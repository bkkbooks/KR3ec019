body:
  text: 卷二十二蟲魚部下品總八十一種今疏其要者十六種蝦蟆牡鼠糞蛤蜊粉附蚶殼附蚺蛇膽蛇蛻白頸蚯蚓蜈蚣蛤蚧水蛭斑蝥田中螺汁白花蛇烏蛇附蜣螂五靈脂蠍鯪鯉甲蝦蟆味辛寒有毒主邪氣破癥堅血癰腫陰瘡服之不患熱病療陰蝕疽癧惡瘡狾犬傷瘡能合玉石一名蟾蜍疏蝦蟆蟾蜍本是二物經云一名蟾蜍者蓋古人通稱蟾為蝦蟆耳經文雖名蝦蟆其用實則蟾蜍也今世所用者皆蟾蜍而非蝦蟆其功益可見矣稟土金之精氣上應月魄性亦靈異其味辛氣寒毒在眉稜皮汁中其主癰腫陰瘡陰蝕疽癘惡瘡狾犬傷瘡者皆熱毒氣傷肌肉也辛寒能散熱解毒其性急速以毒攻毒則毒易解毒解則肌肉和諸證去矣凡瘟疫邪氣得汗則解其味大辛性善發汗辛主散毒寒主除熱故能使邪氣散而不留邪去則胃氣安而熱病退矣破癥堅血者亦以其辛寒能散血熱壅滯也陶隱居云其肪塗玉則刻之如蠟故云能合玉石近世治小兒疳疾多用以其走陽明而能消積滯也主治參互全嬰方五疳保童丸治五疳八痢面黃肌瘦好食泥土不思乳食用大幹蟾蜍一枚燒存性皂角去皮弦一錢燒存性蛤粉水飛三錢麝香一分糊丸粟米大空心米飲下三四十丸日二服鄭氏小兒方走馬牙疳侵蝕口鼻干蚵蚾黃泥裹固煅過黃連各二錢半青黛一錢入麝香少許和研傅之錦囊祕覽附骨壞瘡久不瘥膿汁不已或骨從瘡孔中出用大蝦蟆一個乳發一雞子大豬油四兩入二物煎枯去滓待凝如膏先以桑根皮烏頭煎湯洗拭乾煅龍骨末糝四邊以前膏貼之醫林集要發背腫毒初起勢重者以活蟾一個破開連肛乘熱合瘡上不久必臭不可聞再易三四次即愈袖珍方治瘋犬傷即用蟾蜍後足搗爛水調服之先於頂心拔去血發三四根則小便內見沫也附蟾酥甄權云端午日取眉脂以硃砂麝香為丸如麻子大治小兒疳瘦每日一丸如腦疳以乳汁調滴鼻中日華子云眉酥治蚛牙和牛酥摩傅腰眼並陰囊治腰腎冷並助陽氣蘇頌云主蚛牙及小兒疳瘦觀諸家所主但言其有消積殺蟲溫暖通行之功然其味辛甘氣溫善能發散一切風火抑鬱大熱癰腫之候為拔疔散毒之神藥第性有毒不宜多用入發汗散毒藥中服者尤不可多主治參互同鐵鏽桑硇麝香牛黃冰片用金針針入疔根抹入前藥其疔根即爛出治疔丸同硃砂冰片牛黃明礬白殭蠶麝香黃蠟溶化作丸麻子大用蔥頭白酒服下取汗不過二三小丸青囊雜纂撥取疔黃蟾酥以面丸梧子大每用一丸安舌下即黃出也危氏方拔取疔毒蟾酥以白麵黃丹搜作劑每丸麥粒大挑破納入仍以水澄膏貼之保命集一切瘡毒蟾酥一錢白麵二錢硃砂少許井水調成小錠子如麥大每用一錠蔥湯服汗出即愈如瘡勢緊急用三四錠萬氏家抄凡癰疽發背無名腫毒初起者急取蟾酥三五分廣膠一塊米醋一二碗入銚內火化開用筆蘸乘熱令人不住手周圍潤之以散為度簡誤蟾雖有毒與病無害其眉酥有大毒不宜多服諸家咸云治小兒疳瘦恐非正治不宜漫嘗也即用亦煅過者豫親見一人因齒痛以蟾酥納牙根誤吞入頭目俱脹大而斃即陶注云其皮汁甚有毒犬齧之口皆腫之驗也惟疔腫服之者取其以毒攻毒之義然其劑亦甚小不能為害耳外治殊有神效若欲內服勿過三釐慎毋單使必與牛黃明礬乳香沒藥之類同用乃可如瘡已潰欲其生肌長肉之際得之作痛異常不可不知也牡鼠糞微寒無毒主小兒癇疾大腹時行勞復兩頭尖者是牡鼠屎疏牡鼠糞本經諸家不言味但云微寒無毒然詳其所自應是苦鹹之物蓋鼠屬水而凡糞必苦者也入足陽明足厥陰經其主小兒癇疾大腹及時行勞復者皆熱邪在陽明也苦寒能除是經之熱所以主之古方治男子陰易腹痛婦人吹乳乳癰皆取其除熱軟堅泄結走肝入胃之功耳主治參互同白芷山慈菰山豆根連翹金銀花夏枯草貝母橘葉栝樓根紫花地丁牛蒡子治乳癰乳岩有效外臺祕要傷寒勞復用雄鼠屎二十枚豉五合水二升煮一升頓服活人書加梔子蔥白南陽活人書男子陰易及勞復豭鼠屎湯用豭鼠屎兩頭尖者十四枚韭白根一大把水二盞煎一盞溫服得黏汗為效未汗再服集要方婦人吹奶鼠屎七粒紅棗七八去核包屎燒存性入麝香少許溫酒調服並治乳癰初起普濟方大小便祕雄鼠屎末傅臍中立效除傷寒勞復陰易及乳癰乳岩外他用甚稀故不著簡誤蛤蜊冷無毒潤五臟止消渴開胃解酒毒主老癖能為寒熱者及婦人血塊煮食之疏蛤蜊稟水中之陰氣以生其味鹹氣冷無毒入足陽明經五臟皆屬陰得水氣之陰者其性滋潤而助津液故能潤五臟止消渴開胃也咸能入血軟堅故主婦人血塊及老癖為寒熱也煮食更能醒酒附蛤粉丹溪云味鹹寒無毒主熱痰濕痰老痰頑痰疝氣白濁帶下同香附末薑汁調服主心痛疏此即蛤殼煅成粉者其味鹹氣寒無毒為諸痰證之要藥蓋痰未有不由火氣上炎煎熬津液而成咸能軟堅潤下得之則火自降痰結自消矣疝氣白濁帶下皆腎經為病也腎屬水咸為水化氣類相從故能入腎以除其所苦也心痛者心虛而熱邪客之也五臟苦欲補瀉云心欲軟急食鹹以軟之此之謂也更有消浮腫利小便散癭核腫毒婦人血塊湯火傷瘡等服主治參互普濟方氣虛水腫用大蒜十個搗如泥入蛤粉丸梧子大每食前白湯下二十丸服盡小便下數桶而愈潔古方治白濁遺精真珠粉丸用蛤粉煅一斤黃柏蜜炙一斤為末水和為丸梧子大每服一百丸空心溫酒下日二次蓋蛤粉味鹹而能補腎陰黃柏苦而降心火堅腎故也簡誤肉氣味雖冷乃與丹石人相反食之令腹結痛殼粉善消痰積血塊然脾胃虛寒者宜少用或加益脾胃藥同用為宜蚶溫主心腹冷氣腰脊冷風利五臟健胃令人能食又云溫中消食起陽益血色殼燒過以米醋三度淬後埋令壞醋膏丸治一切血氣冷氣癥癖疏蚶得水中之陽氣故其味甘氣濕性亦無毒經曰里不足者以甘補之又曰形不足者溫之以氣甘溫能益氣而補中則五臟安胃氣健心腹腰脊風冷俱瘳矣胃健則食自消臟暖則陽自起氣充則血自華也殼味鹹走血而軟堅故能治血氣冷氣癥癖丹溪用以消血塊化痰積以此也今世糟其肉侑酒之物罕有入藥者殼惟消癥癖之外無他用故並不著主治及簡誤蚺蛇膽味甘苦寒有小毒主心腹䘌痛下部䘌瘡目腫痛疏蚺蛇稟火土之氣其膽為甲乙風木之化故其味苦中有甘氣寒有小毒氣薄味厚陰也降也入手少陰足厥陰陽明經心腹䘌者蟲在內攻齧也下部䘌瘡者蟲在外侵蝕也濕熱則生蟲苦寒能燥濕殺蟲故內外施之皆得也肝開竅於目肝熱則目腫痛入肝泄熱則腫痛除矣今人受杖時用此噙化可得不死其功能護心止痛使惡血不至薄心有神力也主治參互同血竭乳香沒藥狗頭骨灰䗪蟲天靈蓋象牙末麻皮灰丹砂作丸臨杖服一丸護心止痛多杖無害聖惠方小兒急疳瘡水調蚺蛇膽傅之醫方摘要痔瘡腫痛蚺蛇膽研香油調塗立效真膽絶難得狹長通黑皮膜極薄舐之甜苦剔取粟許著淨水中浮游水上回旋行走者為真其徑沉者非也勿多著亦沉散也今世惟為受杖人所需余甚稀使故不著簡誤蛇蛻音稅味鹹甘平無毒主小兒百二十種驚癇瘛瘲癲疾寒熱腸痔蟲毒蛇癇弄舌搖頭大人五邪言語僻越惡瘡嘔咳明目火熬之良疏蛇蛻蛇之餘性猶存不以氣味為用者故蛇之性上竄而主風蛻之用入肝而辟惡其性一也小兒驚癇瘛瘲癲疾寒熱蛇癇弄舌搖頭大人五邪言語僻越皆肝經為病邪惡侵犯也蛇蛻走竄能引諸藥入肝散邪故主如上等證善能殺蟲故主腸痔蟲毒惡瘡邪去木平故止嘔咳明目今人亦用以催生去翳膜者取其善脫之義也主治參互肘後方治小兒頭面瘡蛇蛻燒灰臘豬脂和傅之並治小兒月蝕周蜜齊東野語云小兒痘後障翳蛇蛻一條燒焙天花粉五錢為末以羊肝破開夾藥縛定米泔水煮食屢試輒效真奇方也濟生祕覽治橫生逆生須臾不救用蛇蛻一具蟬蛻十四個發一握並燒存性分二服酒下仍以小針刺兒足心擦鹽少許即順並能下胞衣産乳方婦人吹乳蛇皮一尺七寸燒末酒服千金方諸漏有膿蛇蛻灰傅之即蟲出直指方魚臍瘡出水四畔浮漿用蛇蛻燒存性雞子清和傅醫方摘要耳忽大痛如有蟲在內奔走或血水流出或干痛不可忍者蛇蛻皮燒存性研細鵝翎吹入立愈簡誤小兒驚癇癲疾非外邪客忤而由於肝心虛者不效白頸蚯蚓味鹹寒大寒無毒主蛇瘕去三蟲伏尸鬼疰蠱毒殺長蟲仍自化作水療傷寒伏熱狂謬大腹黃疸一名土龍畏蔥鹽疏蚯蚓得土中陰水之氣故其味鹹寒無毒大寒能祛熱邪除大熱故主伏尸鬼疰乃療傷寒伏熱狂謬咸主下走利小便故治大腹黃疸諸蟲瘕咸屬濕熱所成得鹹寒之氣則瘕自消蟲自去而蠱毒之熱亦解矣昔一道人治熱病發狂用白頸蚯蚓十數條同荊芥穗搗汁與飲之得臭汗而解其為治傷寒伏熱狂謬之明驗也主治參互肘後方傷寒熱結六七日狂亂見鬼欲走以大白頸蚯蚓半斤去泥用人溺煮汁飲或生絞汁亦可斗門方小便不通因濕而得者用蚯蚓搗爛浸水濾取濃汁半碗服立通勝金方耳卒聾閉蚯蚓入鹽安蔥管內化水點之立效保命集瘰癧潰爛流串者用荊芥根下段煎湯溫洗良久看瘡破紫黑處以針刺去血再洗三四次用韭菜地上蚯蚓一把五更時收取炭火上燒紅為末每一匙入乳香沒藥輕粉各半錢穿山甲九片炙為末麻油調傅之神效簡誤蚯蚓氣大寒能除有餘邪熱故傷寒非陽明實熱狂躁者不宜用溫病無壯熱及脾胃素弱者不宜用黃疸緣大勞腹脹屬脾腎虛尸疰因陰虛成勞瘵者咸在所忌性復有小毒被其毒者以鹽水解之蜈蚣味辛溫有毒主鬼疰蠱毒啖諸蛇魚毒殺鬼物老精溫瘧去三蟲療心腹寒熱結聚墮胎去惡血赤頭足者良一名蝍蛆一名天龍疏蜈蚣稟火金之氣以生故其味辛氣溫有毒乃屬陽之毒蟲足厥陰經藥也善能制蛇見大蛇便緣上啖其腦淮南子云騰蛇遊霧而殆於蝍蛆正指此也故本經主啖諸蛇蟲魚毒及去三蟲蠱毒也性復走竄辟邪所以能療鬼疰溫瘧殺鬼物老精辛主散結溫主通行故又治心腹寒熱結聚墮胎去惡血也今世又以之治小兒驚癇風搐臍風口噤與夫瘰癧便毒痔漏等證皆用之主治參互金頭蜈蚣得牛角䚡象牙末豬懸蹄刺蝟皮蛀竹屑能去通腸漏管直指方瘭瘡一名蛇瘴蠻煙瘴雨之鄉多毒蛇氣人有不伏水土風氣而感觸之者數月以還必發蛇瘴惟赤足蜈蚣最能伏蛇為上藥白芷次之聖濟總録云嶺南外蛇瘴一名瑣喉瘴項大腫痛連喉用赤足蜈蚣一二節研細水下即愈奇效良方天蛇頭瘡生手指頭上用蜈蚣一條燒煙燻一二次即愈或為末豬膽汁調塗之濟生祕覽便毒初起蜈蚣一條瓦上焙存性為末酒調服圖經治初失小兒口噤不開不能乳者用赤足蜈蚣去足炙研末以豬乳二合調半錢分三四服溫灌之效簡誤蜈蚣性有毒善走竄小兒慢驚風口噤不言大人溫瘧非煙嵐瘴氣所發心腹積聚非蟲結蛇瘕便毒成膿將潰咸在所忌性畏蛞蝓不敢過其所行之路能齧人痛甚以蛞蝓搗塗之痛立止蜈蚣能制龍蛇而反畏蛞蝓蜘蛛即莊子所謂物畏其天陰符經所謂禽之制在氣也凡使勿用千足蟲真相似但蜈蚣腰中一段無腳所以能掬而彈遠為異又云頭上有白肉面並嘴尖可別若誤用並把著腥臭氣入頂能殺人也蛤蚧味鹹平有小毒主久肺勞傳尸殺鬼物邪氣療咳嗽下淋瀝通水道生嶺南山谷及城牆或大樹間身長四五寸尾與身等形如大守宮一雌一雄常自呼其名曰蛤蚧最護惜其尾或見人欲取之多自齧斷其尾人即不取之凡採之者須存其尾則用之力全故也疏蛤蚧得金水之氣故其味鹹氣平有小毒入手太陰足少陰經其主久肺勞傳尸鬼物邪氣咳嗽淋瀝者皆肺腎為病勞極則肺腎虛則生熱故外邪易侵內證兼發也蛤蚧屬陰能補水之上源則肺腎皆得所養而勞熱咳嗽自除邪物鬼氣自去矣肺朝百脈通調水道下輸膀胱肺氣清故淋瀝水道自通也又顧玠海槎録云廣西橫州甚多蛤蚧牝牡上下相呼纍日情洽乃交兩相抱負自墮於地人往捕之亦不知覺以手分劈雖死不開乃用熟槁草細纏蒸過曝乾售之煉為房中之藥甚效尋常捕者不論雌雄但可為雜藥用主治參互寇氏衍義治久嗽不愈肺積虛熱成癰咳出膿血曉夕不止喉中氣塞胸膈噎痛用蛤蚧阿膠鹿角膠犀角羚羊角各二錢半用河水三升銀石器內文火熬至半升濾汁時時仰臥細呷日一服簡誤咳嗽由風寒外邪者不宜用雷公曰其毒在眼須去眼及甲上尾上腹上肉毛以酒浸透隔兩重紙緩焙令乾以瓷器盛懸屋東角上一夜用之力可十倍勿傷尾水蛭味鹹苦平微寒有毒主逐惡血瘀血月閉破血瘕積聚無子利水道又墮胎俗名馬蟥疏水蛭生於溪澗陰濕之處其味鹹苦氣平有大毒其用與虻蟲相似故仲景方中往往與之並施鹹入血走血苦泄結鹹苦並行故治婦人惡血瘀血月閉血瘕積聚因而無子者血蓄膀胱則水道不通血散而膀胱得氣化之職水道不求其利而自利矣墮胎者以其有毒善破血也主治參互入抵當湯治傷寒蓄血下焦因而發狂入大黃䗪蟲丸兼治虛勞骨蒸咳嗽內有乾血皮膚甲錯入鱉甲煎丸消瘧母以上皆仲景方古今録驗方墜跌打擊內傷神效水蛭一兩燒令煙出為末入麝香一兩每酒服一錢當下蓄血未止再服其效如神簡誤水蛭虻蟲皆破逐瘀血血瘀發病之惡藥而水蛭入腹煅之若尚存性尚能變為水蛭齧人腸臟非細故也破瘀消血之藥盡多正足選用奚必用此難制之物戒之可也如犯之以黃泥作丸吞之必入泥而出斑蝥味辛寒有毒主寒熱鬼疰蠱毒鼠瘻疥癬惡瘡疽蝕死肌破石癃血積傷人肌墮胎馬刀為之使畏巴豆丹參空青甘草疏斑蝥稟火金相合之氣故其味辛氣寒扁鵲云有大毒近人肌肉則潰爛毒可知矣入手陽明手太陽經性能傷肌肉蝕死肌故主鼠瘻疽瘡疥癬辛寒能走散下泄故主破石癃血積及墮胎也至於鬼疰蠱毒必非極辛大毒之藥所能療此本經之誤甄權主瘰癧通利水道以其能追逐腸胃垢膩復能破結走下竅也主治參互治瘰癧用肥皂二斤去核每服皂一莢入斑蝥四枚線縛蒸取出去斑蝥並肥皂皮筋得淨肉十兩入貝母二兩栝樓根玄參甘草薄荷葉各一兩五錢共為末以肥皂搗如泥為丸梧子大每服一錢白湯吞服後腹疼勿慮此藥力追毒之故治癲犬咬方用斑蝥七個去頭足並翅酒洗和濕糯米銅勺內炒米熟為度隨將二物研成細末加六一散三兩分作七服每清晨一服白湯調下本人頭頂心必有紅髮二三根要不時尋覓拔去經驗方內消瘰癧不拘大人小兒用斑蝥一兩去頭足翅以粟米一升同炒米焦去米入薄荷四兩為末烏雞子清丸如緑豆大空心臘茶下三丸加至五丸卻每日減一丸減至一丸後復日增一丸以消為度簡誤斑蝥性有大毒能潰爛人肌肉惟瘰癧癲犬咬或可如法暫施此物若煅之存性猶能齧人腸胃發泡潰爛致死即前二證亦不若用米同炒取氣而勿用質為穩餘證必不可餌切戒切戒田中螺汁大寒主目熱赤痛止渴疏田螺産於水田中稟水土之陰氣故其汁大寒味應甘性無毒陶隱居以真珠黃連末納入良久取汁點目痛神效以其寒能除熱也解一切有餘之熱故能止渴及醒酒主治參互丹溪方治噤口痢疾用活大田螺二枚搗爛入麝香三分作餅烘熱貼臍間半日熱氣下行即思食矣甚效又方治小便不通腹脹如鼓用田螺一杖鹽半匕生搗傅臍下一寸三分即通經驗方大腸脫肛墜下三五寸者用大田螺二三枚將淨水養去泥用雞爪黃連研細末入靨內待化成水以濃茶洗淨肛門將雞翎蘸水刷之以軟帛托上自然不再發也乾坤生意痔漏疼痛用田螺一個入龍腦一分在內取水搽之效簡誤目病非關風熱者不宜用白花蛇味甘咸溫有毒主中風濕痹不仁筋脈拘急口面喎斜半身不遂骨節疼痛大風疥癩及暴風瘙癢腳弱不能久立一名褰鼻蛇白花者良出蘄州龍頭虎口黑質白花目開如生尾有爪甲真蘄産也疏白花蛇生於土穴陰霾之處稟幽暗毒厲之氣故其味雖甘鹹性則有大毒也經曰風者百病之長善行而數變蛇性走竄亦善行而無處不到故能引諸風藥至病所自腑臟而達皮毛也凡癘風疥癬喎僻拘急偏痹不仁因風所生之證無不借其力以獲瘥本經著其功能信非虛矣主治參互同苦參何首烏威靈仙鱉蝨胡麻天門冬百部豨蘞漆葉刺蒺藜治癘風並遍身頑痹疥癬醫壘元戎驅風膏治風癱癘風遍身疥癬用白花蛇肉四兩酒潤炙乾大麻七錢半薄荷荊芥各二錢半為末好酒二升蜜四合石器熬成膏每服一盞溫湯服日三服急於暖處出汗十日效瑞竹堂經驗方白花蛇酒治諸風癘癬用白花蛇一條酒潤去皮骨取肉絹袋盛之蒸糯米一斗安曲於缸底置蛇於曲上以飯安蛇上用物密蓋三七日取酒以蛇曬乾為末每服三五分溫酒下仍以濁酒並糟作餅食之尤佳潔古白花蛇散治大風病白花蛇烏梢蛇各取淨肉二錢酒炙雄黃二錢大黃五錢為末每服二錢白湯下三日一服附烏蛇即烏梢蛇氣味所主與白花蛇同第性善無毒耳修事亦同不復載色黑如漆尾細有劍脊者良簡誤白花蛇性走竄有毒癘風疥癬頑痹等證誠為要藥然而中風口面喎斜半身不遂定緣陰虛血少內熱而發與得之風濕者殊異非所宜也醫師宜辨之頭尾併骨俱有大毒須盡去之蜣螂味鹹寒有毒主小兒驚癇瘛瘲腹脹寒熱大人癲疾狂易音羊手足端寒支滿賁豚疏蜣螂稟陰濕之氣以生故其味鹹氣寒有毒入足厥陰手足陽明經小兒驚癇瘛瘲腹脹寒熱大人癲疾狂易皆肝胃大腸三經風熱壅盛所致鹹寒除三經之邪熱則諸證自瘳別録主手足端寒支滿者以脾胃主四肢而治中焦脾氣結滯則血液不能通行灌溉於手足胃家熱壅及大腸結實則中焦不治而氣逆支滿行三經之壅滯則所苦減除矣咸能軟堅入腎故又主奔豚也古今方書以之治一切痔瘻及疔腫疽瘡出箭鏃之用主治參互本事方推車散治大小便經月不通欲死者用推車客七個男用頭女用身螻蛄七個男用身女用頭新瓦焙研末用虎目樹南向皮煎汁調服只一服立通一方大腸脫肛蜣螂燒存性為末入冰片研勻摻上托之即入唐氏方腸漏出水用蜣螂一枚陰乾入冰片少許為細末紙捻蘸末入孔內漸漸生肉藥自退出即愈劉涓子方附骨疽瘡蜣螂七枚同大麥搗傅廣利方無名惡瘡忽得不識者用蜣螂杵汁塗之劉禹錫纂柳州救三死方云元和十一年得疔瘡凡十四日益篤善藥傅之莫救長慶賈方伯教用蜣螂心一夕百苦皆已明年正月食羊肉又大作再用如神驗其用蜣螂心在腹下度取之其肉稍白是也貼瘡半日許再易血盡根出即愈蜣螂畏羊肉故食之即發其法蓋出葛洪時後方楊氏家藏方箭鏃入骨不可移者用巴豆微炒同蜣螂搗塗斯須痛定必微癢忍之待極癢不可忍乃撼動拔之立出凡諸瘡皆可療也搗為丸塞下部引痔蟲出盡永瘥簡誤蜣螂有毒外用易臻厥功內服非虛人所宜非不得已勿輕試五靈脂味甘溫無毒主療心腹冷氣小兒五疳闢疫治腸風通利氣脈女子月閉出北地此是寒號蟲糞也疏寒號蟲畏寒喜暖故其糞亦溫味甘而無毒氣味俱厚陰中之陰降也入足厥陰手少陰經性專行血故主女子血閉味甘而溫故療心腹冷氣及通利氣脈也其主小兒五疳者以其亦能消化水穀治腸風者取其行腸胃之瘀滯也凡心胸血氣刺痛婦人産後少腹兒枕塊諸痛及痰挾血成窠囊血凝齒痛諸證所必須之藥主治參互同澤蘭牛膝益母草延胡索牡丹皮紅花赤芍藥山楂生地黃治産後惡露不淨腹中作疼加桃仁其效更速勿過劑同番降香紅曲川通草紅花延胡索韭菜童便治胃脘瘀血作痛同木香烏藥治周身血氣刺痛和劑局方失笑散治男女老少心痛腹痛少腹痛並少腹疝氣諸藥不效者能行能止婦人妊娠心痛及産後心痛少腹痛血氣痛尤妙用五靈脂蒲黃等分研末先以醋二杯調末熬成膏入水一盞煎至七分連藥熱服未止再服一方以醋糊丸童便酒服楊氏産乳方紫金丸治産後惡露不快腰痛少腹如刺時作寒熱頭痛不思飲食又治久有瘀血月水不調黃瘦不食亦療心痛功與失笑同以五靈脂水淘淨炒末一兩以好米醋調稀慢火熬膏入真蒲黃末和丸龍眼大每服一丸以水與童便各半盞煎至七八分溫服少頃再服惡露即下血塊經閉者酒磨服之圖經産後血暈不知人事用五靈脂二兩半生半炒為末每服一錢白水調下如口噤者斡開灌之入喉即愈丹溪方産後腹痛五靈脂香附桃仁等分研末醋糊丸服一百丸白朮牛膝陳皮湯下事林廣記卒暴心痛五靈脂炒一錢半乾薑炮三分為末熱酒服立愈産寶方胎衣不下惡血衝心用五靈脂半生半炒研末生服二錢溫酒下百一選方痰血凝結紫芝丸用五靈脂水飛半夏湯泡等分為末薑汁浸蒸餅丸梧子大每米飲下二十丸夏子益奇疾方血潰怪病凡人眼中白珠渾黑視物殊常毛髮堅直如鐵條能飲食而不語如醉名曰血漬以五靈脂為末湯服二錢即愈簡誤五靈脂其功長於破血行血故凡瘀血停滯作痛産後血暈惡血衝心少腹兒枕痛留血經閉瘀血心胃間作痛血滯經脈氣不得行攻刺疼痛等證在所必用然而血虛腹痛血虛經閉産婦去血過多發暈心虛有火作痛病屬血虛無瘀滯者皆所當忌蠍味甘辛有毒療諸風癮疹及中風半身不遂口眼喎斜語澀手足抽掣形緊小者良疏蠍稟火金之氣以生本經味甘辛有毒然察其用應是辛多甘少氣溫入足厥陰經諸風掉眩屬肝木風客是經非辛溫走散之性則不能祛風逐邪兼引諸風藥入達病所也故大人真中風小兒急驚風皆須用之主治參互全幼心鑑小兒臍風宣風散治小兒初生斷臍後傷風唇青口撮出白沫不乳用全蠍二十一個無灰酒塗炙為末入麝香少許每用金銀煎湯調半字服之經驗方大人風涎用蠍一個頭尾全者以薄荷四葉裹定火上炙焦同研為末作一服白湯下小兒驚風分四服如前服得胡桃同煅共研黃耆金銀花湯下治橫痃不收口簡誤蠍風藥也似中風及小兒慢脾風病屬於虛法咸忌之鯪鯉甲微寒主五邪驚啼悲傷燒之作灰以酒或水和方寸匕療蟻瘻疏鯪鯉甲穿山穴居其性善走味辛平氣微寒有毒入足厥陰兼入手足陽明經邪魅著人則驚啼悲傷不已辛主散則邪魅去驚啼悲傷止矣喜食蟻又能入大腸故療蟻螻蟻瘻者即世人所云漏也性走能行瘀血通經絡故又有消癰毒排膿血下乳和傷發痘等用主治參互鯪鯉甲俗名穿山甲土炒同乳香沒藥番降香紅曲山楂川通草童便治上部內傷胸膈間疼痛同當歸白芷金銀花連翹紫花地丁夏枯草牛蒡子乳香沒藥甘草貝母皂角刺治癰腫未潰資為引導佐地榆治便毒直指方治鼠痔成瘡腫痛用穿山甲尾尖處一兩煅存性鱉甲酥炙一兩麝香半錢為末每服一錢空心茶下又方乳汁不通湧泉散用穿山甲炮研末酒服方寸匕日二服外以油梳梳乳即通又方便毒便癰穿山甲半兩豬苓二錢並以醋炙研末酒服二錢得紫草生犀角生地黃治痘瘡毒盛不得起發色帶乾紅枯燥者有功簡誤癰疽已潰不宜服痘瘡元氣不足不能起發者不宜服
