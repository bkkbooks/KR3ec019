body:
  text: 卷二十七菜部上品總三十種今疏其要者八種胡荽瓜蒂白冬瓜白芥芥萊蔔苦菜苜蓿胡荽味辛溫一云微寒微毒消穀治五臟補不足利大小腸通小腹氣拔四肢熱止頭痛療痧疹豌豆瘡不出作酒噴之立出通心竅疏胡荽稟金氣多火氣少故味辛香氣溫微毒入足太陰陽明經辛香走竄而入脾故主消穀利大小腸通少腹氣脾胃為邪熱所幹則頭痛四肢熱辛溫發散二經之邪則頭痛四肢熱自拔痧疹痘瘡出不快者外為風寒所侵或穢氣所觸也辛溫祛風寒香竄闢穢氣則腠理通暢而痧疹痘瘡皆出矣通心竅治五臟補不足者總言其辛香內通心脾外達腸胃除一切不正之氣則真氣安和斯有補益之道耳子亦能發痘疹殺魚腥主治參互經驗後方痧痘出不快同胡荽二兩切以酒二大盞煎沸沃之以物蓋定勿令泄氣候冷去滓微微含噴從項背至足令遍勿噀頭面子母祕録肛門脫出胡荽一升切燒煙燻之即入外臺祕要牙齒疼痛胡荽子五升水五升煮取一升含嗽簡誤胡荽辛香發散氣虛人不宜食疹痘出不快非風寒外侵及穢惡之氣觸犯者不宜用孟詵云多食損人精神華他云胡臭口臭䘌齒腳氣皆不可食令病加甚陳藏器云久食令人多忘發腋臭根發痼疾凡服一切補藥及藥中有白朮牡丹者咸忌之瓜蒂味苦寒有毒主大水身面四肢浮腫下水殺蠱毒咳逆上氣及食諸果病在胸腹中皆吐下之去鼻中息肉療黃疸疏瓜蒂感時令之火熱稟地中之伏陰故其味苦氣寒有小毒氣薄味厚浮而升陰多於陽酸苦湧泄為陰故也入手太陰足陽明足太陰經其主大水身面四肢浮腫黃疸者皆脾胃虛水氣濕熱乘虛而客之也苦以湧泄使水濕之氣外散故能主之經曰在高者因而越之病在胸中則氣不得歸元而為咳逆上氣吐出胸中之邪則氣自順咳逆止矣殺蠱毒者亦取吐出之義去鼻中息肉者以其苦寒能除肺家之熱也日華子治腦寒熱齆眼昏吐痰好古得麝香細辛治鼻不聞香臭及吐風熱痰涎風眩頭痛癲癇喉痹頭面有濕氣傷寒客水胸中傷食脹滿下部無脈等證皆借其宣發湧泄引涎追淚之功耳主治參互仲景傷寒論病如桂枝證頭不痛項不強寸脈微浮胸中痞硬氣上衝咽喉不得息者此胸中有寒也當吐之宜瓜蒂散用瓜蒂赤小豆等分為散取一錢以香豉一合用熱湯七合煮作稀糜去滓取汁和散頓服之不吐少少加得快吐乃止濕家病身上疼痛發熱面黃而喘頭痛鼻塞而煩其脈大自能飲食腹中和無病病在頭中寒濕故鼻塞納藥鼻中則愈瓜蒂散主之太陽中暍身熱疼重而脈微弱此因夏月傷冷水水行皮中所致宜吐之瓜蒂散病胸上諸實胸中鬱郁而痛不能食欲使人按之而反有涎唾下利日十餘行其脈反微寸口脈微滑此可吐之吐之則利自止宿食在上脘者當吐之病人手足厥冷脈乍結以客氣在胸中心下滿而煩欲食不能食者當吐之懊憹煩躁不得眠未經汗下者謂之實煩當吐之已上悉用瓜蒂散皆仲景法東垣曰難經云上部有脈下部無脈其人當吐不吐者死此飲食內傷填塞胸中食傷太陰則風木生髮之氣伏於下宜瓜蒂散吐之內經所謂木鬱達之也吐去上焦有形之物則木得舒暢天地交而萬物通矣諸亡血家不可與瓜蒂散寇氏衍義風涎暴作氣塞倒僕用瓜蒂末二錢膩粉一錢匕以水半合調灌良久涎自出不出含沙糖一塊乾咽即涎出也千金翼熱病發黃瓜蒂為末以大豆許吹鼻中取出黃水乃愈孟詵食療陰黃黃疸取瓜蒂丁香赤小豆各七枚為末吹豆許鼻中少時黃水流出隔一日用瘥乃止並治身面浮腫活人書濕家頭痛瓜蒂末一字㗜入鼻中口含冷水取出黃水愈聖惠方鼻中息肉瓜蒂末白礬末各半錢錦裹塞之或以豬脂和梃子塞之日一換簡誤瓜蒂極苦而性上湧能損胃傷血耗氣損神凡胸中無寒胃家無食皮中無水頭面無濕及胃虛氣弱諸亡血諸産後似中風倒僕心虛有熱癲癇女勞谷疸元氣尪羸脾虛浮腫切勿誤用誤用則為害非細傷生不淺戒之戒之白冬瓜味甘微寒主除小腹水脹利小便止渴疏白冬瓜內稟陰土之氣外受霜露之侵故其味甘氣微寒而性冷利無毒水屬陰瓜性亦屬陰氣類相從故能利小便除小腹水脹也甘寒解胃中之熱故又能止渴也弘景止消渴煩悶解毒孟詵益氣耐老除心胸滿去頭面熱大明消熱毒癰腫切片摩痱子蘇頌利大小腸壓丹石毒皆得其旨者也主治參互孟詵食療積熱消渴白冬瓜去皮每食後嚼二三兩五七度良古今録驗産後痢渴久病津液枯竭四肢浮腫口舌乾燥用冬瓜一枚黃土泥厚五寸煨熟絞汁飲良亦治傷寒痢渴楊氏家藏方十種水氣浮腫喘滿用大冬瓜一枚切蓋去瓤以赤小豆填滿蓋合簽定以紙筋泥固濟日乾用糯糠兩大籮入瓜在內煨至火盡取出切片同赤豆焙乾為末水糊丸梧子大每服七十丸煎冬瓜子湯下日三服小便利為度冬瓜仁味甘寒能開胃醒脾同橘紅石斛竹茹枇杷葉白芍藥蘆根汁人參白茯苓治胃虛嘔吐同人參茯神竹瀝白茯苓黃耆甘草白芍藥酸棗仁治小兒慢脾風簡誤冬瓜性冷利凡臟腑有熱者宜之若虛寒腎冷久病滑泄者不得食未經霜者不宜多食九月後食之乃佳白芥味辛溫無毒主冷氣色白甚辛美子主射工及疰氣上氣發汗胸膈痰冷面黃疏芥稟火金之氣以生而白芥則又得金氣之勝故味辛氣溫無毒辛溫入肺而發散故有溫中除冷發汗辟邪豁痰利氣之功朱震亨云痰在脅下及皮裡膜外非白芥子莫能達古方控涎丹用之正此義爾主治參互韓𢘅醫通云凡老人苦於痰氣喘嗽胸滿懶食不可妄投燥利之藥反耗真氣因有人求治其親遂制三子養親湯治之隨試隨效用白芥子紫蘇子白萊蔔子各微炒研破看所主為君每劑不過三四錢用絹袋盛入湯煮飲之勿煎大過則味苦辣若大便素實者入蜜一匙冬月加姜一片蘇恭主疰氣發無常處及射工毒以芥子丸服之或搗末醋和塗之隨手有驗簡誤白芥子味極辛氣溫能搜剔內外痰結及胸膈寒痰冷涎壅塞者殊效然而肺經有熱與夫陰火虛炎咳嗽生痰者法在所忌其莖葉煮食動風動氣有瘡瘍痔疾便血者咸忌之芥味辛溫無毒歸鼻主除腎邪氣利九竅明耳目安中久食溫中疏芥所稟與白芥同今人以醋椒同芥心作辣薤食之則腦額酸楚淚涕俱出即歸鼻利竅明耳目之驗也辛溫能利氣消痰開胃闢寒故主安中及久食溫中也其主除腎邪氣者辛能潤腎溫能暖水臟故也子功用與白芥子相同力稍不逮主治參互治肺癰用百年芥菜滷久窨地中者飲數匙立效其義以芥菜辛溫得鹽水久窨之氣變為辛寒辛寒能散痰熱芥菜主通肺氣所以治肺癰真良法也簡誤與白芥子同其主利九竅明耳目者蓋言辛散走竄豁痰引涎暫用一時使邪去而正自復非謂其真能利竅明耳目也用者詳之萊蔔音蔔根味辛甘溫無毒散服及炮煮服食大下氣消穀去痰癖肥健人生搗汁服主消渴試大有驗疏萊蔔根稟土金之氣以生本經味辛甘氣溫無毒孟詵云性冷大明云平詳其功用應是生者味辛性冷熟者味甘溫平故本經下氣消穀去痰癖肥健人及溫中補不足寬胸膈利大小便化痰消導者煮熟之用也止消渴制面毒行風氣去邪熱氣治肺痿吐血肺熱痰嗽下痢者生食之用也大抵入手足太陰手足陽明經故所主皆脾肺腸胃之病子味辛過於根生研汁服吐風痰同醋研消腫毒炒熟下氣定喘消食除脹止氣痛以其性辛甚故升降之功亦烈於根也朱震亨云萊蔔子治痰有推牆倒壁之功是矣主治參互醫學集成齁喘痰促遇厚味即發者用蔔子淘淨蒸熟曬研薑汁浸蒸餅丸緑豆大每服三十丸以口津咽下日三服治年遠脾泄百藥不效單煮白萊蔔終日啖之不輟必瘥簡誤萊蔔根葉皆可食生熟皆宜乃蔬中之至賤而能止渴充飢者歉歲農人種之最有利益但性專下氣復能耗血故多食則髭發早白服地黃何首烏者不可食子消痰下氣更速凡虛弱人忌之苦菜味苦寒無毒主五臟邪氣厭伏也谷胃痹腸澼渴熱中疾惡瘡久服安心益氣聰察少臥輕身耐老耐飢寒高氣不老疏苦菜與苦苣苦蕒一物而形稍異功用則相同也稟天地之陰氣故其味苦氣寒無毒入心脾胃三經其主五臟邪氣者邪熱客於心也胃痹渴熱中疾者熱在胃也腸澼者熱在大腸也惡瘡者熱瘀傷血肉也苦寒總除諸熱故主之也熱去則神自清故久服安心益氣聰察少臥也輕身耐老耐飢寒高氣不老者總言其熱退陰生安心益氣之極功也主治參互寇宗奭衍義治疔瘡以苦苣搗汁傅之殊驗青苗葉陰乾以備冬月需用為末水調傅之唐寶經驗方對口惡瘡野苦苣擂汁一鍾入薑汁一匙和酒服以渣傅一二次即愈肘後方中沙蝨毒沙蝨在水中人澡浴則著人身鑽入皮里初得皮上正赤如小豆黍粟摩之痛如刺三日後發寒熱發瘡毒若入骨殺人嶺南多此即以茅葉刮去以苦菜汁塗之佳簡誤脾胃虛寒者忌之苜蓿味苦平無毒主安中利人可久食疏苜蓿草也嫩時可食處處田野中有之陝隴人亦有種者本經云苦平無毒主安中利人可久食然性頗涼多食動冷氣不益人根苦寒主熱病煩滿目黃赤小便黃酒疸搗汁一升服令人吐利即愈其性苦寒大能泄濕熱故耳以其葉煎汁多服專治酒疸大效
