body:
  text: 卷十七獸部中品總十七種今疏其要者九種白馬莖屎溺附鹿茸角髓腎肉附牛角䚡膽肉附羖羊角肝腎肉血附狗陰莖頭骨血肉附羚羊角犀角虎骨兔頭骨腦肝肉附白馬莖味鹹甘平無毒主傷中脈絶陰不起強志益氣長肌肉肥健生子小兒驚癇陰乾百日用疏馬火畜也其陰莖又純陽之物也故能主男子陰痿堅強房中藥多用之本經味鹹氣平別録甘無毒察其功用氣平應作溫非甘溫則不主傷中脈絶以甘能補血脈溫能通經絡故耳陽衰則陰不起而生長之道絶鹹溫走下焦補助真陽則陰自起精自暖故能令人有子也氣屬陽陽得補故能益氣腎藏志腎氣足故能強志甘溫補血脈而助真氣故又能長肌肉肥健也別録又主小兒驚癇者似非其所長應是誤入耳凡收當取銀色無病白馬春月遊牝時力勢正強者生取陰乾百日用時以銅刀切片將生羊血拌蒸半日去血曬乾銼用主治參互得肉蓯蓉巴戟天山茱萸菟絲子真陽起石人參鹿茸狗陰莖作丸治真陰虛脫陰痿不起下元冷憊等證簡誤馬陰莖乃純陽之物也凡陰虛火盛者不得服人但喜其溫暖滋助陽道少年多欲者房中術用之仗其力勢恣欲無節以致損竭真陰多成勞瘵不可不戒也附馬通微溫主婦人崩中止渴及吐下血鼻衄金瘡止血疏白馬通本經雖云微溫然必是苦而涼者惟其苦涼所以能療諸血熱證止渴及孟詵主陰陽易垂死者絞汁服也附白馬溺味辛微寒主消渴破癥堅積聚男子伏梁積疝婦人瘕疾銅器盛飲之疏白馬溺昔有人與其奴皆患心腹痛病奴死剖之得一白鱉赤眼仍活以諸藥納口中終不死有人乘白馬觀之馬尿墮鱉而鱉縮遂以灌之即化成水其人乃服之疾亦愈觀其氣味不應有如是之功乃知物性畏忌各有所制如刀柄之刈三稜而化為水正以遇其所制之物故也本經雲氣微寒然詳其用必是微溫味應帶咸辛鹹溫俱足所以能療經所言諸證主治參互千金方食發成瘕咽中如有蟲上下者白馬尿飲之佳鮑氏方利骨取牙白馬尿浸茄稈三日炒為末點牙即落簡誤無積聚癥瘕者不得服胞中虛痞誤作伏梁服之有損鹿茸味甘酸溫微溫無毒主漏下惡血寒熱驚癇益氣強志生齒不老療虛勞灑灑如瘧羸瘦四肢痠疼腰脊痛小便利泄精溺血破留血在腹散石淋癰腫骨中熱疽癢癢應作瘍凡用取形如分岐馬鞍茸端如瑪瑙紅玉破之肌如朽木者最良先以酥薄塗勻於烈炎中燎去毛再炙疏鹿茸稟純陽之質含生髮之氣故其味甘氣溫別録言酸微溫氣薄味厚陰中之陽也入手厥陰少陰足少陰厥陰經婦人衝任脈虛則為漏下惡血或瘀血在腹或為石淋男子肝腎不足則為寒熱驚癇或虛勞灑灑如瘧或羸瘦四肢痠疼腰脊痛或小便數利泄精溺血此藥走命門心包絡及腎肝之陰分補下元真陽故能主如上諸證及益氣強志生齒不老也癰腫疽瘍皆榮氣不從所致甘溫能通血脈和腠理故亦主之日華子主補男子腰腎虛冷腳膝無力夜夢鬼交精溢自出女人崩中漏血赤白帶下炙末空心酒服方寸匕主治參互同牛膝杜仲地黃山茱萸補骨脂巴戟天山藥肉蓯蓉菟絲子治腎虛腰痛及陰痿不起淡寮方斑龍丸治諸虛用鹿茸酥炙鹿角膠炒成珠鹿角霜陽起石煅紅醋淬肉蓯蓉酒浸酸棗仁柏子仁黃耆各一兩地黃九蒸八錢硃砂半錢各為末酒糊丸梧子大每空心酒下五十丸昔西蜀市中有一道人貨之一名茸珠丹每醉高歌曰尾閭不禁滄海竭九轉靈丹都漫說唯有班龍頂上珠能補玉堂關下穴朝野遍傳之即此方也普濟方鹿茸酒治陽事虛痿小便頻數面色無光用嫩鹿茸一兩去毛切片山藥末一兩絹袋裹置酒甕中七日後開甕日飲三杯將茸焙乾作丸服本事方陰虛腰痛不能反側鹿茸菟絲子各一兩茴香半兩為末以羊腎一對和酒煮爛搗和泥和丸梧子大陰乾每服三五十丸酒下日三服濟生方室女白帶因衝任虛寒者鹿茸酒蒸焙二兩金毛狗脊白蘞各一兩為末用艾煎醋打米糊丸梧子大每酒下五十丸日二服簡誤同白膠附鹿角味鹹無毒主惡瘡癰腫逐邪惡氣留血在陰中除小腹血急痛腰脊痛折傷惡血益氣杜仲為之使疏鹿山獸屬陽夏至解角者陰生陽退之象麋澤獸屬陰冬至解角者陽生陰退之象也是以麋茸補陰鹿茸補陽角亦如之凡角初生軟嫩者為茸稟壯健之性故能峻補腎家真陽之氣熬成白膠則氣味甘緩能通周身之血脈生角則味鹹氣溫惟散熱行血消腫辟惡氣而已咸能入血軟堅溫能通行散邪故主惡瘡癰腫逐邪惡氣及留血在陰中少腹血急痛折傷惡血等證也肝腎虛則為腰脊痛鹹溫入腎補肝故主腰脊痛氣屬陽補陽故又能益氣也日華子云水磨服治脫精尿血夜夢鬼交醋磨汁塗瘡瘍癰腫熱毒火炙熱尉小兒重舌鵝口瘡孟詵云蜜炙研末酒服輕身強骨髓補陽道絶傷又治婦人夢與鬼交者酒服一撮即出鬼精燒灰治女子胞中余血不盡欲死者悉取其入血行血散熱消腫補陽辟邪之意也主治參互濟生方骨虛勞極面腫垢黑脊痛不能久立血氣衰憊發落齒槁甚則喜唾用鹿角屑二兩牛膝一兩半為末煉蜜丸梧子大每服五十丸空心鹽湯下肘後方腎虛腰痛如錐刺不能動搖鹿角屑二兩炒黃研末空心溫酒服方寸匕日三子母祕録産後腹痛瘀血不盡者鹿角燒研豉汁服方寸匕日三並治産後血暈千金方蹉跌損傷血瘀骨痛鹿角末酒服方寸匕瀕湖方癰癤腫痛毒鹿角尖磨濃汁塗之簡誤無瘀血停留者不得服陽盛陰虛者忌之胃火齒痛亦不宜服附髓味甘溫主丈夫女子傷中絶脈筋急痛咳逆以酒和服之良疏髓者精血之純懿內充以實骨者也鹿稟純陽故其髓味甘氣溫性能補血而潤燥所以主一切血脈不和如傷中脈絶筋急痛及咳逆也日華子同蜜煮服壯陽道令人有子同地黃汁煎膏服填骨髓壯筋骨治嘔吐者亦此意也附腎平主補腎氣疏鹿性淫一牡常御百化腎氣有餘故也故服之能壯陽道補腎家不足附鹿肉甘溫補中強五臟益氣力生者療口僻割薄之疏鹿所食多芳草其性質芳潔氣味醇和故其肉味甘氣溫無毒與他肉不同也性能益脾胃通血脈故主補中強五臟益氣力也生者療中風口僻亦取其有通血脈之功血脈通則口僻自正也牛角䚡下閉血瘀血疼痛女人帶下燔之味苦無毒疏牛角䚡乃角中嫩骨也為筋之粹骨之餘入足厥陰少陰血分之藥兼入手陽明經苦能泄溫能通行故主婦人帶下及閉血瘀血疼痛也主治參互同豬懸蹄蝟皮金頭蜈蚣蛀竹屑明礬白蠟去漏管近效方大便下血黃牛角䚡一具煅末煮豉湯服二錢日三塞上方鼠瘻痔疾牛角䚡燒灰酒服方寸匕附膽味苦大寒無毒除心腹熱渴利口焦燥益目精可丸藥疏膽牛食百草其精華萃於膽其味苦其氣大寒無毒經云寒以勝熱苦以泄結故主心腹熱及渴利口焦燥也肝開竅於目肝熱則目睛不明入肝泄熱故益目精也近世以南星末釀入陰乾治驚風有奇功者取其苦寒制南星之燥俾善於豁痰除熱耳簡誤脾胃虛寒者忌之目病非風熱者不宜用附牛肉味甘平無毒主安中益氣養脾胃疏牛土畜也黃中央正色也經云中央色黃入通於脾故為益脾胃之藥脾胃得所養則中自安氣自益矣丹溪朱氏有倒倉法非為其有吐下之力也特飲之既滿或上湧下泄爾此蓋借其補以為瀉故積聚去而腸胃得所養亦奇法也但病非關腸胃者不宜服凡牛病死及黑身白頭獨肝者皆不宜服合豬肉及黍米酒食並生寸白蟲合韭薤食令人熱病合生姜食損齒又云牛乃稼穡之資不可多殺及食若以之療病則藥物甚多以之供饌核則肥甘不少似可無此一物也好生君子其念及而力戒之當有冥福耳羖羊角味鹹苦溫微寒無毒主青盲明目殺疥蟲止寒泄辟惡鬼虎狼止驚悸療百節中結氣風頭痛及蠱毒吐血婦人産後余痛久服安心益氣輕身取之時勿中濕濕即有毒疏羊角乃肺肝心三經藥也而入肝為正本經鹹溫別録苦微寒甄權大寒察其功用應是苦寒居多非苦寒則不能主青盲驚悸殺疥蟲及風頭痛蠱毒吐血也蓋青盲肝熱也驚悸心熱也疥蟲濕熱也風頭痛火熱上升也蠱毒吐血熱毒傷血也苦寒總除諸熱故能療如上等證也驚悸平則心自安熱傷氣熱除則氣自益其主百節中結氣與婦人産後余痛亦指血熱氣壅者而言本經又主止寒泄及辟惡鬼虎狼未解其義俟博物者詳之主治參互子母祕録産後寒熱心悶脹極百病羖羊角燒末酒服方寸匕普濟方治小兒癇疾方同上附羊腎補腎氣益精髓疏羊腎補腎氣者以其類相從借其氣以補其不足也腎得補則精髓自益矣主治參互羊腎一對去脂切肉蓯蓉一兩酒浸一夕去皮膜和作羹加五味食治勞傷陽虛無力附羊肉味甘大熱無毒主緩中字乳余疾及頭腦大風汗出虛勞寒冷補中益氣安心止驚反半夏菖蒲疏羊得火土之氣以生故其味甘氣大熱無毒素問言苦亦以其性熱屬火耳李杲云補可去弱人參羊肉之屬是已羊肉有形凡形氣痿弱虛羸不足者宜之其主字乳余疾者蓋産後大虛血氣暴損得甘熱之物補助陽氣則陰血自長余疾自除矣中氣虛則心不安或驚惕陽氣弱則頭腦大風汗出補中則中自緩故能安心止驚益氣則陽自足故能療頭腦大風汗出及虛勞寒冷也主治參互金匱要略羊肉湯治寒勞虛羸及産後心腹疝痛用肥羊肉一斤水一斗煮汁八升入當歸五兩黃耆八兩生薑六兩煮取二升分四服又方産後虛羸腹痛冷氣不調及腦中風汗自出白羊肉一斤治如常調和食之飲膳正要壯胃健脾羊肉三斤切粱米二升同煮下五味作粥食千金方損傷青腫用新羊肉貼之簡誤羊肉味甘大熱脾胃虛寒羸瘦氣乏者宜之然天行熱病後溫瘧熱痢後食之必致發熱難療妊婦食之令子多熱與夫癰腫瘡瘍消渴吐血嘈雜易飢等證咸不宜服又銅器煮食之男子損陽女子暴下物性之異如此不可不知也附羊肝性冷療肝風虛熱目赤暗無所見生食子肝七杖神效或切薄片水浸傅之疏羊肝補肝以類相從肝開竅於目肝熱則目赤痛失明補肝除熱所以能明目及治諸目疾也主治參互醫鏡翳膜羞明有淚肝經有熱也用青羊子肝一具竹刀切和黃連四兩為丸梧子大食遠茶清下七十丸日三服忌鐵器豬肉冷水附羊血主女人中風血虛悶産後血暈悶欲絶者生飲一升即活疏血為水化故其味應咸氣平無毒女人以血為主血熱則生風血虛則悶絶鹹平能補血涼血故主女人血虛中風及産後血悶欲絶也性能解丹石毒如丹砂水銀汞粉生銀硇砂砒霜硫黃鍾乳礜石陽起石等類凡覺毒發刺飲一升即解凡服地黃何首烏諸補藥者須忌之狗陰莖味鹹平無毒主傷中陰痿不起令強熱大生子除女子帶下十二疾一名狗精六月上伏取陰乾百日疏狗陰莖氣味與馬陰莖同其所主亦相似性專補右腎命門真火故能令陽道豐隆精暖盈溢使人生子也女子帶下十二疾皆衝任虛寒所致鹹溫入下焦補暖二脈故亦主之也主治參互同菟絲子覆盆子魚膠車前子巴戟天肉蓯蓉鹿茸沙苑蒺藜山茱萸能益陽暖精使人有子簡誤陽事易舉者忌之內熱多火者勿服附頭骨頭金瘡止血燒灰用黃狗者良余骨燒灰生肌傅馬瘡及療諸瘡瘻妒乳癰腫疏狗頭骨本經無氣味察其功用應是甘鹹溫之物咸能入血甘能補血溫能和血故主金瘡止血也主治參互同血竭乳香沒藥蚺蛇膽䗪蟲天靈蓋自然銅治跌撲損傷有神臨杖時服之護心止痛杖後服之生肌長肉千金方治小兒久痢狗頭骨燒灰白湯服非久痢虛寒者勿用和劑局方狗頭骨丸治久痢臍腹㽲痛所下雜色晝夜不止或其人久虛所下腸垢謂之惡痢並能治之赤石脂乾薑各半兩肉豆蔻煨附子炮去皮各一兩狗頭骨灰一兩為末醋和丸如桐子大每服六七十丸空心米飲下非陰臟人及陽虛極者不宜用聖惠方赤白帶下不止者狗頭骨燒存性為末每酒服一錢日三經驗方産後血不定奔四肢以狗頭骨灰酒服二錢甚效衛生易簡方打損接骨狗頭骨灰熱醋調塗傷處暖臥壽域方惡瘡不愈狗頭骨灰黃丹等分傅之同白蘞等分為末生白酒調服五錢治少腹癰有神附白狗血味鹹無毒主癲疾發作疏癲疾屬手少陰少陰主血藏神血虛而神自不寧故發是證此物入心補血以類相從故主癲疾發作也簡誤犬性熱以其稟火土之氣故助陽陽勝則發熱動火生痰發渴凡病人陰虛內熱多痰多火者慎勿食之天行病後尤為大忌治痢亦非所宜附肉味鹹酸溫主安五臟補絶傷輕身益氣疏犬火畜也其味鹹酸氣溫無毒乃脾胃家肉也五臟皆賴脾胃以養脾胃得補故主安五臟五臟安而身自輕氣血益絶傷自補矣日華子主補胃氣壯陽道暖腰膝益氣力孟詵主補五勞七傷益陽事補血脈厚腸胃實下焦填骨髓者皆取其溫暖脾胃之功則氣血生長腰腎受庇陽道壯健而下焦暖也主治參互乾坤祕韞戊戌丸治男子婦人一應諸虛不足大補元氣用童子狗一隻去皮毛肚腸同外腎於砂鍋內以酒酢八分水二升入地骨皮一斤前胡黃耆肉蓯蓉各半斤同煮一日去藥再煮一夜去骨再煮肉如泥擂細入當歸末四兩蓮肉蒼朮末各一斤山藥菟絲子末各十兩甘草末八兩和杵千下丸梧子大每空心酒下六七十丸危氏方痔漏有蟲用熟犬肉蘸藍汁空心食七日效簡誤氣壯多火陰虛之人不宜食凡犬肉不可炙食令人消渴妊婦食之令子無聲熱病後食之殺人道家以犬為地厭忌食羚羊角味鹹苦寒微寒無毒主明目益氣起陰去惡血注下闢蠱毒惡鬼不祥安心氣常不魘寐療傷寒時氣寒熱熱在肌膚溫風注毒伏在骨間除邪氣驚夢狂越僻謬及食噎不通久服強筋骨輕身起陰益氣利丈夫疏羊火畜也而羚羊則屬木本經味鹹氣寒別録苦微寒無毒氣薄味厚陽中之陰降也入手太陰少陰足厥陰經少陰為君主之官虛則神明不守外邪易侵或蠱毒惡鬼不祥或邪氣魘寐驚夢狂越僻謬羚羊性靈能通神靈逐邪氣心得所養而諸證除矣其主傷寒時氣寒熱熱在肌膚溫風注毒伏在骨間者皆厥陰為病厥陰為風木之位風熱外邪傷於是經故見諸證入肝散邪則諸證自除經曰壯火食氣又曰熱則骨消筋緩火熱太甚則陰反不能起而筋骨軟鹹寒入下焦除邪熱則陰自起氣自益筋骨強身自輕也肝熱則目不明肝藏血熱傷血則惡血注下肝在志為怒病則煩滿氣逆噎塞不通苦寒能涼血熱下降能平逆氣肝氣和而諸證無不瘳矣主治參互同犀角丹砂牛黃琥珀天竺黃金箔茯神遠志鉤藤鉤竹瀝治驚邪靨寐及癲癇狂亂等疾同枸杞子甘菊花決明子穀精草生地黃五味子黃柏密蒙花木賊草女貞實治肝腎虛而有熱以致目昏生翳外臺祕要噎塞不通羚羊角為細末飲服方寸匕千金方産後煩悶汗出不識人羚羊角燒末東流水服方寸匕未愈再服簡誤凡肝心二經虛而有熱者宜之虛而無熱者不宜用凡用有神羊角甚長有二十四節掛痕甚明內有天生木胎此角有神力抵千牛入藥不可單用須要不拆元對繩縛鐵銼銼細末盡處須重重密裹恐力散也避風搗篩極細更研萬匝如飛塵後入藥免刮人腸犀角味苦酸咸寒微寒無毒主百毒蠱疰邪鬼瘴氣殺鉤吻鴆羽蛇毒除邪不迷惑魘寐療傷寒溫疫頭痛寒熱諸毒氣久服輕身駿健升麻松脂為之使惡烏頭忌鹽凡欲作末先鋸屑置入懷中一宿搗之應手成粉疏犀亦神獸也故其角之精者名通天夜視有光能開水辟邪禽獸見之皆驚駭辟易本經味苦氣寒無毒別録酸鹹微寒李珣大寒味厚於氣可升可降陽中之陰也入足陽明兼入手少陰經陽明為水穀之海無物不受又口鼻為上下陽明之竅邪氣多從口鼻而入凡蠱毒鬼瘴與夫風火邪熱氣之侵人也必先入於是經犀角為陽明經正藥其性神靈而寒故能除邪鬼省魘寐其味苦寒能散邪熱解諸毒故主百毒蠱疰瘴氣殺鉤吻鴆羽蛇毒及傷寒溫疫頭痛寒熱等證也邪熱去則心經清明人自不迷惑胃亦遂安而五臟皆得所養故能令人駿健及久服輕身也藥性論主鎮心神解大熱散風毒治發背癰疽瘡腫療時疾熱如火煩毒入心狂言妄語日華子治心煩止驚鎮肝明目海藥主風毒攻心冒燥熱悶小兒麩豆風熱驚癇孟詵主中惡心痛中飲食藥毒心風煩悶中風失音及今人用治吐血衄血下血傷寒蓄血發狂譫語發黃發斑痘瘡稠密熱極黑陷等證神效皆取其入胃入心散邪清熱涼血解毒之功耳主治參互同鬼臼麝香龍齒茯神蘇合香沉水香天靈蓋丹砂雄黃能闢鬼疰邪氣同丹砂琥珀金箔天竺黃牛黃鉤藤鉤羚羊角真珠麝香治大人小兒風熱驚癇磨汁同生地黃紅花子麥門冬紫草白芍藥鼠黏子治痘瘡血熱初見點紅豔壯熱口渴煩躁狂語多服可保無虞磨汁同鬱金童便生地黃麥門冬炙甘草白芍藥紫蘇子剪草丹參白藥子治吐血衄血犀角地黃湯治傷寒蓄血發黃或熱盛吐血入紫雪丸治大人小兒癲狂溫疫盅毒邪魅一切煩熱為病入抱龍丸治小兒恍惚驚悸痰涎壅塞入至寶丹治中風不語中惡氣絶一切神魂恍惚癲狂擾亂等證聖濟總録吐血不止似鵝鴨肝用生犀角桔梗各一兩為末每酒服二錢廣利方治小兒驚癇不知人嚼舌仰目者犀角磨濃汁服之立效錢氏小兒方痘瘡稠密生犀角於澀器中新汲水磨濃汁冷飲之千金方瘭疽毒瘡喜著十指狀如代指根深至肌能壞筋骨毒氣入臟殺人宜燒鐵烙之或灸百壯日飲犀角汁瘥聖惠方下痢鮮血犀角地榆金銀花各一兩升麻五錢為末煉蜜丸彈子大每服一丸水一升煎五合去滓溫服此熱毒伏於心經故也宜加丹砂滑石末以金銀藤花熬汁煎藥更效簡誤痘瘡氣虛無大熱者不宜用傷寒陰證發躁因陰寒在內逼其浮陽失守之火聚於胸中上衝咽嗌故面赤手溫煩嘔喜飲涼物食下良久復吐出惟脈沉細足冷雖渴而飲水不多且復吐出為異於陽證耳不宜誤用犀角涼劑妊婦勿多服能消胎氣虎骨主除邪惡氣殺鬼疰毒止驚悸主惡瘡鼠瘻頭骨尤良疏虎西方之獸山獸之君屬金而性最有力語云風從虎者風木也虎金也木受金制焉得不從故虛嘯而風生自然之道也所以能治風病攣急屈伸不便走疰骨節風毒驚癇癲疾等證其性雖死而脛猶矻立不僕故脛骨治腳膝無力及手足諸風多效取以類相從借其氣有餘以補不足也本經無氣味藥性論云味辛微熱無毒稟勇猛之氣其味更辛散而通行故主辟邪惡氣殺鬼疰毒止驚悸也惡瘡鼠瘻亦風邪浸淫所致消散風邪則惡瘡鼠瘻自除矣主治參互同牛膝木瓜地黃山藥山茱萸黃柏枸杞子麥門冬五味子治腰腳無力筋骨疼痛或痿弱不能步履同萆薢獨活防己蒼朮牛膝何首烏薏苡仁木瓜刺蒺藜治風寒濕邪著於經絡以致偏痹不仁同當歸白芍藥炙甘草續斷牛膝白膠麥門冬地黃治遍身骨節痛永類鈐方健忘驚悸預知散用虎骨酥炙白龍骨遠志等分為末每服三錢生薑湯下日三久則令人聰慧李絳兵部手集虎骨治臂脛疼痛不計深淺皆效用虎脛骨二兩酥炙碎羚羊角屑一兩芍藥二兩切以無灰酒浸之養至七日秋冬倍之每日空腹飲一杯若要速服即入磁銀器中以火暖養二三日即可服也聖濟總録歷節痛風虎脛骨炙三兩沒藥七錢為末每服二錢溫酒下日三小品方惡犬咬傷虎骨刮末水服並傅之簡誤凡血不足以養以致筋骨疼痛者宜少用兔頭骨平無毒主頭眩痛癲疾腦主塗凍瘡肝主目暗肉味辛平無毒主補中益氣疏兔屬金得太陰之精故其性喜望月兔至秋深時可食者金氣全也其肉味辛氣平無毒然詳其用味應有甘氣應作涼經曰里不足者以甘補之又曰熱傷氣味甘而氣涼所以能補中益氣也肝為風木之位太過則搖動撼物兔屬金而頭骨在上尤得氣之全故能平木邪療頭眩痛癲疾也肝開竅於目兔目不瞬而瞭然其肝氣足也故能主目暗河間云兔肝明目因其氣有餘以補不足也腦為髓之至精性溫而滑潤故主塗凍瘡皸裂及世人用為催生利胎之聖藥也血味鹹寒能涼血活血解胎中熱毒亦能催生易産屎一名明月砂明目治目中翳膜勞瘵五疳痔瘻殺蟲解毒主治參互博濟方催生散用臘月兔腦攤紙上夾勻陰乾煎作符子於在上書生字一個候産母痛極時用叉股夾定燈上燒灰煎丁香酒調下和劑局方催生丹麝香乳香母丁香為末臘月兔腦和丸如芡實大陰乾密封每一丸溫水下即時産下隨男女左右手中握藥丸是驗劉氏保壽堂方兔血丸小兒服之終身不出痘瘡即出亦稀少臘月八日取生兔一隻刺血和蕎麥麵少加丹砂雄黃四五分候乾丸緑豆大初生小兒以乳汁化下二三丸遍身發出紅點是其微驗也但兒長成常以兔肉啖之尤妙藺氏經驗方痘後目翳直往山中東西地上不許回顧録兔屎二七粒以雌雄檳榔各一個同磨不落地井水調服百無一失其效如神簡誤妊娠不宜食兔肉令子缺唇且能致産不順性寒屬陰陽虛無熱者不宜服多服則損元氣痿陽事不宜合白雞獺肉薑橘芥同食八月至十月可食余月傷人神氣
