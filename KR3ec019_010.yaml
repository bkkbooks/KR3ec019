body:
  text: 卷十草部下品之上總六十二種今疏其要者一十六種附子半夏大黃葶藶桔梗草蒿旋覆花藜蘆射干常山甘遂白蘞白及大戟貫衆羊躑躅附子味辛甘溫大熱有大毒主風寒咳逆邪氣溫中金瘡破癥堅積聚血瘕寒濕踒躄拘攣膝痛腳疼冷弱不能行步腰脊風寒心腹冷痛霍亂轉筋下痢赤白堅肌骨強陰又墮胎為百藥長冬月採為附子春採為烏頭忌豉汁得蜀椒食鹽可引之下行地膽為之使惡蜈蚣畏防風黑豆甘草黃耆人參童便犀角疏附子全稟地中火土燥烈之氣而兼得乎天之熱氣故其氣味皆大辛大熱微兼甘苦而有大毒氣厚味薄陽中之陰降多升少浮中沉無所不至入手厥陰命門手少陽三焦兼入足少陰太陰經其性走而不守得甘草則性緩得肉桂則補命門本經主風寒咳逆邪氣寒濕踒躄拘攣膝痛腳疼冷弱不能行步以此諸病皆由風寒濕三邪客之所致也邪客上焦則咳逆邪客下焦則成踒躄拘攣膝痛腳疼冷弱不能行步此藥性大熱而善走故亦善除風寒濕三邪三邪祛則諸證自瘳矣症堅積聚血瘕皆血分虛寒凝而不行所成血得熱則行故能療之其主金瘡亦謂金瘡為風寒所郁擊血瘀不活之證而非血流不止之金瘡也別録又主腰脊風寒腳氣冷弱心腹冷痛及脾虛寒客中焦為霍亂客下焦肝腎之分為轉筋借諸補氣藥則溫中補血藥則強陰堅肌骨火能消物氣性熱極入血善行故善墮胎為百藥長引參朮黃耆茯苓則溫暖脾胃除脾濕祛腎寒補下焦陽虛佐之以桂則除臟腑沉寒三焦厥逆濕淫腹痛胃寒蛔動氣虛經閉補陽虛散虛壅亦可入足太陽少陰故治督脈為病脊強而厥督脈夾脊而上並足太陽膀胱經膀胱者腎之府故主之也天雄烏頭附子本是同生第其形質有異老嫩或殊大熱大毒則未始有別也主治參互附子得生乾薑桂枝主傷寒直中陰經溫中散寒而能出汗佐人參兼肉桂五味子則補命門相火不足回陽有神得人參肉桂治元氣虛人暴寒之氣入腹腹痛作泄完穀不化小水不禁佐白朮為除寒濕之聖藥得黃耆人參炙甘草白芍藥橘皮五味子主癰疽潰後去膿血過多以致飲食不進噁心欲嘔飲食不化不生肌肉亦主久漏冷瘡得人參白芍藥炙甘草砂仁橘皮主小兒慢驚加蓮肉白扁豆則治吐瀉不止得朮桂牛膝木瓜橘皮主寒疝痛極立止得朮木瓜石斛萆薢薏苡仁橘皮茯苓治風濕麻痹腫痛腳氣之無熱證者輒驗得人參橘皮主久病嘔噦反胃虛而無熱者良經曰腎苦燥急食辛以潤之附子同肉桂之辛入八味丸以潤腎燥陽虛無熱證者宜之簡誤附子既稟地二之火氣兼得乎天之熱氣以生是陰陽湊合無非火熱為性氣味皆然毒可知已論其性質之所能乃是退陰寒益陽火兼除寒濕之要藥引補氣血藥入命門益相火之上劑若非陰寒寒濕陽虛氣弱之病而誤用之於陰虛內熱血液衰少傷寒溫病熱病陽厥等證靡不立斃謹列其害如下醫師司命宜詳玩而深鑑之亦生人之大幸也傷寒陽厥其外證雖與陰厥相類而其內實不相侔何者陽厥之病若系傷寒溫疫其先必發熱頭疼口渴其後雖頭不疼而表熱已除然必面赤顴紅二便不利小水必赤或短少是其候也此當下之病也産後血虛角弓反張病名曰痙痙者徑也是去血過多陰氣暴虛陰虛生內熱熱則生風故外兼現乎風證其實乃陰血不足無以榮養於筋所致足厥陰肝家大虛之候此宜益陰補血清熱則愈也故凡病人一見內熱口乾咽乾口渴渴欲引飲咳嗽多痰煩躁五心煩熱骨蒸勞熱惡寒陰虛內熱外寒虛火上攻齒痛脾陰不足以致飲食無味小便黃赤短澀及不利大便不通或燥結腹內覺熱悶喜飲冷漿及鮮果畏火及日光兼畏人聲木聲虛陽易興夢泄不止産後發熱産後血行不止及惡瘡臭穢小産憎寒壯熱中暑厥暈陰虛頭暈中暑暴泄利下如火赤白滯下小兒中暑傷食作泄小便短赤口渴思飲血虛腹痛按之即止火炎欲嘔外類反胃而惡熱焦煩得寒暫止中熱腹中絞痛中暑霍亂吐瀉或乾霍亂或久瘧寒熱並盛或赤白濁赤白淋尿血便血血崩吐衄齒衄舌上出血目昏神短耳鳴盜汗汗血多汗惡熱老人精絶陽痿少年縱欲傷情以致陰精不守精滑腦漏婦人血枯無子血枯經閉腎虛小便餘瀝血虛大便燥結陰虛口苦舌乾心經有熱夢寐紜下部濕熱行履重滯濕熱痿痹濕熱作泄濕熱腳氣小兒急驚內熱痘瘡乾焦黑陷痘瘡火閉不出痘瘡皮薄嬌紅痘瘡因熱咬牙痘瘡挾熱下利痘瘡餘毒生癰中風僵仆不語中風口眼歪斜中風語言謇澀中風半身不遂中風痰多神昏一切癰疽未潰金瘡失血發痙血虛頭痛偏頭風痛上來內外男婦小兒共七十餘症病屬陰虛及諸火熱無關陽弱亦非陰寒法所均忌倘誤犯之輕變為重重者必死枉害人命此藥居多臨證施治宜謹審之世徒見其投之陽虛之候肺腎本無熱證者服之有起死之殊功而不知其用之陰虛如上諸病亦復下咽莫救故特深著其害以表其非嘗試輕用之藥也業醫君子可不慎諸半夏味辛平生微寒熱溫有毒主傷寒寒熱心下堅下氣咽喉腫痛頭眩胸脹咳逆腸鳴止汗消心腹胸膈痰熱滿結咳嗽上氣心下急痛堅痞時氣嘔逆消癰腫墮胎療痿黃悅澤面目生令人吐熟令人下用之湯洗令滑盡射干為之使惡皂莢畏雄黃生薑乾薑秦皮鱉甲反烏頭忌羊血海藻飴糖疏半夏得土金之氣兼得乎天之燥氣故其味辛平苦溫火金相搏則辛而有毒潔古謂味辛苦性溫氣味俱薄沉而降好古謂其辛厚苦輕陽中陰也入足太陰陽明少陽亦入手少陰經柴胡為之使辛溫善散故主傷寒邪在表裡之間往來寒熱苦善下泄邪在胸中則心下堅胸脹咳逆邪在上焦則頭眩邪在少陰則咽喉腫痛別録亦謂其消心腹胸膈痰熱滿結咳逆上氣心下急痛堅痞時氣嘔逆亦皆邪在上焦胸中之所致故悉主之也中焦者足太陰之所治也有濕有熱清濁不分則腸鳴濕熱勝則自汗入足太陰故並主之辛能散結故消癰腫脾家濕熱則面色痿黃實脾分水燥濕則前證俱除面目因而滑澤矣辛溫有毒故墮胎也主治參互張仲景傷寒論小結胸痛正在心下按之則痛脈浮而滑者小陷胸湯主之半夏半升黃連一兩栝樓實大者一個水六升先煮栝樓至三升去滓納二味煮取二升分三服又治少陰咽痛生瘡不能言語聲不出者苦酒湯主之半夏七枚打碎雞子一枚頭開一竅去黃納苦酒令小滿入半夏在內以環子坐於炭火上煎三沸去滓置杯中時時咽之極驗未瘥更作金匱要略治支飲作嘔嘔家本渴不渴者心下有支飲也或似喘不喘似嘔不嘔似噦不噦心下憒憒並宜小半夏湯用半夏泡七次一升生薑半升水七升煮一升五合分溫服又治嘔噦眩悸谷不得下半夏加茯苓湯半夏一升生薑半斤茯苓三兩切以水七升煎一升半分溫服之又心下悸忪半夏麻黃丸半夏麻黃等分為末蜜丸小豆大每服三十丸日三又嘔吐反胃大半夏湯半夏三升人參三兩白蜜一升水一斗二升和揚之一百二十遍煮取三升半溫服一升日再服亦治膈間支飲又張仲景方治黃疸喘滿小便自利不可除熱者用半夏半斤生薑半斤水七升煮一升五合分溫再服有一人氣結而死心下暖以此少許入口其人遂活潔古活法機要方風痰頭暈嘔逆目眩面青黃色脈弦者水煮金花丸用生半夏生天南星寒水石煅各一兩天麻半兩雄黃二錢小麥面三兩為末水和成餅水煮浮起漉出搗丸梧子大每服五十丸薑湯下極效亦治風痰咳嗽二便不通風痰頭痛又治風痰喘逆兀兀欲吐眩暈欲倒半夏一兩雄黃三錢為末薑汁浸蒸餅丸梧子大每服三十丸薑湯下已吐者加檳榔又治濕痰咳嗽面黃體重嗜臥兼食不消脈緩者白朮丸用半夏南星各一兩白朮一兩半為末薄糊丸梧子大每服五十丸薑湯下又治氣痰咳嗽面白氣促灑淅惡寒愁憂不樂脈澀者玉粉丸用半夏南星各一兩官桂半兩為末糊丸梧子大每服五十丸薑湯下和劑局方治停痰留飲胸膈滿悶氣短噁心飲食不下或吐痰水茯苓半夏湯用半夏泡五兩茯苓三兩每服四錢薑七片水一盅半煎七分甚捷徑又搜風化痰安神定志利頭目辰砂化痰丸用半夏曲三兩天南星炮一兩辰砂枯礬各半兩為末薑汁打糊丸梧子大每服三十丸食後薑湯下又治風痰喘急千緡湯用半夏湯洗七個甘草炙皂莢炒各寸許薑三片水一盞煎七分溫服又治停痰冷飲嘔逆橘皮半夏湯用半夏水煮熟陳橘皮各半兩每服四錢生薑七片水二盞煎一盞溫服又治胃寒噦逆停痰留飲藿香半夏湯用半夏湯泡炒黃二兩藿香一兩皮半兩每服四錢水一盞薑七片煎服又治伏暑引飲脾胃不和消暑丸用半夏醋煮一斤茯苓半斤生甘草半斤為末薑汁麵糊丸梧子大每服五十丸熱湯下又治中焦痰涎利咽清頭目進飲良半夏泡七次四兩枯礬一兩為末薑汁打糊或煮棗肉和丸梧子大每薑湯下十五丸寒痰加丁香五錢熱痰加寒水石煅四兩名玉液丸御藥院方治膈壅風痰半夏半斤酸漿浸一宿溫湯洗五十遍去惡氣日乾為末漿水搜作餅日乾再研為末每五兩入生龍腦一錢以漿水濃煮和丸雞頭子紗袋盛避風處陰乾每服一丸好茶或薄荷湯嚼下葉氏方治風炎濕痰青壺丸半夏一斤天南星八兩各湯泡曬乾為末薑汁和作餅焙乾入神麯半兩白朮末四兩枳實末二兩薑汁麵糊丸梧子大每服五十丸薑湯下作三仙丸能化痰利氣斗門方消痰開胃去胸膈壅滯用半夏洗泡焙乾為末自然薑汁和作餅濕紙裹煨香以熟水二盞同餅二錢入鹽五分煎一盞服之大壓痰毒及酒食傷極驗機要又治結痰不出語音不清年久者亦宜玉粉丸半夏半兩桂心一字草烏半字為末薑汁浸蒸餅丸芡實大每服一丸夜臥含咽活幼口議治小兒痰吐或風壅所致或咳嗽發熱飲食即嘔半夏泡七次半兩丁香一錢以半夏末水和包丁香用面重包煨熟去面為末生薑自然汁和丸麻子大每服二三十丸陳皮湯下肘後方治冒寒霍亂腹脹用半夏桂枝等分為末每服方寸匕又治産後暈絶半夏末冷水和丸大豆大納鼻中即愈即扁鵲法也永類鈐方打撲瘀痕水調半夏末塗一宿即沒魏元君方卒死不寤用半夏末搐鼻中即活子母祕録治五絶急病一曰自縊二曰牆壓三曰溺水四曰魘魅五曰産乳並以半夏末納大豆一丸入鼻中心溫者一日可活也劉長春經驗方治吹奶腫痛半夏一個煨研酒服立驗一方以末隨左右嗅鼻效篋中方治蠍蠆螫人用半夏末水調塗之立止簡誤半夏辛溫性燥而有毒雖能祛濕分水實脾開寒濕痰氣鬱結痰而其所大忌者乃在陰虛血少津液不足諸病故古人立三禁謂血家渴家汗家也故凡一切吐血衄血咯血齒衄舌上出血金瘡産後失血過多尿血便血腎水真陰不足發渴中暑發渴陽虛自汗陰虛盜汗內熱煩躁出汗諸證皆所當禁者也然三禁之外應忌者尚多茲更詳列於後凡咳嗽由於陰虛火空上炎爍肺喉癢因而發嗽內熱煎熬津液凝結為痰所致而不由於寒濕病本乎肺而不本乎脾嘔吐由於火沖胃熱而不由於寒濕痰壅飲食不化由於脾陰不足而不由於因濕脾慢嘔噦眩悸谷不得下由於胃氣虛弱見食厭惡而不由於寒濕邪所幹霍亂腹脹由於脾虛邪熱客中焦而不由於寒濕飲食停滯咽痛由於陰虛腎水不足則水涸而陽無所附故火空上炎而發咽痛而不由於傷寒少陰病邪熱不解氣喘由於氣虛而不由於風寒氣鬱頭痛由於血虛而不由於痰厥小兒吐痰由於傷熱而不由於脾胃不寐由於心絡血少而不由於病後膽虛自汗由於表虛腠理不固而不由於濕熱內客自勝如上諸證法所同禁其所最易誤而難明者世醫類以其能去痰凡見痰嗽莫不先投之殊不知咳嗽吐痰寒熱骨蒸類皆陰虛肺熱津液不足之候誤服此藥愈損津液則肺家愈燥陰氣愈虛膿痰愈結必致聲啞而死若合參術禍不旋踵蓋以其本脾胃家藥而非肺腎藥也寒濕痰飲作嗽屬胃病者固宜然亦百之一二其陰虛火熾煎熬真陰津液化為結痰以致喉癢發咳者往往而是故凡痰中帶血口渴咽乾陰虛咳嗽者大忌之又有似中風痰壅失音偏枯拘攣及二便閉澀血虛腹痛於法並忌犯之過多則非藥可救吉凶貿理悔不可追責在司命謹諸戒諸大黃味苦寒大寒無毒主下瘀血血閉寒熱破亡瘕積聚留飲宿食蕩滌腸胃推陳致新通利水穀調中化食安和五臟平胃下氣除痰實腸間結熱心腹脹滿女子寒血閉脹小腹痛諸老血留結黃芩為之使無所畏疏大黃稟地之陰氣獨厚得乎天之寒氣亦深故其味至苦其氣大寒而無毒入足陽明太陰厥陰併入手陽明經氣味俱厚味厚則發泄故其性猛利善下泄推陳致新無所阻礙所至蕩平有戡定禍亂之功故號將軍味厚則入陰分血者陰也故主下瘀血血閉寒熱癥瘕積聚留飲宿食蕩滌腸胃通利水穀其曰調中化食安和五臟者概指臟腑積滯既去則實邪散而中自調臟自和也別録又云平胃下氣除痰實腸間結熱心腹脹滿女子寒熱女子因寒血凝閉而作脹少腹痛因於血閉及諸老血留結皆由通利開導之力所致也總之此藥乃除實熱燥結下有形積滯之要品隨經隨證以為佐使則奏功殊疾矣主治參互大黃君枳實厚朴為小承氣湯治傷寒熱病邪結中焦治傷寒病發於陰而反下之心下滿而不痛按之濡此為痞也大黃黃連瀉心湯主之大黃二兩黃連一兩以麻沸湯二升漬之須臾絞汁分作二次溫服潔古用以瀉諸實熱不通及瀉心下痞滿由於實皆本仲景法也亦治滯下赤白初起壯實之人可用枳殼檳榔當歸甘草滑石作丸投之是迎而奪之之法也然不可過劑過劑則傷胃氣同鹼及白蘞炒陳小粉沒藥乳香醋蜜調傅作癰腫圍藥凡實熱濕痰為病以錦紋大黃酒蒸八兩入前胡八兩橘紅四兩外另外青礞石二兩同焰硝二兩入砂罐固濟煅紅研末二兩上各取末以水和為丸梧子大每常服一二十丸小病五六十丸緩病七八十丸急病一百二十丸溫水吞下即臥勿動候藥逐上焦痰滯次日先下糟粕次下痰涎未下再服惟妊娠水泄忌之仲景金匱玉函方云凡人食已即吐此胸中有火也大黃一兩甘草炙二錢五分水一碗煮半升溫服此真方滾痰丸也治一切因痰發為怪證若入霞天膏為丸更妙西大黃拌蜜及竹瀝九蒸九曬粉糊為丸如麻子大薄荷湯吞三錢治中上二焦有熱痰因發偏頭風諸藥不效目將損者有殊功又治中焦脾胃濕熱下流客腎以致飽後夜臥即夢遺臨臥以升麻陳皮湯吞三四錢濕熱去即止簡誤經曰實則瀉之大黃氣味大苦大寒性稟直逐長於下通故為瀉傷寒溫病熱病實熱熱結中下二焦二便不通及濕熱膠痰滯於中下二焦之要藥祛邪止暴有撥亂反正之殊功第具峻利之性猛烈之氣長驅直搗一往不返如武王伐紂前徒倒戈血流漂杵雖應天順人救民水火然亦不免於未盡善之議矣故凡血閉由於血枯而不由於熱積寒熱由於陰虛而不由於瘀血癥瘕由於脾虛胃弱而不由於積滯停留便閉由於血少腸燥而不由於熱結不通心腹脹滿由於脾虛中氣不運而不由於飲食停滯女子少腹痛由於厥陰血虛而不由於經阻老血瘀結滯下初起即屬胃虛當以補養胃氣清消濕熱為本而不可以妄加推蕩瘧病傷於暑氣而不由於山嵐濕熱吐衄血由於陰虛火起於下炎鑠乎上血熱妄行溢出上竅而不由於血分實熱腰腳風氣由於下元先虛濕熱下流因茲致病而不專由於風濕外侵骨蒸積熱本於陰精不足而非實熱所致偏墜由於腎虛濕邪秉虛客之而成而不由於濕熱實邪所犯乳癰腫毒由於肝家氣逆鬱抑不舒以致榮氣不從逆於肉裡乃生癰腫而不本於膏粱之變足生大疔血分積熱所發法咸忌之以其損傷胃氣故也故傷寒家調胃承氣湯中用甘草以和之正謂是也輕發誤投多致危殆戒之戒之葶藶味辛苦寒大寒無毒主癥瘕積聚結氣飲食寒熱破堅逐邪通利水道下膀胱水伏留熱氣皮間邪水上出面目浮腫身暴中風熱痱癢利小腹久服令人虛得酒良疏葶藶稟陰金之氣以生故其味辛苦大寒無毒氣薄味厚陽中陰也為手太陰經正藥故仲景瀉肺湯用之亦入手陽明足太陰經肺屬金主皮毛膀胱屬水藏精液肺氣壅塞則膀胱與焉譬之上竅閉則下竅不通下竅不通則水濕泛溢為喘滿為腫脹為積聚種種之病生矣辛能散苦能泄大寒沉陰能下行逐水故能療本經所主諸病十劑云泄可去閉葶藶之屬是矣至苦極寒有瀉無補暫用尚能損真久服寧不令人虛也主治參互金匱方肺癰喘急不得臥葶藶大棗瀉肺湯主之葶藶炒黃搗末蜜丸彈子大每用大棗二十枚水三升煎取二升入葶藶一丸更煎取一升頓服亦主支飲不得息外臺祕要通身腫滿苦葶藶炒四兩為末棗肉和丸梧子大每服十五丸桑白皮湯下日三大效千金方腹脹積聚葶藶子一升熬以酒五升浸七日日服三合篋中方痰飲咳嗽含奇丸用葶藶子一兩紙襯炒令黑知母貝母各一兩棗肉半兩砂糖一兩半和丸彈子大每以新綿裹一丸含之咽津甚者不過三丸簡誤葶藶瀉肺利小便治腫滿之要藥然味大寒走而不守不利於脾胃虛弱及真陰不足之人凡腫滿由於脾虛不能制水水氣泛溢小便不通由於膀胱虛無氣以化者法所咸忌犯之則輕病重重必危慎之近世甜苦二種據本經云辛苦則甜者非矣總之療體皆以行水泄閉為用多服久服咸不宜耳桔梗味辛苦微溫有小毒主胸脅痛如刀刺腹滿腸鳴幽幽驚恐悸氣利五臟腸胃補血氣除寒熱風痹溫中消穀療喉咽痛下蠱毒疏桔梗本經味辛氣微溫別録加苦云有小毒神農醫和岐伯雷公咸曰無毒而復加甘觀其所主諸病應是辛苦甘平微溫無毒入手太陰少陰兼入足陽明胃經味厚氣輕陰中之陽升也傷寒邪結胸脅則痛如刀刺邪在中焦則腹滿及腸鳴幽幽辛散升發苦泄甘和則邪解而氣和諸證自退矣其主驚恐悸氣者心脾氣血不足則現此證諸補心藥中藉其升上之力以為舟楫勝載之用此佐使之職也別録利五臟腸胃補氣血者蓋指邪解則臟腑腸胃自和和則血氣自生也除寒熱風痹溫中療喉咽痛下蠱毒者皆散邪解毒通利之功也消穀者以其升載陽氣使居中焦而不下陷則脾中陽氣長浮而穀食自消矣甄權用以治下痢及去肺熱氣促者升散熱邪之故也日華子用以除邪辟瘟肺癰排膿潔古用以利竅除肺部風熱清利頭目咽嗌胸膈滯氣及痛除鼻塞者入肺開發和解之功也好古以其色白故為肺部引經與甘草同為舟楫之劑諸藥有此一味不能下沉也主治參互朱肱活人書治胸中痞滿不痛用桔梗枳殼取其通肺利膈下氣也張仲景傷寒論治傷寒實結胸用桔梗貝母巴豆取其溫中散邪消穀破積也又治肺癰唾膿用桔梗甘草取其苦辛清肺甘溫瀉火又能排膿血補內漏也其治少陰證二三日咽痛亦用桔梗甘草取其苦辛散邪甘平除熱合而用之能調寒熱也後人易名甘桔湯通治咽喉口舌諸病南陽活人書治傷寒腹脹陰陽不和者桔梗半夏湯主之桔梗半夏陳皮各三錢薑五片煎服簡要濟衆方治痰嗽喘急桔梗一兩半為末用童子小便半升煎四合去滓溫服仲景金匱玉函方治肺癰咳嗽胸滿振寒脈數咽乾不渴時出濁唾腥臭久久吐膿如粳米粥者桔梗一兩甘草二兩水三升煮一升分溫再服朝暮吐膿血則瘥千金方治喉痹毒氣桔梗二兩水三升煮一升頓服仲景傷寒論少陰證二三日咽痛者可與甘草湯不瘥者與甘桔湯主之桔梗一兩甘草二兩水三升煮一升分服又可治口舌生瘡永類鈐方治齒𧈟腫痛桔梗薏苡仁等分為末服經驗方治骨槽風牙齦腫痛者桔梗為末棗瓤和丸皂子大綿裹咬之仍以荊芥湯漱之衛生易簡方治牙疳臭爛桔梗茴香等分燒研傅之普濟方治鼻衄桔梗為末水服方寸匕日四服一方加生犀角屑古今録驗方治中蠱下血如雞肝晝夜出血石余四臟皆損惟心未毀或鼻破將死者苦梗為末以酒服方寸匕日三服不能下藥以物拗口灌之心中當煩須臾自定七日止當食豬肝肺以補之一方加犀角等分聖惠方治妊娠中惡心腹疼痛桔梗一兩生薑三片煎溫服張文仲備急方治小兒客忤死不能言桔梗燒研三錢米湯服之仍吞麝香豆許簡誤桔梗之性屬陽而升凡病氣逆上升不得下降及邪在下焦者勿用凡攻補下焦藥中勿入雷公云凡使勿用木梗真似桔梗只是咬之腥澀不堪為異草蒿味苦寒無毒主疥瘙痂癢惡瘡殺蝨留熱在骨節間明目一名青蒿疏草蒿青蒿也稟天地芬烈之氣以生故其味苦其氣寒而芬芳其性無毒疥瘙痂癢惡瘡皆由於血熱所致留熱在骨節間者是熱伏於陰分也肝胃無熱則目明苦能泄熱苦能殺蟲寒能退熱熱去則血分平和陰氣日長前證自除故悉主之也諸苦寒藥多與胃氣不宜惟青蒿之氣芬芳可人香氣先入脾故獨宜於血虛有熱之人以其不犯胃氣故爾是以蓐勞虛熱非此不除矣主治參互青蒿得鱉甲地黃牛膝枸杞麥門冬五味子除一切産後虛熱寒熱淹延不解亦治一切虛勞寒熱陰虛五心煩熱腎水真陰不足以致骨蒸勞熱此為要藥陶隱居謂其生挼傅金瘡大止血生肉止疼痛以帛裹之陳藏器謂其主鬼氣尸疰伏留婦人血氣腹內滿及冷熱久痢秋冬用子春夏用苗日華子謂其能補中益氣輕身補勞駐顏色長毛髮發黑不老心痛熱黃生搗汁服百一方治蜂螫人嚼青蒿傅瘡上即瘥斗門方治男婦勞瘦用青蒿細銼水三升童便五升同煎取一升半去滓入器中煎成膏丸如梧子大每空心及臨臥溫酒吞二十丸靈苑方治虛勞寒熱肢體倦疼不拘男婦八九月青蒿成實時採之去枝梗以童便浸三日曬乾為末每服二錢烏梅一個煎湯服崔元亮海上方治骨蒸鬼氣用童便五大斗澄清青蒿五斗八九月採帶子者最好細銼相和納大釜中以猛火煎取三大斗去滓溉釜令淨再以微火煎可二大斗入豬膽一枚同煎一大斗半去火待冷以磁器盛之每欲服時取甘草二三兩炙熟為末以煎和搗千杵為丸空腹粥飲下二十丸漸增至三十丸止十便良方治骨蒸煩熱用青蒿一握豬膽汁一枚杏仁四十個去皮尖炒以童溺一大盞煎五分空心溫服聖濟總録治虛勞盜汗煩熱口乾用青蒿一斤取汁熬膏入沙參末麥冬末各一兩同熬至可丸丸如梧子大每食後米飲服二十丸名青蒿煎肘後方治瘧疾寒熱用青蒿一握水二升搗汁服之仁存方治溫瘧痰盛但熱不寒用青蒿二兩童便浸焙黃丹半兩為末每服二錢白湯調下衛生易簡方治鼻衄青蒿搗汁服之並塞鼻中極驗永類鈐方治酒痔便血青蒿用葉不用莖用莖不用葉為末血從糞前冷水調糞後溫酒調服濟急方治牙齒腫痛青蒿一握煎漱之聖惠方治耳中出膿青蒿為末綿裹納耳中簡誤産後氣虛內寒作瀉及飲食停滯泄瀉者勿用凡産後脾胃薄弱忌與當歸地黃同用旋覆花味鹹甘溫微溫冷有小毒主結氣脅下滿驚悸除水去五臟間寒熱補中下氣消胸上痰結唾如膠漆心脅痰水膀胱留飲風氣濕痹皮間死肌目中眵䁾利大腸通血脈益色澤一名金沸草五月採花日乾疏旋覆花別録甄權日華子寇宗奭皆無毒宗奭又加苦辛而曰冷利其稟冬之氣而生者乎故其味首系之以咸潤下作咸咸能軟堅別録加甘甘能緩中微溫溫能通行故主結氣脅下滿心脾伏飲則病驚悸飲消則復常矣除水去五臟間寒熱及消胸上痰結唾如膠漆心脅痰水膀胱留飲風氣濕痹皮間死肌目中眵䁾利大腸者皆軟堅冷利潤下消痰飲除水之功也其曰補中下氣者以甘能緩中咸能潤下故也通血脈益色澤者蓋指飲消則脾健健則能運行脾裹血又統血故也主治參互仲景治傷寒汗下後心下痞堅噫氣不除有七物旋覆代赭湯成無己曰硬則氣堅旋覆之咸以軟痞堅也金匱要略治半産漏下虛寒相搏其脈弦芤旋覆花湯用旋覆花三兩蔥十四莖新絳少許水三升煮一升頓服胡洽治痰飲在兩脅脹滿有旋覆花丸總微論治小兒眉癬自眉毛眼睫因癬退不生用野油花即旋覆花赤箭即天麻苗防風等分為末洗淨以油調塗之簡誤丹溪謂為走散之藥病人涉虛者不宜多服冷利大腸虛寒人禁用藜蘆味辛苦寒微寒有毒主蠱毒咳逆泄痢腸澼頭瘍疥瘙惡瘡殺諸蟲毒去死肌療噦逆喉痹不通鼻中息肉馬刀爛瘡不入湯疏藜蘆稟火金之氣以生故其味辛氣寒別録苦微寒有毒入手太陰足陽明經本經主蠱毒咳逆及別録療噦逆喉痹不通者皆取其宣壅導滯之力苦為湧劑故能使邪氣痰熱胸膈部分之病悉皆吐之也辛能散結故主鼻中息肉苦能泄熱殺蟲故主泄痢腸澼頭瘍疥瘙殺諸蟲毒也瘡瘍皆濕熱所生濕熱不去則肌肉潰爛苦寒能瀉濕熱則馬刀惡瘡爛瘡死肌皆愈也味至苦入口即吐故不入湯主治參互經驗方諸風痰飲藜蘆十分鬱金一分為末每以一字溫漿水一盞和服探吐簡要濟衆方中風不省牙關緊急者藜蘆一兩去苗濃煎防風湯洗焙乾切片炒為末每服半錢小兒減半溫水調灌吐出風涎效聖惠方諸風頭痛以藜蘆一莖日乾研末入麝香少許吹鼻保命集久瘧痰多不食欲吐不吐藜蘆末半錢溫漿水調下探吐簡誤藜蘆辛苦有大毒服一匕則令人胸中煩悶吐逆不止凡胸中有痰飲或中蠱毒惡氣者只可借其上湧宣吐之力獲效一時設病非關是者切勿沾唇徒令人悶亂吐逆不止虧損津液也射干味苦平微溫有毒主咳逆上氣喉痹咽痛不得消息散結氣腹中邪逆食飲大熱療老血在心脾間咳唾言語氣臭散胸中熱氣久服令人虛疏射干稟金氣而兼火火金相搏則辛而有毒故本經謂其味苦平有毒平亦辛也別録微溫保升微寒二説一義並無異云潔古味苦陽中陰也入手少陽少陰厥陰經苦能下泄故善降兼辛故善散故主咳逆上氣喉痹咽痛不得消息散結氣胸中邪逆既降且散益以微寒故主食飲大熱別録又主老血在心脾間咳唾言語氣臭散胸中熱氣甄權主疰氣消瘀血主女人月閉日華子主消痰破鷖結胸膈滿腹脹氣喘痃癖寇宗奭主脈氣喉痹為佳潔古主胃中癰瘡皆此意也丹溪主行太陰厥陰之積痰使結核自消甚捷又治足厥陰濕氣下流因疲勞而發為便毒悉取其泄熱散結之力耳故古方治喉痹咽痛為要藥主治參互仲景金匱方治咳逆上氣喉中作水雞聲射干麻黃湯入鱉甲煎丸治瘧母袖珍方治咽喉腫痛用生射干豬脂各四兩合煎令焦去滓每噙棗許即瘥醫方大成治喉痹不通用扁竹新根擂汁咽之大腸動即解或醋研汁噙引涎出亦妙便民方亦治喉痹不通用紫蝴蝶根一錢黃芩生甘草桔梗各五分為末水調頓服立愈名奪命散永類鈐方治乳癰初腫用扁竹根如殭蠶者同萱草根為末蜜調敷之神效孫真人千金方治喉痹有烏翣膏簡誤射干雖能降手少陽厥陰相火泄熱散結消腫痛然無益陰之性故別録云久服令人虛凡脾胃薄弱臟寒氣血虛人病無實熱者禁用常山味苦辛寒微寒有毒主傷寒寒熱熱發溫瘧鬼毒胸中痰結吐逆療鬼蠱往來水脹灑灑惡寒鼠瘻畏玉扎忌菘菜疏常山稟天地陰寒之氣以生故其味苦寒別録桐君益之以辛宜其有毒也苦泄辛散故善逐飲陰寒祛熱故善破瘴癘入口即吐其性暴悍又可知已本經主傷寒寒熱宜作主山嵐瘴氣寒熱發為溫瘧鬼毒胸中痰結古方治瘧多用蓋以嶺南西粵鬼方咸多山嵐瘴癘之氣所感邪氣充於榮衛皮膚之間欲去皮膚毛孔中瘴氣根本非常山不可以其性能祛逐老痰積飲善散山嵐瘴癘之邪故也主治參互治山嵐瘴氣作瘧百藥不效祕方常山四兩砂仁四兩檳榔二兩米醋浸入瓷器中二宿取出各炒燥為末雞子清和丸如緑豆大五更新汲水向東吞三五錢一服可止九月以後宜以酒吞劉長春經驗方治瘴瘧寒熱用常山一寸草果一枚熱酒一盞浸一宿五更向東飲之蓋臥酒醒即愈肘後方治三十年老瘧及積年久瘧常山黃連各一兩酒三升漬一宿以瓦釜煮取一升半發日早服五合發時再服熱當吐冷當利無不瘥者簡誤常山陰毒之草也其性暴悍雖能破瘴癘逐積飲然善損真氣故瘧非由於瘴氣及老痰積飲所致者勿用經曰夏傷於暑秋必痎瘧又曰邪之所湊其氣必虛暑邪秉虛客於五臟六腑十二經瘧亦因之而發內經載之詳矣王好古分條立方殊得仲景遺意此皆瘧之對病正藥也並不得妄用常山虛人真氣變為危證戒之戒之清暑養胃健脾消痰乃治瘧之正法稍久則當分氣血施補助靡不愈者又安所事常山乎甘遂味苦甘寒大寒有毒主大腹疝瘕腹痛面目浮腫留飲宿食破癥堅積聚利水穀道下五水散膀胱留熱皮中痞熱氣腫滿瓜蒂為之使惡遠志反甘草疏甘遂稟天地陰寒之氣以生故其味苦其氣寒而有毒亦陰草也水屬陰各從其類故善逐水其主大腹者即世所謂水蠱也又主疝瘕腹滿面目浮腫及留飲利水道穀道下五水散膀胱留熱皮中痞氣腫滿者謂諸病皆從水濕所生水去飲消濕除是拔其本也潔古謂其味苦性寒苦性泄寒勝熱直達水氣所結之處乃泄水之聖藥水結胸非此不能除故仲景大陷胸湯用之但有毒不可輕用其性之惡可概見已其根皮赤肉白作連珠實重者良主治參互入陷胸湯治傷寒水結胸有神聖濟總録治膜外水氣甘遂末大麥面各半兩水和作餅燒熟食之取利肘後方治身面洪腫甘遂末二錢以雄豬腰子一枚分作七片入末在內濕紙包煨令熟每日服一片至四五服當覺腹鳴小便利是其效也張仲景金匱玉函方治心下留飲堅滿脈伏其人欲自利反快甘遂半夏湯用甘遂大者三枚半夏十二枚以水一升煮半升入芍藥五枚水二升煮半升去滓以蜜半升同煎至八合頓服之筆峰雜興方治小便轉脬甘遂末一錢豬苓湯調下立通祕方治體氣甘遂一錢同豬肉煮食於野地中掘一坑令患人至彼處向上風站立以甘草末唾調入臍內須臾腹中作響取利下黑汁亟從上風奔回可絶不絶再作一服仍前用之簡誤甘遂性陰毒雖善下水除濕然能耗損真氣虧竭津液元氣虛人除傷寒水結胸不得不用外其餘水腫臌脹類多脾陰不足土虛不能制水以致水氣泛濫即劉河間云諸濕腫滿屬脾土法應補脾實土兼利小便不此之圖而反用甘遂下之是重虛其虛也水既暫去復腫必死矣必察病屬濕熱有飲有水而元氣尚壯之人乃可一施耳不然禍不旋踵矣戒之戒之慎之慎之白蘞味苦甘平微寒無毒主癰腫疽瘡散結氣止痛除熱目中赤小兒驚癇溫瘧女子陰中腫痛下赤白殺火毒反烏頭疏白蘞得金氣故味苦平平應作辛別録兼甘其氣微寒無毒苦則泄辛則散甘則緩寒則除熱故主癰腫疽瘡散結止痛蓋以癰疽皆由榮氣不從逆於肉裡所致女子陰中腫痛亦由血分有熱之故火毒傷肌肉即血分有熱目中赤赤血熱為病散結涼血除熱則上來諸苦蔑不濟矣其治小兒驚癇溫瘧及婦人下赤白則雖云驚癇屬風熱溫瘧由於暑赤白淋屬濕熱或可通用然病各有因藥各有主以類推之恐非其任矣尚俟後哲詳之總之為疔腫癰疽家要藥乃確論也主治參互白蘞得白及紅藥子加硃砂雄黃乳沒腦麝為傅癰疽止痛散毒之上藥肘後方治發背初起水調白蘞末傅之聖惠方治疔瘡初起同上陶隱居治一切癰腫白蘞赤小豆茜草為末雞子白調塗之又方白蘞二分藜蘆一分為末酒和貼之日三上御藥院方治面鼻酒渣白蘞白石脂杏仁各半兩為末雞子調塗日一洗肘後方治面生粉刺白蘞二分杏仁半分雞屎白一分為末蜜和雜水拭面談野翁治凍耳成瘡白蘞黃柏等分為末生油調搽外臺方治湯火灼爛白蘞末傅之聖惠方治鐵刺諸哽及竹木哽在咽中白蘞半夏泡等分為末酒服半錢日二服又治刺在肉中方同上千金方治風痹筋急腫痛屈轉異常處白蘞二分熟附子一分為末每酒服半刀圭日二服以身中熱行為候十日便覺忌豬肉冷水瑞竹堂方治諸瘡不斂口白蘞赤蘞黃柏各三錢炒研輕粉一錢用蔥白漿水洗淨傅之簡誤癰疽已潰不宜服白及味苦辛平微寒無毒主癰腫惡瘡敗疽傷陰死肌胃中邪氣賊風鬼擊痱緩不收除白癬疥蟲紫石英為之使惡理石畏李核杏仁反烏頭疏白及本經味苦平別録加辛微寒李當之大寒日華子加甘東垣亦微寒謂其性澀陽中之陰收也辛為金味收為金氣其為得季秋之氣而兼金水之性者哉宜乎入肺理傷有奇效矣苦能泄熱辛能散結癰疽皆由榮氣不從逆於肉裡所生敗疽傷陰死肌皆熱壅血瘀所致故悉主之也胃中邪氣者即邪熱也賊風鬼擊痱緩不收皆血分有熱濕熱傷陰之所生也入血分以泄熱散結逐腐則諸證靡不瘳矣主治參互白及性澀破散中有收斂蓋去腐逐瘀以生新之藥也得白蘞紅藥子加腦麝乳沒治一切癰疽腫毒止痛散結排膿有神一味為細末米飲調三錢服治損肺吐血有奇效經驗方治鼻衄不止津調白及末塗山根上仍以水服一錢立止袖珍方治疔瘡腫毒白及末半錢以水澄之去水攤於厚紙上貼之永類鈐方治失跌骨折酒調白及末二錢服其功不減於自然銅古銖錢也濟急方治手足皸裂白及末水調塞之勿犯水孫真人方治湯火傷灼白及末油調傅之簡誤癰疽已潰不宜同苦寒藥服大戟味苦甘寒大寒有小毒主蠱毒十二水腫滿急痛積聚中風皮膚疼痛吐逆頸腋癰腫頭痛發汗利大小腸反甘草畏菖蒲蘆草鼠糞疏大戟稟天地陰毒之氣以生故味苦寒而有小毒甄權潔古兼辛別録兼甘應是辛多非辛則無毒矣苦寒故善下走則入腎肝辛則橫走無所不到矣潔古又謂瀉肺損真氣其主下蠱毒者以蠱毒必熱必辛辛則散走臟腑故假其辛寒以搜其辛熱是以毒攻毒也苦寒下泄故能逐諸有餘之水濕熱及留飲在中下二焦則為腹滿急痛或成積聚苦辛甘寒故散頸腋癰腫利大小便瀉毒藥通月水陰草苦辛有毒故又墮胎也天行黃病非元氣實者勿用經曰邪之所湊其氣必虛中風之人其虛必矣本經又謂其主中風皮膚疼痛吐逆者非也焉有虛病而可施苦寒有毒下泄之藥哉是重虛其虛也主治參互大戟入玉樞丹紫金錠則解蠱毒熱毒癰疽疔腫及蛇蟲諸毒內服外傅取利為度百祥丸治痘瘡變黑干陷不發寒而大便閉結者用大戟一兩棗三枚水一碗同煮曝乾去大戟以棗肉焙丸從三分服至五分以利為度三因方控涎丹治痰涎留在胸膈上下變為諸病或頸項胸背腰脅手足胯髀隱痛不可忍筋骨牽引釣痛走易及皮膚麻痹似乎癱瘓不可誤作風氣風毒及瘡疽施治又治頭痛不可舉或睡中流涎或咳唾喘息或痰迷心竅並宜此藥數服痰涎自失諸疾尋愈紫大戟白甘遂白芥子微炒各一兩為末薑汁打麵糊丸梧子大每服七丸或二十丸以津液咽下若取利則服五六十丸千金方中風發熱大戟苦參各四兩白酢漿一斗煮熟洗之寒乃止生生方牙齒搖痛大戟咬於痛處良簡誤大戟陰寒善走而下泄潔古謂其損真氣故凡水腫不由於受濕停水而由於脾虛土堅則水清土虛則水泛濫實脾則能制水此必然之數也今不補脾而復用疏泄追逐之藥是重虛其虛也宜詳辨而深戒之惟留飲伏飲停滯中焦及元氣壯實人患水濕乃可一暫施耳貫衆味苦微寒有毒主腹中邪熱氣諸毒殺三蟲去寸白破癥瘕除頭風止金瘡花療惡瘡令人泄赤小豆為之使疏貫衆味苦而又微寒止應云有小毒以其苦寒故主腹中邪熱氣諸毒三蟲皆由濕熱所生苦寒除濕熱則三蟲自死矣苦以泄之亦兼有散之之義故破癥瘕苦寒能除風熱故止頭風金瘡出血後必發熱泄熱散結則金瘡自止主治參互貫衆一味為細末水調一錢匕治鼻衄有效疫氣發時以此藥置水中令人飲此水則不傳染簡誤病人虛寒無實熱者禁用羊躑躅味辛溫有大毒主賊風在皮膚中淫淫痛溫瘧惡毒諸痹邪氣鬼疰蠱毒疏羊躑躅毒藥也然性能祛風寒濕故可以治惡痹痹者風寒濕所成也然非元氣未虛脾胃尚實之人不可用凡用此等毒藥亦須雜以安胃和氣血藥同用簡誤躑躅性發散氣血虛人忌之不可近眼
