body:
  text: 卷四玉石部中品總八十七種今疏其要者一十八種雄黃石硫黃食鹽水銀石膏金屑靈砂水銀粉磁石凝水石陽起石密陀僧鐵落珊瑚瑪瑙太陰玄精土蜂窩上細土胡燕窩內土雄黃味苦甘平寒大溫有毒主寒熱鼠瘻惡瘡疽痔死肌療疥蟲䘌瘡目痛鼻中息肉及絶筋破骨百節中大風積聚癖氣中惡腹痛鬼疰殺精物惡鬼邪氣百蟲毒勝五兵殺諸蛇虺毒解藜蘆毒悅澤人面煉食之輕身神仙餌食之皆飛入人腦中勝鬼神延年益壽保中不飢得銅可作金疏雄黃稟火金之性得正陽之氣以生本經味苦平氣寒有毒別録加甘大溫甄權言辛大毒察其功用應是辛苦溫之藥而甘寒則非也氣味俱厚升也陽也入足陽明經其主殺精物惡鬼邪氣及中惡腹痛鬼疰者蓋以陽明虛則邪惡易侵陰氣勝則精鬼易憑得陽氣之正者能破幽暗所以殺一切鬼邪勝五兵也寒熱鼠瘻惡瘡疽痔死肌疥蟲䘌瘡諸證皆濕熱留滯肌肉所致久則浸淫而生蟲此藥苦辛能燥濕殺蟲故為瘡家要藥其主鼻中息肉者肺氣結也癖氣者大腸積滯也筋骨斷絶者氣血不續也辛能散結滯溫能通行氣血辛溫相合而殺蟲故能搜剔百節中大風積聚也虺蛇陰物藜蘆陰草雄黃稟純陽之氣所以善殺百蟲蛇虺毒及解藜蘆毒也別録復有目痛及悅澤人面之語悉非正治煉餌之法出自仙經以銅為金亦黃白朮中事耳主治參互同紅白藥子白及白蘞乳香沒藥冰片傅一切腫毒癰疽研細末入豬膽內套指頭上治天蛇疔毒發於中指同金頭蜈蚣牛角䚡豬懸蹄蝟皮象牙末黃蠟白礬治通腸漏同漆葉苦參刺蒺藜白芷荊芥天麻鱉蝨胡麻半枝蓮豨蘞百部天門冬治大麻風眉毛脫落治暑毒瘧痢百法不效用雄黃研細水飛九次竹筒盛蒸九次再研蒸餅和丸梧子大每服甘草湯下七丸日三服其辭云暑毒在脾濕氣連腳不泄則痢不痢則瘧獨煉雄黃蒸餅和藥別作治療醫家大錯此昔人夢中所得之方今試之輒效聖惠方傷寒狐惑蟲食下部痛癢不止雄黃半兩燒於瓶中熏其下部肘後方五尸疰病發則變痛無常昏恍沉重纏結臟腑上衝心脅即身中尸鬼接引為害也雄黃大蒜各一兩杵丸彈子大每熱酒服一丸夏氏奇疾方筋肉蟲有蟲如蟹走於皮下作聲如小兒啼為筋肉之化雄黃雷丸各一兩為末摻豬肉上炙熟吃盡自安積德堂方廣東惡瘡雄黃一錢半杏仁三十粒去皮輕粉一錢為末洗淨以雄豬膽汁調上二三日即愈百發百中天下第一方也出武定侯府內入龍腦少許尤良簡誤雄黃殺蛇蟲咬毒及傅疥癬惡瘡疔腫闢鬼魅邪氣在所必用然而性熱有毒外用易見其所長內服難免其無害凡在服餌中病乃已毋盡劑也石硫黃味酸溫大熱有毒主婦人陰蝕疽痔惡血堅筋骨除頭禿療心腹積聚邪氣冷癖在脅咳逆上氣腳冷疼弱無力及鼻衄惡瘡下部䘌瘡止血殺疥蟲能幹汞中其毒者黑鉛煎湯解之或食冷豬血疏石硫黃稟火氣以生本經味酸氣溫有毒別録大熱黃帝雷公咸有毒氣味俱厚純陽之物也入手厥陰經經曰寒淫於內治以溫熱冷癖咳逆上氣寒邪在中也非溫劑無以除之又曰硬則氣堅咸以軟之心腹積聚邪氣堅積在中也非咸劑無以軟之命門火衰則為腳冷疼弱無力下焦濕甚則為陰蝕疽痔䘌瘡酸溫能補命門不足大熱能除下焦濕氣故主之也其主頭禿惡瘡疥癬者悉取其除濕殺蟲之功耳本經又主堅筋骨及別録療鼻衄止血者皆非所宜夫熱甚則骨消筋緩火載血上則錯經妄行豈有大熱之物反能療是證哉無是理也主治參互入雞子同艾葉煮食治婦人白帶因於虛寒者聖惠方諸瘡胬肉如蛇出數寸硫黃末一兩肉上薄之即縮急救良方疥瘡有蟲硫黃末以雞子煎香油調搽極效簡誤硫黃古方未有服餌者本經所用止於治瘡蝕攻積聚冷氣腳弱等而近世遂為常服丸散如來復丹半硫丸金液丹黑龍丹及諸方書所載者不可縷指稱其功用亦未能彈述然而人身之中陽常有餘陰常不足病寒者少病熱者多苟非真病虛寒胡可服此大熱毒藥假令果系虛寒證法當補氣以回陽亦何須藉此毒石哉世人徒知其取效良捷而不知其為害之酷烈也戒之戒之食鹽味鹹溫無毒主殺鬼蠱邪疰毒氣下部瘡傷寒寒熱吐胸中痰癖止心腹卒痛堅肌骨多食傷肺喜咳疏鹽稟水氣以生洪範潤下作咸素問水生咸此鹽之根源也本經味鹹別録鹹溫無毒察其本具氣味則是鹹寒而非溫也氣薄味厚陰也降也入足少陰亦入手少陰足陽明手太陰陽明經其主腸胃結熱喘逆胸中病及傷寒寒熱者皆熱邪在陽明也經曰熱淫於內治以鹹寒正此之謂也五臟苦欲補瀉云心欲軟急食鹹以軟之以咸補之心虛則邪熱客之而卒痛鹹寒能除熱補心故主心腹卒痛也凡濕熱在下焦則為䘌瘡留著經絡則肌骨軟鹹寒能除濕熱故主之也或以為咸能軟堅又何以堅肌骨不知肌骨軟緩皆濕熱所致經曰熱則骨消筋緩又曰體重胕腫肉如泥皆屬於濕如夏月濕熱大盛則肉食易於潰散得鹽性之鹹寒乃能堅久不腐也鹹味湧泄所以能吐胸中痰癬及鬼蠱邪疰毒氣悉皆吐出也多食作肺喜咳者肺主清肅多食則鹹味漬入肺竅故令咳也日華子以助水臟及霍亂心痛金瘡明目止風淚邪氣一切蟲傷瘡腫火灼通大小腸療疝氣諸治悉取其入腎入心走血軟堅除熱潤下之功耳主治參互炒鹽三錢以炒砂仁五錢為末泡湯井水澄冷灌下治霍亂心腹絞痛有效一味炒作湯治心經火熱作痛柳柳州纂救三死方治霍亂上不得吐下不得瀉氣絶欲死者用鹽一大匙熬令黃童子小便一升合和溫服少頃吐下即愈也孫真人方卒中尸遁服鹽湯取吐效甄權藥性論中惡心痛鹽如雞子大青皮裹燒赤納酒中頓服當吐惡物愈唐瑤經驗方風熱牙痛以槐枝煎濃湯二碗入鹽一斤煮乾炒研日用揩齒以水洗目梅師方蜈蚣咬人嚼鹽塗之或鹽湯洗之炒經驗方蚯蚓咬毒形如大風眉鬢皆落惟濃煎鹽湯浸身數遍即愈浙西將軍張韶病此每夕蚯蚓鳴於體一僧用此方而安蚯蚓畏鹽故也簡誤內經曰咸走血血病無多食鹹多食則脈凝澀而色變凡血病及喘嗽水腫消渴法所大忌以其或傷肺引痰或澀血脈或助水邪或走精液故也水銀味辛寒有毒主疥瘻痂瘍白禿殺皮膚中蝨墮胎除熱以傅男子陰陰消無氣殺金銀銅錫毒熔化還復為丹久服神仙不死一名汞得鉛則凝得硫則結並棗肉人唾研則散別法煅為膩粉粉霜得紫河車則伏得川椒則收疏水銀從石中迸出為石汞從丹砂中出者為朱里汞即丹砂中液也稟至陰之氣而有汞故其味辛其氣寒而有毒善能殺蟲其氣下走無停歇故本經以之主疥瘻痂瘍白禿殺皮膚中蝨及墮胎除熱也至陰之精能消陽氣故不利男子陰也神仙不死之說必得鉛華相合乃能收攝真氣凝結為丹即道家所謂太陽流珠常欲去人卒得金華轉而相因之旨也伏煉五金為泥以其性能殺金銀銅錫毒也熔化還復為丹亦出仙家烹煉耳主治參互得礬石丹砂芒硝雄黃黑鉛入陽城罐內如法升煉名紅粉霜能止痛生肌少加冰片研勻擦廣瘡有效製法白礬輕粉同大風子蛇床子樟腦輕粉枯礬雄黃胡桃油治疥癬蟲瘡肘後方一切惡瘡水銀黃連胡粉熬黃各一兩研勻傅之干則以唾調簡誤陳藏器曰水銀入耳能食人腦至盡入肉令百節攣縮倒陰絶陽人患疥瘡多以水銀塗之性重直入肉宜謹之頭瘡切不可用恐入經絡必緩筋骨寇宗奭云水銀入藥雖各有法極須審謹有毒故也歷舉學士大夫惑於方士之說服煅煉水銀暴卒者不可勝數婦人誤服多致絶孕其為毒害昭昭矣惟宜外傅不宜內服入口為厲可不戒哉石膏味辛甘微寒大寒無毒主中風寒熱心下逆氣驚喘口乾舌焦不能息腹中堅痛除邪鬼産乳金瘡除時氣頭痛身熱三焦大熱皮膚熱腸胃中膈氣解肌發汗止消渴煩逆腹脹暴氣喘息咽熱亦可作湯浴堅白明瑩者良浙人呼為寒水石者真疏石膏稟金水之正得天地至清至寒之氣故其味辛甘其氣大寒而無毒陰中之陽可升可降入足陽明手太陰少陽經氣分辛能解肌甘能緩熱大寒而兼辛甘則能除大熱故本經主中風寒熱熱則生風故也邪火上衝則心下有逆氣及驚喘陽明之邪熱甚則口乾舌焦不能息邪熱結於腹中則腹中堅痛邪熱不散則神昏譫語同乎邪鬼肌解熱散汗出則諸證自退矣惟産乳金瘡非其用也別録除時氣頭痛身熱三焦大熱皮膚熱腸胃中膈氣解肌發汗止消渴煩逆腹脹暴氣喘息咽熱者以諸病皆由足陽明胃經邪熱熾盛所致惟喘息咽熱略兼手太陰病此藥能散陽明之邪熱降手太陰之痰熱故悉主之也甄權亦用以治傷寒頭痛如裂壯熱如火日華子用以治天行熱狂頭風旋揩齒東垣用以除胃熱肺熱散陽邪緩脾益氣者邪熱去則脾得緩而元氣回也潔古又謂止陽明經頭痛發熱惡寒日晡潮熱大渴引飲中暑及牙痛者無非邪在陽明經所生病也理陽明則蔑不濟矣足陽明主肌肉手太陰主皮毛故又為發斑發疹之要品起死回生功同金液若用鮮少則難責其功世醫罔解茲特表而著之主治參互仲景白虎湯專解陽明邪熱其證頭疼壯熱口渴煩躁鼻乾目眴眴不得眠畏人聲木聲畏火若勞役人病此元氣先虛者可加人參名人參白虎湯發斑陽毒盛者白虎湯加竹葉麥門冬以石膏為君自一兩至四兩麥門冬亦如之知母自七錢至二兩竹葉自百片至四百片粳米自一大撮至四大撮甚則更加黃連黃芩名三黃石膏湯自一劑至四劑婦人妊娠病此者亦同傷寒汗後煩熱不解竹葉石膏湯主之小兒痧疹發熱口渴唇焦咳嗽多嚏或多痰或作泄竹葉石膏湯加赤柳木枝兩許貝母栝樓根各二三錢主之發斑亦同甚則加三黃瘧疾頭痛壯熱多汗發渴亦用竹葉石膏湯二三劑主之虛者加人參後隨證施治中暑用白虎湯虛者加人參太陽中暍亦用竹葉石膏湯胃家實熱或嘈雜消渴善飢齒痛皆須竹葉石膏湯主之簡誤石膏本解實熱祛暑氣散邪熱止渴除煩之要藥溫熱二病多兼陽明若頭痛遍身骨痛而不渴不引飲者邪在太陽也未傳陽明不當用七八日來邪已結里有燥糞往來寒熱宜下者勿用暑氣兼濕作泄脾胃弱甚者勿用瘧邪不在陽明則不渴亦不宜用産後寒熱由於血盛或惡露未盡骨蒸勞熱由於陰精不足而不由於外感金瘡下乳更非其職宜詳察之並勿誤用金屑味辛平有毒主鎮精神堅骨髓通利五臟除邪毒氣服之神仙寇宗奭曰不曰金而更屑字者是已經磨屑可用之義必須烹煉煅屑為箔方可入藥蘇頌曰金屑古方不見用惟作金箔入藥甚便又古方有金石凌紅雪紫雪輩皆取金銀煮汁此通用經煉者假其氣爾生金有毒能殺人且難解有中其毒者惟鶴鴣肉可解之性惡錫畏水銀疏金屑稟西方剛利之性善能制木體重而降亦能鎮心心氣怯則驚邪易入精神不安五臟皆為之病肝經風熱則為驚癇失志魂魄飛楊肝屬木而畏金與心為子母之臟故其病同一源治亦同法本經主鎮驚通利五臟邪氣及甄權療小兒驚傷五臟風癇失志鎮心安魂魄者亦兼實則瀉其子之義也本經又主堅骨髓者以肝心平風熱退則精生血骨髓自堅矣服之神仙乃出之仙經非醫方所述也主治參互入至寶丹治中風不語氣絶中惡蠱毒尸疰難産血暈等證入牛黃清心丸治諸風緩縱不隨語言謇澀恍惚怔忡痰涎壅塞驚恐怕怖或喜怒無時癲狂昏亂入紫雪治內外煩熱口舌生瘡狂呼叫走瘴疫毒癘卒死溫瘧五尸五疰蠱毒卒黃小兒驚癇百病紅雪治療略同金箔鎮心丸治小兒風壅痰熱驚悸譫妄心神不寧磨細屑挑開疔瘡頭上沒入能拔疔根作針針疔瘡納藥拔疔簡誤太清法云金稟中宮陰己之氣性本剛服之傷肌損骨豫見今之以難求死者服金一二分則心腹剜痛腸胃如裂而斃其為損傷肌骨概可見矣惟作箔入藥可為鎮心安神之用如或止因心氣虛以致神魂不安並無驚邪外入者當以補心安神為急而非金箔所能定矣靈砂味甘溫無毒主五臟百病養神安魂魄益氣明目通血脈止煩滿益精神殺精魅惡鬼氣久服通神明不老輕身神仙令人心靈一名二氣砂疏靈砂硫汞制而成及水火既濟二氣交合奪造化之功竊陰陽之妙可以變化五行升降氣血為除邪養正扶危救急之靈丹也故能主五臟百病益精神安魂魄及益氣養神也其主明目通血脈止煩滿殺精魅惡鬼氣者特其餘事耳得陰陽之妙故能令人心靈心靈則神明自通不老輕身神仙所自來矣又能主上盛下虛痰涎壅盛頭旋吐逆霍亂反胃心腹冷痛諸證更為鎮墜之神丹也修治用水銀一兩硫黃六銖細研炒作青砂頭後入水火既濟爐抽之如束錢紋者成就也又按胡演丹藥祕訣云升靈砂法用新鍋安逍遙爐上蜜揩鍋底文火下燒入硫黃二兩熔化投水銀半斤以鐵匙急攪作青砂頭如有焰起噴醋解之待汞不見星取出細研盛入水火鼎內鹽泥固濟下以自然火升之於水十二盞為度取出束針紋者成矣主治參互錢氏小兒方霍亂吐逆不問虛實冷熱二氣散一名青金丹用水銀硫黃等分研不見星每服一字生薑湯調下直指方冷氣心痛靈砂三分五靈脂一分為末稀糊丸麻子大每服二十丸食前石菖蒲生薑湯下又方九竅出血因暴驚而得其脈虛者靈砂丹三十粒人參湯下三服愈此證不可認作血得熱則妄行而用涼藥誤矣何者驚則氣浮神魂發越陽氣暴壅故也得鎮墜則神魂復安而血自循經矣和劑局方有養正丹又名交泰丹用黑鉛硃砂水銀硫黃炒成即靈砂意也其用亦與靈砂略同簡誤靈砂雖稱水火既濟陰陽配合然而硫汞有毒性亦下墜止可借其墜陽交陰卻病於一時安能資其養神益氣通靈於平日哉凡胃虛嘔吐傷暑霍亂肺熱生痰非關驟發者咸在所忌水銀粉味辛冷無毒主通大腸傅小兒疳痹瘰癧殺瘡疥癬蟲及鼻上酒皶風瘡瘙癢又名汞粉輕粉膩粉畏磁石石黃忌一切血本出於丹砂故也土茯苓黑鉛鐵漿可制其毒疏水銀粉升煉水銀而成其味本辛氣冷無毒療體與水銀相似第其性稍輕浮爾大腸燥熱則不通小兒疳痹因多食甘肥腸胃結滯所致辛涼總除腸胃積滯熱結故主之也其主瘰癧瘡疥癬蟲及鼻上酒皶風瘡瘙癢者皆從外治無非取其除熱殺蟲之功耳升煉輕粉法用水銀一兩白礬二兩食鹽一兩同研不見星鋪於鐵器內以小烏盆覆之鹽泥封固盆口以炭火打三炷香取開則粉升於盆上矣主治參互活幼口議小兒哯乳不止服此立效膩粉一錢鹽豉七粒去皮研勻丸麻子大每服三丸藿香湯下經驗方小兒吃泥及䑋肚用膩粉一分砂糖和丸麻子大空心米飲下一丸良久泄出泥土瘥聖惠方大小便閉脹悶欲死二三日則殺人膩粉一錢生麻油一合相和空心服萬表積善堂方下疳陰蝕瘡輕粉末乾摻之即結靨而愈永類鈐方臁瘡不合蔥汁調輕粉傅之又祕法升丹靈藥方治癰疽惡瘡楊梅諸瘡拔毒長肉神驗水銀一兩黑鉛七錢硃砂雄黃各三錢白礬火硝各二兩半其法先用鉛化開投水銀凝成餅入硃砂雄黃研勻將硝礬熔化投前四味末入內離火急攪令勻用陽城罐盛之鐵盞蓋口上架然後鐵梁鐵線扎緊鹽泥固濟神仙爐內文武火升煉盞中時時以水擦之火漸加以三分為率每焚官香一炷則加一分如是煉三炷香為度候冷取開於盞底刮取研如飛面甘草湯飛過三次入龍腦香少許點廣瘡上數數以指蘸藥按之三日自脫神方也簡誤水銀粉下膈涎消積滯並小兒涎潮瘛瘲藥多用然而其性有毒走而不守若服之過劑或不得當則毒氣熏蒸竄入經絡筋骨莫之能出痰涎既去血液隨亡筋失所養營衛不從變為筋攣骨痛或結腫塊漏瘡或手足皸裂頑痹等證遂成痼疾貽害無窮蓋此物本成於汞則汞之毒尚存又得火煅則火之毒氣未出本經言其無毒誤也凡閉結由於虛血不能潤澤小兒疳病脾胃兩虛小兒慢驚痰涎壅上楊梅結毒發於氣虛久病之人咸不宜服宗奭有云病屬於驚尤須審謹蓋驚為心氣不足不可下下之裡虛驚氣入心不可治其人本虛便須禁此慎之至也磁石味辛咸寒無毒主周痹風濕肢節中痛不可持物洗洗酸消除大熱煩滿及耳聾養腎臟堅骨氣益精除煩通關節消癰腫鼠瘻頸核喉痛小兒驚癇煉水飲之亦令人有子一名玄石即吸鐵石入藥須火燒醋淬研末水飛或醋煮三日夜疏磁石生於有鐵處得金水之氣以生本經味辛氣寒無毒別録甄權咸有小毒大明甘澀平藏器咸溫今詳其用應是辛鹹微溫之藥而甘寒非也氣味俱厚沉而降陽中陰也入足少陰兼入足厥陰經其主周痹風濕肢節中痛不可持物洗洗酸者皆風寒濕三氣所致而風氣尤勝也風淫末疾發於四肢故肢節痛不能持物風濕相搏久則從火化而骨節皮膚中洗洗酸也辛能散風寒溫能通關節故主之也咸為水化能潤下軟堅辛能散毒微溫能通行除熱故主大熱煩滿及消癰腫鼠瘻頸核喉痛者足少陽少陰虛火上攻所致咸以入腎其性鎮墜而下吸則火歸元而痛自止也夫腎為水臟磁石色黑而法水故能入腎養腎臟腎主骨故能強骨腎藏精故能益精腎開竅於耳故能療耳聾腎主施泄久祕固而精氣盈溢故能令人有子小兒驚癇心氣怯痰熱盛也咸能潤下重可去怯是以主之甄權云補男子腎虛風虛身強腰中不利加而用之宗奭云養腎氣填精髓腎虛耳聾目昏者皆用之主治參互直指方耳卒聾閉吸鐵石半錢入病耳內鐵砂末入不病耳內自然通透千金方陽事不起磁石五斤研清酒漬二七日每服三合日二夜一倪維德原機啓微眼昏內障神光寬大漸散昏如霧露中行漸睹空花物成二體久則光不收及內障磁朱丸真磁石火煅醋淬七次二兩硃砂一兩神麯生用三兩為末更以神麯末一兩煮糊加蜜丸梧子大每服二十丸空心飯湯下千金方金瘡血出磁石末傅之止痛斷血諸藥石皆有毒且不宜久服獨磁石性稟沖和無猛悍之氣更有補腎益精之功故不著簡誤大都漬酒優於丸散石性體重故爾凝水石味辛甘寒大寒無毒主身熱腹中積聚邪氣皮中如火燒煩滿水飲之除時氣熱盛五臟伏熱胃中熱煩滿止渴水腫小腹痹久服不飢一名寒水石一名白水石色如雲母可析者良鹽水精也石膏亦名寒水石與此不同疏凝水石生於鹵地稟積陰之氣而成本經味辛氣寒別録加甘大寒無毒經曰小熱之氣涼以和之大熱之氣寒以取之又曰熱淫於內治以鹹寒大寒微咸之性故主身熱邪氣皮中如火燒煩滿及時氣熱盛五臟伏熱胃中熱也易飢作渴亦胃中伏火也甘寒除陽明之邪熱故能止渴不飢水腫者濕熱也小便多不利以致水氣上溢於腹而成腹痹辛鹹走散之性故能除熱利竅消腫也療腹中積聚者亦取其辛散咸軟之功耳主治參互永類鈐方男女轉脬不得小便寒水石二兩滑石一兩葵子一合為末水一斗煮五升每服一升即利經驗方小兒丹毒皮膚熱赤寒水石半兩白土一分為末米醋調塗之簡誤凝水石按本文云鹽之精則與石膏方解石大相懸絶矣因石膏有寒水石之名而王隱君復云寒水石又名方解石以致混淆難辨其功能各不相同用者自宜分別生鹵地味辛鹹碎之如朴硝者是凝水石其氣大寒能除有餘邪熱凡陰虛火旺咳嗽吐血多痰潮熱骨蒸並脾胃作泄者不宜服經曰諸腹脹大皆屬於熱者宜之諸濕腫滿屬脾土者忌之大宜詳審慎勿有誤陽起石味鹹微溫無毒主崩中漏下破子臟中血癥瘕結氣寒熱腹痛無子陰痿不起補不足療男子莖頭寒陰下濕癢去臭汗消水腫久服下飢令人有子白色瑩明若狼牙者為上凡用火煅酒淬七次研細水飛日乾疏陽起石稟純陽之氣以生本經味鹹氣微溫無毒觀圖經所載齊州陽起山其山常有暖氣雖盛冬大雪遍境獨此山無少積蓋石氣熏蒸也其為氣之溫暖當不甚微矣味鹹而氣溫入右腎命門補助陽氣併除積寒宿血留滯下焦之聖藥故能主崩中漏下及破子臟中血癥瘕結氣寒熱腹痛及男子莖頭寒陰痿不起陰下濕冷令人有子也真陽足則五臟之氣充溢邪濕之氣外散故久服不飢並去臭汗也別録又主消水腫者蓋指真火歸元則能暖下焦熏蒸糟粕化精微助脾土以制水也主治參互同破故紙鹿茸膃肭臍菟絲子狗陰莖肉蓯蓉巴戟天治命門寒陰痿不起精寒無嗣服之能令陽道豐隆使人有子總治男子九醜之疾簡誤陰虛火旺者忌之陽痿屬於失志以致火氣閉密不能發越而然及崩中漏下由於火盛而非虛寒者並不得服密陀僧味鹹辛平有小毒主久痢五痔金瘡面上瘢䵟面膏藥用之舊出南閩中銀銅冶處今甚難得但取煎銷銀鋪爐底用之疏密陀僧感銀銅之氣而結故其味鹹辛氣平有小毒久痢五痔大腸濕熱積滯也辛主散結滯咸主潤下除熱大腸清寧則久痢五痔自瘳矣體重能消磨堅積味鹹能入血涼血故又主金瘡及滅面上瘢䵟也主治參互聖惠方鼻皶赤皰密陀僧二兩細研人乳調夜塗旦洗活人心鑑夏月汗癍如疹用密陀僧八錢雄黃四錢先以薑片擦熱仍以薑片蘸末擦之次日即焦壽域方骨疽出骨一名多骨瘡不時出細骨乃母受胎未及一月與六親骨肉交合感其精氣故有多骨之名以密陀僧末香油調勻攤貼之即愈簡誤密陀僧惟治䵟𪒟傅面外今人無復用以服食者大都可外傅不可內服此藥難得真者銷銀爐底乃銷銅之氣所結能爛一切物益不宜輕用鐵落味辛甘平無毒主風熱惡瘡瘍疽瘡痂疥氣在皮膚中除胸膈中熱氣食不下止煩去黑子可以染皂疏鐵落是煅家燒鐵赤沸砧上煅之如皮甲落下者本出於鐵不離金象體重而降故素問有生鐵落飲以療病狂怒者云生鐵落下氣疾也又狂怒屬肝氣暴升故取金氣以制之也其主氣在皮膚中及除胸膈中熱氣食不下止煩者皆制木散熱之功也本經又主風熱惡瘡瘍疽瘡痂疥者皆肝心火熱所致辛平能除二經之火熱故主之也蘇恭以之炒熱投酒中飲療賊風痙大明治驚邪癲癇小兒客忤並煮服之悉此意耳主治參互鐵稱錘燒紅淬入米泔中百次乘熱熏洗陰癬頑瘡皆有效別傅殺蟲涼血藥彌佳珊瑚味甘平無毒主宿血去目中翳鼻衄末吹鼻中疏珊瑚得水中陰氣以生味甘氣平性主消散故能去目中翳及消宿血止鼻衄也主治參互同貝子真珠瑪瑙琥珀石蟹為極細末點入目中去浮翳甘平無毒主療亦稀故無簡誤瑪瑙味辛寒無毒主辟惡尉目赤爛疏瑪瑙玉之屬也觀陳藏器云砑木不熱其性寒可知矣寒而兼辛故能辟惡及尉目赤爛也同珊瑚輩為末點目去障翳尤妙太陰玄精味鹹溫無毒主除風冷邪氣濕痹益精氣婦人痼冷漏下心腹積聚冷氣止頭痛解肌其色青白龜背者良疏太陰玄精出於鹽滷之地及至陰之精凝結而成故其形皆六出象老陰之數也本經味鹹氣溫無毒然詳其所主味應帶辛氣應作寒非辛寒則不能除風冷邪氣濕痹及止頭痛解肌等證咸能軟堅故主心腹積聚咸能潤下入腎滋水故主益精氣本經誤認為溫故有婦人痼冷漏下冷氣之治皆非所宜也主治參互圖經本草正陽丹治傷寒三日頭痛壯熱四肢不利太陰玄精石硝石硫黃各二兩蓬砂一兩細研入瓶固濟以炭半斤於瓶子周一寸㶸之約近半日候藥青紫色住火待冷取出用臘月雪水拌勻入罐子中屋後北陰下陰乾又入地埋二七日取出研細曲糊丸雞頭實大先用熱水浴後以艾湯研下一丸以衣蓋汗出為瘥入來復丹治緩急諸病但有胃氣無不獲安簡誤傷寒陰證不宜服咸能走血用以引經入腎則可多則反瀉腎傷血矣血病無多食鹹戒之土蜂窩上細土本經無氣味云主腫毒醋和為泥傅之亦主蜘蛛咬必是甘平無毒之物甘為土化故能解諸毒也胡燕窩內土無毒主風瘙癮疹及惡刺瘡浸淫瘡遍身至心者死並水和傅之疏胡燕即玄鳥春分後至窠取四方濕土為之其氣味必甘寒故藏器以之療諸瘡瘍蓋諸痛癢瘡瘍皆屬心火而甘寒最能解火毒土性能化一切毒故也主治參互入回燕膏貼瘰癧有效回燕者朝北燕窠土
