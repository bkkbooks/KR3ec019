body:
  text: 卷二十三果部三品總五十三種今疏其要者二十種又木部移入三種上品藕實藕蓮鬚附橘袖青皮核葉附大棗覆盆子雞頭實中品梅實木瓜柿烏芋枇杷葉荔枝子石蜜甘蔗沙糖下品桃核仁杏核仁梨胡桃海松子橄欖龍眼木部移入赤爪木即山楂木部移入棐實木部移入藕實味甘平寒無毒主補中養神益氣力除百疾久服輕身耐老不飢延年疏藕實得天地清芳之氣稟土中衝和之味故味甘氣平別録寒無毒入足太陰陽明兼入手少陰經土為萬物之母後天之元氣藉此以生化者也母氣既和則血氣生神得所養而疾病無由來矣藕實正稟稼穡之化乃脾家之果故主補中養神益氣力除百疾及久服輕身耐老不飢延年也孟詵主五臟不足傷中益十二經脈血氣大明主止渴去熱安心止痢治腰痛及泄精多食令人喜皆資其補益心脾之功也主治參互得川黃連白芍藥白扁豆乾葛升麻紅曲橘紅甘草滑石烏梅為丸治滯下如神下痢飲食不入俗名噤口痢此證大危用鮮蓮肉一兩黃連五錢人參五錢水煎濃細細與呷服完思食便瘥同菟絲子五味子山茱萸山藥車前子肉豆蔻砂仁橘紅芡實人參補骨脂巴戟天治脾腎俱虛五更泄瀉有肺熱者去人參肉豆蔻孟詵食療服食不飢石蓮肉蒸熟去心為末煉蜜丸梧子大日服三十丸此仙家方也普濟方白濁遺精石蓮肉龍骨益智仁等分為末每服二錢空心米飲下直指方心虛赤濁蓮子六一湯用石蓮肉六兩炙甘草一兩為末每服一錢燈心湯下丹溪心法久痢噤口石蓮肉炒為末每服二錢陳倉米湯調下便覺思食甚妙簡誤藕實脾家果也甘平無毒於諸疾並無相忤第生者食之過多微動冷氣脹人石蓮子乃九月經霜後採堅黑如石者破房得之墮水入泥者良今肆中一種石蓮子狀如棐子其味大苦産廣中出樹上木實也不宜入藥附藕唐本注主熱渴散留血生肌久服令人心歡藥性論云藕汁味甘能消瘀血不散藕節搗汁主吐血不止或口鼻出血孟詵云生食之主霍亂後虛渴煩悶不能食其産後忌生冷物惟藕不同生冷為能破血故也蒸食甚補五臟實下焦陳藏器云消食止泄除煩解酒毒及病後熱渴日華子云止霍亂開胃消食除煩止悶口乾渴疾止怒令人喜破産後血悶搗罯金瘡並傷折止暴痛疏藕稟土氣以生其味甘生寒熟溫入心脾胃三經生者甘寒能涼血止血除熱清胃故主消散瘀血吐血口鼻出血産後血悶閟金瘡傷折及止熱渴霍亂煩悶解酒等功熟者甘溫能健脾開胃益血補心故主補五臟實下焦消食止泄生肌及久服令人心歡止怒也本生於汙泥之中而體至潔白味甚甘脆孔竅玲瓏絲綸內隱療血止渴補益心脾真水果中之嘉品也又能解蟹毒附蓮蕊須一名佛座須味甘澀氣溫本經不收而古方固真補益方中往往用之詳其主治乃是足少陰經藥亦能通手少陰經能清心入腎固精氣烏鬚髮止吐血療滑泄同黃桕砂仁沙苑蒺藜魚膠五味子覆盆子生甘草牡蠣作丸治夢遺精滑最良橘皮味辛溫無毒主胸中瘕熱逆氣利水穀下氣止嘔咳除膀胱留熱停水五淋利小便主脾不能消穀氣衝胸中吐逆霍亂止泄去寸白久服去臭下氣通神輕身長年按橘柚實兩種本經作一條蓋傳誤也今改正疏橘皮花開於夏成實於秋得火氣少金氣多故味辛苦氣溫無毒味薄氣厚降多升少陽中之陰也入手足太陰足陽明經其主胸中瘕熱逆氣氣衝胸中嘔咳者以肺主氣氣常則順氣變則逆逆則熱聚於胸中而成瘕瘕者假也如痞滿鬱悶之類也辛能散苦能泄溫能通行則逆氣下嘔咳止胸中瘕熱消矣脾為運動磨物之臟氣滯則不能消化水穀為吐逆霍亂泄瀉等證苦溫能燥脾家之濕使滯氣運行諸證自瘳矣肺為水之上源源竭則下流不利熱結膀胱肺得所養而津液貫輸氣化運動故膀胱留熱停水五淋皆通也去臭及寸白者辛能散邪苦能殺蟲也通神輕身長年者利脾肺之極功也主治參互橘皮留白補脾胃和中去白消痰理肺氣同白朮則補脾同甘草則補肺同補氣藥則益氣同泄氣藥則破氣同消痰藥則能去痰同消食藥則能化食各從其類以為用也同人參何首烏桂枝當歸姜皮治三日瘧寒多得白豆蔻生薑藿香半夏治胃家有寒痰或偶感寒氣傷冷食嘔吐不止同人參白朮白茯苓甘草山藥白豆蔻藿香麥芽山楂白扁豆治脾胃虛飲食不化或不欲食食亦無味同蘇子貝母枇杷葉麥門冬桑根白皮沙參栝樓根五味子百部治上氣咳嗽能消痰下氣同枳殼烏藥木香草豆蔻檳榔治氣實人暴氣壅脹凡蒼朮厚朴甘草為平胃散治胸中脹滿入二陳湯治脾胃濕痰及寒痰痰飲仲景方橘皮湯治男女傷寒及一切雜病嘔噦手足逆冷者用橘皮四兩生薑一兩水二升煎一升徐徐呷之即止百一選方霍亂吐瀉但有一點胃氣存者服之即生廣陳皮去白五錢真藿香五錢水二盞煎一盞時時溫服食療治腳氣衝心或心下結硬腹中虛冷陳皮一斤和杏仁五兩去皮尖熬少許蜜搗和丸如梧桐子大每日食前米飲下三十丸普濟方大腸閉塞陳皮連白酒煮焙乾研末每服二錢米飲下適用方脾寒諸瘧不拘老少孕婦只兩服便止真橘皮去白切生薑自然汁浸過一指銀石器內重湯煮乾焙研末每服三錢用隔年青州棗十個去核水一盞煎半盞發前服以棗下之張氏方婦人乳癰未成者即散已成者即潰痛極者不痛神驗不可言用真橘皮湯浸去白曬乾麵炒微黃為末每服二錢麝香調酒下初發一服見效簡誤橘皮味辛氣溫能耗散真氣中氣虛氣不歸元者忌與耗氣藥同用胃虛有火嘔吐不宜與溫熱香燥藥同用陰虛咳嗽生痰不宜與半夏南星等同用瘧非寒甚者亦勿施附青橘即青皮主氣滯下食破積結及膈氣疏青皮古方無用者至宋時醫家始用之其色青其味極苦而辛其氣溫而無毒氣味俱厚沉而降陰也入足厥陰少陽苦泄辛散性復刻削所以主氣滯下食破結積及膈氣也元素破堅癬散滯氣治左脅肝經積氣亦此意耳主治參互青皮同人參鱉甲能消瘧母同枳殼肉桂川芎治左脅痛同人參白朮三稜蓬荗阿魏礬紅山楂紅曲木香消痃癖氣塊及一切肉食堅積簡誤青皮性最酷烈削堅破滯是其所長然誤服之立損人真氣為害不淺凡欲使用必與人參朮芍藥等補脾藥同用庶免遺患必不可單行也肝脾氣虛者概勿施用附橘核主腰痛膀胱氣腎冷炒去殼酒服良按橘核出日華子其味苦溫而下氣所以能入腎與膀胱除因寒所生之病也疝氣方中多用附橘葉古今方書不載能散陽明厥陰經滯氣婦人妒乳內外吹乳岩乳癰用之皆效以諸證皆二經所生之病也大棗味甘平無毒主心腹邪氣安中養脾助十二經平胃氣通九竅補少氣少津液身中不足大驚四肢重和百藥補中益氣強力除煩悶療心下懸腸澼久服輕身延年不飢神仙疏大棗純得土之沖氣兼感天之微陽以生本經味甘氣平無毒東垣孟詵言溫氣味俱厚陽也入足太陰陽明經經曰里不足者以甘補之又曰形不足者溫之以氣甘能補中溫能益氣甘溫能補脾胃而生津液則十二經脈自通九竅利四肢和也正氣足則神自安故主心腹邪氣及大驚中得緩則煩悶除故療心下懸急及少氣脾得補則氣力強腸胃清故主身中不足及腸澼甘能解毒故主和百藥脾胃足氣血充後天生氣藉此而盈溢故久服輕身長年不飢神仙也然亦指辟穀修煉者言之非恆人所能耳主治參互大棗甘溫能和陰陽調營衛生津液凡邪在營衛者辛甘以解之故仲景桂枝湯用薑棗以和營衛助脾胃生津液令出汗也仲景治傷寒水飲脅痛咳而乾嘔者有十棗湯取其益土勝水也又方發汗後小便利其人臍下悸欲作奔豚者茯苓桂枝甘草大棗湯主之茯苓能伐腎邪桂枝泄奔豚甘草大棗之甘滋助脾土以平腎氣許叔微本事方治婦人臟躁悲傷欲哭象若神憑數缺者大棗湯大棗十枚小麥一升甘草二兩每服一兩水煎服之簡誤棗雖能補脾胃益氣然而味過於甘中滿者忌之小兒疳病不宜食齒痛及患痰熱者不宜食生者尤不利人多食致寒熱覆盆子味甘平無毒主益氣輕身令發不白疏覆盆子得木氣而生本經味甘氣平無毒甄權微熱宗奭酸甘深得其義入足少陰腎經其主益氣者言益精氣也腎藏精腎納氣精氣充足則身自輕發不白也蘇恭立補虛續絶強陰健陽悅澤肌膚安和臟腑甄權主男子腎精虛極陰痿女子食之有子大明主安五臟益顏色養精神長髮強志皆取其益腎添精甘酸收斂之義耳主治參互同黃桕沙苑蒺藜蓮鬚五味子砂仁魚膠山茱萸治夢遺泄精同車前子五味子菟絲子蒺藜子為五子衍宗丸治男子精氣虧乏中年無子加入巴戟天膃肭臍補骨脂鹿茸白膠山茱萸肉蓯蓉治陽虛陰痿臨房不舉或精寒精薄簡誤強陽不倒者忌之雞頭實味甘平無毒主濕痹腰脊膝痛補中除暴疾益精氣強志令耳目聰明久服輕身不飢耐老神仙一名芡疏雞頭實稟水土之氣以生故味甘氣平無毒入足太陰少陰補脾胃固精氣之藥也脾主四肢足居於下多為濕所侵以致腰脊膝痛而成痹脾氣得補則濕自不容留前證皆除矣脾主中州益脾故能補中腎藏精與志入腎故主益精強志暴病多屬火得水土之陰者能抑火故主除暴疾也精氣足脾胃健則久服耳目聰明輕身不飢耐老神仙所自來矣簡誤君山藥白茯苓白朮人參蓮肉薏苡仁白扁豆為補脾胃要藥一味搗末熬金櫻子煎和丸服之補下元益人謂之水陸丹經驗方雞頭粥法用雞頭實三合煮熟去殼粳米一合煮粥日日空心食能益精氣強志意利耳目永類鈐方四精丸治思慮色欲過度損傷精氣小便數遺精用秋石白茯苓芡實蓮肉各二兩為末蒸棗和丸梧子大每服三十丸空心鹽湯送下簡誤芡實生食味澀動風冷氣小兒不宜多食以其難消化也梅實味酸平無毒主下氣除熱煩滿安心止肢體痛偏枯不仁死肌去青黑痣惡疾止下痢好唾口乾疏梅實即今之烏梅也梅得木氣之全故其味最酸所謂曲直作酸是也經曰熱傷氣邪客於胸中則氣上逆而煩滿心為之不安烏梅味酸能斂浮熱能吸氣歸元故主下氣除熱煩滿及安心也下痢者大腸虛脫也好唾口於者虛火上炎津液不足也酸能斂虛火化津液固腸脫所以主之也其主腰體痛偏枯不仁者蓋因濕氣侵於經絡則筋脈弛縱或疼痛不仁肝主筋酸入肝而養筋肝得所養則骨正筋柔機關通利而前證除矣其主去死肌青黑痣惡肉者白梅之功也白梅味鹹咸能軟堅故也又能消痰醒睡止霍亂解酒毒弘景雲生梅烏梅白梅功用大約相似第烏梅較良資用更多主治參互烏梅同川黃連白芍藥滑石甘草蓮肉白扁豆葛根升麻紅曲橘紅作丸治滯下如神一味作湯代茶飲治火炎頭痛仲景烏梅丸治蛔厥蛔上入膈故煩須臾復止得食而嘔又煩者蛔聞食即出故耳用烏梅三百個細辛附子人參桔梗黃柏各六兩當歸蜀椒各四兩黃連一斤乾薑十兩搗烏梅肉和丸桐子大先食飲服十丸日三服劉涓子鬼遺方蝕惡瘡努肉用烏梅肉燒為灰傅上惡肉立盡聖惠方赤痢腹痛烏梅肉黃連各四兩煉蜜丸梧子大每米飲下二十丸日三服圖經本草治勞瘧用烏梅十四枚豆豉二合甘草三寸生薑一塊以童便二升煎去一半溫服即止治暑氣霍亂白梅一個和仁搗碎入絲瓜葉一葉或扁豆葉再搗爛用新汲水調灌下即釋簡誤素問云味過於酸肝氣以津又云酸走筋筋病無多食酸以肝主筋性喜升發酸味斂束是違其性之所喜也梅實過酸不宜多食齒痛及病當發散者咸忌之木瓜實味酸溫無毒主濕痹腳氣霍亂大吐下轉筋不止疏木瓜實得春生之氣稟曲直之化故其味酸氣溫無毒氣薄味厚降多於升陽中陰也入足太陰陽明兼入足厥陰其主濕痹腳氣者以脾主四肢又主肌肉性惡濕而喜燥濕侵肌肉則為濕痹傷足絡則成腳氣木瓜溫能通肌肉之滯酸能斂濡滿之濕則腳氣濕痹自除也霍亂大吐下轉筋不止者脾胃病也夏月暑濕飲食之邪傷於脾胃則揮霍撩亂上吐下瀉甚則肝木乘脾而筋為之轉也酸溫能和脾胃固虛脫兼之入肝而養筋所以能療肝脾所生之病也藏器治腳氣衝心強筋骨下冷氣止嘔逆大明主吐瀉水腫心腹痛好古治腹脹善噫心下煩痞無非取其去濕和胃滋脾益肺利筋骨調榮衛通行收斂有並行不悖之功也主治參互得白扁豆藿香白茯苓橘皮白梅人參白朮甘草砂仁香薷治傷暑霍亂吐瀉不止加入石斛雞舌香治轉筋同當歸石斛牛膝續斷芍藥橘皮治血虛轉筋同薏苡仁朮茯苓五加皮石斛萆薢黃柏治濕熱腳氣同人參白茯苓麥門冬藿香白豆蔻竹茹枇杷葉治胃虛嘔吐一味末之白湯吞三錢日五服治楊梅結毒有效入六和湯治暑月霍亂聖惠方治霍亂轉筋木瓜一兩酒一升煎服不飲酒者煎湯服仍煎湯浸青布裹其足御藥院方四蒸木瓜丸治肝腎脾三經氣虛為風寒暑濕相搏流注經絡凡遇時令不和七情怫鬱必致發動或腫滿或頑痹憎寒壯熱嘔吐自汗霍亂吐利用宣州大木瓜四個切蓋剜空聽用一個入黃耆續斷末各半兩於內一個入蒼朮橘皮末各半兩於內一個入烏藥黃松節末各半兩於內黃松節即茯神心中木也一個入威靈仙苦葶藶末各半兩於內以原蓋蓋好拴定用酒浸透入甑內蒸熟曬乾再浸蒸如此三度搗末以榆皮末水和糊丸如梧子大每服五十丸溫酒鹽湯任下醫林集要翻花痔瘡木瓜為末以鱔魚身上涎調貼之以紙護住簡誤下部腰膝無力由於精血虛真陰不足者不宜用傷食脾胃未虛積滯多者不宜用入藥忌犯鐵器柿味甘寒無毒主通鼻耳氣腸澼不足疏柿稟地中之陰氣以生故味甘氣寒無毒入手足太陰經鼻者肺之竅也耳者腎之竅也金水二臟最忌火熱二臟有火上炎則外竅閉而不通得甘寒之氣俾火熱下行竅自清利矣肺與大腸為表裡濕熱傷血分則為腸澼不足甘能益血寒能除熱臟氣清而腑病亦除也乾柿寒氣稍減能厚腸胃補不足潤肺止渴功同於前柿霜清心肺間熱生津止渴化痰寧嗽治喉舌口瘡總之其功長於清肅上焦火邪兼能益脾開胃故三者所主雖不同而其源皆歸於一義也主治參互柿霜得桑根白皮百部天麥門冬沙參貝母蘇子枇杷葉橘紅栝樓根作丸噙化治肺經有火咳嗽生痰簡誤柿性寒肺經無火因客風寒作嗽者忌之冷痢滑泄腸胃虛脫者忌之脾家素有寒積及風寒腹痛感寒嘔吐者皆不得服不宜與蟹同食令人腹痛作瀉烏芋味苦甘微寒無毒主消渴疸熱溫中益氣一或荸臍疏烏芋稟土金之氣以生本經味苦甘氣微寒無毒然詳其用味應有辛辛能散苦能泄故主疸熱甘寒能除熱而生津故主消渴熱去則氣自益氣益則中自溫自然之道也孟詵主下丹石消黃疸除胸中實熱氣汪機主療五種膈氣消宿食治誤吞銅物及今人治腹脹下血等皆取其辛寒消散除熱之功也主治參互烏芋去皮填入雄豬肚內線縫砂器煮糜食之勿入鹽治腹滿脹大善毀銅銅器中煮之即煬誤吞銅物以烏芋合胡桃食一二斤許即消一味曬乾為末服能闢蠱毒神祕方大便下血荸臍搗汁大半鍾入酒少許溫服三日見效簡誤孟詵云烏芋性冷先有冷氣人不可食多食令人患腳氣又孕婦忌之枇杷葉味苦平無毒主卒啘不止下氣疏枇杷葉稟天地清寒之氣四時不凋其味苦氣平平即涼也無毒入手太陰足陽明經氣薄味厚陽中之陰降也經曰諸逆衝上皆屬於火火氣上炎則為卒啘不止啘者噦也其聲濁惡而長經曰樹枯者葉落病深者聲噦病者見此是為危證枇杷葉性涼善下氣氣下則火不上升而胃自安故卒啘止也其治嘔吐不止婦人産後口乾男子消渴肺熱咳嗽喘息氣急腳氣上衝皆取其下氣之功氣下則火降痰順而嘔者不嘔渴者不渴咳者不咳沖逆者不沖逆矣又治婦人發熱咳嗽經事先期佐補陰清熱之藥服之可使經期正而受孕主治參互同生地黃麥門冬白芍藥炙甘草枸杞子桑根白皮童便茅根天門冬蘇子五味子栝樓根治陰虛咳嗽吐血入噙化丸治肺熱咳嗽同竹茹木瓜蘆根汁石斛麥門冬人參白茯苓治胃熱嘔吐加童便人乳竹瀝蘇子白芍藥蔗漿治噎膈反胃同白芍藥生地黃青蒿子五味子黃柏阿膠枸杞子杜仲牡丹皮鱉甲作丸治婦人經行先期發熱無孕同人參白芍藥茯苓竹茹橘紅蘇子麥門冬木瓜治妊娠惡阻同栝樓根天門冬枸杞子五味子石斛白芍藥黃連甘草蘆根汁童便竹葉治消渴龐安常方溫病發噦因飲水多者枇杷葉去毛炙香茅根各半斤水四升煎二升稍稍飲之聖惠方衄血不止枇杷葉去毛焙研末茶服一二錢日二服簡誤胃寒嘔吐及肺感風寒咳嗽者法並忌之荔枝子味甘平無毒止渴益人顏色疏荔枝子南方果也感天之陽氣得地之甘味本經雖云平而其氣實溫也鮮時味極甘美多津液故能止渴甘溫益血助榮衛故能益人顏色也多食令人發熱或衄血齒痛者以其生於炎方熟於夏月故善助火發熱耳入藥甚稀無主治簡誤核味甘溫主心痛小腸氣痛㿗疝婦人血氣刺痛以一枚煨存性研末酒調服蓋其氣溫而通行入肝者散滯氣闢寒邪所以能療如上諸證也主治參互荔枝核同牛膝補骨脂延胡索合歡子茴香木瓜杜仲橘核萆薢治疝氣虛熱者加黃柏虛寒加桂孫氏方治疝氣㿗腫荔枝核炒黑色大茴香炒等分為末每服一錢溫酒下又方腎腫如斗荔枝核青橘皮茴香等分各炒研酒服二錢日三除疝氣外無他用故不著簡誤石蜜乳糖也味甘寒無毒主心腹熱脹口乾渴性冷利疏石蜜乃煎甘蔗汁曝之凝如石而體甚輕今之白沙糖也其味甘其氣寒其用在脾故主心腹熱脹甘寒能除熱生津液故止口乾渴及咳嗽生痰也多食亦能害脾以其味太甘耳甘蔗味甘平無毒主下氣和中助脾氣利大腸疏甘蔗稟地中之沖氣故味甘氣平無毒日華子云冷氣薄味厚陽中之陰降也入手足太陰足陽明經甘為稼穡之化其味先入脾故能助脾氣脾主中州故主和中甘寒除熱潤燥故主下氣利大腸也大明為其消痰止渴除心胸煩熱解酒毒今人用以治噎膈反胃嘔吐大便燥結皆取其除熱生津潤燥之功耳主治參互蔗漿一味單服能潤大便下燥結同蘆根汁梨汁藕汁人乳童便竹瀝和勻時時飲之治胃脘乾枯噎食嘔吐梅師方反胃吐食蔗漿七升薑汁半升和勻日日細呷簡誤甘蔗世人皆以其性熱不敢多食不知乃是甘寒之物能瀉火熱潤枯燥唐王摩詰櫻桃詩云飽食不須愁內熱大官還有蔗漿寒可為證矣惟胃寒嘔吐中滿滑泄者忌之沙糖味甘寒無毒功用與石蜜同而冷利過之疏沙糖蔗汁之清而煎煉至紫黑色者本經雖云與石蜜同功然而不逮石蜜多矣既經煎煉之久則未免有濕熱之氣故多食損齒生蟲發疳脹滿令人心痛等害與鯽魚同食成疳蟲與葵同食生流澼與筍同食不消成癥身重不能行今醫家用作湯下小兒丸散殊為未當桃核仁味苦甘平無毒主瘀血血閉瘕邪氣殺小蟲止咳逆上氣消心下堅除卒暴擊血破癥瘕通月水止痛疏桃核仁稟地二之氣兼得天五之氣以生故其味苦重甘微氣平無毒思邈言辛孟詵言溫皆有之矣氣薄味厚陽中之陰降也入手足厥陰經夫血者陰也有形者也周流乎一身者也一有凝滯則為癥瘕瘀血血閉或婦人月水不通或擊撲傷損積血及心下宿血堅痛皆從足厥陰受病以其為藏血之臟也苦能泄滯辛能散結甘溫通行而緩肝故主如上等證也心下宿血去則氣自下咳逆自止桃為五木之精能鎮闢不祥故主邪氣味苦而辛故又能殺小蟲也主治參互仲景桃仁承氣湯治傷寒濕熱在內小便利而大便黑為蓄血用桃仁五十粒桂枝二兩大黃四兩芒硝二兩甘草一兩以水七升煮取二升半去滓納芒硝更上火微沸空心溫服五合日三當微利入抵擋湯治太陽病六七日表證仍在脈微而沉反不結胸其人如狂者以熱結在下焦少腹當硬滿小便自利下血乃愈用桃仁二十粒水蛭三十個熬虻蟲三十個去翅足熬大黃三兩酒浸以水五升煮取三升溫服一升不下再服同當歸芍藥澤蘭延胡索蘇木五靈脂紅花牛膝生地黃益母草治産後瘀血結塊作痛並治壯盛婦人經閉不通同當歸麻仁地黃麥門冬芍藥黃芩肉蓯蓉甘草治大腸血燥便結不通同番降香川通草山楂穿山甲乳香沒藥紅花續斷當歸治上部內傷瘀血作痛聖濟總録大便不快裡急後重用桃仁三兩去皮以吳茱萸二兩食鹽一兩同炒熟去二物每嚼桃仁五七粒效兼可預闢瘴癘刪繁方婦人難産數日不出桃仁一個劈開用硃砂書一片可字一片出字吞之即生肘後方婦人陰癢桃仁杵爛綿裹塞之杏仁亦可用簡誤桃仁性善破血凡血結血祕血燥瘀血留血蓄血血痛血瘕等證用之立通第散而不收瀉而無補過用之及用之不得其當能使血下不止損傷真陰為害非細故凡經閉不通由於血虛而不由於留血結塊大便不通由於津液不足而不由於血燥閉結法並忌之附桃梟味苦微溫主殺百鬼精物療中惡腹痛殺精物五毒不祥一名桃奴疏桃梟是桃實著樹經冬不落者正月採之桃為五木之精仙木也最能辟邪今道家禁咒鎮魔之術猶有用桃木者本經以桃梟主殺諸精鬼不祥亦此意耳況著於樹上最久得氣尤全苦溫之性又能通滯散邪者乎治血之功與桃仁同主治參互桃梟煅存性同棕皮灰蒲黃硃砂京墨為末臨臥以童便調服三錢小便解色漸淡為度治內傷吐血神效同番降香辰砂治鬼擊吐血聖惠方伏梁結氣在心下不散桃奴三兩為末空心溫酒下每服二錢簡誤用桃仁杏核仁味甘苦溫冷利有毒主咳逆上氣雷鳴喉痹下氣産乳金瘡寒心賁豚驚癇心下煩熱風氣去來時行頭痛解肌消心下急殺狗毒疏杏核仁稟春溫之氣而兼火土之化以生本經味甘氣溫別録加苦有毒其言冷利者以其性潤利下行之故非真冷也氣薄味厚陰中微陽降也入手太陰經太陰為清肅之臟邪客之則咳逆上氣火炎乘金則為喉痹杏仁潤利而下行苦溫而散滯則咳逆上氣喉痹俱除矣其主心下煩熱者邪熱客於心肺之分也風氣去來時行頭痛者肺主皮毛風邪自外而入也溫能解肌苦能泄熱故仲景麻黃湯中用之亦取其有發散之功也主産乳金瘡者亦指為風寒所乘者言之消心下急者以其潤利而下氣也心寒賁豚者心虛而腎邪凌之也驚癇者痰熱盛也雷鳴者大腸不和也總之取其下氣消痰溫散甘和苦泄潤利之功也主治參互同桑根白皮前胡薄荷桔梗蘇子貝母甘草五味子橘紅紫菀治風寒入肺咳嗽生痰入麻黃湯治太陽病無汗惡寒喘急千金方咳逆上氣以杏仁三升去皮尖炒黃研膏入蜜一合杵熟每食前含之咽汁梅師方食狗肉不消心下堅脹口乾發熱妄語杏仁一升去皮尖水三升煎減半取汁分三服效簡誤杏仁性溫散肺經風寒滯氣殊效第陰虛咳嗽肺家有虛熱熱痰者忌之風寒外邪非壅逆肺分喘急息促者不得用産乳金瘡無風寒擊襲者不得用驚癇喉痹亦非必須之藥用者詳之雙仁者能殺人本經言有毒蓋指此耳梨味甘微酸寒多食令人寒中金瘡乳婦尤不可食疏梨成於秋花實皆白其得西方之陰氣者乎味甘微酸氣寒無毒入手太陰兼入足陽明經別録著梨止言其害不敘其功陶隱居言梨不入藥蓋古人論病多主於風寒外邪以溫熱為補藥多桂附凡冷利之物輟而不用也不知時運迭降稟受遞殊今時之人火病熱病痰病往往皆是梨能潤肺消痰降火除熱故蘇恭主熱嗽止渴貼湯火傷治客熱中風不語傷寒寒熱解丹石熱氣驚邪利大小便大明主賊風心煩氣喘熱狂孟詵主胸中痞塞熱結等誠不可闕者也本經言多食令人寒中者以其過於冷利也乳婦金瘡不可食者以血得寒則凝而成瘀為病也凡人有痛處脈數無力或發渴此癰疽將成之候惟晝夜食梨可轉重為輕膏粱之家厚味釅酒縱恣無節必多痰火卒中癰疽之病數食梨可變危為安功難盡述主治參互梨汁同霞天膏竹瀝童便治中風痰熱同人乳蔗漿蘆根汁童便竹瀝治血液衰少漸成噎膈普濟方消渴飲水用香水梨或鵝梨雪梨皆可取汁以蜜和熬成膏瓶收不時白湯調服一二匙崔元亮海上方卒得咳嗽用上好梨去核搗汁一碗入椒四十粒煎一沸去滓納黑餳一大兩消訖細細含咽立定食療本草暗風失音搗梨汁一盞飲之日再服聖惠方小兒風熱昏懵躁悶不能食用消梨三枚切破以水二升煮取汁一升入粳米一合煮粥食之治小兒內熱痰壅喉間吐不出或因驚熱生痰或因風熱生痰取梨汁時時與之加牛黃分許神效圖經赤目胬肉日夜痛者取好梨一顆搗絞汁以黃連切片一錢浸汁內取汁仰臥點之聖濟總録反胃轉食藥物不下用大雪梨一個以丁香十五粒刺入梨內濕紙包四五重煨熟去丁香食之簡誤肺寒咳嗽脾家泄瀉腹痛冷積寒痰痰飲婦人産後小兒痘後胃冷嘔吐及西北真中風證法咸忌之橄欖味酸甘溫無毒主消酒療鯸鮐毒疏橄欖本經味酸甘今嘗之先澀而後甘得土中之陽氣氣溫無毒肺家果也能生津液酒後嚼之不渴故主消酒甘能解毒故療鯸鮐毒也馬志云鯸鮐即河豚也人誤食此魚肝及子必迷悶至死惟橄欖磨汁煮取之必解其木作楫撥著魚皆浮出故知物有相畏如此不特味甘解毒之義也主治參互食諸魚被鯁用橄欖嚼汁咽之無橄欖時即覓核研末急流水調服亦效手抓碎成瘡用橄欖磨濃汁塗之能滅瘢痕直指方腸風下血橄欖燒存性研末每服二錢陳米飲調下乾坤生意耳足凍瘡橄欖核燒研油調塗之胡桃味甘平無毒食之令人肥健潤肌黑髮取瓤燒令黑末斷煙和松脂研傅瘰癧瘡又和胡粉為泥拔白鬚發以納孔中其毛皆黑多食利小便能脫人眉動風故也去五痔外青皮染髭疏胡桃稟火土之氣以生本經雖云甘平然其氣多熱而性潤益血脈補命門之藥也血不充則消瘦肌膚不澤及鬚髮易白益血故令人肥健潤肌黑鬚發也多食利小便者以其能入腎固精令水竅常通也傅瘰癧者甘熱能解毒散結去五痔取其潤腸除濕之功也能脫人眉者熱極則生風風甚則萬物搖落之象也青皮性澀故能染髭主治參互一味勿去黃皮空腹食之最能固精同補骨脂蒺藜蓮鬚鹿茸麥門冬巴戟天覆盆子山茱萸五味子魚膠益命門種子最效入青娥丸能黑鬚發補右腎方見補骨脂條御藥院方胡桃丸益血補髓強筋壯骨延年明目悅心潤肌能除百病用胡桃肉四兩搗膏入補骨脂杜仲萆薢末各四兩杵勻丸梧子大每空心溫酒鹽湯任下五十丸普濟方産後氣喘胡桃肉人參各二錢水一盞煎七分頓服李樓方誤吞銅錢多食胡桃自化出也聖惠方揩齒烏須胡桃仁燒過貝母等分為散日日用之聖濟總録血崩不止胡桃肉十五枚燒存性研作一服空心溫酒調下神效子和儒門事親便毒初起用胡桃七個燒研酒服不過三服效楊試經驗方魚口便毒端五日午時取樹上青胡桃筐內陰乾臨時全燒為末酒服少行一二次有膿自大便出無膿即消二三服平上二方應加全蠍穿山甲尤妙圖經本草壓撲損傷胡桃肉搗和溫酒頓服便瘥簡誤胡桃前人多言其有害不可食孫思邈云多食動痰飲令人噁心吐水蘇頌云性熱不可多食馬志云多食動風脫人眉同酒食多令人咯血汪穎曰多食生痰動腎火然而近世醫方用治痰氣喘嗽和傷補命門潤血脈大腸及癧風諸病而酒家往往以之佐酒則多食吐水咯血脫眉動火之說亦未盡然也但性本熱惟虛寒者宜之如肺家有痰熱命門火熾陰虛吐衄等證皆不得施海松子味甘小溫無毒主骨節風頭眩去死肌發白散水氣潤五臟不飢生新羅疏海松子氣味香美甘溫甘溫助陽氣而通經則骨節中風水氣及因風頭眩死肌自除矣氣溫屬陽味甘補血血氣充足則五臟自潤發白不飢所由來矣仙方服食多餌此物故能延年輕身不老也龍眼味甘平無毒主五臟邪氣安志厭食除蟲去毒久服強魂聰明輕身不老通神明自木部移入疏龍眼稟稼穡之化故其味甘氣平無毒入足太陰手少陰經少陰為君主之官藏神而主血甘能益血補心則君主強神明通五臟邪氣俱除矣甘味補脾脾得補則食自寡而飫心得補則火下降而坎離交故能安志肝藏魄主納血心家血滿則肝有所受而魂強甘能解毒故主去毒久服聰明耳目輕身不老總之補益心脾之驗也至於除蟲非其所能略之可也主治參互同生地黃天麥門冬丹參柏子仁遠志蓮實五味子茯神人參能補心保神益氣強志嚴用和濟生方歸脾湯治思慮過度勞傷心脾健忘怔忡虛煩不眠自汗驚悸用龍眼肉酸棗仁炒黃耆炙白朮焙茯神各一兩木香半兩炙甘草二錢半㕮咀每服五錢姜三片棗一枚水二鍾煎二鍾溫服赤爪木實味酸冷無毒汁服主水痢沐頭及洗身上瘡癢自木部移入即今山楂一名棠球疏山楂稟木氣而生本經云味酸氣冷然觀其能消食積行瘀血則其氣非冷矣入足陽明太陰經二經有積滯則成下痢産後惡露不盡蓄於太陰部分則為兒枕痛山楂能入脾胃消積滯散宿血故治水痢及産婦腹中塊痛也大抵其功長於化飲食健脾胃行結氣消瘀血故小兒産婦宜多食之本經誤認為冷故有洗瘡癢之用主治參互同礬紅黃連紅曲消肉積同紅曲麥芽橘皮白朮肉豆蔻厚朴砂仁能消食健脾同牛膝生地黃當歸續斷益母草澤蘭牡丹皮蒲黃芍藥治産後耳枕作痛衛生易簡方偏墜疝氣山楂肉茴香炒各一兩為末糊丸梧子大每服一百丸空心白湯下簡誤山楂性能克化飲食若胃家無食積及脾虛不能運化不思食者多食之反致克伐脾胃生氣如脾胃虛兼有積滯者當與補藥同施亦不宜過用也物類相感志云煮老雞硬肉入山楂數顆即易爛其消食克伐之力彰矣棐實味甘無毒主五痔去三蟲蠱毒鬼疰木部移入疏棐實稟土氣以生本經味甘無毒然嘗其味多帶微澀詳其用應是有苦氣應微寒氣薄味厚陰也降也入手太陰陽明經五痔三蟲皆大腸濕熱所致苦寒能瀉濕熱則腸清寧而二證愈矣其主蠱毒疰者以其甘能解毒而苦寒能滌除腸胃邪惡氣耳主治參互孟詵食療治寸白蟲日食棐子七顆滿七日蟲皆化為水也簡便方好食茶葉面黃者每日食棐子七枚以愈為度
