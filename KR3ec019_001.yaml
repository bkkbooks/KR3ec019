body:
  text: 卷一讀經疏引豫之作是疏也該括經文義難概述求其宗趣宜有裁節是以或先經而闡義或隨文而暢旨或斷章以相比或因源以導流或從末而會本或根性以知非凡茲數者期在發明經旨適當於用然俱偏見多遺難為準的必欲使纖悉洞了小大靡遺開擴來學臻乎無惑尚有望於明哲之助焉續序例上原本藥性氣味生成指歸夫物之生也必稟乎天其成也必資乎地天布令主發生寒熱溫涼四時之氣行焉陽也地凝質主成物酸苦辛鹹甘淡五行之味滋焉陰也故知微寒微溫者春之氣也大溫熱者夏之氣也大熱者長夏之氣也涼者秋之氣也大寒者冬之氣也凡言微寒者稟春之氣以生春氣升而生言溫熱者盛夏之氣以生夏氣散而長言大熱者感長夏之氣以生長夏之氣化言平者感秋之氣以生平即涼也秋氣降而收言大寒者感冬之氣以生冬氣沉而藏此物之氣得乎天者也天一生水地六成之地二生火天七成之天三生木地八成之地四生金天九成之天五生土地十成之水曰潤下潤下作咸火曰炎上炎上作苦木曰曲直曲直作酸金曰從革從革作辛土爰稼穡稼穡作甘本乎天者親上本乎地者親下氣味多少各從其類也凡言酸者得木之氣言辛者得金之氣言咸者得水之氣言苦者得火之氣言甘者得土之氣惟土也寄旺於四季生成之氣皆五故其氣平其味甘而淡其性和而無毒土德沖和感而類之莫或不然固萬物之所出亦萬物之所入乎此物之味資乎地者也氣之毒者必熱味之毒者必辛炎黃言味而不加氣性者何也蓋古文尚簡故只言味物有味必有氣有氣斯有性自然之道也氣味生成原本乎是知其所自則思過半矣藥性主治參互指歸今夫醫譬諸兵焉料敵出奇者將之謀也破軍殺賊者士之力也審度病機者醫之智也攻邪伐病者藥之能也非士無以破敵非藥無以攻邪故良將養士上醫蓄藥然不知士何以養不知藥何以蓄夫士猶有情實可考才略可試尚曰難知以孔明之明一馬謖用違其才卒致敗衄悔不可追況乎藥石無情才性莫測既非言論之可考又非擬議之可及而欲知其的然不謬非神聖之智其孰能與於斯假令嘗試漫為則下咽不返死生立判顧不大可懼耶上古之人病生於六淫者多發於七情者寡故其主治嘗以一藥治一病或一藥治數病今時則不然七情彌厚五欲彌深精氣既虧六淫易入內外膠固病情殊古則須合衆藥之所長而又善護其所短乃能蘇調瘵而起沉疴其在良醫善知藥性劑量無差庶得參互旁通彼此兼濟以盡其才而無乖剌敗壞之弊矣故作主治參互俾後之醫師循而求之共收平定之功期無夭枉之患斯作疏意也昔人云用藥如用兵旨哉言乎旨哉言乎藥性簡誤指歸夫藥石稟天地偏至之氣者也雖醇和濃懿號稱上藥然所稟既偏所至必獨脫也用違其性之宜則偏重之害勢所必至故凡有益於陽虛者必不利乎陰有益於陰虛者必不利乎陽能治燥者必不宜於濕能治濕者必不宜於燥能破散者不可以治虛能收斂者不可以治實升不可以止升降不可以療降寒有時而不宜於熱熱有時而不宜於寒古人半夏有三禁謂渴家汗家血家仲景嘔家忌甘酒家亦忌甘王好古論肺熱忌人參之屬諸如此類莫可勝數苟昧斯旨吉凶貿焉人命至重冥報難逃醫為司命其可不深思詳察也哉此與十劑互證十劑對治反則為誤故作簡誤以防其失論七方本義夫方者法也法乃所以制物者也故大小緩急奇偶復七者為法制之變且盡也七方不同同歸已疾其制各異異以從宜岐伯言之已詳後人演之彌悉凡制方者必本乎是苟悖其制則非法矣非法則不能所施合轍而反致乖剌惡在其能攻邪已疾耶附録七方岐伯曰氣有多少形有盛衰治有緩急方有大小又曰病有遠近證有中外治有輕重近者偶之遠者奇之汗不以奇下不以偶補上治上制以緩補下治下制以急近而偶奇制小其服遠而奇偶制大其服大則數少小則數多多則九之少則一之奇之不去則偶之偶之不去則反佐以取之所謂寒熱溫涼反從其病也王冰曰臟位有高下腑氣有遠近病證有表裡藥用有輕重單方為奇復方為偶心肺為近肝腎為遠脾胃居中腸膀胞膽亦有遠近識見高遠權以合宜方奇而分兩偶方偶而分兩奇近而偶制多數服之遠而奇制少數服之則肺服九心服七脾服五肝服三腎服一為常制也方與其重也寧輕與其毒也寧良與其大也寧小是以奇方不去偶方主之偶方不去則反佐以同病之氣而取之夫微小之熱折之以寒微小之冷消之以熱其大寒熱則必能與異氣相格聲不同不相應氣不同不相合是以反其佐以同其氣夏令寒熱參合使其始同終異也逆者正治從者反治反佐即從治也謂熱在下而上有寒邪拒格則寒藥中入熱藥為佐下膈之後熱氣既散寒性隨發也寒在下而上有浮火拒格則熱藥中入寒藥為佐下膈之後寒氣既消熱性隨發也此寒因熱用熱因寒用之妙也溫涼仿此完素曰流變在乎病主病在乎方制方在乎人方有七大小緩急奇偶復也制方之體本於氣味寒熱溫涼四氣生於天酸苦辛咸甘淡六味成於地是以有形為味無形為氣氣為陽味為陰辛甘發散為陽酸苦湧泄為陰鹹味湧泄為陰淡味滲泄為陽或收或散或緩或急或燥或潤或軟或堅各隨臟腑之證而施藥之品味乃分七方之制也故奇偶復三方也大小緩急四制之法也故曰治有緩急方有大小大方岐伯曰君一臣三佐九制之大也君一臣三佐五制之中也君一臣二制之小也又曰遠而奇偶制大其服近而偶奇制小其服大則數少小則數多多則九之小則一之完素曰身表為遠里為近大小者制奇偶之法也假如小承氣湯調胃承氣湯奇之小方也大承氣湯抵當湯奇之大方也所謂因其攻裡而用之也桂枝麻黃偶之小方也葛根青龍偶之大方也所謂因其發表而用之也故曰汗不以奇下不以偶張從正曰大方有二有君一臣三佐九之大方病有兼證而邪不一不可以一二味治者宜之有分兩大而頓服之大方肝腎及下部之病道遠者宜之王太僕以心肺為近腎肝為遠脾胃為中劉河間以身表為遠身里為近以豫觀之身半以上其氣三天之分也身半以下其氣三地之分也中脘人之分也小方從正曰小方有二有君一臣二之小方病無兼證邪氣專一可一二味治者宜之有分兩少而頻服之小方心肺及在上之病者宜之徐徐細呷是也完素曰肝腎位遠數多則其氣緩不能速達於下必大劑而數少取其迅急下走也心肺位近數少則其氣急下走不能升發於上必小劑而數多取其易散而上行也王氏所謂肺服九心服七脾服五肝服三腎服一乃五臟生成之數也緩方岐伯曰補上治上制以緩補下治下制以急急則氣味厚緩則氣味薄適其至所此之謂也病所遠而中道氣味之者食而過之無越其制度也王冰曰假如病在腎而心氣不足服藥宜急過之不以氣味飼心腎藥凌心心復益衰矣余上下遠近例同完素曰聖人治上不犯下治下不犯上治中上下俱無犯故曰誅伐無過命曰大惑好古曰治上必妨下治表必違里用黃芩以治肺必妨脾用蓯蓉以治腎必妨心用乾薑以治中必僭上服附子以補火必涸水從正曰緩方有五有甘以緩之之方甘草糖蜜之屬是也病在胸膈取其留戀也有丸以緩之之方比之湯散其行遲慢也有品件衆多之緩方藥衆則遞相拘制不得各騁其性也有無毒治病之緩方無毒則性純功緩也有氣味俱薄之緩方氣味薄則長於補上治上比至其下藥力已衰矣急方完素曰味厚者為陰味薄者為陰中之陽故味厚則下泄味薄則通氣氣厚者為陽氣薄者為陽中之陰故氣厚則發熱氣薄則發汗是也好古曰治主宜緩緩則治其本也治客宜急急則治其標也表裡汗下皆有所當緩所當急從正曰急方有四有急病急攻之急方中風關格之病是也有湯散蕩滌之急方下咽易散而行速也有毒藥之急方毒性能上湧下泄以奪病勢也有氣味俱厚之急方氣味俱厚直趨於下而力不衰也奇方王冰曰單方也從正曰奇方有二有獨用一物之奇方病在下而遠者宜之有藥合陽數一三五七九之奇方宜下不宜汗完素曰假如小承氣奇之小方也大承氣抵當湯奇之大方也所謂因其攻下而為之也桂枝麻黃偶之小方也葛根青龍偶之大方也所謂因其發散而用之也故曰汗不以奇下不以偶偶方從正曰偶方有三有兩味相配之偶方有古之二方相合之偶方古謂之復方皆病在上而近者宜之有藥合陰數二四六八十之偶方宜汗不宜下王太僕言汗藥不以偶則氣不足以外發下藥不以奇則藥毒攻而致過意者下本迅利故單行則力專專則直下不旁及而速汗或難出故並行則物衆而力微乎乃仲景制方桂枝汗藥反以三味為奇大承氣下藥反以四味為偶何也豈汗下緩急在力之大小而不以數之奇偶為重乎復方岐伯曰奇之不去則偶之是謂重方好古曰奇之不去復以偶偶之不去復以奇故曰復復者再也重也所謂十補一泄數泄一補也又傷寒見風脈傷風得寒脈為脈主證不相應宜以復方主之從正曰復方有三有二方三方及數方相合之復方如桂枝二越婢一湯五積散之屬是也有本方之外別加余藥如調胃承氣加連翹薄荷黃芩梔子為涼膈散之屬是也有分兩均齊之復方如胃風湯各等分之屬是也王太僕以偶為復方今七方有偶又有復豈非偶乃二方相合復乃數方相合之謂乎論十劑本義劑者從齊從刀用以齊其不齊而成其所以齊也夫獨用之謂藥合用之謂劑而其才有長短大小良毒之難齊故用有相益相濟相畏相惡相忌相制之不同則劑有宣通補瀉輕重滑澀燥濕十者對治之各異譬夫良相劑量群才以成治世之功類良醫劑量群藥以成治病之功其義一也岐伯論之詳矣凡和劑者必本乎是苟昧其旨而違其道即失對治之義求疾之瘳其可得乎附録十劑劉完素曰制方之體欲成七方十劑之用者必本於氣味也寒熱溫涼四氣生於天酸苦辛咸甘淡六味成於地是以有形為味無形為氣氣為陽味為陰陽氣出上竅陰味出下竅氣化則精生味化則形長故地産養形形不足者溫之以氣天産養精精不足者補之以味辛甘發散為陽酸苦湧泄為陰鹹味湧泄為陰淡味滲泄為陽辛散酸收甘緩苦堅咸軟各隨五臟之病而製藥性之品味故方有七劑有十方不七不足以盡方之變劑不十不足以盡劑之用方不對證非方也劑不蠲疾非劑也此乃太古先師設繩墨而取曲直叔世方士乃出規矩以為方圓夫物各有性制而用之變而通之施於品劑其功用豈有窮哉如是有因其性而為用者有因其用而為使者有因其所勝而為制者有氣相同則相求者有氣相剋則相制者有氣有餘而補不足者有氣相感則以意使者有質同而性異者有名異而實同者故蛇之性上竄而引藥蟬之性外脫而退翳虻飲血而用以治血鼠善穿而用以治漏所謂因其性而為用者如此弩牙速産以機發而不栝也杵糖下咽以杵築下也所謂因其用而為使者如此浮萍不沉水可以勝濕獨活不搖風可以治風所謂因其所勝而為制者如此麻木谷而治風豆水穀而治水所謂氣相同則相求者如此牛土畜乳可以止渴疾豕水畜心可以鎮恍惚所謂因其氣相剋則相制也如此熊肉振羸兔肝明視所謂因其氣有餘補不足也如此鯉之治水鶩之利水所謂因其氣相感則以意使者如此蜜成於蜂蜜溫而蜂寒油生於麻麻溫而油寒茲同質而異性者也靡蕪生於芎藭蓬虆並於覆盆茲名異而實同者也如斯之類不可勝舉故天地賦形不離陰陽形色自然皆有法象毛羽之類生於陽而屬於陰鱗甲之類生於陰而屬於陽空青法木色青而主肝丹砂法火色赤而主心雲母法金色白而主肺磁石法水色黑而主腎黃石脂法土色黃而主脾故觸類而長之莫不有自然之理也欲為醫者上知天文下知地理中知人事三者俱明然後可以語人之疾病不然則為無目夜遊無足登涉動致顛殞而欲愈疾者未之有也徐之才曰藥有宣通補瀉輕重滑澀燥濕十種是藥之大體而本經不言後人未述凡用藥者審而詳之則靡所遺失矣宣劑之才曰宣可去壅生薑橘皮之屬是也杲曰外感六淫之邪欲傳入里三陰實而不受逆於胸中天分氣分窒塞不通而或噦或嘔所謂壅也三陰者脾也故必破氣藥如薑橘藿香半夏之類瀉其壅塞從正曰俚入以宣為瀉又以宣為通不知十劑之中已有瀉矣仲景曰春病在頭大法宜吐是宣劑即湧劑也經曰高者因而越之木鬱則達之宣者升而上也以君召臣曰宣是矣凡風癇中風胸中諸實痰飲寒結胸中熱鬱上而不下久則喘嗽滿脹水腫之病生焉非宣劑莫能愈也吐中有汗如引涎追淚嚏鼻凡上行者皆吐法也完素曰鬱而不散為壅必宣以散之如痞滿不通之類是矣攻其里則宣者上也泄者下也湧劑則瓜蒂梔子之屬是矣發汗解表亦同好古曰經有五郁木鬱達之火鬱發之土鬱奪之金鬱泄之水鬱折之皆宣也斆曰宣揚制曰宣明君召臣曰宣喚臣奉召命宣布上意皆宣之意也通劑之才曰通可去滯通草防己之屬是也完素曰留而不行必通以行之如水病為痰澼之類以木通防己之屬攻其內則留者行也滑石茯苓芫花甘遂大戟牽牛之類是也從正曰通者流通也前後不得溲便宜木通海金沙琥珀大黃之屬通之痹病鬱滯經隧不利亦宜通之補劑之才曰補可去弱人參羊肉之屬是也杲曰人參甘溫能補氣虛羊肉甘熱能補血虛羊肉補形人參補氣凡氣味與二藥同者皆是也從正曰五臟各有補瀉五味各補其臟有表虛裡虛上虛下虛陰虛陽虛氣虛血虛經曰精不足者補之以味形不足者溫之以氣五穀五菜五果五肉皆補養之物也瀉劑之才曰泄可去閉葶藶大黃之屬是也杲曰葶藶苦寒氣味俱厚不減大黃能泄肺中之閉又泄大腸大黃走而不守能泄血閉腸胃渣穢之物一泄氣閉利小便一泄血閉利大便凡與二藥同者皆然從正曰實則泄之諸痛為實痛隨利減芒硝大黃牽牛甘遂巴豆之屬皆瀉劑也其催生下乳磨積逐水破經泄氣凡下行者皆下法也輕劑之才曰輕可去實麻黃葛根之屬是也從正曰風寒之邪始客皮膚頭痛身熱宜解其表內經所謂輕而揚之也癰瘡疥痤俱宜解表汗以泄之毒以熏之皆輕劑也凡熏洗蒸灸尉烙刺砭導引按摩皆汗法也重劑之才曰重可去怯磁石鐵粉之屬是也從正曰重者鎮墜之謂也怯則氣浮如喪神失守而驚悸氣上硃砂水銀沉香黃丹寒水石之倫皆鎮重也久病咳嗽涎潮於上形羸不可攻者以此墜之經曰重者因而減之貴其漸也滑劑之才曰滑可去著冬葵子榆皮之屬是也完素曰澀則氣著必滑劑以利之滑能養竅故潤利也從正曰大便燥結宜麻仁郁李之類小便癃閉宜葵子滑石之類前後不通二陰俱閉也名曰三焦約約者束也宜先以滑劑潤養其燥然後攻之澀劑之才曰澀可去脫牡蠣龍骨之屬是也完素曰滑則氣脫如開腸洞泄便溺遺失之類必澀劑以收斂之從正曰寢汗不禁澀以牡蠣五味五倍之屬滑泄不已澀以肉豆蔻訶黎勒沒食子亞芙蓉龍骨之屬凡酸味同乎澀者收斂之義也然此種皆宜先攻其本而後收之可也燥劑之才曰燥可去濕桑白皮赤小豆之屬是也完素曰濕氣淫勝腫滿脾濕必燥劑以除之桑皮之屬濕勝於上以苦吐之以淡滲之是也從正曰積寒久冷吐利腥穢上下所出水液澄徹清冷此大寒之病宜薑附胡椒輩以燥之若病濕氣則陳皮白朮木香蒼朮之屬除之亦燥劑也而黃連黃柏梔子大黃其味皆苦苦屬火化皆能燥濕此內經之本旨也豈獨二術之類為燥劑乎好古曰濕有在上在下在中在經在皮在裡濕劑之才曰濕可去枯白石英紫石英之屬是也從正曰濕者潤濕也雖與滑類少有不同經云辛以潤之辛能走氣能化液故也鹽硝味雖咸屬真陰之水誠濡枯之上藥也人有枯涸皴揭之病非獨金化蓋有火以乘之故非濕劑不能愈完素曰津耗為枯五臟痿弱榮衛涸澀必濕劑以潤之好古曰有減氣而枯有減血而枯十劑補遺十劑之後陶隱居續入寒熱二劑豈知寒有時而不可以治熱熱有時而不可以治寒何者陰虛內熱當用甘寒滋腎家之陰是益水以制火也設有芩連梔子苦寒之劑以攻熱則徒敗胃氣苦寒損胃而傷血血愈不足而熱愈熾胃氣傷則後天之元氣愈無所養而病轉增劇也陽虛中外俱寒當以人參黃耆以益表裡之陽氣而少佐桂附以回陽則其寒自解是益火以祛寒也設專用辛熱如吳茱萸乾薑麻黃葫蘆巴蓽茇胡椒之屬以散寒則辛能走散真氣愈虛其寒愈甚王安道所謂辛熱愈投而沉寒愈滋也二者非徒無益而又害之顧不悖歟況寒熱二劑攝在補瀉義不重出今當增入升降二劑升降者治法之大機也經曰高者抑之即降之義也下者舉之即升之義也是以病升者用降劑病降者用升劑火空則發降氣則火自下矣火下是陽交於陰也此法所宜降者也勞傷則陽氣下陷入於陰分東垣所謂陰實陽虛陽虛則內外皆寒間有表熱類外感者但不頭疼口渴及熱有時而間為異耳法當升陽益氣用參耆炙甘草益元氣以除虛寒虛熱佐以升麻柴胡引陽氣上行則表裡之寒熱自解即甘溫除大熱之謂此法所宜升者也五臟苦欲補瀉論五臟苦欲補瀉乃用藥第一義好古為東垣高足東垣得之潔古潔古實宗仲景仲景遠師伊尹伊尹原本炎黃聖哲授受百世一源靡或少異不明乎此不足以言醫矣何則五臟之內各有其神神各有性性復各殊故素問命十二官之名厥有旨焉蓋形而上者神也有知而無質形而下者塊然者也五臟之體也有質而無知各各分斷者也肝藏魄肺藏魄心藏神脾藏意與智腎藏精與志皆指有知之性而言即神也神也者陰陽不測之謂也是形而上者臟之性也惟其無形故能主乎有形故知苦欲者猶言好惡也違其性故苦遂其性故欲欲者是本臟之神之所好也即補也苦者是本臟之神之所惡也即瀉也補瀉系乎苦欲苦欲因乎臟性不屬五行未落陰陽其神用之謂歟自虛則補其母以下乃言臟體之虛實始有補母瀉子之法斯則五行之性也明乎此斯可以言藥道矣附録五臟苦欲補瀉並續解五條肝苦急急食苦以緩之甘草欲散急食辛以散之川芎以辛補之細辛以酸瀉之芍藥虛以生薑陳皮之類補之經曰虛則補其母水能生木腎乃肝之母腎水也苦以補腎熟地黃黃柏是矣如無他證錢氏地黃丸主之實則白芍藥瀉之如無他證錢氏瀉青丸主之實則瀉其子心乃肝之子以甘草瀉心肝為將軍之官言不受制者也急則有摧折之意焉故苦而惡之緩之是使遂其性也甘可以緩甘草之屬是已扶蘇條達木之象也升發開展魂之用也故其性欲散辛以散之解其束縛也是散即補也辛可以散川芎之屬是已若其太過則屈制之毋使逾分酸可以收芍藥之屬是已急也斂也肝性之所苦也違其性而苦之肝斯虛矣補之以辛是明以散為補也細辛生薑陳皮之屬是已心苦緩急食酸以收之五味子欲軟急食鹹以軟之芒硝以咸補之澤瀉以甘瀉之人參黃耆甘草虛以炒鹽補之虛則補其母木能生火肝乃心之母肝木也以生薑補肝如無他證錢氏安神丸主之實則甘草瀉之如無他證錢氏方中重則瀉心湯輕則導赤散心為形君神明之性惡散緩而喜收斂散緩則違其性斂則寧靜清明故宜酸以收其緩也軟者和調之意也心君本自和調邪熱乘之則躁急故復須芒硝之鹹寒除其邪熱以軟其躁急堅徑之氣使復其平也以咸補之澤瀉導心氣以入腎也煩勞則虛而生熱故須人參黃耆甘草之甘溫以益元氣而虛熱自退故謂之瀉也心以下交於腎為補炒鹽之咸以潤下即得心與腎交也火空則發鹽為水味得之俾心氣下降是既濟之道也有補之義焉故軟即補也脾苦濕急食苦以燥之白朮欲緩急食甘以緩之甘草以甘補之人參以苦瀉之黃連虛以甘草大棗之類補之如無他證錢氏益黃散主之心乃脾之母以炒鹽補心實則以枳實瀉之如無他證以瀉黃散瀉之肺乃脾之子以桑白皮瀉肺脾為倉廩之官主運動磨物之臟燥其性也宜健而不宜滯濕斯滯矣違其性故苦而惡之急食苦以燥之使復其性之所喜脾斯健矣白朮之苦溫是已過燥則復欲緩之以甘甘草之屬是已稼穡之化故甘先入脾性欲健運氣旺則行補之以甘人參是已長夏之令濕熱主之脾氣斯困故當急食苦以瀉之黃連之苦寒是已虛則宜補炙甘草之甘以益血大棗之甘溫以益氣乃所以補其不足也肺苦氣上逆急食苦以泄之訶子皮一作黃芩欲收急食酸以收之白芍藥以辛瀉之桑白皮以酸補之五味子虛則五味子補之如無他證錢氏阿膠散補之脾乃肺之母以甘草補脾實則桑白皮瀉之如無他證以瀉白散瀉之腎乃肺之子以澤瀉瀉腎肺為華蓋之臟相傅之官藏魄而主氣者也氣常則順氣變則逆逆則違其性矣故宜急食苦以泄之黃芩之屬是已肺主上焦其政斂肅故其性喜收宜急食酸以收之白芍藥之屬是已賊肺者熱也肺受熱邪急食辛以瀉之桑白皮之屬是已不斂則氣無所管束是肺失其職也故宜補之以酸使遂其收斂之性以清肅乎上焦是即補也五味子之屬是已腎苦燥急食辛以潤之知母欲堅急食苦以堅之黃柏以苦補之地黃以咸瀉之澤瀉虛則熟地黃黃柏補之腎本無實不可瀉錢氏只有補腎地黃丸無瀉腎之藥肺乃腎之母以五味子補肺腎為作強之官藏精與志主五液屬真陰水臟也其性本潤故惡涸燥宜急食辛以潤之知母之屬是已欲堅急食苦以堅之蓋腎非堅則無以稱作強之職四氣以遇濕熱即軟遇寒冷即堅五味以得咸即軟得苦即堅故宜急食苦以堅之黃柏味苦氣寒可以堅腎故宜急食以遂其欲堅之性也以苦補之是堅即補也地黃黃柏是已咸能軟堅軟即瀉也澤瀉是已虛者精氣奪也藏精之臟苦固能堅然非益精無以為補故宜熟地黃黃柏之屬以補之是已治法綱陰陽寒熱臟腑經絡氣血表裡標本先後虛實緩急病在於陰毋犯其陽病在於陽毋犯其陰犯之者是謂誅伐無過病之熱也當察其源火苟實也苦寒鹹寒以折之若其虛也甘寒酸寒以攝之病之寒也亦察其源寒從外也辛熱辛溫以散之動於內也甘溫以益之辛熱辛溫以佐之經曰五臟者藏精而不瀉者也故曰滿而不能實是有補而無瀉者其常也臟偶受邪則瀉其邪邪盡即止是瀉其邪非瀉臟也臟不受邪毋輕犯也世謂肝無補法知其謬也六腑者傳導化物糟粕者也故曰實而不能滿邪客之而為病乃可攻也中病乃已毋盡劑也病在於經則治其經病流於絡則及其絡經直絡橫相維輔也病從氣分則治其氣虛者溫之實者調之病從血分則治其血虛則補肝補脾補心實則為熱為瘀熱者清之瘀者行之因氣病而及血者先治其氣因血病而及氣者先治其血因證互異宜精別之病在於表毋攻其里病在於里毋虛其表邪之所在攻必從之受邪為本現證為標五虛為本五邪為標譬夫腹脹由於濕者其來必速當利水除濕則脹自止是標急於本也當先治其標若因脾虛漸成脹滿夜劇晝靜病屬於陰當補脾陰夜靜晝劇病屬於陽當益脾氣是病從本生本急於標也當先治其本舉一為例余可類推矣病屬於虛宜治以緩虛者精氣奪也若屬沉痼亦必從緩治虛無速法亦無巧法蓋病已沉痼凡欲施治宜有次第故亦無速法病屬於實宜治以急實者邪氣勝也邪不速逐則為害滋蔓故治實無遲法亦無巧法此病機緩急一定之法也藥性差別論藥有五味中涵四氣因氣味而成性合氣與味及性而論其為差別本自多途其間厚薄多少單用互兼各各不同良難究竟是故經曰五味之變不可勝窮此方劑之本也陰陽二象實為之綱紀焉鹹味本水苦味本火酸味本木甘味本土辛味本金此五味之常也及其變也有神明之用焉今姑陳其略以明之第準經文同一苦寒也黃芩則燥天冬則潤蘆薈能消黃柏能補黃連止瀉大黃下通柴胡苦寒而升龍膽苦寒而降同一咸也澤瀉則瀉蓯蓉則補海藻昆布則消而軟堅馬莖鹿茸則補而生齒同一酸也硫黃味酸而熱空青味酸而寒甘合辛而發散為陽甘合酸而收斂為陰人參黃耆陽也甘溫以治大熱地黃五味陰也甘酸以斂陰精聊採數端引以為例如斯之類難以枚舉良由氣味互兼性質各異參合多少制用全殊所以窮五味之變明藥物之能厥有旨哉顧其用紛錯其道淵微可以意知難以言盡非由妙悟則物不從心固將拯蒸民於夭枉宜寤寐乎茲篇臟氣法時並四氣所傷藥隨所感論夫四時之氣行乎天地之間人處氣交之中亦必因之而感者其常也春氣生而升夏氣長而散長夏之氣化而軟秋氣收而斂冬氣藏而沉人身之氣自然相通是故生者順之長者敷之化者堅之收者肅之藏者固之此藥之順乎天者也春溫夏熱元氣外泄陰精不足藥宜養陰秋涼冬寒陽氣潛藏匆輕開通藥宜養陽此藥之因時制用補不足以和其氣者也然而一氣之中初中末異一日之內寒燠或殊假令大熱之候人多感暑忽發冰雹亦復感寒由先而感則為暑病由後而感則為寒病病暑者投以暑藥病寒者投以寒藥此藥之因時制宜以合乎權乃變中之常也此時令不齊之所宜審也假令陰虛之人雖當隆冬陰精虧竭水既不足不能制火則陽無所依外泄為熱或反汗出藥宜益陰地黃五味鱉甲枸杞之屬是已設從時令誤用辛溫勢必立斃假令陽虛之人雖當盛夏陽氣不足不能外衛其表表虛不任風寒灑淅戰栗思得熱食及御重裘是雖天令之熱亦不足以敵其真陽之虛病屬虛寒藥宜溫補參耆桂附之屬是已設從時令誤用苦寒亦必立斃此藥之舍時從證者也假令素病血虛之人不利苦寒恐其損胃傷血一旦中暑暴注霍亂須用黃連滑石以泄之本不利升須用葛根以散之此藥之舍證從時者也從違之際權其輕重耳至於四氣所傷因而致病則各從所由是故經曰春傷於風夏生飧泄藥宜升之燥之升麻柴胡羌活防風之屬是已夏傷於暑秋必痎瘧藥宜清暑益氣以除寒熱石膏知母乾葛麥門冬橘皮參苓術之屬是已邪若內陷必便膿血藥宜祛暑消滯專保胃氣黃連滑石芍藥升麻蓮實人參扁豆甘草之屬是已秋傷於濕冬生咳嗽藥宜燥濕清熱和表降氣保肺桑白皮石膏薄荷杏仁甘草桔梗蘇子枇杷葉之屬是已冬傷於寒春必病溫邪初在表藥宜辛寒苦溫甘寒苦寒以解表邪兼除內熱羌活石膏葛根前胡知母竹葉柴胡麥門冬荊芥甘草之屬是已至夏變為熱病六經傳變藥亦同前散之貴早治若後時邪結於裡上則陷胸中下承氣中病乃已慎毋盡劑勿僭勿忒能事必矣以上皆四時六氣所傷致病並證重舍時時重舍證用藥主治之大法萬世遵守之常經聖哲復起不可改已所云六氣者即風寒暑濕燥火是也過則為淫故曰六淫淫則為邪以其為天之氣從外而入故曰外邪邪之所中各有其地在表治表在裡治里表裡之間則從和解病有是證證有是藥各有司存不相越也此古人之定法今人之軌則也論制方和劑治療大法夫虛實者諸病之根本也補瀉者治療之綱紀也何謂虛五臟六腑虛所生病也何謂實五臟六腑實所生病也經曰真氣奪則虛邪氣勝則實虛則補之實則瀉之此萬世之常經也以補為瀉是補中有瀉也以瀉為補是瀉中有補也譬夫參耆甘草之退勞倦氣虛發熱地黃黃柏之滋水堅腎以除陰虛潮熱是補中之瀉也桑根白皮之瀉肺火車前子之利小便除濕是瀉中之補也舉斯為例余可類推矣升降者病機之要最也升為春氣為風化為木象故升有散之之義降為秋氣為燥化為金象故降有斂之之義飲食勞倦則陽氣下陷宜升陽益氣瀉利不止宜升陽益胃鬱火內伏宜升陽散火滯下不休宜升陽解毒因濕洞泄宜升陽除濕肝木鬱於地中以致少腹作脹作痛宜升陽調氣此病宜升之類也陰虛則水不足以制火火空則發而炎上其為證也為咳嗽為多痰為吐血為鼻衄為齒衄為頭痛為齒痛為眼痛為頭眩為暈為眼花為噁心為嘔吐為口苦舌乾為不眠為寒熱為骨蒸是為上盛下虛之候宜用蘇子枇杷葉麥門冬白芍藥五味子之屬以降氣氣降則火自降而氣自歸元而又益之以滋水添精之藥以救其本則諸證自瘳此病宜降之類也設宜降而妄升當升而反降將使輕變為重重必斃矣論塞因塞用通因通用寒因熱用熱因寒用用熱遠熱用寒遠寒經曰寒因寒用者譬夫脾虛中焦作脹腎虛氣不歸元致上焦逆滿用人參之甘以補元氣五味子之酸以收虛氣則脾得補而脹自消腎得補而氣自歸元而上焦清泰則逆滿自平矣通因通用者譬夫傷寒挾熱下利或中有燥糞必用調胃承氣湯下之乃安滯下不休得六一散清熱除積而愈皆其義也寒因熱用是藥本寒也而反佐之以熱熱因寒用是藥本熱也而反佐之以寒則無拒格之患故曰必先其所主而伏其所因也用熱遠熱者是病本於寒法應熱治所投熱劑僅使中病毋令過焉過則反生熱病矣用寒遠寒義亦同此論天地風氣漸薄人亦因之漸弱用藥消息亦必因之而變不可執泥古法輕用峻利夫人在氣交之中其強其弱卒莫逃乎天地之氣明甚是以上古之人度百歲乃去今則七十稱古稀矣身形長大常過七尺今則世鮮六尺之軀矣其壽數精神既已漸減則血氣臟腑亦應因之漸薄乃天地之風氣使然有非人力所能挽回者又況時丁末造衆生識昏見陋五欲熾然難解難遏斫喪戕賊日惟不足於是疾病叢生虛多實少臨證施治多事調養專防克伐此今日治法之急務也設使病宜用熱亦當先之以溫病宜用寒亦當先之以清縱有積滯宜消必須先養胃氣縱有邪氣宜法必須隨時逐散不得過劑以損傷氣血氣血者人之所賴以生者也氣血一虧則諸邪輻輳百病橫生世人之病十有九虛醫師之藥百無一補寧知用藥之誤則實者虛虛者死是死於藥而非死於疾病也其慎其難屬諸司命臨證之頃宜加戰兢勉之哉毋執己見而輕人命也通評虛實論經曰邪氣盛則實精氣奪則虛又曰邪之所湊其氣必虛凡言虛者精氣奪也凡言實者邪氣勝也是故虛則受邪邪客為實法先攻邪邪盡治本邪猶未盡勿輕補益犯之者是謂實實精者陰也氣者陽也設被削奪是五臟六腑之陰精陽氣皆虛也宜從其類以補之陰精虛者補陰精陽氣虛者益陽氣一切克伐攻擊之藥概勿使用犯之者是謂虛虛經曰實實虛虛損不足而益有餘如是者醫殺之耳戒之哉論治陰陽諸虛病皆當以保護胃氣為急夫胃氣者即後天元氣也以穀氣為本是故經曰脈有胃氣曰生無胃氣曰死又曰安穀則昌絶谷則亡可見先天之氣縱有未盡而他臟不至盡傷獨胃氣偶有傷敗以至於絶則速死矣穀氣者譬國家之餉道也餉道一絶則萬衆立散胃氣一敗則百藥難施若陰虛若陽虛或中風或中暑乃至瀉利滯下胎前産後疔腫癰疽痘瘡痧疹驚疳靡不以保護胃氣補養脾氣為先務本所當急也故益陰宜遠苦寒益陽宜防泄氣祛風勿過燥散消暑毋輕下通瀉利勿加消導滯下之忌芒硝巴豆牽牛胎前泄瀉之忌當歸産後寒熱之忌芩連梔子疔腫癰疽之未潰忌當歸痘疹之不可妄下其他內外諸病應投藥之中凡與胃氣相違者概勿使用投藥之頃宜加三思論諸病惟虛與火為難治經曰精氣奪則虛又曰邪之所湊其氣必虛虛者空也無也譬諸國內空虛人民離散則百禍易起鎮撫為難非委任賢智安靖休養以生息之未可保其無事也病之虛者亦猶是已醫非明哲孰能鎮之以靜久而勿搖卒成收合散亡克復故物之功哉是故經曰不能治其虛安問其餘蓋言虛為百病之本宜其首舉以冠諸證也夫火者陽也氣也與水為對待者也水為陰精火為陽氣二物匹配名曰陰陽和平亦名少火生氣如是則諸病不作矣設不善攝養以致陰虧水涸則火偏勝陰不足則陽必湊之是謂陰虛陽盛亦曰壯火食氣是知火即氣氣即火也故仙經謂藥即火火即藥一而二二而一者也東垣亦曰火與元氣不兩立亦指此也譬諸水性本流本寒過極則凝而不流為層冰矣解則復常非二物也蓋平則為水火既濟當斯時也火即真陽之氣矣及其偏也則即陽氣而為火也始於元氣不兩立而成乖否之象矣故戴人亦曰莫治風莫治燥治得火時風燥了言苟能解此則已達陰陽水火之原曲暢旁通何施不可正指火之變態多端其為病也非一了此則余皆可辦然學者非心領神會詎足喻於斯乎論陽常有餘陰常不足藥必因之以為損益誤則殺人人身之有陰陽也水一而已火則二焉是秉受之始陽常有餘陰常不足天地且然況於人乎故自小至老所生疾病靡不由於真陰不足者其恆也若夫真陽不足之病千百而一二矣陽者氣也火也神也陰者血也水也精也陰陽均平氣血和調是為平人氣象之常候苟失所養或縱恣房室或肆情喜怒或輕犯陰陽或嗜好辛熱以致腎水真陰不足不能匹配陽火遂使陽氣有餘氣有餘即是火故火愈盛而水愈涸於是發為吐血咳嗽吐痰內熱骨蒸盜汗種種陰虛等病醫師不察不揆其本凡見前證不分陰陽類施溫補參耆二術視同食物佐以薑桂若啖五辛倘遇憊劇輒投附子於是輕者重重者斃纍纍相踵死而不悟良可憫也然使其術得售者不獨醫師之罪亦病家不明有以致之耳何則難成易虧者陰也益陰之藥縱醫師選用無差亦必無旦夕之效助陽之藥能使胃氣一時暫壯飲食加增或陽道興舉有似神王醫師藉以要功病者利其速效彼此固執莫辨厥由故知陰虛真水不足之病十人而九陽虛真火不足之病百不得一醫師之藥補助陽火者往往概施滋益陰精者未嘗少見宜乎服藥者之多斃無藥者之反存也豫見世醫以此傷人者甚衆茲特著其誤以為世戒論上盛下虛本於腎水真陰不足人身以陰陽兩稱為平偏勝則病此大較也水不足則火有餘陰既虧則陽獨盛蓋陰陽之精互藏其宅是陰中有陽陽中有陰也故心火也而含赤液腎水也而藏白氣赤液為陰白氣為陽循環往復晝夜不息此常度也苟不知攝養縱恣情欲虧損真陰陽無所附因而發越上升此火空則發之義是周身之氣並於陽也並於陽則陽盛故上焦熱而咳嗽生痰迫血上行而吐衄為煩躁為頭痛為不得眠為胸前骨痛為口乾舌苦此其候也陽愈盛則陰愈虛陰愈虛則為五心煩熱為潮熱骨蒸為遺精為骨乏無力為小水短赤丹田不暖則飲食不化為泄瀉為卒僵仆此其候也治之之要當亟降氣當益陰精氣降即陽交於陰是火下降也精血生即腎陰復是水上升也此既濟之象為坎離交也坎離交即是小周天至此則陰陽二氣復得其平矣病何自而生哉論陰精陽氣補益不同經曰形不足者溫之以氣人參羊肉黃耆人胞紅鉛之屬是已益陽氣也乃可以卻沉寒經曰精不足者補之以味人乳鱉甲地黃黃柏枸杞牛膝天門冬之屬是已補陰精也乃可以除伏熱論治氣三法藥各不同一補氣氣虛宜補之如人參黃耆羊肉小麥糯米之屬是已二降氣調氣降氣者即下氣也虛則氣升故法宜降其藥之輕者如紫蘇子橘皮麥門冬枇杷葉蘆根汁甘蔗其重者如番降香鬱金檳榔之屬調者和也逆則宜和和則調也其藥如木香沉水香白豆蔻縮砂蜜香附橘皮烏藥之屬三破氣破者損也實則宜破如少壯人暴怒氣壅之類然亦可暫不可久其藥如枳實青皮枳殼牽牛之屬蓋氣分之病不出三端治之之法及所主之藥皆不可混濫也誤則使病轉劇世多不察故表而出之論治血三法藥各不同血虛宜補之虛則發熱內熱法宜甘寒甘平酸寒酸溫以益榮血其藥為熟地黃白芍藥牛膝炙甘草酸棗仁龍眼肉鹿角膠肉蓯蓉甘枸杞子甘菊花人乳之屬血熱宜清之涼之熱則為癰腫瘡癤為鼻衄為齒衄為牙齦腫為舌上出血為舌腫為血崩為赤淋為月事先期為熱入血室為赤遊丹為眼暴赤痛法宜酸寒苦寒鹹寒辛涼以除實熱其藥為童便牡丹皮赤芍藥生地黃黃芩犀角地榆大小薊茜草黃連山梔大黃青黛天門冬玄參荊芥之屬血瘀宜通之瘀必發熱發黃作痛作腫及作結塊癖積法宜辛溫辛熱辛平辛寒甘溫以入血通行佐以鹹寒乃可軟堅其藥為當歸紅花桃仁蘇木桂五靈脂蒲黃薑黃鬱金京三稜延胡索花蕊石沒藥蟅蟲乾漆自然銅韭汁童便牡蠣芒硝之屬蓋血為榮陰也有形可見有色可察有證可審者也病既不同藥亦各異治之之法要在合宜倘失其宜為厲不淺差劇之門可不謹乎論治吐血三要宜降氣不宜降火氣有餘即是火氣降則火降火降則氣不上升血隨氣行無溢出上竅之患矣降火必用寒涼之劑反傷胃氣胃氣傷則脾不能統血血愈不能歸經矣今之療吐血者大患有二一則專用寒涼之味如芩連山梔青黛柿餅灰四物湯黃柏知母之類往往傷脾作泄以致不救一則專用人參肺熱還傷肺咳逆愈甚亦有用參而愈此是氣虛喘嗽氣屬陽不由陰虛火熾所致然亦百不一二也宜以白芍藥炙甘草制肝枇杷葉麥門冬薄荷橘紅貝母清肺薏苡仁懷山藥養脾韭菜番降香真蘇子下氣青蒿鱉甲銀柴胡牡丹皮地骨皮補陰清熱酸棗仁白茯神養心山茱萸枸杞子牛膝補腎此纍試輒驗之方然陰無驟補之法非多服藥不效病家欲速其功醫者張皇無主百藥雜試以致殞命覆轍相尋而不悟悲夫宜行血不宜止血血不循經絡者氣逆上壅也夫血得熱則行得寒則凝故降氣行血則血循經絡不求其止而自止矣止之則血凝血凝必發熱惡食及胸脅痛病日沉痼矣宜補肝不宜伐肝經曰五臟者藏精氣而不瀉者也肝為將軍之官主藏血吐血者肝失其職也養肝則肝氣平而血有所歸伐之則肝不能藏血血愈不止矣論腎泄多在黎明所由凡人之生二五妙合之頃識神依託是中即攬父精母血以為立命之基遂成左右兩腎腎間動氣即道家所謂先天祖氣是也藏乎兩腎之中以腎屬水故稱坎宮以平人氣象言之此氣至子後一陽生生即漸漸上升歷醜寅卯辰巳而六陽已極則入離宮午後一陰生即白氣變為赤液漸漸降下至坎宮復為白氣晝夜循環升降不息此即醫家所謂真陽之火道家所謂君火即先天祖氣醫家謂為相火者是也方此火之自下而上也行過中焦必經脾胃則能腐熟水穀蒸糟粕而化精微脾氣散精上歸於肺通調水道下輸膀胱氣化而出是謂清升濁降即既濟之象也苟不慎攝生之道不明正性之理則必務快其心逆於生樂憂患以傷心寒熱以傷肺飢飽以傷脾多怒以傷肝多欲以傷腎則真氣漸衰精神日損馴至子後一陽不以時生不能上升腐熟水穀則糟粕無由而化寅為三陽之候陽氣微則不能應候而化物故天黎明而泄其泄亦溏俗名鴨溏是為腎泄亦名大瘕泄昔人以四神丸治之豫加人參蓮肉輒獲奇效蓋人參補五臟之陽氣故也論少年人陽痿因於失志不宜補陽經曰腎為作強之官技巧出焉藏精與志者也夫志從士從心志主決定心主思維思維則或遷或改決定則一立不移此作強之驗也苟志意不遂則陽氣不舒陽氣者即真火也譬夫極盛之火置之密器之中閉悶其氣使不得發越則火立死而寒矣此非真火衰也乃悶郁之故也宣其抑鬱通其志意則陽氣立舒而其痿立起矣若誤謂陽精不足過投補火之劑多致癰疽而歿可不戒哉論似中風與真中風治法迥別誤則殺人凡言中風有真假內外之別差之毫釐謬以千里何者西北土地高寒風氣剛烈真氣空虛之人猝為所中中臟者死中腑者成廢人中經絡者可調治而瘳治之之道先以解散風邪為急次則補養氣血此治真中外來風邪之法也其藥如小續命湯桂枝麻黃生熟附子羌獨活防風白芷南星甘草之屬為本若夫大江以南之東西兩浙七閩百粵兩川滇南鬼方荊揚梁三州之域天地之風氣既殊人之所稟亦異其地絶無剛猛之風而多濕熱之氣質多柔脆往往多熱多痰真陰既虧內熱彌甚煎熬津液凝結為痰壅塞氣道不得通利熱極生風亦致猝然僵仆類中風證或不省人事或語言謇澀或口眼歪斜或半身不遂其將發也外必先顯內熱之候或口乾舌苦或大便祕澀小便短赤此其驗也劉河間所謂此證全是將息失宜水不制火丹溪所謂濕熱相火中痰中氣是也此即內虛暗風確係陰陽兩虛而陰虛者為多與外來風邪迥別法當清熱順氣開痰以救其標次當治本陰虛則益血陽虛則補氣氣血兩虛則氣血兼補久之自瘳設若誤用治真中風藥如前辛熱風燥之劑則輕變為重重則必死禍福反掌不可不察也初清熱則天門冬麥門冬甘菊花白芍藥白茯苓瓜蔞根童便順氣則紫蘇子枇杷葉橘紅鬱金開痰則貝母白芥子竹瀝荊芥瓜蔞仁霞天膏次治本益陰則天門冬甘菊花懷生地當歸身白芍藥枸杞子麥門冬五味子牛膝人乳白膠黃柏白蒺藜之屬補陽則人參黃耆鹿茸大棗巴戟天之屬與時消息則因乎證似中風問答或問有患似中風證眠不竟夕而易醒心脈弦而不洪多怒肝脈弦而不長語言謇澀不利多痰聲重小便疾速不能忍且有餘瀝大便燥結左尺脈浮洪飲食少不易消此何以故答曰眠不竟夕而易醒者心血不足也故其脈弦而不洪東垣云胃虛者多怒多怒者肝氣必不和經曰怒則氣上逆加以久病多郁故益易怒故肝脈亦弦而不長弦為血少此非以智慧觀察以慈忍靜定之力和之未可以藥石瘳也腎屬水冬脈沉故曰諸浮者腎不足也腎主五液又主二便腎家有火則真陰日虧津液日少不能榮養於舌絡舌絡徑急故語言不利火性急速故小便疾出而不能忍且有餘瀝而大便亦多燥結也故其脈應沉實而反浮洪失常候也肺者五臟之華蓋位乎上象天而屬金喜清肅而惡煩熱熱則津液乾枯無以下滴而通水道或煎熬濃稠而成痰矣肺熱則人參反助邪熱而傷肺故往往聲重多痰壅塞氣道而升降不利也脾為土臟胃為之腑乃後天元氣之所自出胃主納脾主消脾陰虧則不能消胃氣弱則不能納飲食少則後天元氣無自而生精血坐是日益不足也經曰損其脾者調其飲食節其起居適其寒溫此至論也不如是則不足以復其脾陰然其要又在戒暴怒使肝無不平之氣肝和則不賊脾土矣命門者火臟也乃先天真陽之氣之所寄即道家所謂先天祖氣醫家所謂真火是也其壯也有三一者元稟過厚二者保嗇精氣不妄施泄三者志氣無所怫鬱則年雖邁而猶壯也不爾則子後一陽不生不能上升熏蒸糟粕而化精微以滋後天之元氣是火不生土而脾胃因之日弱也法當降氣和肝滋腎降氣是陽交於陰也肝和則脾胃不被賊邪所幹故能納而能消也脾胃無恙則後天元氣日益生長矣腎足則真陰自生津液自足舌絡有所榮養則舌之伸縮自如而言語自利矣且世無不陰虛而中風者第須撥去煩惱一切放下使心火不炎則腎亦因之而不燥此又治之之本也論痰飲藥宜分治夫痰之生也其由非一其為治也藥亦不同由於陰虛火炎上迫乎肺肺氣熱則煎熬津液凝結為痰是為陰虛痰火痰在乎肺而本乎腎治宜降氣清熱益陰滋水法忌辛溫燥熱補氣等藥由於脾胃寒濕生痰或兼飲啖過度好食油麵豬脂以致脾氣不利壅滯為痰濃厚膠固甚至流於經絡及皮裡膜外或結為大塊或不思食或徹夜不眠或卒爾眩僕不省人事或發癲癇或昔肥今瘦或叫呼異常或身重腹脹不便行走或泄瀉不止及成癱瘓種種怪證皆痰所為故昔人云怪病多屬痰暴病多屬火有以夫此病在脾胃無關肺腎治宜燥脾行氣散結軟堅法忌滯泥苦寒濕潤等藥及諸厚味由於風寒鬱閉熱氣在肺而成痰嗽齁喘病亦在肺治宜豁痰除肺熱藥中加辛熱辛溫如麻黃生乾薑之屬以散外寒則藥無格拒之患法忌溫補酸收等藥病因不齊藥亦宜異利潤利燥及利發散各有攸當非可混施也世以痰飲混稱藥亦混投殊不知痰之與飲其由自別其狀亦殊痰質稠黏飲惟清水特其色有異或青或黃或緑或黑或如酸漿或伏於腸胃或上支胸脅刺痛難忍或流於經絡四肢則關節不利支飲上攻為心痛為中脘痛甚則汗出為嘔吐酸水苦黃水等種種各異或發寒熱不思飲食及不得眠皆其候也此證皆因酒後過飲茶湯則水漿與腸胃飲食濕熱之氣凝而為飲或因情抱抑鬱飲食停滯不得以時消散亦能成飲總之必由脾胃有濕或脾胃本虛又感飲食之濕則停而不消此飲之大略也治宜燥濕利水行氣健脾乃為得也其藥大都以半夏茯苓參術為君佐以豬苓澤瀉以滲泄之白豆蔻橘皮以開散之蘇梗旋覆花以通暢之東垣五飲丸中有人參其旨概可見矣論瘧痢宜從六淫例治風寒暑濕燥火此天之六淫其邪自外而入感之而病宜隨其邪之所在以攻治之經曰夏傷於暑秋必痎瘧乃暑邪為病也雖有山嵐瘴氣發瘧一證治稍不同然其證大都多熱多寒或熱多寒少或寒多熱少或單熱不寒或單寒不熱頭疼骨疼大渴引飲口苦舌乾嘔吐不思食或煩躁不得眠必用白虎湯二三劑隨證增損解表以祛暑邪而後隨經消息以除其苦可也滯下者俗呼為痢疾皆緣暑濕與飲食之積滯膠固而成其證類多里急後重數登圊而不便或發熱或口渴或噁心不思食何莫非暑之標證也必用六一散黃連芍藥為主而後隨其所苦為之增損傷氣分則調氣益氣傷血分則行血和血然未有不先治暑而可獲效者矣治病必求其本其斯之謂歟論病由七情生者只應養性怡神發舒志氣以解之不宜全仗藥石攻治夫喜怒憂思悲恐驚七者皆發於情者也情即神識有知不定無迹可尋觸景乃發滯而難通藥石無知焉能消其妄執縱通其已滯之氣活其已傷之血其默默綿綿之意物而不化者能保無將來復結之病乎只宜以識遣識以理遣情此即心病還將心藥醫之謂也如是庶可使滯者通結者化情與境離不為所轉當處寂然心君泰定其何七情之為纍哉論傷寒溫疫癰疽痘疹瘧疾諸病皆由實邪所發自里發出於表者吉由表陷入於裡者凶傷寒溫疫初發邪在於表必頭疼身熱病屬三陽即於此時急表散之冬月即病宜用辛溫辛熱以汗之春溫夏熱宜用辛涼辛寒甘寒以汗之汗後身涼脈靜無所傷犯病不復作而愈如投藥濡滯或病重藥輕不散之於表致邪熱內結病屬三陰須下乃愈內虛之人不勝下藥多致危殆又有少陰咽痛等證則又不宜於下或成狐惑蟲蝕肛門種種難治之條皆失於不早散故也癰疽皆由榮家實熱氣逆所結急宜涼血活血散結解毒大劑連進內外夾攻務使消散即勢大毒盛一時不能散盡亦必十消七八縱使潰脹保無大害若失於救治使熱毒內攻其膜必壞膜壞則神人不能救矣痘瘡之害多在血熱解於一二日內者十全八九若遲則熱毒內攻陷入於裡腸胃當之必致大便作泄乳食不化或神昏悶亂便祕腹脹則十不救一除是稟受虛寒方堪補托濟以溫熱可救危急若夫疹家便須速用辛寒甘寒苦寒之劑清涼發散十不失一假令病重藥輕或治療後期或誤投溫熱則邪熱內攻煩躁悶亂不可救藥矣瘧本暑邪法當解肌若元氣先虛之人脾胃薄弱誤投破氣消食克伐之藥則中氣愈虛邪反內陷必便膿血治或失宜多成腹脹馴至不救往往而是此之四證皆須急治要以自里達表者吉自表陷里者凶故藥宜解散通利最忌收澀破氣及諸溫補其關乎死生者最大故特表而出之俾世人知所先務也論五運六氣之謬原夫五運六氣之説其起於漢魏之後乎何者張仲景漢末人也其書不載也華元化三國人也其書亦不載也前之則越人無其文後之則叔和鮮其説豫是以知其為後世所撰無益於治療而有誤乎來學學者宜深辨之豫見今之醫師學無原本不明所自侈口而談莫不動云五運六氣將以施之治病譬之指算法之精微謂事物之實有豈不誤哉殊不知五運六氣者虛位也歲有是氣至則算無是氣至則不算既無其氣焉得有其藥乎一言可竟已其云必先歲氣者譬夫此年忽多淫雨民病多濕藥宜類用二術苦溫以燥之佐以風藥如防風羌活升麻葛根之屬風能勝濕故也此必先歲氣之謂也其云毋伐天和者即春夏禁用麻黃桂枝秋冬禁用石膏知母芩連芍藥之謂即春夏養陰秋冬養陽之義耳乃所以遵養天和之道也昔人謂不明五運六氣檢遍方書何濟者正指後人愚蒙不明五運六氣之所以而誤於方册所載依而用之動輒成過則雖檢遍方書亦何益哉豫少檢素問中載有是説既長遊於四方見天下醫師與學士大夫在在談説其義於時心竊疑之又見性理所載元儒草廬吳氏於天之氣運之中亦備載之豫益自信其為天運氣數之法而非醫家治病之書也後從敝邑見趙少宰家藏宋版仲景傷寒論皆北宋善版始終詳檢並未嘗載有是説六經治法之中亦並無一字及之豫乃諦信豫見之不謬而斷為非治傷寒外感之説豫嘗遵仲景法治一切外邪為病靡不響應乃信非仲景之言不可為萬世法程雜學混濫疑誤後人故特表而出之俾來學知所抉擇云祝醫五則凡人疾病皆由多生不惜衆生身前竭用人財好殺鳥獸昆蟲好箠楚下賤甚則枉用毒刑加諸無罪種種業因感此苦報業作醫師為人司命見諸苦惱當興悲憫詳檢方書精求藥道諦察深思務期協中常自思維藥不對病病不對機二旨或乖則下咽不返人命至重冥報難逃勿為一時衣食自貽莫懺之罪於千百劫戒之哉宜懼不宜喜也凡為醫師當先讀書凡欲讀書當先識字字者文之始也不識字義寧解文理文理不通動成窒礙雖詩書滿目於神不染觸途成滯何由省人譬諸面牆亦同木偶望其拯生民之疾苦顧不難哉故昔稱太醫今曰儒醫太醫者讀書窮理本之身心驗之事物戰戰兢兢求中於道造次之際罔敢或肆者也外此則俗工耳不可以言醫矣凡為醫師先當識藥藥之所産方隅不同則精粗頓異收採不時則力用全乖又或市肆飾偽足以混真苟非確認形質精嘗氣味鮮有不為其誤者譬諸將不知兵立功何自醫之於藥亦猶是耳既識藥矣宜習修事雷公炮炙固為大法或有未盡可以意通必期躬親勿圖苟且譬諸飲食烹調失度尚不益人反能增害何況藥物關乎軀命者也可不慎諸凡作醫師宜先虛懷靈知空洞本無一物苟執我見便與物對我見堅固勢必輕人我是人非與境角立一靈空竅動為所塞雖日親至人終不獲益白首故吾良可悲已執而不化害加於人清夜深思宜生愧恥況人之才識自非生知必假問學問學之益廣博難量脫不虛懷何由納受不恥無學而恥下問師心自聖於道何益苟非至愚能不警者乎醫師不患道術不精而患取金不多舍其本業專事旁求假寵貴人翼其口吻以希世重縱得多金無拔苦力於當來世豈不酬償作是思惟是苦非樂故當勤求道術以濟物命縱有功效任其自酬勿責厚報等心施治勿輕貧賤如此則德植厥躬鬼神幽贊矣上來所祝五條皆關切醫師才品道術利濟功過仰願來學俯從吾祝則進乎道而不囿於技矣詎非生人之至幸斯道之大光也哉
