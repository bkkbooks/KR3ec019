body:
  text: 梓行本草疏題辭藥性之道具在本草雖代有哲匠演其奧義然去古彌遠浸失其旨豫以綿質性復疏戇本不堪塵俗年方弱冠值門戶衰冷世纍糾纏以是多見憤激礙膺之事十常八九自茲數嬰疾病於是檢討圖經求其本意積纍既久恍焉有會心處輒札記之歷三十餘年遂成此疏學士大夫見而奇之欲豫付諸梓人豫未之許也豫以昔人嘗云切忌說破恐塞斷後學悟門將茲是咎外孫毛鳳苞文學曰不然世間上根人少中下人多設使上根人出自得無師智獲睹此書當不言而喻默默相契下根人讀之如盲人談五色總不能別惟中人以上之資得窺其概則所得多矣其為利濟寧有量耶請亟登梓以拯夭枉豫曰善且曰舅祖許可鳳苞願力任其役乃悉檢疏稿付之即集豫同里門人李枝通家子云間康元浤松陵顧澄先二文學並其舅氏隱淪戈汕輩董督校讎早夜孜孜惟恐或後其用意可謂勤矣志存及物有君子之嗜尚焉良足多也豫年已髦倘書成而得早行於世亦足以副海內求明斯道者之企望也時天啓乙丑暮春海虞遺民繆希雍題於吳江舟次吳興晚學姚凝之書
