front:
  text: 自序神農本草經者古三墳之一也其成於黃帝之世乎觀其嘗藥別味對病主治施之百世無可逾越其為開天大聖憫生民疾苦於飲食衣服之外復設針石藥物用拯夭札俾得盡其天年是已原夫藥之生也氣稟乎天味承乎地性在其間氣為陽味為陰五味四氣各歸其類斯親上親下之義也既述之以本性又制之以君臣合之以佐使以成其攻邪已疾之能遂使無情之用同諸有識自非生而神靈冥契萬物者其孰能與於斯乎去古滋遠民性滋漓心識粗浮莫能研精殫思深入玄要而不察乎即象即理物物昭然弭疾延年功力自著正以三墳之書言大道也言其然而不言其所以然言亦象也豫因據經以疏義緣義以致用參互以盡其長簡誤以防其失而復詳列病忌藥忌以別其微條析諸藥應病分門以究其用刊定七方十劑以定其法闡發五臟苦欲補瀉以暢其神著論三十餘首以通古今之變始悉一經之趣命之曰神農本草經疏讀之者宜因疏以通經因經以契往俾炎黃之旨晦而復明藥物之生利而罔害乃豫述疏意也餘生也晚親年已衰得於稟者固薄故少善病長嗜方伎僻耽藥妙顧念自昔仙人道士靡不悉由藥道以濟群生加之友生協贊後先不一馴屆耳順良友凋喪百念灰冷惟茲一事尚用嬰懷手所論著裒然成帙倘典則可師幽隱可顯試用於世有廣來學固所願也不敢必也採真同好其相證諸
