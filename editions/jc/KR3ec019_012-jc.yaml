body:
  text: 卷十二木部上品總七十二種今疏其要者二十八種桂松脂實葉節附槐實枝皮根花附枸杞柏實葉白皮附茯苓茯神附琥珀酸棗仁蘗木楮實乾漆葉附五加皮牡荊實蔓荊實辛夷桑上寄生杜仲楓香脂女貞實枸骨附蕤核丁香沉香檀香乳香降真香蘇合香金櫻子放杖木桂味辛甘大熱有小毒主溫中利肝肺氣心腹寒熱冷疾霍亂轉筋頭痛腰痛出汗止煩止唾咳嗽鼻齆能墮胎堅骨節通血脈理疏不足宣導百藥無所畏久服神仙不老元素補下焦不足治沉寒痼冷之病滲泄止渴去榮衛中風寒表虛自汗春夏為禁藥秋冬下部腹痛非此不能止好古補命門不足益火消陰日華子桂心治一切風氣補五勞七傷通九竅利關節益精明目暖腰膝破痃癖癥瘕消瘀血治風痹骨節攣縮續筋骨生肌肉甄權主九種心痛腹內冷氣痛不可忍咳逆結氣壅痹腳痹不仁止下利殺三蟲治鼻中息肉破血通利月閉胞衣不下疏桂稟天地之陽而兼得乎土金之氣故其味甘辛其氣大熱亦有小毒木之純陽者也潔古謂其氣熱味大辛純陽東垣謂其辛熱有毒浮也氣之薄者桂枝也氣之厚者肉桂也氣薄則發泄故桂枝上行而發表氣厚則發熱故肉桂下行而補腎此天地親上親下之道也桂枝入足太陽經桂心入手少陰厥陰經血分肉桂入足少陰厥陰經血分夫五味辛甘發散為陽四氣熱亦屬陽氣味純陽故能散風寒自內充外故能實表辛以散之熱以行之甘以和之故能入血行血潤腎燥其主利肝肺氣頭痛出汗止煩止唾咳嗽鼻齆理疏不足表虛自汗風痹骨節攣痛者桂枝之所治也以其病皆得之表虛不任風寒寒邪客之所致故悉主之以其能實表祛邪也其主心腹寒熱冷疾霍亂轉筋腰痛墮胎溫中堅筋骨通血脈宣導百藥無所畏又補下焦不足治沉寒痼冷滲泄止渴去榮衛中風寒秋冬下部腹痛因於寒補命門益火消陰者肉桂之所治也氣薄輕楊上浮達表故桂枝治邪客表分之為病味厚甘辛大熱而下行走里故肉桂桂心治命門真火不足陽虛寒動於中及一切裡虛陰寒寒邪客里之為病蓋以肉桂桂心甘辛而大熱所以益陽甘入血辛能橫走熱則通行合斯三者故善行血命門者心包絡也道家所謂兩腎中間一點明又曰先天腎氣是也先天真陽之氣即醫家所謂命門相火乃真火也天非此火不能生物人非此火不能有生若無此真陽之火則無以蒸糟粕而化精微脾胃之氣立盡而亡矣心腹寒熱寒邪在裡也冷疾霍亂轉筋者脾與肝同受寒邪也行二臟之氣則前證自止矣腰者腎之府動搖不能腎將憊矣補命門之真陽則腰痛自作血熱則行故墮胎也益陽則溫中筋者肝之餘也骨者腎之餘也入肝入腎故堅筋骨也通血脈宣導百藥無所畏者熱則通行辛則善散也陽長則陰消氣之自然者也能益陽則消陰必矣寒邪觸心則心痛陽虛氣不歸元因而為寒所中則腹內冷氣痛不可忍咳逆者亦氣不歸元所致也結氣壅痹腳痹不仁者皆寒濕邪客下焦榮衛不和之所生也血凝滯而不行則月經不通血瘀不走則胞衣不下九竅不通關節不利者榮衛不調血分之病也消瘀血破痃癖癥瘕疏導肝氣通行瘀血之力也補五勞七傷者蓋指陽氣虛羸下陷無實熱之候也其曰久服神仙不老甄權又謂殺三蟲治鼻中息肉大明又謂益精明目皆非其性之所宜也何者獨陽偏熱之質行血破血乃其能事陰精不長則陽無所附安所從得神仙不老哉味既帶甘焉能殺蟲鼻中息肉由於肺有積熱瞳子神光屬腎肉桂辛而大熱其不利於肺熱腎陰不足亦明矣益精明目徒虛語耳盡信書則不如無書斯之謂也主治參互得芍藥炙甘草飴糖黃耆則建中兼止榮弱自汗得石膏知母人參竹葉麥門冬治陽明瘧渴欲引飲汗多寒熱俱甚得白芷當歸川芎黃耆生地黃赤芍藥白殭蠶治金瘡為風寒所擊俗名破傷風得朴硝當歸下死胎得蒲黃黑豆澤蘭益母草紅花牛膝生地黃當歸治產後少腹兒枕作痛甚則加乳香沒藥各七分得吳茱萸乾薑附子治元氣虛人中寒腹痛不可忍虛極則加人參佐參耆五味當歸麥冬療瘡瘍潰後熱毒已盡內塞長肉良入桂苓甘露飲治中暑霍亂吐瀉殊驗得薑黃鬱金治怒氣傷肝脅痛得當歸牛膝治冬月難產產門交骨不開得當歸牛膝生地黃乳香沒藥桃仁治跌撲損傷瘀血凝滯腹中作痛或惱怒勞傷而致蓄血發寒熱熱極令人不得眠腹不痛大便不秘亦不甚渴脈不洪數不思食食亦無味熱至天明得汗暫止少頃復熱小便赤此其候也和童子小便服之立除簡誤桂辛甘其氣大熱獨熱偏陽表裡俱達和榮氣散表邪出汗實腠理則桂枝為長故仲景專用以治冬月傷風寒即病邪在表者寇宗奭成無己論之詳矣一覽可盡因附之於後肉桂桂心實一物也只去皮耳此則走里行血除寒破血平肝入右腎命門補相火不足其功能也然大忌於血崩血淋尿血陰虛吐血咯血鼻衄齒衄汗血小便因熱不利大便因熱燥結肺熱咳嗽產後去血過多及產後血虛發熱小產後血虛寒熱陰虛五心煩熱似中風口眼歪斜失音不語語言謇澀手足偏枯中暑昏暈中熱腹痛婦人陰虛少腹痛一切溫病熱病頭疼口渴陽證發斑發狂小兒痧疹腹痛作瀉痘瘡血熱乾枯黑陷婦人血熱經行先期婦人陰虛內熱經閉婦人陰虛寒熱往來口苦舌乾婦人血熱經行作痛男婦陰虛內熱外寒中暑瀉利暴注如火熱一切滯下純血由於心經伏熱腸風下血臟毒便血陽厥似陰夢遺精滑虛陽數舉脫陰目盲等三十餘證法並忌之誤投則禍不旋踵謹察病因用舍在斷行其所明無行所疑其難其慎毋嘗試也附寇宗奭曰桂辛甘大熱素問云辛甘發散為陽故漢張仲景桂枝湯治傷寒表虛皆須此藥正合辛甘發散之意本草三種之桂不用菌桂牡桂者此二種性止於溫不可以治風寒之病也然本經止言桂仲景又言桂枝者取枝上皮也好古曰或問本草言桂能止煩出汗而張仲景治傷寒有當發汗凡數處皆用桂枝湯又云無汗不得用桂枝汗家不得重發汗若用桂枝是重發其汗汗多者用桂枝甘草湯此又用桂枝閉汗也一藥二用與本草之義相通否乎曰本草言桂辛甘大熱能宣導百藥通血脈止煩出汗是調其血而汗自出也仲景云太陽中風陰弱者汗自出衛實榮虛故發熱汗出又云太陽病發熱汗出者此為榮弱衛強陰虛陽必湊之故皆用桂枝發其汗此乃調其榮氣則衛氣自和風邪無所容遂自汗而解非桂枝能開腠理發出其汗也汗多用桂枝者以之調和榮衛則邪從汗出而汗自止非桂枝能閉汗孔也昧者不知出汗閉汗之意遇傷寒無汗者亦用桂枝誤之甚矣桂枝湯下發汗發字當認作出字汗自然出非若麻黃能開腠理發出其汗也及治虛汗亦當逆察其意可也成無己曰桂枝本為解肌者太陽中風腠理致密榮衛邪實津液禁固其脈浮緊發熱汗不出者不可與此必也皮膚疏泄自汗脈浮緩風邪干於衛氣者乃可投之發散以辛甘為主桂枝辛熱故以為君而以芍藥為臣甘草為佐者風淫所勝平以辛苦以甘緩之以酸收之也以薑棗為使者辛甘能發散而又用其行脾胃之津液而和榮衛不專於發散也故麻黃湯不用薑棗專於發汗不待行其津液也松脂味苦甘溫無毒主疽惡瘡頭瘍白禿疥瘙風氣安五臟除熱胃中伏熱咽乾消渴及風痹死肌煉之令白其赤者主惡痹久服輕身不老延年疏松脂感天之陽氣而得乎地之火土之化者也故其味苦而兼甘其氣則溫其性無毒得陽氣兼火土則其性燥燥則除濕散風寒苦而燥則能殺蟲甘能除熱胃中伏熱散則咽乾消渴自止痹者風寒濕合而為病也地之濕氣感則害人皮肉筋脈此死肌之所由來也濕熱之邪散則血不瘀敗榮氣通調而無壅滯故主疽惡瘡榮和熱散則頭瘍白禿疥瘙風氣俱愈矣熱消則榮血和風濕去則衛氣安脾胃健五臟無病可知濕去則身輕可必久服不老延年固可想見附松實味甘氣溫性和而無毒本經言苦者誤也以其屬陽故亦主風痹寒氣其主虛羸少年補不足者精不足補之以味甘能益血是已形不足溫之以氣溫能和氣是已服餌延年輕身不飢惟此足以當之然亦久服乃可責效耳附松葉味苦溫而不甘宜其主風濕瘡生毛髮也安五臟守中不飢延年其旨具松脂條內服之可治惡疾即癩病灸閟凍瘡風瘡佳附松節味苦氣溫性燥故能主百節久風風虛腳痹疼痛主治參互陶弘景以松節釀酒主腳弱骨節風丹溪以松節炒焦用以治筋骨間病能燥血中之濕外臺秘要治歷節風痛四肢如解脫松節二十斤酒五斗浸三七日每服一合日五六服集簡方治陰毒腹痛油松木七塊炒焦沖酒二鍾熱服談野翁方跌撲損傷松節煎酒服簡誤松脂松葉其性甚燥味又苦溫病人血虛有火及病不關風寒濕所傷而成者咸不宜服槐實味苦酸咸寒無毒主五內邪氣熱止涎唾補絕傷五痔火瘡婦人乳瘕子臟急痛以七月七日取之搗取汁銅器盛之日煎令可作丸大如鼠屎納竅中三易乃愈又墮胎久服明目益氣頭不白延年枝主洗瘡及陰囊下濕癢皮主爛瘡根主喉痹寒熱花苦平無毒主五痔心痛眼赤殺腹藏蟲及熱治皮膚風並腸風瀉血赤白痢並炒服葉平無毒煎湯治小兒驚癇壯熱疥癬及疔腫疏槐實感天地陰寒之氣而兼木與水之化故其味苦氣寒而無毒別錄益以酸鹹宜矣入手足陽明兼入足厥陰經其主五內邪氣熱者乃熱邪實也涎唾多者脾胃有熱也傷絕之病其血必熱五痔由於大腸火熱火瘡乃血為火傷婦人乳瘕肝家氣結血熱所成子臟急痛由於血熱燥火槐為苦寒純陰之藥為涼血要品故能除一切熱散一切結清一切火如上諸病莫不由斯三者而成故悉主之久服明目益氣頭不白延年者血分無熱則目自明矣熱能傷氣除火熱則氣自益矣涼血則發不白熱去則陰精不損故引年也其花味以苦勝故除手足陽明足厥陰諸熱證尤長耳主治參互外臺秘要療蛔蟲心痛取槐樹上木耳燒灰末如棗許正發和水服若不止飲熱水一升蛔蟲出千金方療胎赤眼取槐枝如馬鞭大長二尺作二段齊頭麻油一匙置銅缽內晨使童子一人以其木研之至暝乃止令仰臥以塗兩眼眥日三度瘥古方以子入冬月牛膽中漬之陰乾百日每日吞一粒久服明目通神白髮還黑有痔及下血者尤宜服之千金方治九種心痛當太歲上取新生槐枝一握去兩頭水三大升煎取一升頓服千金翼治蠼螋瘡槐白皮醋浸半日洗之及諸惡瘡肘後方療腸痔大便常下血槐樹上木耳取末飲方寸匕日三服經驗方治野雞痔用槐柳枝煎湯洗痔上便以艾灸之七壯又方治下血槐花荊芥穗等分為末酒調下一錢匕梅師方治痔有蟲作癢或下膿血多取槐白皮濃煎汁安盆內先熏後洗良久欲大便當有蟲出不過三度即愈仍以其皮為末綿裹納下部孟詵必效方療陰瘡濕癢槐樹北面不見日枝煎水洗三五遍冷再暖之太清草木方云槐者虛星之精以十月上巳日採子服之去百病長生通神又梁書言瘐肩吾常服槐實年七十餘髮鬢皆黑目看細字亦其驗也外臺秘要療內外痔用槐角子一斗搗汁曬稠取地膽為末同搗丸梧子大每服十丸兼作挺子納下部或以苦參末代地膽亦可聖濟總錄治目熱昏暗槐子黃連各二兩為末蜜丸梧子大每漿水下二十丸日二服楊梅毒瘡乃陽明積熱所生集簡方用槐花四兩略炒入酒二盞煎十餘沸熱服胃虛寒者勿服醫方摘要療疔瘡腫毒一切癰疽不問已成未成但焮痛者皆用槐花微炒核桃仁二兩無灰酒一鍾煎十餘沸熱服未成者二三服已成者一二服見效摘玄方治白帶槐花炒牡蠣煅等分為末酒服三錢聖惠方治風熱牙痛槐枝燒熱烙之普濟方療破傷風用避陰槐枝上皮旋刻一片安傷處用艾灸皮上百壯不痛灸至痛痛者灸至不痛用火摩之生生方治陰囊下濕癢槐白皮炒煎水日洗簡誤槐性苦寒而屬純陰病人虛寒脾胃作泄及陰虛血熱而非實熱者外證似同內因實異即不宜服枸杞味苦寒根大寒子微寒無毒主五內邪氣熱中消渴周痹風濕下胸脅氣客熱頭痛補內傷大勞噓吸堅筋骨強陰利大小腸久服堅筋骨輕身不老耐寒暑疏枸杞感天令春寒之氣兼得乎地之沖氣故其味苦甘其氣寒而其性無毒苗葉苦甘性升且涼故主清上焦心肺客熱根名地骨味甘淡性沉而大寒故主下焦肝腎虛熱為三焦氣分之藥經曰熱淫於內瀉以甘寒者是已子味甘平其氣微寒潤而滋補兼能退熱而專於補腎潤肺生津益氣為肝腎真陰不足勞乏內熱補益之要藥本經主五內邪氣熱中消渴周痹別錄主風濕下胸脅氣客熱頭痛當指葉與地骨皮而言以其寒能除熱故也至於補內傷大勞噓吸堅筋骨強陰利大小腸又久服堅筋骨輕身不老耐寒暑者方是子之功用而非根葉所能力矣老人陰虛者十之七八故服食家為益精明目之上品昔人多謂其能生精益氣除陰虛內熱明目者蓋熱退則陰生陰生則精血自長肝開竅於目黑水神光屬腎二臟之陰氣增益則目自明矣主治參互甘枸杞子得地黃五味子麥門冬地骨皮青蒿鱉甲牛膝為除虛勞內熱或發寒熱之要藥加天門冬百部枇杷葉兼可治肺熱咳嗽之因陰虛者千金方枸杞煎治虛勞退虛熱輕身益氣令一切癰疽永不發用枸杞三十斤春夏用莖葉秋冬用根實以水一石煮取五斗以滓再煎取三斗澄清去滓再煎取二斗入鍋煎如餳收之每早酒服一合經驗方金髓煎枸杞子逐日摘紅熟者不拘多少以無灰酒浸之蠟紙封固勿令泄氣兩月足取入砂盆中擂爛濾取汁同浸酒入銀鍋內慢火熬之不住手攪恐黏滯不勻候成膏如餳淨瓶密收每早溫酒服二大匙夜臥再服百日身輕氣壯積年不輟可以羽化也經驗方枸杞酒變白耐老輕身用枸杞子二升十月壬癸日面東採之以好酒二升磁瓶內浸三七日乃添生地黃汁三升攪勻密封至立春前三十日開瓶每空心暖飲一杯至立春後髭發卻黑勿食蕪菁蔥蒜瑞竹堂方四神丸治腎經虛損眼目昏花或云翳遮晴甘枸杞子一斤好酒浸透分作四分一分同蜀椒一兩炒一分同小茴香一兩炒一分同芝麻一兩炒一分同川楝肉一兩炒揀取枸杞加熟地黃白朮白茯苓各一兩為末煉蜜丸日服龍木論療肝虛下淚枸杞子二斤絹袋盛浸一斗酒中密封三七日飲之肘後方療目赤生翳枸杞搗汁日點三四次神驗聖惠方治面黯皯皰枸杞子十斤生地三斤為末每服方寸匕溫酒下日三服久則如童顏攝生方療注夏虛病枸杞子五味子研細滾水泡代茶飲效千金方治虛勞客熱枸杞根為末白湯調服有痼疾人慎之又方治虛勞苦渴骨節煩熱或寒用枸杞根白皮切五升麥冬三升小麥二升水二斗煮至麥熟去滓每服一升口渴即飲又方治腎虛腰痛枸杞根杜仲萆薢各一斤好酒三斗漬之罌中密封鍋中煮一日飲之任意簡便方療小便出血鮮地骨皮洗搗自然汁無汁則以水煎汁每服一盞入酒少許食前溫服千金方治帶下脈數枸杞根一斤生地黃五斤酒一斗煮五升日日飲之蘭室秘藏治口舌糜爛因膀胱移熱於小腸則上為口糜心胃壅熱水穀不下地骨皮柴胡各三錢水煎服之衛生寶鑑療下疳先以漿水洗之後搽地骨皮末生肌止痛永類方療婦人陰腫或生瘡枸杞根煎水頻洗唐慎微本草療癰疽惡瘡膿血不止地骨皮洗淨刮去粗皮取細白瓤以粗皮同骨煎湯洗令膿血盡以細瓤貼之立效千金方治瘭疽出汗此證手足肩背累累如赤豆用枸杞根葵根葉煮汁煎如餳隨意服之閨閣事宜治足趾雞眼作瘡作痛地骨皮同紅花研細傅之次日即愈肘後方治火赫毒瘡此患急防毒氣入心腹枸杞搗汁服之立瘥十便良方治目澀有翳枸杞葉車前葉挼汁以桑葉裹懸陰地一夜取汁點之不過三五度簡誤枸杞雖為益陰除熱之上藥若病脾胃薄弱時時泄瀉者勿入須先治其脾胃俟泄瀉已止乃可用之即用尚須同山藥蓮肉車前茯苓相兼則無潤腸之患矣柏實味甘平無毒主驚悸安五臟益氣除風濕痹療恍惚虛損吸吸歷節腰中重痛益血止汗久服令人潤澤美色耳目聰明不飢不老輕身延年葉味苦微溫無毒主吐血衄血痢血崩中赤白輕身益氣令人耐寒暑去濕痹生肌四時各依方面採陰乾柏白皮主火灼爛瘡長毛髮疏柏感秋令得金氣其質堅而氣極芬芳故其實味甘平無毒甄權加辛亦應有之入足厥陰少陰亦入手少陰經其主驚悸者心藏神腎藏精與志心腎兩虛則病驚悸入心故養神入腎故定志神志得所養而寧定則其證自除矣芬芳則脾胃所喜潤澤則肝腎所宜故能安五臟五臟皆安則氣自益矣心主五色耳為腎竅目為肝竅加以久服氣專其力自倍豈不令人潤澤美色耳目聰明不飢不老輕身延年哉惟除風濕痹之功非潤藥所能當是葉之能事耳別錄療恍惚即驚悸之漸也虛損吸吸精氣微也歷節腰中重痛肝腎不足也汗乃心液心主血益陰血則諸證悉瘥矣葉味苦而微溫義應並於微寒故得主諸血崩中赤白若夫輕身益氣令人耐寒暑則略同於柏實之性矣惟生肌去濕痹乃其獨擅之長也柏白皮主火灼爛瘡長毛髮者涼血之功也主治參互雷斆云柏葉有花柏葉叢柏葉及有子圓葉其有子圓葉成片如大片雲母葉皆側葉上有微赤毛者宜入藥用柏實凡使先以酒浸一宿至明漉出曬乾用黃精自然汁於日中煎之緩火煮成煎為度每煎柏子仁三兩用酒五兩浸服柏實法九月連房取實曝收去殼研末每服二錢溫酒下一日三服渴即飲水令人悅澤一方加松子仁等分以松脂和丸一方加菊花等分蜜丸服寇宗奭治老人虛閉柏子仁松子仁大麻仁等分同研熔蜜蠟丸梧子大以少黃丹湯食前服二三十丸日二服普濟方治小兒躽啼驚癇腹滿大便青苔色用柏子仁末溫水調服一錢陸氏積德堂方治黃水濕瘡真柏油二兩熬稠搽之如神葉甄權用以治冷風歷節疼痛止尿血日華子用以灸罯凍瘡燒取汁塗頭黑潤鬢髮蘇頌用以傅湯火傷止痛滅瘢服之療蠱痢作湯常服殺五臟蟲益人丹溪云柏屬陰與金善守故採其葉隨月建方取其多得月令之氣此補陰之要藥其性多燥久得之大益脾土以滋其肺神仙服餌方五月五日採五方側柏葉三斤遠志去心二斤白茯苓一斤為末煉蜜和丸梧子大每以仙靈脾酒下三十丸日再服並無所忌楊氏家藏方治中風不省人事得病之日便進此藥可使風退氣和不成廢人柏葉一握去枝蔥白一握連根研如泥無灰酒一升煎一二十沸溫服如不飲酒分作四五服方進他藥聖惠方治憂恚吐血煩滿少氣脅中疼痛柏葉為散米飲調服二方寸匕普濟方治酒血不止柏葉榴花研末吹之百一選方治大腸下血隨四時方向採柏葉燒研每米飲服二錢王渙之舒州病此陳宜父大夫傳方二服愈又方以柏葉一斤搗令極勻加蜜丸如梧子大每五錢白湯空心吞治腸風效普濟方治酒毒下血或下痢嫩柏葉九蒸九曬二兩陳槐花炒焦一兩為末蜜丸梧子大每空心溫酒下四十丸本草圖經治蠱痢下黑血茶腳色或膿血如靛色柏葉焙乾為末黃連和煎為汁服之經驗方治小兒洞痢柏葉煮汁代茶飲之本草圖經治湯火灼燒柏葉生搗塗之系定二三日止痛滅瘢姚僧垣集驗方治鼠瘻核痛末成膿以柏葉搗塗熬鹽熨之氣下即消聖惠方治大風厲疾眉發不生側柏葉九蒸九曬為末煉蜜丸梧子大每服五丸至十丸日三夜一服百日即生聖惠方治頭髮黃赤生側柏葉末一升豬膏一升和丸彈子大每以布裹一丸納泔汁中化開沐之一月色黑而潤矣簡誤柏子仁體性多油腸滑作瀉者勿服膈間多痰者勿服陽道數舉腎家有熱暑濕作瀉法咸忌之已油者勿用入藥茯苓味甘平無毒主胸脅逆氣憂恚驚邪恐悸心下結痛寒熱煩滿咳逆口焦舌乾利小便止消渴好睡大腹淋瀝膈中痰水水腫淋結開胸腑調臟氣伐腎邪長陰益氣力保神守中久服安魂養神不飢延年其有抱根者名茯神茯神平主闢不祥療風眩風虛五勞口乾止驚悸多恚怒善忘開心益智安魂魄養精神疏茯苓生於古松之下感土木之氣而成質故其味甘平性則無毒入手足少陰手太陽足太陰陽明經陽中之陰也胸脅逆氣邪在手少陰也憂恚驚邪皆心氣不足也恐悸者腎志不足也心下結痛寒熱煩滿咳逆口焦舌乾亦手少陰受邪也甘能補中淡而利竅補中則心脾實利竅則邪熱解心脾實則憂恚驚邪自止邪熱解則心下結痛寒熱煩滿咳逆口焦舌乾自除中焦受濕熱則口發渴濕在脾脾氣弱則好睡大腹者脾土虛不能利水故腹脹大也淋瀝者脾受濕邪則水道不利也膈中痰水水腫皆緣脾虛所致中焦者脾土之所治也中焦不治故見斯病利水實脾則其證自退矣開胸腑調臟氣伐腎邪者何莫非利水除濕解熱散結之功也長陰益氣力保神守中久服安魂養神不飢延年者補心脾伐腎邪除濕利竅之極功也白者入氣分赤者入血分補心益脾白優於赤通利小腸專除濕熱赤亦勝白藥性論云茯苓臣忌米醋能開胃止嘔逆善安心神主肺痿痰壅治小兒驚癇療心腹脹滿婦人熱淋赤者破結氣日華子云茯苓補五勞七傷安胎暖腰膝開心益智止健忘茯神抱木心而生以此別於茯苓別錄謂茯神平總之其氣味與性應是茯苓一樣茯苓入脾腎之用多茯神入心之用多故主闢不祥療風眩風虛五勞口乾止驚悸多恚怒善忘開心益智安魂魄養精神藥性論又云茯神君味甘無毒主驚癇安神安志補勞乏主心下急痛堅滿人虛而小腸不利加而用之其心名黃松節治偏風口面喎斜毒風筋攣不語心神驚掣虛而健忘其所主與茯苓大同小異耳主治參互白茯苓得煉蜜胡麻仁餌之可以辟穀延年不飢入五苓散利水除濕暑氣勝則去桂得人參白朮橘皮山藥扁豆芍藥甘草為補脾胃之上藥得二朮澤瀉車前白芍藥橘皮木瓜豬苓為消水腫之要劑入六味地黃丸能伐腎邪入補心丹則補心安魂養神百一選方朱雀丸治心神不定恍惚健忘不樂火不下降水不上升時復振跳常服消陰養火全心氣茯神二兩去皮沉香半兩為末煉蜜丸小豆大每服三十丸食後人參湯下證治要訣治血虛心汗別處無汗獨心孔有汗思慮多則汗亦多宜養心血以艾湯調茯苓末服一錢直指方治心虛夢泄或白濁白茯苓末二錢米湯調下日二服東坡方也威喜丸治丈夫元陽虛憊精氣不固小便下濁餘瀝常流夢寐多驚頻頻遺泄婦人白淫白帶並治之白茯苓去度四兩作匱以豬苓四錢半入內煮二十餘沸取出日乾去豬苓為末化黃蠟搜和丸彈子大每嚼一丸空心津下以小便清為度忌米醋三因方治小便淋濁由心腎氣虛神志不守或夢遺白濁赤白茯苓等分為末新汲水飛去沫控干以地黃汁同搗酒熬作膏和丸彈子大空心鹽湯嚼下一丸禹師方治妊娠水腫小便不利惡寒赤茯苓去皮葵子各半兩為末每服二錢新汲水下普濟方治卒然耳聾黃蠟不拘多少和茯苓末細嚼茶湯下夏子益奇疾方治血餘怪證十指節斷壞惟有筋連無節肉蟲出如燈心長數寸遍身綠毛卷名曰血餘以茯苓胡黃連煎湯飲之愈普濟方治水腫尿澀茯苓皮椒目等分煎湯日飲取效簡誤病人腎虛小水自利或不禁或虛寒精清滑皆不得服琥珀味甘平無毒主安五臟定魂魄殺精魅邪鬼消瘀血通五淋疏琥珀感土木之氣而兼火化故其味甘平無毒而色赤陽中微陰降也入手少陰太陽亦入足厥陰經專入血分五臟有所感觸則不安能殺精魅邪鬼則五臟自安而魂魄自定心主血肝藏血入心入肝故能消瘀血也藥性論云琥珀君治百邪產後血瘀作痛日華子云療蠱毒壯心明目磨翳止心痛癲邪破結癥正以其陽明之物又消瘀血故主上來諸病也若作傅藥能止血生肌愈金瘡宋高祖時寧州貢琥珀枕碎以賜軍士傅金瘡其一證也出罽賓國初如桃膠凝乃成焉海藥云是海松木中津液初如桃膠後乃凝結性溫主止血生肌鎮心明目破癥瘕氣塊產後血暈悶絕兒枕痛等並宜餌此以拾草通明而堅輕色赤者良主治參互得沒藥乳香延胡索乾漆鱉甲為散治產後血暈有神佐以人參益母草澤蘭生地牛膝當歸蘇木作湯送前藥則治兒枕痛惡露下不盡腹痛少腹痛寒熱等證極效和大黃鱉甲作散子酒下方寸匕下婦人腹內惡血同鱉甲京三稜各一兩沒藥延胡索各半兩大黃六銖熬搗為散空心酒服三錢治婦人癥瘕氣塊及產後血暈悶絕兒枕痛甚虛極者減大黃同丹砂滑石竹葉麥冬木通治心家有熱小腸受之因之小水不利立效同人爪珍珠瑪瑙珊瑚除目翳赤障得丹砂犀角羚羊角天竺黃遠志茯神鎮驚主諸癇直指方治小兒胎驚琥珀防風各一錢丹砂半錢為末豬乳調一字入口中最妙又方治小兒胎癇琥珀丹砂各少許全蠍一枚為末麥門冬湯調一字服聖惠方治小兒轉胞真琥珀一兩為末用水四升蔥白十莖煮汁三升入琥珀末二錢溫服砂石諸淋三服皆效普濟方小便淋瀝琥珀為末二錢麝香少許白湯服之或萱草煎湯服老人虛人以人參湯下亦可蜜丸以赤茯苓湯下外臺秘要治從高墜下有瘀血在內刮琥珀屑酒服方寸匕或入蒲黃二三匙日服四五次鬼遺方治金瘡悶絕不識人琥珀研粉童子小便調一錢三服瘥簡誤此藥畢竟是消磨滲利之性不利虛人大都從辛溫藥則行血破血從淡滲藥則利竅行水從金石鎮墜藥則鎮心安神凡陰虛內熱火炎水涸小便因少而不利者勿服琥珀以強利之利之則愈損其陰酸棗仁味酸平無毒主心腹寒熱邪結氣聚四肢痠疼濕痹煩心不得眠臍上下痛血轉久泄虛汗煩渴補中益肝氣堅筋骨助陰氣能令人肥健久服安五臟輕身延年疏酸棗仁得木之氣而兼土化故其實酸平仁則兼甘氣味勻齊其性無毒為陽中之陰入足少陽手少陰足厥陰太陰之經專補肝膽亦復醒脾從其類也熟則芳香香氣入脾故能歸脾能補膽氣故可溫膽母子之氣相通故亦主虛煩煩心不得眠其主心腹寒熱邪結氣聚及四肢痠疼濕痹者皆脾虛受邪之病脾主四肢故也膽為諸臟之首十一臟皆取決於膽五臟之精氣皆稟於脾故久服之功能安五臟輕身延年也別錄主煩心不得眠臍上下痛血轉久泄虛汗煩渴補中益肝氣堅筋骨助陰氣能令人肥健者緣諸證悉由肝膽脾三臟虛而發膽主升肝藏血脾統血三髒得補久而氣增氣增則滿足故主如上功能也主治參互君茯神遠志麥門冬石斛五味子龍眼人參能止驚悸並一切膽虛易驚入溫膽湯治病後膽虛不眠入歸脾湯治脾家氣血虛自汗不眠驚悸不嗜食太平聖惠方治骨蒸不眠心煩用酸棗仁一兩炒研水二盞研絞取汁煮粥熟下地黃汁一合再煮勻食凡服固表藥而汗不止者用棗仁一兩炒研同地黃白芍藥麥冬五味子龍眼肉竹葉煎服多服取效汗乃心液故爾簡便方治睡中汗出即盜汗用酸棗仁白茯苓人參等分為末每服一錢米飲下外臺秘要療刺入肉棗仁核燒存性為細末水服之立出簡誤凡肝膽脾三經有實邪熱者勿用以其收斂故也檗木黃柏也味苦寒無毒主五臟腸胃中結熱黃疸腸痔止泄痢女子漏下赤白陰傷蝕瘡療驚氣在皮間肌膚熱赤起目熱赤痛口瘡久服通神疏黃柏稟至陰之氣而得清寒之性者也其味苦其氣寒其性無毒故應主五臟腸胃中結熱蓋陰不足則熱始結於腸胃黃疸雖由濕熱然必發於真陰不足之人腸澼痔漏亦皆濕熱傷血所致泄痢者滯下也亦濕熱干犯腸胃之病女子漏下赤白陰傷蝕瘡皆濕熱乘陰虛流客下部而成膚熱赤起目熱赤痛口瘡皆陰虛血熱所生病也以至陰之氣補至陰之不足虛則補之以類相從故陰回熱解濕燥而諸證自除矣乃足少陰腎經之要藥專治陰虛生內熱諸證功烈甚偉非常藥可比也潔古用以瀉膀胱相火補腎水不足堅腎壯骨髓療下焦虛諸痿癱瘓利下竅除熱東垣用以瀉伏火救腎水治衝脈氣逆不渴而小便不通諸瘡痛不可忍丹溪謂得知母滋陰降火得蒼朮除濕清熱為治痿要藥得細辛瀉膀胱火治口舌生瘡主治參互黃柏為足少陰腎經藥然以柴胡引之則入膽以黃連葛根升麻引之則入腸胃及太陰脾經治濕熱滯下佐牛膝枸杞地黃五味子鱉甲青蒿則益陰除熱佐甘菊枸杞地黃蒺藜女貞實則益精明目得豬膽汁水銀粉則主諸熱瘡有蟲久不合口得鉛丹則生肌止痛得木瓜茯苓二朮石斛地黃則除濕健步佐白芍藥甘草則主火熱腹痛外臺秘要治口中及舌上生瘡銼黃柏含之千金方治小兒重舌以黃柏苦竹瀝浸點舌上肘後方治咽喉卒腫食飲不通黃柏搗末苦酒和傅腫上佳又方治傷寒時氣溫病毒攻手足腫痛欲斷亦治毒攻陰腫細銼黃柏五斤以水三斗煮漬之傷寒類要同葛氏方治食自死六畜肉中毒黃柏末服方寸匕未解再服之經驗方治嘔血黃柏蜜塗炙乾杵為末用麥冬湯調下二錢匕立瘥梅師方治癰疽發背或髮乳房初起微赤不急治之即殺人搗黃柏末和雞子白塗之簡要濟眾方治吐血熱極黃柏二兩蜜炙搗末每服二錢溫糯米飲調下十全博救方治小兒熱瀉黃柏削皮焙為末用薄米飲丸如粟大每服十丸米飲下深師方治傷寒熱病口瘡黃柏削去粗皮蜜漬一宿唯欲令濃含其汁良久吐更含若胸中熱有瘡時飲三五合尤佳衍義云檗木今用皮以蜜炙與青黛各一分同為末入生龍腦一字研勻治心脾熱舌頰生瘡當摻瘡上有涎即吐又張仲景檗皮湯無不驗傷寒論中已著婦人良方治妊娠下痢白色晝夜三五十行根黃厚者蜜炒令焦為末大蒜煨熟去皮搗爛如泥和丸梧子大每空心米飲下三五十丸日三服神妙不可述潔古家珍治赤白濁淫及夢泄精滑真珠粉丸黃柏炒真蛤粉各一斤為末煉蜜丸綠豆大每服一百丸空心溫酒下黃柏苦而降火蛤粉咸而補腎也又方加知母炒牡蠣煅山藥炒等分為末糊丸梧子大每服八十丸鹽湯下許學士本事方治積熱夢遺心忪恍惚膈中有熱宜清心丸主之黃柏末一兩片腦一錢煉蜜丸梧子大每服十五丸麥冬湯下此大智禪師方也三因方治口疳臭爛綠雲散黃柏五錢銅綠二錢為末摻之漱去涎聖惠方治鼻疳有蟲黃柏二兩冷水浸一宿絞汁溫服普濟方治鬈毛毒瘡生頭中初生如蒲桃痛甚黃柏一兩乳香二錢半為末槐花煎水調作餅貼於瘡上子母秘錄治小兒臍瘡不合者黃柏末塗之又方治臁瘡熱瘡黃柏末一兩輕粉三錢豬膽汁調搽之或只用蜜炙黃柏末一味張杲醫說治火毒生瘡凡人冬月向火火氣入內兩股生瘡其汁淋漓用黃柏末摻之立愈一婦生此人無識者用此而愈宣明方斂瘡生肌黃柏末麵糊調塗效簡誤黃柏固能除熱益陰然陰陽兩虛之人病兼脾胃薄弱飲食少進及食不消或兼泄瀉或惡冷物及好熱食腎虛天明作泄上熱下寒小便不禁少腹冷痛子宮寒血虛不孕陽虛發熱瘀血停滯產後血虛發熱金瘡發熱癰疽潰後發熱傷食發熱陰虛小水不利痘後脾虛小水不利血虛不得眠血虛煩躁脾陰不足作泄等證法咸忌之楮實味甘寒無毒主陰痿水腫益氣充肌膚明目久服不飢不老輕身疏楮實稟土氣以生故其味甘氣寒無毒氣薄味厚陰也降也入足太陰經其主水腫益氣充肌膚者脾為土臟而主肌肉脾虛則肌肉不充土虛則水濕氾濫甘為土化能入脾堅土則水腫消肌肉充氣自益矣明目者目得血而能視脾旺自能生血也陰痿者精氣竭也脾實則能生精而灌注於腎故陰自強也補脾益氣則五臟皆實不飢不老輕身是其驗矣主治參互活法機要治水氣蠱脹楮實子丸以潔淨府用楮實一斗水三斗熬成膏茯苓三兩白丁香一兩半為末以膏和丸梧子大從少至多至小便清利脹減為度後服治中湯養之忌甘苦峻補及發動之物劉禹錫傳信方治女子月經不絕來無時者取案紙三十張燒灰以清酒半升和調服之頓定蓐中血暈服之立驗已斃者去板齒灌之經一日亦活聖惠方治癬濕癢用楮葉搗爛傅上外臺秘要治天行病後兩脅脹滿臍下如水腫以谷枝汁隨意服愈肘後方治鼻衄小勞輒出楮葉取汁飲三升良子母秘錄治小兒下痢赤白作渴得水又嘔逆者楮葉炙香以飲漿半升浸至水綠去葉以木瓜一個切納汁中煮二三沸去木瓜細細飲之聖惠方治通身水腫楮枝葉煎如餳空腹服一匕日三服直指方肝熱生翳楮實研細食後蜜湯服一錢日再服外臺秘要治金瘡出血穀子搗傅之簡誤楮實雖能消水補脾然氣亦微寒脾胃虛寒者不宜用乾漆味辛溫無毒有毒主絕傷補中續筋骨填髓腦安五臟五緩六急風寒濕痹療咳嗽消瘀血痞結腰痛女子疝瘕利小腸去蛔蟲疏乾漆稟火金之氣以生故其味辛氣溫火金相搏則未免有毒別錄言之為當矣甄權加咸宗奭加苦氣味俱厚通行腸胃入肝行血之藥也凡風寒濕邪之中人留而不去則腸胃鬱而生蟲久則五臟六腑皆受病或為癱瘓或為拘攣所自來矣此藥能殺蟲消散逐腸胃一切有形之積滯腸胃既清則五臟自安痿緩痹急自調矣又損傷一證專從血論蓋血者有形者也形質受病惟辛溫散結而兼鹹味者可入血分而消之瘀血清而絕傷自和筋骨自續則髓腦自足矣其主痞結腰痛女子疝瘕者亦指下焦血分受寒血凝所致利小腸者取其通行經脈之功耳至於療咳嗽雖非正治然亦有瘀血停積發為骨蒸勞瘵以致咳嗽者得其清散瘀血之力則骨蒸退而咳嗽亦除也誤中漆毒者多食蟹及甘豆湯解之主治參互同䗪蟲桃仁當歸紅花蘇木牡丹皮五靈脂延胡索牛膝治腹中瘀血作痛或產後感寒惡露未盡結成痞塊作痛者加入乾薑澤蘭同楝根鶴蝨檳榔錫灰薏苡根烏梅龍膽草能殺腸胃一切諸蟲同牛膝牡丹皮續斷赤芍藥桃仁乳香沒藥紅花延胡索鱉甲治女子月閉因於瘀血臍腹作痛畏寒及不發熱不口渴者可加桂同豨薟葉生地黃半枝蓮胡麻荊芥何首烏天門冬苦參可療紫雲風入仲景大黃䗪蟲丸中治五勞虛極羸瘦腹滿不能飲食內有乾血肌膚甲錯簡誤乾漆味辛有毒瘀血得之即化成水其消散之功可知凡經閉由於血虛而非有瘀血結塊阻塞者切勿輕餌附漆葉味辛無毒圖經曰彭城樊阿少師事華佗佗授以漆葉青黏散云服之去三蟲利五臟輕身益氣使人頭不白五加皮味辛溫微寒無毒主心腹疝氣腹痛益氣療躄小兒不能行疽瘡陰蝕男子陰痿囊下濕小便餘瀝女人陰癢及腰脊痛兩腳疼痹風弱五緩虛羸補中益精堅筋骨強志意久服輕身耐老疏五加皮在天得少陽之氣為五車星之精在地得火金之味故其味辛其氣溫而其性無毒別錄加苦微寒氣味俱厚沉而陰也入足少陰足厥陰經觀本經所主諸證皆因風寒濕邪傷於二經之故而濕氣尤為最也其治疝氣腹痛療躄小兒不能行陰蝕疽瘡男子陰痿囊下濕小便餘瀝女人陰癢脊痛兩腳疼痹風弱者何莫非二經受風寒濕邪所致經云傷於濕者下先受之又云地之濕氣感則害人皮肉筋脈肝腎居下而主筋骨故風寒濕之邪多自二經先受此藥辛能散風濕能除寒苦能燥濕二髒得其氣而諸證悉廖矣又濕氣浸淫則五臟筋脈緩縱濕氣留中則虛羸氣乏濕邪既去則中焦治而筋骨自堅氣日益而中自補也其主益精強志者腎藏精與志也輕身者除風濕之效也耐老者補肝腎之功也昔人云寧得一把五加不用金銀滿車寧得一斤地榆安用明月寶珠又昔魯定公母單服五加酒以致不死又東華真人煮石法用玉豉金鹽玉豉地榆也金鹽五加也世為仙經所頌其能輕身耐老又可知矣主治參互得牛膝木瓜黃柏麥門冬生地黃薏苡仁石斛虎脛骨山藥治濕熱痿痹腰以下不能行動同續斷杜仲牛膝山茱萸巴戟天破故紙治腎虛寒濕客之作腰痛同二朮萆薢石菖蒲薏苡仁白蒺藜甘菊花防風羌活獨活白鮮皮石斛治風寒濕成痹同石菖蒲連翹蒼朮黃柏黃耆薏苡仁金銀花鱉蝨胡麻木瓜土茯苓治下部濕瘡久不愈兼治膿窠瘡如神同黃柏末菖蒲末蛇床子俱為細末傅囊濕神效如欲作湯沐加荊芥苦參防風一味釀酒飲之治風痹四肢拘攣全幼心鑑治小兒三歲不能行用此便走五加皮五錢牛膝木瓜各二錢半為末每服五分米飲入酒二三滴調服簡誤下部無風寒濕邪而有火者不宜用肝腎虛而有火者亦忌之牡荊實味苦溫無毒主除骨間寒熱通利胃氣止咳逆下氣得朮柏實青葙共療頭風防風為之使疏牡荊實感仲夏之氣以生故其味苦氣溫無毒可升可降陽也入足陽明厥陰經其主骨間寒熱通利胃氣止咳逆下氣者蓋足陽明為十二經脈之長厥陰為風木之位外邪傷於二經則寒熱留連於筋骨而胃氣壅滯苦溫能通行散邪則胃氣利而寒熱自除咳逆亦邪氣壅胃所致邪散氣下則咳逆自止矣主治參互外臺秘要頭風痛取荊瀝不拘多少服日日服之朱震亨治心痛及婦人白帶用牡荊實炒焦為末飲服入折傷藥能散瘀血和筋骨簡誤病非干外邪者一概不宜用蔓荊實味苦辛微寒平溫無毒主筋骨間寒熱濕痹拘攣明目堅齒利九竅去白蟲長蟲主風頭痛腦鳴目淚出益氣久服輕身耐老令人光澤脂致疏蔓荊實稟陽氣以生兼得金化而成神農味苦微寒無毒別錄加辛平溫察其功用應是苦溫辛散之性而寒則甚少也氣清味薄浮而升陽也入足太陽足厥陰兼入足陽明經其主筋骨間寒熱濕痹拘攣風頭痛腦鳴目淚出者蓋以六淫之邪風則傷筋寒則傷骨而為寒熱甚則或成濕痹或為拘攣又足太陽之脈夾脊循項而絡於腦目為厥陰開竅之位邪傷二經則頭痛腦鳴目淚出此藥味辛氣溫入二臟而散風寒濕之邪則諸證悉除矣邪去則九竅自通痹散則光澤脂致其主堅齒者齒雖屬腎而床屬陽明陽明客風熱則上攻牙齒為動搖腫痛散陽明之風熱則齒自堅矣去白蟲長蟲者假其苦辛之味耳益氣輕身耐老必非風藥所能也主治參互同甘菊花荊芥酒炒黃芩烏梅芽茶白蒺藜川芎羌活黑豆土茯苓治偏頭風痛目將損者簡誤頭目痛不因風邪而由於血虛有火者忌之元素云胃虛人不可服恐生痰疾辛夷味辛溫無毒主五臟身體寒熱風頭腦痛面䵟溫中解肌利九竅通鼻塞涕出治肌腫引齒痛眩冒身兀兀如在車船上者生鬚髮去白蟲久服下氣輕身明目增年耐老可作膏藥用之去心及外毛毛射入肺令人咳疏辛夷稟春陽之氣以生故其味辛氣溫性無毒氣清而香味薄而散浮而升陽也入手太陰足陽明經其主五臟身體寒熱風頭腦痛面䵟解肌通鼻塞涕出面腫引齒痛者皆二經受風邪所致足陽明主肌肉手太陰主皮毛風邪之中人必自皮毛肌肉以達於五臟而變為寒熱又鼻為肺之竅頭為諸陽之首三陽之脈會於頭面風客陽分則為頭痛面䵟鼻塞涕出面腫引齒痛辛溫能解肌散表芳香能上竄頭目逐陽分之風邪則諸證自愈矣眩冒及身兀兀如在車船之上者風主搖動之象故也風邪散中氣溫則九竅通矣大風之中人則毛髮脫落風濕之浸淫則腸胃生蟲散風行濕則鬚髮生而蟲自去矣久服下氣輕身明目增年耐老悉非風藥所能雖出自神農本經然而易世相傳得無謬訛存而不論可也主治參互同甘菊花蒼耳子薄荷細辛甘草羌活藁本防風川芎治風寒入腦頭痛或鼻塞流涕或鼻淵涕下不止腥臭簡誤辛香走竄之性氣虛人不宜服雖偶感風寒鼻竅不通亦不得用頭腦痛屬血虛火熾者不宜用齒痛屬胃火者不宜用桑上寄生味苦甘平無毒主腰痛小兒背強癰腫安胎充肌膚堅發齒長鬚眉主金瘡去痹女子崩中內傷不足產後余疾下乳汁其實主明目輕身通神疏桑寄生感桑之精氣而生其味苦甘其氣平和不寒不熱固應無毒詳其主治一本於桑抽其精英故功用比桑尤勝腰痛及小兒背強皆血不足之候癰腫多由於榮氣熱肌膚不充由於血虛齒者骨之餘也發者血之餘也益血則發華腎氣足則齒堅而鬚眉長血盛則胎自安女子崩中及內傷不足皆血虛內熱之故產後余疾皆由血分乳汁不下亦由血虛金瘡則全傷於血上來種種疾病莫不悉由血虛有熱所發此藥性能益血故並主之也兼能祛濕故亦療痹實味甘平亦益血之藥故主治如經所云也主治參互同枸杞子地黃胡麻川續斷何首烏當歸牛膝治血虛手臂骨節疼痛入獨活寄生湯療一切風濕痹聖惠方療胎動腹痛桑寄生一兩五錢阿膠炒五錢艾葉五錢水一盞半煎一盞去滓溫服或去艾葉以其熱也杜仲味辛甘平無毒主腰脊痛補中益精氣堅筋骨強志除陰下癢濕小便餘瀝腳中痠痛不欲踐地久服輕身耐老疏杜仲稟陽氣之微得金氣之厚故其味辛氣平無毒別錄加甘溫甄權言苦暖應是辛苦勝而苦次之溫暖多而平為劣也氣薄味厚陽中陰也入足少陰兼入足厥陰經按本經所主腰脊痛益精氣堅筋骨腳中痠痛不欲踐地者蓋腰為腎之府經曰動搖不能腎將憊矣又腎藏精而主骨肝藏血而主筋二經虛則腰脊痛而精氣乏筋骨軟而腳不能踐地也五臟苦欲補瀉云腎苦燥急食辛以潤之肝苦急急食甘以緩之杜仲辛甘俱足正能解肝腎之所苦而補其不足者也強志者腎藏志益腎故也除陰下癢濕小便塗瀝者祛腎家之濕熱也益腎補肝則精血自足故久服能輕身耐老其主補中者肝腎在下臟中之陰也陰足則中亦補矣主治參互同牛膝枸杞子續斷白膠地黃五味子菟絲子黃柏山藥治腎虛腰痛及下部軟弱無力崔元亮海上方治腎虛腰痛用杜仲去皮酥炙黃一斤分作十劑每夜取一劑以水一升浸至五更煎三分減一取汁去滓以羊腎三四枚切片放下再煎三五沸如作羹法和以椒鹽空腹頓服得效方治風冷傷腎腰背虛痛杜仲一斤切炒酒二升漬十日日服三合肘後方治病後虛汗及目中流淚杜仲牡蠣等分為末臥時水服五匕不止更服簡便方治頻慣墮胎或三四月即墮者於兩月前以杜仲八兩糯米煎湯浸透炒去絲續斷二兩酒浸焙乾為末以山藥五六兩為末作糊丸梧子大每服五十丸空心米飲下青娥丸見補骨脂條下簡誤腎虛火熾者不宜用即用當與黃柏知母同入楓香脂味辛苦平無毒主癮疹風癢浮腫齒痛一名白膠香附李時珍治一切癰疽瘡疥吐血咯血活血生肌止痛解毒燒過揩牙永無牙疾疏楓香脂屬金有火故其味辛苦氣平無毒氣薄中厚陽中之陰也入足厥陰為活血涼血之藥凡熱則生風又血熱則壅而發癮疹風為木化風火相搏則為浮腫苦平能涼血熱兼辛又能散風故主血熱生風之證風火既散則肌肉和而浮腫自消齒痛亦因風熱上攻風勢既散則前亦止矣主治參互袖珍方治便癰膿血白膠香一兩為末入麝香輕粉少許摻之直指方諸瘡不合白膠香輕粉各二錢豬脂和塗儒門事親一切惡瘡水沉金絲膏用白膠香瀝青各一兩以麻油黃蠟各二錢同熔化入冷水中扯千遍攤貼之危氏得效方年久牙疼楓香脂為末以香爐內灰和勻每旦揩擦楓香近世為外科要藥除外科無別用故不著簡誤女貞實味苦甘平無毒主補中安五臟養精神除百疾久服肥健輕身不老疏女貞實稟天地至陰之氣故其木凌冬不凋神農味苦氣平別錄加甘無毒觀今人用以為變白多效者應是甘寒涼血益血之藥氣薄味厚陰中之陰降也入足少陰經夫足少陰為藏精之臟人身之根本虛則五臟雖無病而亦不安百疾叢生矣經曰精不足者補之以味蓋腎本寒因虛則熱而軟此藥氣味俱陰正入腎除熱補精之要品腎得補則五臟自安精神自足百疾去而身肥健矣其主補中者以其味甘甘為土化故能補中也所主如上功能則輕身不老蓋有自矣此藥有變白明目之功累試輒驗而經文不載為闕略也葉長子黑色者為女貞葉微圓子紅色者為冬青亦能治風虛補益肌膚主治參互同地黃何首烏人參麥門冬旱蓮草南燭子牛膝枸杞子山藥沒食子桑椹子黃柏椒紅蓮鬚為變白要藥同甘菊花生地黃蒺藜枸杞子能明目簡便方治虛損百病久服須白再黑返老還童用女貞實十月上巳日收陰乾用時以酒浸一日蒸透曬乾一斤四兩旱蓮草五月收陰乾十兩為末桑椹子四月收陰乾十兩為末煉蜜丸如梧子大每服七八十丸淡鹽湯下若四月收桑椹搗汁和藥七月收旱蓮搗汁和藥即減蜜之半矣濟急仙方治風熱赤眼冬青子不拘多少搗汁重湯熬膏淨瓶收固每用點眼普濟方治一切眼疾冬青葉研爛入朴硝貼之海上方也簡誤氣味俱陰變白家當雜保脾胃藥乃椒紅溫暖之類同施否則恐有腹痛作泄之患附枸骨本經附出女貞條下不載氣味所主然觀陳藏器云其皮椹浸酒補腰膝令健枝葉燒灰淋汁或煎膏塗白癜風亦可作稠煎傅之應是苦寒無毒氣味俱陰入肝入腎之藥也惟春入肝故主白癜風蓋肝為風木之位藏血之臟血虛則發熱熱甚則生風苦寒能涼血清熱故主之也其補腰膝令健者腰為腎之府腎虛則濕熱乘之而腰膝不利又腎為作強之官虛則熱而軟故其性欲堅急食苦以堅之此藥味苦入腎正遂其欲堅之性耳腎氣既實則濕熱自除而腰膝自健矣主治參互秘方取其葉煮飲治痰火甚驗蓋痰火未有不因陰虛火炎上爍乎肺煎熬津液而成此藥直入足少陰經補養陰氣則痰火自消如斧底抽薪之意也兼能散風毒惡瘡昔有老妓患楊梅結毒三十年者有道人教以單服此藥瘡愈而顏色轉少皆假其清熱涼血之功耳一名樞木黑子者名極木又名貓兒刺用作羅經入地不差簡誤脾胃虛寒作泄及火衰陰痿者忌之蕤核味甘溫微寒無毒主心腹邪結氣明目目赤痛傷淚出目腫眥爛齆鼻破心下結痰痞氣久服輕身耐老不飢疏蕤核得土氣以生神農味甘氣溫別錄加微寒無毒氣薄味厚陽中之陰也入足厥陰經厥陰為風木之臟開竅於目風熱乘肝則肝血虛而目為之病或為赤痛腫傷或為淚出眥爛此藥溫能散風寒能除熱甘能補血肝氣和而目疾悉瘳矣其主心腹邪結氣者即邪熱氣也熱則生痰痰礙中焦氣為之痞甘寒除熱溫主通行熱邪去而痰自不生痰結解而氣自通暢矣鼻齆者熱在上焦心肺之分也甘寒總能除上下之熱故亦主之非養性益精之藥而云輕身益氣不飢者未必然也主治參互和劑局方春雪膏治肝虛風熱上攻眼目昏暗癢痛隱澀赤腫羞明迎風有淚多見黑花用蕤核去皮壓去油二兩腦子二錢半研勻生蜜六錢和收點眼集效方百點膏治一切風熱眼蕤仁去油三錢甘草防風各六錢黃連五錢以三味煎取濃汁次下蕤仁膏日點簡誤目病非關風熱而因於肝腎兩虛者不宜用凡修事湯浸去皮尖劈作兩片用芒硝木通通草同煎一伏時取出研膏入藥丁香味辛溫無毒主溫脾胃止霍亂擁脹風毒諸腫齒疳䘌能發諸香疏丁香稟純陽之氣以生故其味辛氣溫性無毒氣厚味薄升也陽也入足太陰足陽明經其主溫脾胃止霍亂擁脹者蓋脾胃為倉廩之官飲食生冷傷於脾胃留而不去則為壅塞脹滿上湧下泄則為揮霍撩亂辛溫暖脾胃而行滯氣則霍亂止而擁脹消矣齒疳䘌者亦陽明濕熱上攻也散陽明之邪則疳䘌自除療風毒諸腫者辛溫散結而香氣又能走竅除穢濁也主治參互同白豆蔻藿香陳皮厚朴砂仁治霍亂因於寒加生薑半夏治吐嘔因於寒冷傷胃或寒月飽食受寒腹痛甚同砂仁厚朴乾薑橘皮草果蒼朮木香麥糵治小兒傷生冷腹痛劉氏小兒方治小兒虛寒吐瀉丁香橘皮等分薑汁糊丸綠豆大米湯化下全幼心鑑治小兒脾胃虛寒嘔吐不止丁香半夏末各一錢薑汁浸一夜曬乾為末薑汁打面為丸黍米大量大小用薑湯下和劑局方治婦人產難母丁香乳香麝香三件用十分之三各為末臘月兔腦和杵為丸如芡實大每服一丸酒下梅師方治乳頭破裂丁香末傅之證治要訣食蟹致傷丁香末薑湯服五分入陳氏異功散治痘瘡虛寒之極又值冬月寒氣薄之發不出者簡誤丁香氣味辛溫一切有火熱證者忌之非屬虛寒概勿施用沉香微溫療風水毒腫去惡氣疏沉香稟陽氣以生兼得雨露之精氣而結故其氣芬芳其味辛而無毒氣厚味薄可升可降陽也入足陽明太陰少陰兼入手少陰足厥陰經本經療風水毒腫者即風毒水腫也風為陽邪鬱於經絡遇火相煽則發出諸毒沉香得雨露之精氣故能解風火之毒水腫者脾惡濕而喜燥辛香入脾而燥濕則水腫自消凡邪惡氣之中人必從口鼻而入口鼻為陽明之竅陽明虛則惡氣易入得芬芳清陽之氣則惡氣除而脾胃安矣附錄李珣味苦溫無毒主心腹痛霍亂中惡邪鬼症清人神並宜酒煮服之諸瘡腫宜入膏用日華子味辛熱無毒主調中補五臟益精壯陽暖腰膝去邪氣止轉筋吐瀉冷氣破痃癖冷風麻痹骨節不任風濕皮膚癢心腹痛氣痢元素補右腎命門相火主治參互同人參菖蒲遠志茯神酸棗仁生地黃麥門冬治思慮傷心心氣鬱結不舒者得木香藿香砂仁治中惡腹中㽲痛闢一切惡氣同蘇子橘紅枇杷葉白豆蔻人參麥門冬治胸中氣結或氣逆不快醫壘元戎治胞轉不通非小腸膀胱厥陰受病乃強忍房事或過忍小便所致當治其氣則愈非利藥可通也沉香木香各二錢為末白湯空腹服之以通為度簡誤沉香治冷氣逆氣氣鬱氣結殊為要藥然而中氣虛氣不歸元者忌之心經有實邪者忌之非命門真火衰者不宜入下焦藥用檀香本經無正文弘景雲白檀消熱腫藏器主心腹霍亂中惡鬼氣殺蟲日華子云檀香熱無毒治心痛霍亂腎氣腹痛濃煎服水磨傅外腎並腰腎痛處詳其所主諸證亦是芬芳升發辟惡散結除冷之藥也今人多供燃爇非上乘沉水者不入藥乳香微溫療風水毒腫去惡氣療風癮疹癢毒疏乳香得木氣而兼火化本經微溫大明辛熱微毒元素苦辛氣厚味薄陽也入足太陰手少陰兼入足厥陰經風水毒腫邪干心脾惡氣內侵亦由二經虛而邪易犯癮疹癢毒總因心脾為風濕熱邪所幹致之脾主肌肉而痛癢瘡瘍皆屬心火此藥正入二經辛香能散一切留結則諸證自瘳矣日華子云煎膏止痛長肉陳藏器云治婦人血氣療諸瘡令內消則今人用以治內傷諸痛及腫毒內服外傅之藥有自來矣主治參互同紫花地丁白及白蘞金銀花夏枯草白芷連翹貝母甘菊甘草穿山甲沒藥治一切癰疽疔腫同續斷牛膝當歸紅曲牡丹皮沒藥地黃川芎治內傷胸脅作痛同沒藥牛膝澤蘭黑豆蒲黃五靈脂延胡素牡丹皮山楂治產後兒枕作痛入一切膏藥能消毒止痛靈苑方治甲疽胬肉膿血疼痛不愈用乳香為末膽礬燒研等分傅之內消即愈山居四要治玉莖作腫乳香蔥白等分搗傅簡要濟眾方難產催生用明乳香為末取母豬血和丸梧子大每服五丸酒下簡誤癰疽已潰不宜服諸瘡膿多時未宜遽用降真香李珣云味辛溫無毒燒之闢天行時氣宅舍怪異小兒帶之辟邪惡氣疏降真香香中之清烈者也故能闢一切惡氣不祥入藥以番舶來者色較紅香氣甜而不辣用之入藥殊勝色深紫者不良上部傷瘀血停積胸膈骨按之痛或並脅肋痛此吐血候也急以此藥刮末入藥煎服之良治內傷或怒氣傷肝吐血用此以代鬱金神效名醫錄云周崇被海寇刃傷血出不止筋骨如斷用花蕊石散不效軍士李高用紫金散掩之血止痛定明日結痂如鐵遂愈且無瘢痕叩其方則用紫藤香瓷瓦刮下研末爾云即降真之最佳者曾救萬人蘇合香味甘溫無毒主辟惡殺鬼精物溫瘧蠱毒癇痓痓作痙去三蟲除邪令人無夢魘久服通神明輕身長年疏蘇合香聚諸香之氣而成故其味甘氣溫無毒凡香氣皆能辟邪惡況合眾香之氣而成一物者乎其走竅逐邪通神明殺精鬼除魘夢溫瘧蠱毒宜然矣亦能開鬱金櫻子味酸澀平溫無毒療脾泄下痢止小便利澀精氣久服令人耐寒輕身疏金櫻子得陽氣而兼木化故其味酸澀氣平溫無毒氣薄味厚陰中陽也入足太陽手陽明兼入足少陰經十劑云澀可去脫脾虛滑泄不禁非澀劑無以固之膀胱虛寒則小便不禁腎與膀胱為表裡腎虛則精滑時從小便出此藥氣溫味酸澀入三經而收斂虛脫之氣故能主諸證也精固則精氣日生而陽氣充骨髓滿故耐寒輕身也主治參互和芡實粉為丸名水陸丹益氣補真孫真人食忌金櫻子煎霜後用竹夾子摘取入木臼中杵去刺劈去核以水洗過搗爛入大鍋水煎不得絕火減半濾過仍煎似稀餳每服一匙暖酒調服活血駐顏其功不可備述簡誤泄瀉由於火熱暴注者不宜用小便不禁及精氣滑脫因於陰虛火熾而得者不宜用放杖木味甘溫無毒主一切風血理腰腳輕身變白不老浸酒服之生溫括睦婺山中樹如木天蓼老人服之一月放杖故以為名疏放杖木得土氣以生故味甘氣溫無毒甘入脾而養血溫散風而通行故主一切風血腰腳為病變白易老亦皆血虛不能榮養筋骨及潤毛髮所致甘能補血血足則發自不白身輕不老有自來矣
