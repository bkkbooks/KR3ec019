body:
  text: 卷二十六米穀部下品總一十八種今疏其要者三種醋稻米醬醋一名苦酒味酸溫無毒主消癰腫散水氣殺邪毒疏醋惟米造者入藥得溫熱之氣故從木化其味酸氣溫無毒酸入肝肝主血血逆熱壅則生癰腫酸能斂壅熱溫能行逆血故主消癰腫其治產後血暈癥塊血積亦此意耳散水氣者水性氾濫得收斂而寧謐也殺邪毒者酸苦湧瀉能吐出一切邪氣毒物也日華子主下氣除煩婦人心痛血氣併產後及傷損金瘡出血迷悶殺一切魚肉菜毒取其酸收而又有散瘀解毒之功也故外科傅藥中多資用主治參互仲景方少陰病脈微細但欲寐咽中傷生瘡不能言語聲不出者苦酒湯主之用半夏十四枚雞子一枚去黃以苦酒半夏著雞子殼中置刀環中安火上令三沸去滓少少含咽之不瘥更用三劑仲景金匱方黃耆芍藥苦酒湯治黃汗汗出沾衣正黃如藥汁因汗出時入水中浴水從汗孔入得之用黃耆五兩芍藥三兩桂枝三兩以苦酒一斗水七升相和煮取三升溫服一升當心煩服至六七日乃解衍義云產婦房中常以火炭沃醋氣為佳酸氣能斂血使下也孟詵食療青木香以醋磨汁服止卒心痛浸黃柏含之治口瘡千金方身體卒腫醋和蚯蚓屎傅之又方舌腫不消以酢和釜底墨厚傅舌之上下脫則更傅須臾即消又方湯火傷灼即以酸酢淋洗並以酢泥塗之良亦無瘢痕喉痹咽痛以釅醋探吐之簡誤經曰酸走筋筋病毋多食酸凡筋攣偏痹手足屈伸不便皆忌之又曰味過於酸肝氣以津脾氣乃絕多食酸則肉皺而唇揭言能助肝賊脾凡脾病者亦不宜過食稻米味苦主溫中令人多熱大便堅疏稻米即今之糯米也稟土中之陽氣其味應甘氣應溫無毒造酒必用之者以其性近於熱也為補脾胃益肺氣之谷脾胃得補則中自溫大便亦堅實溫能養氣氣充則身自多熱大抵脾肺虛寒者宜之為其能益氣溫中也故又有止泄利縮小便收自汗發痘瘡等用主治參互松篁經驗方久泄食減以糯米一升水浸一宿瀝乾炒熟磨篩入懷山藥一兩每日清晨用半盞入白砂糖二匙胡椒末少許以滾湯調食大有滋補久服更能令人精暖有子醫方大成癲犬咬傷糯米一合斑蝥七枚同炒熬黃去之再入七枚再炒黃去之又入七枚待米出煙去貓為末水調服之小便利下佳亦可油調外傅又方虛勞不足糯米入豬肚內蒸熟日食簡誤糯米孟詵云發風動氣久食令人多睡藏器云久食令人身軟妊娠雜肉食之令子不利蕭炳云擁諸經絡氣使四肢不收發風昏昏陳士良云久食發心悸及癰疽瘡癤中痛合酒食之醉難醒然愚意觀之其為害未必如此之甚蓋天生五穀以食人皆稟土中衝和之氣可常御而無害者茅糯米氣溫性黏滯惟不利於上焦有痰熱及脾病不能轉運小兒難於克化者余皆無害諸家之言不可盡信也醬味鹹酸冷利主除熱止煩滿殺百藥熱湯及火毒疏按醬之品不一惟豆醬陳久者入藥其味鹹酸冷利故主除熱止煩滿及湯火傷毒也能殺一切魚肉菜蔬蕈毒本經云殺百藥毒者誤也聖人不得其醬不食朱子云食肉用醬各有所宜玩一宜字則不宜者必有傷害於人非特悅口而已如食蟹用橙醬或姜醬煮魚用茱萸醬取其能殺毒之義耳又有榆仁醬味辛美殺諸蟲利大小便心腹惡氣蕪荑醬主療相同茱萸醬作法不用面豆鹽只以河水量茱萸多少稍稍加石灰摻入拌勻甕藏殺一切魚腥毒用時洗去石灰擂爛烹水放入之良
