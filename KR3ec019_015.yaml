body:
  text: 卷十五人部總二十五種今疏其要者十一種又陳藏器三種發皮亂髮人乳汁頭垢人牙齒人屎人中黃附人溺秋石附溺白垽婦人月水經衣附浣褌汁婦人褌襠附懷妊婦人爪甲天靈蓋人胞胞衣水附初生臍帶發皮味苦溫小寒無毒主五癃關格不通利小便水道療小兒癇大人痙仍自還神化合雞子黃煎之消為水療小兒驚熱雷斅云是男子二十已來無疾患顏色紅白於頂心剪下者入丸藥中用先以苦參水浸一宿漉出入瓶子以火煅赤放冷研用疏發者血之餘也經曰男子八歲腎氣盛齒更髮長是發因人之血氣以為生長榮枯也故血盛之人則發潤而黑血枯之人則發燥而黃本經用發皮之意為是故爾其味苦氣溫別錄小寒無毒入手足少陰經大人痙小兒驚癇皆心肝二經血虛而有熱也發為血之餘故能入心入肝益血微寒而苦又能泄熱所以療小兒驚癇及大人痙也心與小腸為表裡腎與膀胱為表裡心腎有熱則二腑亦受病此藥能入心除熱入腎益陰則水道利五癃關格俱通矣是以古人治驚多用茯苓琥珀竹葉之類取其分利心經之熱自小腸出也日華子主止血悶血暈金瘡傷風及煎膏長肉消瘀血者悉取其入心走肝益血除熱之功耳自還神化之事未見別方大抵以火煅之復化而凝成血質此即自還神化之謂是因血而生復還為血非神化而何附亂髮微溫主咳逆五淋大小便不通小兒驚癇止血鼻衄燒之吹內立已疏亂髮即常人頭上墮下者其氣味所主與發皮相似第其力稍不及耳以發皮一時難得故別錄重出此條以便臨時取用療體實不甚相遠也主治參互和劑局方腸風黑散治腸風瀉血用亂髮一兩半荊芥二兩槐花槐角各一兩以上共煅為末枳殼甘草各一兩半為末和前末勻每服二錢水一盞煎七分空心服溫酒調下亦得劉禹錫傳信方孩子熱瘡亂髮一團如梨子大雞子黃十個煮熟同於銚子內熬至甚干始有液出旋置盞中液盡為度用傅瘡上外即以苦參粉摻之神效又方小兒斷臍即用清油調發灰傅之不可傷水臍濕不幹亦傅之效千金方小兒驚啼亂油發燒研乳汁或酒服少許良聖惠方鼻血不止血發燒灰吹之又方諸竅出血頭髮敗棕陳蓮蓬並燒灰等分每服三錢童便溫酒調下婦人良方女人漏血亂髮洗淨燒研空心溫酒服一錢入諸膏藥內能消毒止痛長肉生肌肘後方女勞黃疸膏發煎用豬膏半斤亂髮雞子大三團和煎發消藥成矣分溫再服病從小便中出也簡誤發灰走血分而帶散其主諸血證亦是血見灰則止取其治標之義居多若欲全仗其補益未必能也經熬煅成末後氣味不佳胃弱者勿服入外科藥殊有神效人乳汁主補五臟令人肥白悅澤唐本注療目赤痛多淚解豬肝牛肉毒合豉濃汁飲之神效疏人乳乃陰血所化生於脾胃攝於衝任未受孕則下為月水既受孕則留而養胎已產則赤變為白上為乳汁此造化玄微之妙人身轉運之神也其味甘氣平無毒入心入腎入脾潤肺益壽延年之聖藥也氣血之液故能補五臟五臟得補則氣血充實而體自肥白悅澤也經曰目得血而能視乳為血化故能療目赤痛多淚甘能解毒故又主解豬肝牛肉毒也主治參互攝生眾妙方接命丹治男婦氣血衰弱痰火上升虛損之證又治中風癱瘓手足疼痛不能動履等證用人乳二杯香甜白者為佳以好梨汁一杯和勻銀石器內頓滾每日五更一服能消痰補虛生血延壽此以人補人之妙法也聖惠方眼熱赤腫人乳半合古文錢十文銅器中磨令變色稀稠成煎瓶收日點數次或以乳浸黃連蒸熱洗之萬氏家抄方一切虛損勞證太乙神應丸人乳一碗磁器煮乾焙燥牛乳一碗同前制杜仲三兩破故紙二兩半白鮮皮白茯苓牛膝當歸各二兩黍米金丹一個曬乾即初生兒口中血珠共為末蜜丸桐子大每服一丸夜間噙化簡誤乳屬陰其性涼而滋潤血虛有熱燥渴枯涸者宜之若臟氣虛寒滑泄不禁及胃弱不思食脾虛不磨食並不宜服頭垢主淋閉不通梳上者名百齒霜疏頭垢頭上垢膩也其性滑潤而下走故本經主淋閉不通及弘景療噎疾其味苦溫能走陽明故又主勞復及婦人吹乳也主治參互同白芷貝母半夏為丸酒下治婦人吹乳同山慈菇橘葉鼠糞人爪蒲公英柴胡山豆根白芷連翹貝母夏枯草忍冬藤治乳岩乳癰神效類要方天行熱病後勞復含頭垢棗核大一枚良外臺秘要預防勞復傷寒初愈欲令不勞復者頭垢燒研水丸梧子大飲服一丸衛生寶鑑婦人吹乳百齒霜以無根水丸梧子大每服三丸數條之外無別用故不著簡誤人牙齒平除勞治瘧蠱毒氣入藥燒用疏牙齒者腎之標骨之餘也經云男子三八腎氣平而真牙生五八腎氣衰而齒槁以腎主骨故也其味甘鹹氣熱有小毒其主除勞治瘧者蓋勞乃勞極精氣乏絕腎家虧損所致也齒牙為腎氣所生以類相從適還其本故主之也瘧亦因勞而發非夏傷暑秋為瘧之比故亦主之味甘而咸所以能解蠱毒氣也今世又以之治痘瘡倒靨乳癰未潰為必須之藥主治參互錢氏小兒方痘疹倒靨人牙燒存性入麝香少許溫酒服半錢聞人規痘瘡論人牙散治痘瘡方出為風寒外襲或變黑或青紫此倒靨也宜溫肌發散使熱氣復行而斑自出用人牙不拘多少瓦罐固濟煅過出火毒研末出不快而黑陷者獖豬血調下一錢因誤服涼藥血澀倒陷者入麝香溫酒服之其效如神肘後方乳癰未潰人牙齒燒研酥調傅之直指方陰疽不發頭凹沉黯不疼無熱內服補散不起用人牙燒過穿山甲炙各一分為末分作二服用當歸麻黃煎湯下外以薑汁和麵傅之簡誤近世用人牙治痘瘡陷伏稱為神品然一概用之貽害不淺夫齒者腎之標骨之餘也痘瘡則毒自腎出方長之際外為風寒穢氣所冒腠理閉塞血澀不行毒不能出或變黑倒靨宜用此以酒麝達之竄入腎經發出毒氣使熱令復行而瘡自紅活蓋劫劑也若伏毒在心昏冒不省人事及氣虛色白癢塌不能作膿熱沸紫泡之證只宜解毒補虛苟誤用此則鬱悶聲啞反成不治之證可不慎哉其除勞治瘧本經雖言之今世亦稀用人屎寒主療時行大熱狂走解諸毒宜用絕乾者搗末沸湯沃服之疏人之五穀入胃津液上升為氣血糟粕下降而成糞其本原以化過但存極苦大寒之氣味耳入足陽明經經曰陽明實熱則登高而歌棄衣而走苦寒能除陽明之熱故療時行大熱狂走也凡毒必熱必辛苦寒能除辛熱故又主解諸毒也蘇恭云新者封疔腫一日根爛蓋疔腫乃風火之毒氣結成得大寒極苦之氣則風火散根自爛也今世人又以之治痘瘡血熱紫黑倒靨者殊效附糞清臘月截淡竹去青皮塞口納糞坑中積年得汁甚黑而苦主天行熱狂熱疾中惡蕈毒惡瘡瘟病垂死者皆瘥一名黃龍湯俗名金汁附人中黃即多年廁坑中磚上所凝結黃垽是也藥性治療大約與人屎同解胃家熱毒有效主治參互斗門方熱病發狂奔走似癲如見鬼神久不得汗及不知人事者以人中黃入大罐內以泥固濟煅半日去火毒研末新汲水服三錢未退再服寇宗奭衍義大熱狂渴干陳人屎為末於陰地淨黃土中作五六寸小坑將末三兩匙於坑中以新汲水調勻良久澄清細細與飲即解儒門事親四靈無價散治痘瘡黑陷腹脹危篤者此為劫劑用人糞貓糞豬犬糞等分臘月初旬收埋高燥黃土窖內至春取出砂罐盛之鹽泥固濟炭火煅令煙盡為度取出為末入麝香少許研勻瓷器密封收之一歲一字二歲半錢三歲一錢蜜水調下須臾瘡起千金方疔腫初起刮破以熱屎傅之干即易又方五色丹毒黃龍湯飲二合並塗之良陶弘景解藥箭毒交廣夷人用焦銅為箭鏃更以毒藥物汁漬之射人才傷皮便死惟飲糞汁即解簡誤傷寒溫疫非陽明實熱者不宜用痘瘡非火熱鬱滯因而紫黑干陷倒靨者不宜用以其苦寒之極耳人溺療寒熱頭疼溫氣童男者尤良疏人溺乃津液之濁者滲入膀胱而出其味鹹氣寒無毒為除勞熱骨蒸咳嗽吐血及婦人產後血暈悶絕之聖藥晉褚澄勞極論云降火甚速降血甚神飲溲溺百不一死服涼藥百不一生言其功力之優勝也經云飲入於胃遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱故人服小便入胃亦隨脾之氣上歸於肺下通水道而入膀胱乃循其舊路也故能治肺病引火下行凡人精氣清者為血濁者為氣濁之清者為津液清之濁者為小便與血同類也故其味鹹而走血鹹寒能伏虛熱使火不上炎而血不妄溢是以能療諸血證也蘇恭主久嗽上氣失聲及日華子止勞渴潤心肺療血悶熱狂撲損瘀血在內暈絕止吐血鼻衄皮膚皴裂難產胞衣不下諸證悉由此故本經主寒熱頭疼溫氣者鹹寒能除邪熱故耳法當熱飲熱則於中尚有真氣在其行自速冷則惟存鹹味寒性矣主治參互同枇杷葉天門冬麥門冬蘇子桑白皮沙參五味子生地黃款冬花百部治陰虛咳嗽聲啞喉間血腥氣同蘇木番降香續斷牛膝牡丹皮蒲黃治內傷吐血或瘀血停留作痛同澤蘭荊芥白芷續斷延胡索牛膝蘇木黑豆治產後血暈虛者加人參凡產後溫飲一杯可免血暈至三日後止之中暍昏倒以熱小便灌下即活聖濟總錄頭痛至極童便一盞豉心半合同煎至五分溫服孟詵必效方骨蒸發熱童便五升煎取一升以蜜三匙和之每服二碗半日更服此後常服自己小便輕者二十日重者五十日瘥聖惠方絞腸痧痛童便乘熱服之即瘥仲景方中暑昏悶夏月在途中熱死急移陰處就掬道上熱土擁臍上作窩令人溺滿暖氣透臍即蘇乃服地漿蒜水等藥千金方金瘡出血不止飲人尿五升外科發揮折傷跌撲童便入少酒飲之推陳致新其功甚大千金方火燒悶絕不省人事者新尿頓服二三升良通變要法人咬手指瓶盛熱尿浸一宿即愈普濟方赤眼腫痛自己小便乘熱抹洗即閉目少頃此以鹹寒內有真氣故能退去邪熱也簡誤人溺滋陰降火除骨蒸解勞乏治諸吐衄咯血唾血其效甚速褚澄遺書云人喉有竅則咳血殺人喉不停物毫髮芥蒂必咳血既滲入愈滲則愈咳愈咳愈滲惟飲溲溺則百不一死若服寒涼則百不一生其為肺腎有火者必須之物第其性稍寒惟不利於脾胃虛寒或溏泄及陽虛無火食不消者咸在所忌今世人類用秋石此乃水澄火煉真元之氣盡失其功不逮童便多矣況難多服久服則咸能走血使血凝泣為病溺白垽療鼻衄湯火灼瘡疏溺白垽即人中白乃人溺之積氣結成其味鹹氣涼無毒能瀉肝腎三焦膀胱有餘之火本經療鼻衄及大明治傳屍勞熱肺痿心膈熱吐血羸瘦渴疾者以其能入諸經淳去火邪也涼能除熱故又治湯火灼瘡今人以之治口舌生瘡疳䘌等證多效是其除熱降火之驗也主治參互同冰片硼砂青黛黃柏牙硝白礬治口舌生瘡及小兒走馬牙疳口臭經驗方鼻衄不止人中白焙乾入麝香少許溫酒調服立效又方小兒口疳人中白煅黃柏蜜炙焦為末等分入冰片少許以青布拭淨摻之累效婦人月水解箭毒並女勞復陳藏器云經衣主金瘡血湧出炙熱熨之又燒灰傅虎狼傷瘡及箭鏃毒入腹疏經云女子二七天癸至任脈通太衝脈盛月事以時下謂之天癸者乃天一所生之水也上應太陰下應海潮月有盈虧潮有朝汐故月事一月一行與之相符也其味鹹咸為水化凡毒得水則解故能解箭毒也女勞復者熱病新瘥後交感而得其證發熱煩躁少腹陰囊牽引而痛以前病餘熱未除陰精復損故有是證月水乃陰中有陽之物能補陰除熱故主之也金瘡及虎狼傷瘡皆血分受傷為病以類相從乃所以補其不足也童女首經名紅銅能回垂絕之陽氣第一時難得耳如女子自受胎時算至十四歲足即於是日是時經至者此為正鼎其經為上藥用法招攝於經將至時真氣先到採入身中名得大藥可以接命即首楞經所載精仙是也絕非入爐交感交非情想得通故亦成仙道耳主治參互扁鵲方丈夫熱病後交接復發忽卵縮入腹腹痛欲死燒女人月經赤衣為末熱水服方寸匕即定並治女勞色疸千金方男子陰瘡因不忌月事行房陰物潰爛用室女血衲瓦上燒存性研末麻油調傅博物志交廣夷人以焦銅和毒藥於箭鏃上中人即沸爛須臾骨壞而死但服月水屎汁解之簡誤月水雖能治病然穢汙不潔之物故女子入月時人宜遠之其升丹煎膏治藥及小兒出痘切須避忌如犯之則藥不靈痘變壞也紅鉛其性質乃陽氣凝結而成火盛人不宜單服須多服人乳併入童溺乃佳浣褌汁解箭毒並女勞復亦善婦人褌襠主陰易病當陰上割取燒末服方寸匕童女褌益佳若女患陽易即須男子褌也陰易病者人患時行病起後交合陰陽便即相著甚於本病其候小便赤澀寒熱甚頭痛腰痛耳鳴眼花服此便通利疏褌襠居下體得陰氣勝取其以類相從氣相感能導邪熱故主陰陽易病也主治參互仲景方陰陽易病身體重少氣腹裡急或引陰中拘急熱上衝胸頭重不欲舉眼中生花膝脛拘急者燒褌散主之取中褌近陰處燒灰水服方寸匕日三服小便即利陰頭微腫則愈男用女女用男千金方胞衣不下以本婦褌覆井上即下懷妊婦人爪甲取細末置目中去翳障疏爪者筋之餘肝膽之外候也經曰多食辛則筋急而爪枯以辛能散真氣而走筋也本經獨用懷妊婦人者蓋婦人氣血充實乃能受孕取其有生長力緊之意也其味甘鹹氣平無毒目中翳障肝經血虛也爪甲乃肝之餘氣所生而性又帶散故點目能去翳障也寇宗奭以眾人甲刮取細末㗜鼻內治鼻衄立愈兼能催生利小便止尿血散乳癰等用主治參互聖惠方胞衣不下取本婦手足爪甲燒灰酒服又方一切目疾以木賊草擦取爪甲末同丹砂等分研勻以露水搜丸芥子大每以一粒點入目內或用乳汁和亦得並治飛絲入目天靈蓋味鹹平無毒主傳屍屍疰鬼氣伏連久瘴勞瘧寒熱無時者燒令黑細研白飲和服亦合丸散用疏天靈蓋乃死人腦蓋骨也不用他骨而用此者以人生時腦為諸陽之會而此骨則一身眾骨之主也其主傳屍屍疰鬼氣伏連者取其同類之氣引出邪魅則其魂魄飛越不復附人故得瘥也久瘴勞瘧寒熱無時者亦邪惡之氣侵人也辟惡散邪是其能事故亦主之主治參互同鬼臼乾漆象膽獺肝丹砂胡黃連入滋陰藥內治傳屍勞同牛黃象牙末蛀竹屑血竭乳香沒藥黃蠟明礬真珠作丸治楊梅結毒痘瘡經驗方痘瘡陷伏灰平不長此係虛寒證用天靈蓋燒研酒服三分附化屍場上人骨取為細末傅金瘡止血長肉及惡瘡不收斂並能治打撲折傷人受杖時服之不痛不腫不爛簡誤天靈蓋治勞瘵者以其有屍鬼勞蟲為害取其逐散邪也今人虛損勞怯皆系色欲過度損傷真陰實無鬼氣淹伏何得用此幽暗不祥之物治之哉其痘瘡虛寒陷伏或為邪氣所觸發不出者不過借其陽氣所結之餘逐散其邪以發出耳非正治也若血熱煩躁瘡乾紫黑者用之必致危殆不救慎之慎之人胞主血氣羸瘦婦人勞損面䵟皮黑腹內諸病漸瘦瘁者以五味和之如䭔𩚲法與食之勿令知一名紫河車疏夫人有生之初攪父精母血以成胚胎外即有衣一層裹之即胞也至十月降生時隨兒後出其味甘鹹氣溫無毒血氣羸瘦婦人勞損面䵟皮黑腹內諸病漸瘦瘁者皆榮血不足精氣虧損也此藥得精血之氣而結能從其類以補之是以主諸證也今世以之治男女一切虛損勞極為益血補精氣之用主治參互同人參黃耆鹿茸白膠當歸補骨脂五味子巴戟天治真陽虛極畏寒足冷吳球大造丸治虛勞骨蒸女人無子及多生女月水不調小產難產服之必主有子危疾將絕者一二服可更活一二日其補氣血之功力可見也久服耳目聰明鬚髮烏黑延年益壽有奪造化之功故名大造丸用紫河車一具男用女胎女用男胎初生者米泔洗淨淡酒蒸熟搗曬研末敗龜板童便浸三日酥炙黃二兩黃柏杜仲各一兩半牛膝一兩二錢生地黃二兩半入砂仁六錢白茯苓二兩絹袋盛入瓦罐酒煮七次去茯苓砂仁不用杵地黃為膏聽用天門冬麥門冬人參各一兩二錢淨夏月加五味子七錢俱忌鐵器為細末地黃膏加酒米糊丸小豆大每服八九十丸空心鹽湯下女人去龜板加當歸二兩男子遺精女人漏下並加牡蠣粉一兩去人參簡誤人胞乃補陰陽兩虛之藥以其形質亦得男女坎離之氣而成如陰陽兩虛者服之有返本還元之功誠為要藥也然而陰虛精涸水不制火發為咳嗽吐血骨蒸盜汗等證此屬陽盛陰虛法當壯水之主以制陽光不宜服此並補之劑以耗將竭之陰也胃火齒痛法亦忌之附胞衣水味辛無毒主小兒丹毒諸熱毒發寒熱不歇狂言妄語頭上無辜發豎虛痞等證天行熱病飲之立效此即胞衣埋地下久遠化為水者得地中之陰氣其氣必寒辛寒而走足陽明經故主如上諸證也南人以甘草升麻和人胞瓶盛埋之三五年後掘出取為藥也初生臍帶主瘧燒為灰飲下之疏臍者命蒂也當心腎之中為真元歸宿之處胎在母腹臍連於胞喘息呼吸滋養之妙從此而通胎出母腹臍帶剪斷則一點真元之氣從此而歸入命門丹田故臍為命蒂而臍帶亦真氣會聚之所也本經以之治瘧者應是久瘧虛寒之甚借其氣以補不足也今世以小兒脫下臍帶燒灰與服可解胎中一切毒及免驚風痘患亦取裨補真元耳主治參互全幼心鑑臍汁不幹綿裹落下臍帶燒研一錢入當歸頭末一錢麝香一字摻之保幼大全預解胎毒臍帶燒灰以乳汁調服或入辰砂少許可免痘患無毒而主療甚稀不著簡誤
