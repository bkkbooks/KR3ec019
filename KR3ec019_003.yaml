body:
  text: 卷三玉石部上品總七十三種今疏其要者一十四種丹砂雲母石鐘乳礬石芒硝朴硝玄明粉滑石空青紫石英赤石脂無名異緑礬鐵鏽丹砂味甘微寒無毒主身體五臟百病養精神安魂魄益氣明目通血脈止煩滿消渴益精神悅澤人面殺精魅邪惡鬼除中惡腹痛毒氣疥瘻諸瘡久服通神明不老輕身神仙能化為汞作末名真珠光色如雲母可析者良惡磁石畏鹼水疏丹砂本稟地二之火氣以生而兼得乎天七之氣以成色赤法火中含水液為龍為汞亦曰陰精七為陽火之少故味甘微寒而無毒蓋指生砂而言也藥性論云丹砂為清鎮少陰君火之上藥闢除鬼魅百邪之神物安定神明則精氣自固火不妄炎則金木得平而魂魄自定氣力自倍五臟皆安則精華上發故明目心主血脈心火寧謐則陰分無熱而血脈自通煩滿自止消渴自除矣殺精魅邪惡鬼除中惡腹痛者陽明神物故能闢除不祥消散陰惡殺厲之氣也久服通神明不老者古之真人飛丹煉石引納清和配以金鉛按之法象自能合丹道而成變化也青霞子及太清服煉靈砂法云能重能輕能暗能明能黑能白能神能靈一斛人擎力難舉升萬斤遇火輕速上騰鬼神尋求莫知所在先稟氣於甲受氣於丙出胎見壬結魄成庚增光歸戊陰陽升降各本其原非虛語矣主治參互丹砂研飛極細令狀如飛塵以甘草生地黃濃煎調分許與兒初生時服之能止胎驚解胎毒同真珠琥珀金箔牛黃生犀角天竺黃滑石末治小兒急驚有神入六一散治暑氣伏於心經神昏口渴及泄瀉如火熱入補心丹鎮心神定魂魄入乳香托裡散散癰疽熱毒發熱疼痛及毒氣攻心發譫語簡誤丹砂為八石之主故列石部之首體中含汞汞味本辛故能殺蟲殺精魅宜乎藥性論謂其有大毒若經伏火及一切烹煉則毒等砒硇服之必斃自唐以來上而人主下而縉紳曾服斯藥鮮克免者戒之戒之雲母味甘平無毒主身皮死肌中風寒熱如在車船上除邪氣安五臟益子精明目下氣堅肌續絶補中療五勞七傷虛損少氣止痢久服輕身延年悅澤不老耐寒暑志高神仙一名云珠色多赤一名雲華五色具一名雲英色多青一名雲液色多白一名云砂色青黃一名磷石色正白澤瀉為之使忌羊血用礬石則柔爛疏雲母本經載其味甘氣平詳其主治亦應有溫韓保升曰雲母色白而主肺此石藥中溫良之品也以其法金故主身皮死肌及中風寒熱如在車船上甘能緩溫能和故除邪氣石性鎮墜能使火下火下則水上是既濟之象也故安五臟益子精明目久服輕身延年別録主下氣堅肌續絶補中療五勞七傷虛損少氣久服悅澤不老耐寒暑志高神仙皆此意也其曰止痢者久痢則腸胃俱虛甘溫足以回其虛下墜足以去其積故亦主之也主治參互雲母得鉛丹熬成膏可貼一切癰疽瘡毒和以升丹細末更著奇效經驗方云青城山丈人觀主康道豐治百病雲母粉方用雲母一斤析開揉入大瓶內築實封固以十斤頂火煅赤取出卻拌香蔥紫連翹草二件合搗如泥後以夾絹袋盛於大水盆內搖取粉余滓未盡再添草藥重搗取粉於木盆一面貯灰於灰上印一淺坑鋪紙傾粉在內候乾焙之以麵糊丸梧子大遇有疾者服之無不效知成都府辛諫議曾患大風衆醫不愈道豐進此服之神驗千金方服食雲母法上白雲母二十斤薄劈以露水八斗作湯分半淘淨二次又作二斗湯納芒硝十斤木器中浸二十日取出絹袋盛懸屋上勿見風日令燥以鹿皮為囊揉之從旦至午篩滓復揉得好粉二十斤攪糊入竹筒內薄削封口漆固埋北垣南下入地六尺覆土春夏四十日秋冬三十日出之當成水若洞洞不消更埋三十日此水能治萬病及勞氣風疼每以溫水一合和服之日三服十日小便當變黃二十日腹中寒澼消三十日齲齒更生四十日不畏風寒五十日諸病皆愈顏色日少長生神仙深師方治痰飲頭痛往來寒熱雲母粉二兩煉過常山一兩為末每服方寸匕湯服取吐忌生蔥生菜仲景金匱方治牝瘧多寒雲母燒二日夜龍骨蜀漆燒去腥等分為末發前漿水服半錢千金方治赤白痢積年不愈飲調雲母粉方寸匕服神效積德堂方治婦人難産經日不生雲母粉半兩溫酒調服入口即産不順者即順萬不失一陸氏云此是何德揚方也已救三五十人千金方治風疹遍身百計不愈煅雲母粉清水調服二錢良又方治一切惡瘡用雲母粉傅之聖惠方治火瘡敗壞雲母粉和生羊髓傅之事林廣記治金瘡出血雲母粉傅之絶妙千金翼治風熱汗出水和雲母粉服三錢不過再服立愈簡誤雲母性雖甘平終屬石種與臟腑氣血實非同類只宜用以治病取效若夫益精明目輕身延年耐寒暑志高神仙皆必不然之論也始俟世人試過乃敢信耳石鐘乳味甘溫無毒主咳逆上氣明目益精安五臟通百節利九竅下乳汁益氣補虛損療腳弱疼冷下焦傷竭強陰久服延年益壽好顏色不老令人有子不煉服之令人淋蛇床為之使惡牡丹玄參紫石英疏石鐘乳稟石之氣而生本經謂其味甘氣溫無毒吳普曰神農辛斯言近之甄權以為有大毒或是經火之故應云味甘辛氣大溫其性得火則有大毒乃為得之其主咳逆上氣者以氣虛則不能歸元發為斯證乳性溫而鎮墜使氣得歸元則病自愈故能主之也通百節利九竅下乳汁者辛溫之力也療腳弱疼冷者亦是陽氣下行之驗也甄權主寒嗽通聲者辛以散邪結溫以祛寒氣故也其他種種補益之說當是前人好事者溢美之辭夷考其性恐無是理未足信也主治參互石鐘乳得牛黃白蠟象牙末真珠乳香沒藥樺皮灰龜板灰俱存性細研枯白礬蛀竹屑紅鉛治廣瘡結毒爛壞鼻梁及陰蝕陽物有神孫真人千金翼鍾乳煎治風虛勞損腹腳無力補益強壯用鍾乳粉煉成者三兩以夾絹袋盛之牛乳一大升煎減三之一去袋飲乳分二服日一作不吐不利虛冷人微溏無所苦一袋可煮三十度力盡別作袋每煎迄須濯淨令通氣其滓和麵煨雞子食之此崔尚書方也宣明方治一切勞嗽胸膈痞滿焚香透膈散用鵝管石雄黃佛耳草款冬花等分為末每用一錢安香爐上焚之以筒吸烟入喉中日二次聖濟總録治肺虛喘急連綿不息生鍾乳粉光明者五錢蠟三兩化和飯甄內蒸熟研丸如梧子大每水下一丸外臺祕要治乳汁不通氣少血衰脈澀不行故少乳煉成鍾乳粉二錢濃煎漏蘆湯調下或通草等分為末米飲服方寸匕日三服簡誤石鐘乳辛溫若加火煉有毒無疑縱治虛寒尚須審察況病涉溫熱者耶世人病陰虛有熱者十之九陽虛內寒者百之一是以自唐迄今因服鍾乳而發病者不可勝紀服之而獲效得力者不聞一二其於事理可以燭照經曰石藥之性悍味斯言也則其大略可概見已慎毋輕信方士之言致蹈前人覆轍尊生之士宜安常處順以道理自持修短有命無惑乎長年之說庶不為所誤矣礬石味酸寒無毒主寒熱泄痢白沃陰蝕惡瘡目痛堅骨齒除固熱在骨髓去鼻中息肉煉餌服之輕身不老增年岐伯云久服傷人骨能使鐵為銅生河西山谷及隴西武都石門甘草為之使惡牡蠣畏麻黃疏礬石味酸氣寒而無毒其性燥急收澀解毒除熱墜濁蓋寒熱泄痢皆濕熱所為婦人白沃多由虛脫澀以止脫故也陰蝕惡瘡亦緣濕火目痛多由風熱除固熱在骨髓堅齒者髓為熱所劫則空故骨痿而齒浮礬性入骨除熱故亦主之去鼻中息肉者消毒除熱燥濕之功也主治參互礬石即白礬得巴豆同煅令枯取礬研末以鵝翎管吹入喉中流出熱涎立解喉痹其證俗呼為纏喉風是也皮膚疥癬膿窠坐板肥疳等瘡皆資其用各合所宜以施之得硫黃雄黃白附子海金沙密陀僧擦汗斑殊效一年者去皮一次十年者去皮十次擦後坐臥勿當風勿行房搖扇製半夏能散濕痰及食積痰兼除五飲同芒硝可燒水銀成粉治一切瘡中有蟲得黃臘和丸名臘礬丸治一切瘡毒有神凡治癰疽當服之以護膜膜苟不破雖劇必瘥陳師古方大風痰厥四肢不收氣閉膈塞者白礬一兩牙皂角五錢為末每服一錢溫水調下吐痰為度簡要濟衆方牙齒腫痛白礬一兩燒灰大露蜂房一兩微炙每二錢水煎含漱去涎千金方鼻中息肉用明礬一兩萆麻仁七粒鹽梅肉五個麝香一字搗丸綿裹塞之化水自下也夏子益奇疾方發斑怪證有人眼赤鼻張大喘渾身出斑毛髮如銅鐵乃熱毒氣結於下焦也白礬滑石各一兩為末水三碗煎減半不住服盡即安永類鈐方爛弦風眼白礬煅一兩銅青三錢研末湯泡澄清點洗千金方腳氣衝心白礬三兩水一斗五升煎沸浸洗張仲景金匱方女勞黃疸日晡發熱而反惡寒膀胱急少腹滿目盡黃額上黑足下熱因作黑疸其腹脹如水狀大便必黑時溏此女勞之病非水也自大勞大熱交接後入水所致腹滿者難治用礬石燒硝石熬黃等分為散以大麥粥汁和服方寸匕日三服病從大小便去又金匱方婦人白沃經水不利子臟堅癖中有乾血下白物用礬石燒杏仁一分研勻蜜丸棗核大納入腸中日一易之千金翼婦人陰脫作癢礬石燒研空心酒服方寸匕日三劉禹錫傳信方蛇咬蜴螫燒刀矛頭令赤置白礬於上汁出熱滴之立瘥此神驗之方也簡誤白礬本經主寒熱泄痢此蓋指泄痢久不止虛脫滑泄因發寒熱礬性過澀澀以止脫故能主之假令濕熱方熾積滯正多誤用收澀為害不一慎之婦人白沃多由虛脫故用收澀以固其標終非探本之治除固熱在骨髓僅可資其引導若謂其獨用反有損也礬性燥急而能劫水故不利齒骨齒者骨之餘故也岐伯云久服傷人骨故凡陰虛內熱火熾水涸發為咽喉痛者不宜含此目痛由陰虛血熱者亦不宜用劫水損骨之藥豈可煉服輕身不老增年徒虛語耳芒硝味辛苦大寒主五臟積聚久熱胃閉除邪氣破留血腹中痰實結搏通經脈利大小便及月水破五淋推陳致新生於朴硝疏芒硝稟天地至陰極寒之氣所生故味苦辛性大寒乃太陰之精以消物為性故能消五金八石況乎五臟之積聚其能比之金石之堅哉久熱即是邪熱傷寒熱邪結中焦或停飲食則胃脹閉少少投之可立蕩除除邪氣者寒能除熱故也破留血者咸能軟堅辛能散結也邪熱盛則經脈閉熱淫於內治以鹹寒結散熱除則經脈自通二便自利月水復故五淋中惟石淋膏淋為膠結難解病由於積熱非得辛苦大寒之藥以推蕩消散之不能除也推陳致新總述其體用之功耳由朴硝再煎而成故曰生於朴硝主治參互入仲景大承氣湯治傷寒七八日後邪結下焦少腹按之堅痛下之愈又治傷寒邪熱失汗蓄血少腹或先因內傷留血下焦入桃仁承氣湯下之愈千金方療漆瘡用湯漬芒硝令濃塗之如干即易之子母祕録治小兒赤遊行於體上下至心即死以芒硝納湯中取濃汁以拭丹上百一選方治療關格大小便不通脹滿欲死兩三日則殺人以芒硝三兩紙裹三四重炭火燒之令納一升湯中盡服當先飲湯一升已吐出乃服之孫真人食忌主眼有翳取芒硝一大兩置銅器中急火上煉之放冷後以生絹細羅點眼角中每夜欲臥時一度點妙姚和衆方治小兒重舌馬牙硝塗於舌上下三日效簡要濟衆方治小兒鵝口用馬牙硝擦舌上日五度效梅師方治火焰丹毒水調芒硝末塗之信效方治死胎不下用芒硝末二錢童便溫服三因方治風熱喉痹及纏喉風玉鑰匙用焰硝一兩半白殭蠶一錢白硼砂半兩腦子一字研勻取少許數數吹之普濟方治重舌鵝口用竹瀝同焰硝點之朴硝味苦辛寒大寒無毒主百病除寒熱邪氣逐六腑積聚結固留痹胃中食飲熱結破留血閉絶停痰痞滿推陳致新能化七十二種石煉餌服之輕身神仙煉之白如銀能寒能熱能滑能澀能辛能苦能咸能酸入地千歲不變色青白者佳黃者傷人赤者殺人疏朴硝乃初次煎成者其味氣烈於芒硝主治皆同總為除邪熱逐六腑積聚結固留癖胃中食飲停滯因邪熱結停痰痞滿破留血閉絶之要藥與芒硝功用曾無少別文具芒硝條下茲不復疏主治參互聖惠方治時氣頭痛不止用朴硝二兩搗羅為散用生油調塗於頂上又方治乳石發動煩悶及諸風熱用朴硝煉成者半兩細研如粉每服以蜜水調下一錢匕日三四服簡要濟衆治小便不通膀胱熱白花散朴硝不以多少研為末每服二錢匕溫茴香酒調下無時服入紫雪療傷寒溫疫溫瘧一切積熱煩熱狂呼叫走瘴疫毒癘卒死腳氣五尸五注心腹諸疾㽲刺切痛解諸熱毒邪熱發黃蠱毒鬼魅野道熱毒小兒驚癇百病黃金一百兩石膏寒水石磁石滑石各三斤搗碎水一斛煮四斗去滓入犀角屑羚羊角屑青木香沉香各五兩玄參洗焙升麻各一斤炙甘草八兩丁香一兩入前汁中煮取一斗五升去滓入煉朴硝十斤硝石三十二兩於藥汁中微火煎之用柳木不住攪至水氣欲盡傾水盆中待欲凝入麝香一兩二錢半硃砂末三兩攪勻收之每服一二錢涼水服臨時加減甚者一兩碧雪治一切積熱天行時疾發狂昏憒或咽喉腫塞口舌生瘡心中煩躁或大小便不通胃火諸病朴硝芒硝馬牙硝石膏水飛寒水石水飛各一斤以甘草一斤煎水五升入諸藥同煎不住手攪令消熔得所入青黛一斤和勻傾盆內經宿結成雪為末每含咽或吹之或水調服二三錢欲通利則熱水服一兩劉禹錫傳信方治熱壅甘露飲涼胸膈驅積滯芒硝末一大斤用蜜十二兩和勻入新竹筒內半筒以上即止不得令滿卻入炊甑中令有藥處在飯內其虛處出其上蒸之候飯熟取出綿濾入磁鉢內竹篦攪勻勿停手待凝取入磁盒每臥時含半匙漸漸咽之如要通利即多服之簡便方治赤眼腫痛朴硝置豆腐上蒸化取汁收點外臺祕要治喉痹腫痛用朴硝一兩細細含咽立效或加丹砂一錢氣塞不通加生甘草二錢半吹之孫真人方治口舌生瘡用朴硝含之良夏子益奇疾方灸瘡飛蝶因艾灸火瘡痂退落瘡內鮮肉片子飛如蝶狀騰空飛去痛不可言是血肉俱熱怪病也用朴硝大黃各半兩為末水調下微利即愈史記倉公傳菑川王美人懷子不乳來召淳于意意往飲以莨菪藥一撮以酒飲之旋乳意復診其脈躁躁者有餘病即飲以硝石一劑出血豆比五六枚而安此去蓄血之驗也炮炙論治頭痛欲死用硝石末吹鼻中即愈聖惠方治赤眼腫痛用硝石末臨臥時以銅箸點黍米大入目眥至旦以鹽水洗去之玄明粉味辛甘性冷無毒治心熱煩躁並五臟宿滯癥結明目退膈上虛熱消腫毒此即朴硝煉成者疏玄明粉即芒硝投滾湯沸化夜置冰霜之下結起在水面上者用白萊蔔切片煮汁投硝以結起多次者為上其色瑩白其味辛成沉而降陰也入手少陰足厥陰陽明經其治邪熱在心煩躁者經曰熱淫於內治以鹹寒佐之以苦並主五臟宿滯鷖結者即燥糞結痰瘀血宿食之謂辛能散結咸能軟堅兼能潤下苦能下泄故主之也目為血熱所侵必赤腫作痛異常硝物峻利加以苦辛鹹寒之極故能散熱結逐熱血目病既去必自明矣退膈上虛熱者當作實熱邪解心涼故熱退也消腫毒者即軟堅散結之功也主治參互集簡方熱厥氣痛玄明粉三錢熱童便調下傷寒蘊要傷寒發狂玄明粉二錢硃砂一錢末之冷水服聖濟總録鼻血不止玄明粉二錢冷水服簡誤硝者消也五金八石其堅莫比惟硝能消之苟非大辛至咸極苦最烈之味其能消化之乎消石朴硝一經澄煉便名芒硝馬牙硝風化硝甜硝若經煅過即名玄明粉究其功用無堅不磨無結不散無熱不蕩無積不推可謂直往無前物無留礙之性也別録謂煉餌服之輕身神仙失其本矣故仲景於諸承氣湯用之非邪結下焦堅實不可按者不用恐其誤伐下焦真陰故也病不由於邪熱深固閉結難通斷不可輕投至於血涸津枯以致大腸燥結陰虛精乏以致大熱骨蒸火炎於上以致頭痛目昏口渴耳聾咽痛吐血衄血咳嗽痰壅虛極類實等證切戒勿施庶免虛虛之咎而無悔不可追之大錯也至如唐玄宗所召道士劉玄真謂服玄明粉遂無病長生中所載有益精壯氣助陽補陰不拘丈夫婦人幼稚襁褓不問四時冷熱俱治之說乃是荒唐不經之語不識本章何緣載人豈歷代董修儒臣本不知醫但廣異聞未暇核實而誤收之耶正所謂盡信書則不如無書也滑石味甘寒大寒無毒主身熱泄澼女子乳難癃閉利小便蕩胃中積聚寒熱益精氣通九竅六府津液去留結止渴令人利中久服輕身耐飢長年石韋為之便惡曾青疏滑石石中之得沖氣者也故味甘淡氣寒而無毒入足太陽膀胱經亦兼入足陽明手少陰太陽陽明經用質之藥也滑以利諸竅通壅滯下垢膩甘以和胃氣寒以散積熱甘寒滑利以合其用是為祛暑散熱利水除濕消積滯利下竅之要藥本經用以主身熱泄澼女子乳難蕩胃中積聚寒熱者解足陽明胃家之熱也利小便癃閉者通膀胱利陰竅也其曰益精氣久服輕身耐飢長年此則必無是理矣別録通九竅津液去留結止渴令人利中者濕熱解則胃氣和而津液自生下竅通則諸壅自泄也丹溪用以燥濕分水道實大腸化食毒行積滯逐瘀血解燥渴補脾冒降心火偏主石淋皆此意耳主治參互和甘草為益元散又名天水散六一散太白散解中暑傷寒疫癧並汗後遺熱勞復諸疾兼解兩感傷寒百藥酒食邪熱毒煩滿短氣腹脹悶痛淋閟澀痛療身熱嘔吐泄瀉腸澼下痢赤白除煩熱胸中積聚寒熱止消渴蓄水婦人催生下乳治吹乳乳癰牙瘡齒疳此藥大養脾胃之氣通九竅六腑去留結通經脈消水穀安魂定魄乃神驗之仙藥也劉河間傷寒直格本方白滑石水飛過六兩粉甘草一兩為末每服三錢蜜少許溫水調下實熱則用新汲水調下解利則蔥豉湯下通乳用豬肉麵湯調下催生用香油漿水調下凡難産或死胎不下皆由風熱燥澀結滯聚斂不能舒緩故也此藥力至則結滯頓開而瘥矣如用以治痢照雷公炮製用牡丹皮同煮過加丹砂水飛細末每兩一錢名辰砂六一散治心經伏暑下痢純血煩躁口渴神昏不爽聖惠方治膈上煩熱多渴利九竅滑石二兩搗水三大盞煎二盞去滓入粳米煮粥食千金方治女勞黃疸日晡發熱惡寒少腹急大便溏黑額黑滑石石膏等分研末大麥汁服方寸匕日三小便大利愈腹滿者難治聖惠方治乳石發動煩熱煩渴滑石粉半兩水一盞絞白汁頓服廣利方氣壅關格不通小便淋急臍下妨悶兼痛滑石粉水調服一兩楊氏産乳小便不通滑石末一升車前汁和塗臍之四畔方四寸干即易之冬月水和聖惠方治婦人轉胞因過忍小便而致滑石末蔥湯服二錢普濟方伏暑水泄白龍丸滑石火煅過一兩硫黃四錢為末麵糊丸緑豆大每用淡薑湯隨大小服又方治伏暑或吐或瀉或瘧小便赤煩渴玉液散用桂府滑石燒四兩藿香一錢丁香一錢為末米湯服二錢亦治霍亂王氏痘疹方治痘瘡狂亂循衣摸床大渴引飲用益元散一兩加硃砂二錢冰片三分麝香一分用燈心湯調二三錢服普濟方治風毒熱瘡遍身出黃水桂府滑石末傅之次日愈先以虎杖豌豆甘草等分煎湯洗後乃搽集簡方治腳指縫爛滑石一兩石膏煅半兩枯礬少許研摻之夏子益奇疾方載白礬石條內簡誤滑石本利竅去濕消暑除熱逐積下水之藥若病人因陰精不足內熱以致小水短少赤澀或不利煩渴身熱由於陰虛火熾水涸者皆禁用脾腎俱虛者雖作泄勿服空青味甘酸寒大寒無毒主青盲耳聾明目利九竅通血脈養精神益肝氣療目赤痛卻浮翳止淚出利水道下乳汁通關節破堅積久服輕身延年不老令人不忘志高神仙能化銅鐵鉛錫作金生益州山谷及越巂山有銅處銅精熏則生空青其腹中空三月中旬採亦無時疏空青感銅之精氣而結其味甘酸其氣大寒無毒可知已色青法木故入肝而主目盲目者肝之竅瞳子神光屬腎肝腎虛則內熱怒則火起於肝故生內外障翳此目病所由成也甘寒能除積熱兼之以酸則火自斂而降矣熱退則障自消目自明耳者腎之竅水涸火炎耳聾腎家熱解則火息水生而聽復聰矣九竅不和無非火壅肝家有火則血熱氣逆故血脈不通涼肝除熱則精氣自益陰足火清則竅自利而血脈自通精神自長矣目赤痛浮翳淚出皆肝氣不足之候益肝氣則諸證自除矣其曰利水道下乳汁通關節破堅積者皆以熱除則氣血和平陰氣自復五臟清寧則諸證自解聖藥神功於斯顯矣主治參互空青得真珠貝子珊瑚石決明點目中內外障翳有神千金方眼目𥉂𥉂不明空青少許漬露一宿點聖濟總録浮翳昏暗空青二錢蕤仁去皮一兩片腦三錢細研日點明目去障翳上珍之藥一時難購明目外無別用故不著簡誤紫石英味甘辛溫無毒主心腹咳逆邪氣補不足女子風寒在子宮絶孕十年無子療上氣心腹痛寒熱邪氣結氣補心氣不足定驚悸安魂魄填下焦止消渴除胃中久寒散癰腫令人悅澤久服溫中輕身延年疏紫石英稟土中之陽氣以生本經味甘氣溫無毒別録加辛雷公言大溫獨李當之言大寒者昧其性矣味厚於氣陽中之陰降也入手少陰手厥陰足厥陰經少陰主心屬陽而本熱虛則陽氣衰而寒邪得以乘之或為上氣咳逆或為氣結寒熱心腹痛此藥溫能除寒甘能補中中氣足心得補諸證無不瘳矣驚悸屬心虛魂魄不安亦由心君怯弱無以鎮壓諸經茲得鎮墜之力而心君有以鎮攝即重以去怯之義也其主女子風寒在子宮絶孕無子者蓋女子系胎於腎及心包絡皆陰臟也虛則風寒乘之而不孕非得溫暖之氣則無以怯風寒而資化育之妙此藥填下焦走腎及心包絡辛溫能散風寒邪氣故為女子暖子宮之要藥補中氣益心肝通血脈鎮墜虛火使之歸元故又能止消渴散癰腫令人悅澤及久服輕身延年也凡入丸散用火煅醋淬七次研末水飛過曬乾入藥主治參互同白薇艾葉白膠當歸山茱萸川芎香附治女人子宮虛寒絶孕無子張文仲備急方虛勞驚悸補虛止驚令人能食紫石英五兩打細豆大水淘一遍以水一斗煮取三升細細服仲景金匱方治風熱瘛瘲及驚癇風引湯紫石英白石英寒水石石膏乾薑大黃龍齒牡蠣甘草滑石等分㕮咀水一升煎去三分食後溫呷無不效者簡誤紫石英其性鎮而重其氣暖而補故心神不定肝血不足及女子血海虛寒不孕者誠為要藥然而只可暫用不宜久服凡系石藥皆然不獨石英一物也婦人絶孕由於陰虛火旺不能攝受精氣者忌用赤石脂味甘酸辛大溫無毒主養心氣明目益精療腹痛泄澼下痢赤白小便利及癰疽瘡痔女子崩中漏下産難胞衣不出久服補髓好顏色益智不飢輕身延年白石脂功用大略相同石脂有五色舊經同一條今用唯赤白二者余皆不用疏赤石脂稟土金之氣而色赤則象火故其味甘酸辛氣大溫無毒氣薄味厚降而能收陽中陰也入手陽明大腸兼入手足少陰經經曰澀可去脫大小腸下後虛脫非澀劑無以固之故主腹痛腸澼及小便利女子崩中漏下也赤者南方之色離火之象而甘溫則又有入血益血之功故主養心氣及益精補髓好顏色也血足則目自明心氣收攝則得所養而下交於腎故有如上功能也癰疽因榮氣不從所生瘡痔因腸胃濕熱所致甘溫能通暢血脈下降能滌除濕熱故主之也其主難産胞衣不出者以其體重下降而酸辛能化惡血惡血化則胞胎無阻滯之患矣東垣所謂胞衣不出澀劑可以下之此之謂也不飢輕身延年乃方士煉餌之法耳凡泄利腸澼久則下焦虛脫無以閉藏其他固澀之藥性多輕浮不能達下惟石脂體重而澀直入下焦陰分故為久利泄澼之要藥主治參互和劑局方冷痢腹痛下白凍如魚腦者桃花丸主之赤石脂煅研乾薑炮等分為末蒸餅為丸量大小服日三服仲景方傷寒下利便膿血不止桃花湯主之赤石脂一斤一半全用一半末用乾薑一兩粳米半斤水七升煮米熟去滓每服七合納末方寸匕日三服愈乃止千金翼方痰飲吐水無時節者其原因冷飲過度遂令脾胃氣弱不能消化飲食飲食入胃皆變成冷水反吐不停赤石脂散主之赤石脂一斤搗篩服方寸匕酒食自任稍加至三匕服盡一斤則終身不吐痰水又不下利補五臟令人肥健有人患痰飲服諸藥不效用此遂愈病人虛者宜之簡誤火熱暴注者不宜用滯下全是濕熱於法當忌自非的受寒邪下利白積者不宜用崩中法當補陰清熱不可全仗收澀滯下本屬濕熱積滯法當祛暑除積止澀之藥定非所宜慎之慎之無名異味甘平無毒主金瘡折傷內損止痛生肌肉疏無名異稟地中陰水之氣以生本經味甘氣平無毒蘇頌鹹寒咸能入血甘能補血寒能除熱故主金瘡折傷內損及止痛生肌肉也蘇頌醋摩傅腫毒癰疽者亦取其活血涼血之功耳主治參互集驗方打傷腫痛無名異為末酒服趕下四肢瘀血皆散矣多能鄙事損傷接骨無名異甜瓜子各一兩乳香沒藥各一錢為末每服五錢熱酒調服小兒三錢服畢以黃米粥塗紙上摻左顧牡蠣末裹之竹篦夾住談野翁試驗方臨杖預服無名異末臨時溫酒服三五錢則杖不甚痛亦不甚傷除折傷腫毒外無他用故不著簡誤緑礬涼無毒治喉鰌蚛牙口瘡及惡瘡疥癬釀鯽魚燒灰和服療腸風瀉血一名皂礬煅赤醋淬為礬紅又名青礬疏緑礬氣味所稟與白礬同其酸湧澀收燥濕解毒化涎之功亦與白礬相似而力差緩本經主喉痹者酸湧化涎之功也蚛牙口瘡惡瘡疥癬者燥濕除熱解毒之功也腸風瀉血者消散濕熱之後復有收澀之功也然而諸治之外又善消積滯凡腹中堅肉積諸藥不能化者以礬紅同健脾消食藥為丸投之輒消主治參互得紅曲山楂肉豆蔻消肉積加麥芽橘皮草果檳榔三稜蓬荗消一切肉積及米麵食堅積脾病黃腫用緑礬四兩煅成赤珠子當歸四兩酒浸七日焙百草霜三兩為末以浸藥酒打糊丸梧子大每服五丸至七丸溫水下一月後黃去立效楊真人濟急方酒黃水腫黃腫積痛青礬半斤醋一大碗和勻瓦盆內煅干為度平胃散烏藥順氣散各半兩為末醋煮糊丸梧子大薑湯下二三十丸救急方食勞黃病身目俱黃青礬鍋內安炭煅赤米醋拌為末棗肉和丸梧子大每服二三十丸食後薑湯下聖惠方腹中食積緑礬二兩研米醋一大碗瓷器煎之柳條攬成膏入赤腳烏一兩研丸緑豆大每空心溫酒下五丸談野翁試驗方走馬疳瘡緑礬煅紅以醋拌勻如此三次為末入麝香少許溫漿水漱淨摻之應加龍腦雄黃蓬砂芒硝簡誤緑礬礬紅雖能消肉食堅積然能令人作瀉胃弱人不能多用服此者終身忌食蕎麥犯之立斃鐵鏽主惡瘡疥癬和油塗之蜘蛛蟲等咬和蒜磨傅之一名鐵衣疏鐵鏽得金器之英華其味應辛苦氣應寒惡瘡疥癬濕熱所生蜘蛛蟲咬毒氣傷血辛苦能除濕熱寒能解熱毒氣故主之也又祕法取露天入土者研極細同蟾酥腦麝以金針刺入疔瘡中令至根然後以藥塞入針能拔疔根輒效蓋疔腫未有不因肝經風熱所致此藥屬金善能平木故有如是之功普濟方疔腫初起多年土內鏽釘火煅醋淬刮下鏽末研細每用少許人乳和挑破傅之
