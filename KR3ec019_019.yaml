body:
  text: 卷十九禽部三品總五十六種今疏其要者四種雞烏骨雞雞冠血肝屎白雞子抱出卵殼肶胵里黃皮雀卵雄雀屎附天鼠屎白鴿諸雞疏按雞為陽禽屬木而外應乎風故在卦為巽其色雖有丹白黃烏其種復有烏骨之異總之性熱補陽起陰兼有風火之義惟烏骨者別是一種獨得水木之精故主陰虛發熱蓐勞崩中等證也簡誤雞性熱動風凡熱病初愈癰疽未潰素有風病人咸忌之弘景雲小兒五歲以下食雞生蛔蟲雞肉不可合葫芥李食不可合犬肝犬腎並令人泄痢同兔食成痢同魚汁食成心瘕同鯉魚食成癰癤同獺肉食成遁尸同生蔥食成蟲痔同糯米食生蛔蟲年久老雞腦有大毒食之能發疔中其毒發疔者以玉樞丹丸可解附烏骨雞味甘平無毒主補虛勞羸弱消渴中惡鬼擊心腹痛益産婦治女人崩中帶下一切虛損諸疾疏烏骨雞得水木之精氣其性屬陰能走肝腎血分補血益陰則虛勞羸弱可除陰回熱去則津液自生渴自止矣陰平陽祕表裡固密邪惡之氣不得入心腹和而痛自止鬼亦不能犯矣益陰則沖任帶三脈俱旺故能除崩中帶下一切虛損諸疾也古方烏骨雞丸治婦人百病者以其有補虛益陰入血分之功也主治參互古方烏骨雞丸治婦人産後蓐勞及陰虛等證方中半夏人參乃立方者之誤宜去之用骨一具煅存性同紅藥子白及白蘞冰片雄黃硃砂乳香沒藥醋蜜調傅一切癰疽腫毒神效治中惡心腹痛欲死但殺白烏骨雞乘熱薄心即瘥如鬼擊卒死用其熱血塗心下亦妙附雞冠血主乳難用三年老雄者取其陽氣充溢也凡風中血脈則口角僻喎冠血咸而走血透肌肉故以之治中風口喎不正塗頰上效丹雄雞為陽禽冠血乃諸陽之所聚故能治中惡客忤邪氣高武痘疹正宗云雞冠血和酒服發痘最佳雞屬巽屬風頂血至清至高故也主治參互必效方對口毒瘡熱雞冠血頻塗之取散青囊雜纂中蜈蚣毒舌脹出口是也雄雞冠血浸舌並咽之勝金方諸蟲入耳雞冠血滴入即出簡誤痘瘡須分寒熱雞血性溫天行瘡子虛寒者得之固可資其起發尚因血熱而乾枯焦黑者誤用之能更轉劇世人類用雞血桑蠹蟲發痘而不分寒熱誤也附肝主起陰氣疏肝本經主起陰氣性溫可知味甘微苦入足厥陰少陰經今人用以治少兒疳積眼目不明者取其導引入肝氣類相感之用也主治參互同蕪荑使君子胡黃連青黛五穀蟲穀精草蘆薈治小兒疳熱目生障翳千金方陰痿不起用雄雞肝三具菟絲子一升為末雀卵和丸小豆大每五六十丸酒下日二服附屎白微寒主消渴傷寒寒熱破石淋及轉筋利小便止遺尿滅瘢痕雄雞屎乃是白臘月收之白雞烏骨者更良素問作雞矢疏雞屎白微寒乃腸胃所出之物故復能走腸胃治病素問云心腹滿旦食不能暮食名為鼓脹治之以雞矢醴一劑知二劑已王太僕注云本草雞矢並不治蠱脹但能利小便蓋蠱脹皆生於濕熱濕熱脹滿則小便不利雞屎能通利下泄則濕熱從小便而出蠱脹自愈故曰治濕不利小便非其治也本經主石淋利小便止遺溺者正此意耳轉筋者血熱也傷寒寒熱及消渴者熱在陽明也瘢痕者血熱壅滯肌肉也寒能總除諸熱故主之也日華子炒服治中風失音痰迷陳藏器和黑豆炒酒浸服治賊風風痹蓋風為陽邪因熱而生雞屎寒能除熱雞本與風木之氣相通取其治本從類之義也主治參互普濟方雞矢醴治臌脹旦食不能暮食用臘月乾雞矢白半斤袋盛以酒醅一斗漬七日溫服三杯日三或為末服二錢亦得積善堂經驗方治一切肚腹四肢腫脹不拘鼓脹氣脹濕脹水脹等用乾雞矢一升炒黃以酒醅三碗煮一碗濾汁飲之少頃腹中氣大轉動利下即自腳下皮皺消也未盡隔日再作附雞子主除熱火瘡癇痙卵白微寒療目熱赤痛除心下復熱止煩滿咳逆小兒下泄婦人産難胞衣不出醯漬之一宿療黃疸破大煩熱疏雞子稟生化最初之氣如混燉未分之形故卵白象天其氣清其性微寒卵黃象地其氣濁其性微溫卵則兼清濁而為體其味甘氣平無毒凡癇痙皆火熱為病雞子之甘能緩火之標平即兼涼能除熱故主癇痙及火瘡並治傷寒少陰咽痛神效主治參互醫方集成年深哮喘雞子略敲損浸尿缸中三四日煮食能去風痰又方用頭生雞卵七枚童便浸七日取出煮熟每日食一枚永不出痘仲景苦酒湯治少陰病咽中傷生瘡痛不能語言聲不出者用半夏十四枚碎雞子一枚去黃納入半夏苦酒令滿置刀環中安火上令三沸去滓少少含咽之不瘥更作此方有神效普濟方咽塞生瘡乾嘔頭痛食不下法同上無半夏經驗祕方湯火燒灼雞子清和酒調洗勤洗止痛生肌普濟方塗面駐顏雞子一枚開孔去黃留白入金華胭脂及桑砌少許紙封與雞抱之俟別卵抱出以塗面洗之不落半年尚紅也仲景方治少陰病得之二三日以上心中煩不得臥者用黃連黃芩芍藥阿膠雞子黃先煎三物成去滓膠煬盡小冷雞子黃攪勻溫服劉禹錫傳信方亂髮雞子膏治孩子熱瘡效見發皮條下附抱出卵殼研末磨障翳取其蛻脫之義也蘇頌又主傷寒勞復熬令黃黑為末熱湯和一合服取汗出即愈炒研細傅下疳亦妙卵中白皮主久咳氣結得麻黃紫菀和服之立止附肶胵里黃皮微寒主泄利小便利遺溺除熱止煩疏此即肫內黃皮一名雞內金是也肫是雞之脾乃消化水穀之所其氣通達大腸膀胱二經有熱則泄痢遺溺得微寒之氣則熱除而泄痢遺溺自愈矣煩因熱而生熱去故煩自止也今世又以之治諸疳瘡多效主治參互醫林集要小便淋瀝痛不可忍雞肫內黃皮五錢陰乾燒存性作一服白湯下立愈子母祕録鵝口白瘡雞肫內黃皮為末乳服半錢並可傅之經驗方走馬牙疳雞肫內黃皮不落水者五枚焙存性枯礬一錢研細搽並治陰頭疳蝕雀卵味酸溫無毒主下氣男子陰痿不起強之令熱多精有子疏雀屬陽其氣溫味酸其性淫故能入下焦陰分能補暖兩腎夫人身兩腎左為腎右為命門左屬水為陰右屬火為陽天非此火不能生物人非此火不能有生又云陽生則陰長可見命門真陽之氣乃人身生化之本也故命門衰敗則陰痿精寒絶化育之道雀卵性溫補暖命門之陽氣則陰自熱而強精自足而有子也溫主通行性又走下故主下氣也弘景雲術家和天雄服之令莖大不衰孟詵云和天雄菟絲子末為丸空心酒下五丸治男子陰痿女子帶下便溺不利除疝瘕以其有溫命門之功也肉味甘溫功用不及卵附雄雀屎療目痛決癰癤女子帶下溺不利除疝瘕一名白丁香一頭尖是雄兩頭圓者雌凡用研細甘草水浸一宿焙乾用疏雀屎本經無氣味察其所主應是辛苦溫之物性善消散故外用療目痛決癰癤內服治帶下溺不利疝瘕也蘇恭以首生男子乳研雀屎成泥點目中胬肉赤脈貫瞳子者即消神效蓋取其辛散拔出火毒之義也主治參互子母祕録小兒中風口噤乳不下雀屎丸如麻子大服二丸即愈梅師方諸癰癤已成膿不肯決懼針者塗雀屎瘡頭即易決普濟方喉痹乳蛾白丁香二十個以沙糖和作三丸每以一丸綿裹含咽即時遂愈甚者不過二丸極有奇效簡誤雀肉及卵陰虛火盛者忌之不可合李食妊娠食雀肉飲酒令子多淫凡服術人忌之雀屎療目痛非風熱外邪者不宜用女子帶下溺不利屬腎虛有火者並忌之古方同天雄服此藥性極熱有大毒非陰臟及真陽虛憊者慎勿輕餌天鼠屎味辛寒無毒主面癰腫皮膚洗洗時痛腹中血氣破寒熱積聚除驚悸去面䵟一名夜明沙疏天鼠夜出喜食蚊納故其屎中淘出細沙皆未化蚊蚋眼也所以今人主明目治目盲障翳取其氣類相從也其味辛寒乃入足厥陰經藥本經所主諸證總屬是經所發取其辛能散內外結滯寒能除血熱氣壅故也然主療雖多性有專屬明目之外余皆可略主治參互聖惠方青盲障翳夜明沙一兩柏葉炙一兩為末牛膽汁和丸梧子大每夜臥時竹葉湯下二十丸又方五瘧不止夜明沙末每冷茶服一錢立效並治胎前瘧除目疾外他用甚稀故不立簡誤白鴿味鹹平無毒肉主闢諸藥毒及人馬久患疥又云暖無毒調精益氣治惡瘡疥並風瘙白癜癧瘍風疏白鴿稟水金之氣故其味鹹氣平無毒腎藏精腎納氣肺主皮毛鹹入腎故能調精益氣平則兼辛入肺故能主惡瘡疥及白癜癧瘍風凡毒藥之性多熱鴿得金水之氣故又能闢諸藥毒也其屎名左盤龍亦能主人馬疥瘡主治參互食醫心鏡治消渴飲水不知足用白花鴿切作小片以土蘇煎含之咽汁潛江方預闢痘毒用白鴿卵一對入竹筒封置廁中半月取出以卵白和辰砂三錢丸緑豆大每服三十丸豆子飲送下毒從大小便出也保命集破傷中風病傳入里用左盤龍白殭蠶各炒半錢雄黃一錢為末蒸餅丸梧子大每服十五丸溫酒下取效聖惠方頭癢生瘡白鴿屎五合醋煮三沸杵傅之日三上又方頭瘡白禿鴿糞研末先以醋米泔洗淨傅之簡誤鴿本經雖云調精益氣其用只長於去風解毒然而未必益人故孟詵云食多減藥力今世勞怯人多畜養及煮食之殊未當也
