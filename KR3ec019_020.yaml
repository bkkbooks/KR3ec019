body:
  text: 卷二十蟲魚部上品總五十種今疏其要者十三種石蜜蜜蠟牡蠣龜甲真珠玳瑁桑螵蛸石決明文蛤蠡魚鯽魚蟬鯉魚膽肉鱗附石蜜味甘平無毒微溫主心腹邪氣諸驚癇痓痓作痙安五臟諸不足益氣補中止痛解毒除衆病和百藥養脾氣除心煩食飲不下止腸澼肌中疼痛口瘡明耳目久服強志輕身不飢不老延年神仙疏石蜜蜂採百花釀成故本經味甘氣平別録微溫無毒得草木群英之精華合露氣以釀成故其氣清和其味純甘施之精神氣血虛實寒熱陰陽內外諸病罔不相宜經曰里不足者以甘補之甘為土化土為萬物之母石蜜具天地間至甘之味故能安五臟諸不足及益氣補中除衆病也心經有熱則為諸驚癇痙得甘緩之氣則心火降煩熱除諸驚癇痙平矣諸痛癢瘡瘍皆屬心火故又能止肌中疼痛及口瘡也甘主解毒故能和百藥甘主入脾故能養脾氣脾氣得所養而飲食自下腸澼止矣五臟足氣血充則耳目聰明不飢不老輕身強志延年神仙所自來矣主治參互同蘆根汁梨汁人乳牛羊乳童便治噎膈大便燥結用此潤之有痰加竹瀝煉熟和諸丸藥及膏子主潤五臟益血脈調脾胃通三焦塗火灼瘡能緩痛仲景方蜜煎導治陽明病自汗小便反利大便硬者用蜜二合銅器中微火熬之候凝如飴狀至可丸乘熱捻作挺令頭鋭大如指長寸半許候冷納穀道中少頃即通也一法加皂角細末二分攪勻尤速産書産後口渴用熟蜜不計多少熟水調服即止全幼心鑑痘疹作癢難忌抓成瘡及痂欲落不落百花膏主之用上等石蜜不拘多少湯和時時以翎刷之效肘後方天行虜瘡頭面及身須臾周匝狀如火瘡皆戴白漿隨決隨生不即療數日必死瘥後瘡瘢黯色一歲方滅此惡毒之氣深入也用蜜入升麻煎過數數拭之簡誤石蜜雖稱補五臟益脾胃然而生者性寒滑能作泄大腸氣虛完穀不化者不宜用嘔家酒家不宜用中滿蠱脹不宜用濕熱腳氣不宜用生者有小毒尤不宜食青赤酸者食之令人心煩不可與生蔥同食害人若與萵苣同食令人利下食蜜飽後不可食鮓令人暴亡蜜蠟味甘微溫無毒主下痢膿血補中續絶傷金瘡益氣不飢耐老白蠟療久泄澼後重見白膿補絶傷利兒久服輕身不飢疏蠟石蜜之凝結於底者也蜜性緩質柔故主潤臟腑經絡蠟性澀質堅故能療久痢泄澼後重下膿血也甘能益血補中溫能通行經脈故主續絶傷及金瘡也中得補則氣自益故久服能不飢輕身耐老也男子女人大小內外皆可施而別録獨云利小兒者非也主治參互得象牙末等能去漏管長肉見象牙條下得膩粉真珠末黃柏末龍腦香鉛丹蛀竹屑蔥白豬脊髓治陰蝕惡瘡同孩兒茶銅丹胡粉水龍骨粉霜龍骨黃柏豬膽汁炙豬脂作膏治內外臁瘡久不愈金匱調氣飲治赤白痢少腹痛不可忍後重或面青手足俱變者用黃蠟三錢阿膠三錢同溶化入黃連末五錢攪勻分三次熱服神效千金方膠蠟湯治熱痢及婦人産後下痢用蠟二棋子大阿膠二錢當歸二錢半黃連三錢黃柏一錢陳廩米半升水三升煮至一升去米入藥煎至一鍾溫服神效簡誤火熱暴痢不宜用牡蠣味鹹平微寒無毒主傷寒寒熱溫瘧灑灑驚恚怒氣除拘緩鼠瘻女子帶下赤白除留熱在關節榮衛虛熱去來不定煩滿止汗心痛氣結止渴除老血澀大小腸止大小便療泄精喉痹咳嗽心脅下痞熱久服強骨節殺邪鬼延年貝母為之使得甘草牛膝遠志蛇床子良惡麻黃細辛吳茱萸疏牡蠣得海氣結成故其味鹹平氣微寒無毒氣薄味厚陰也降也入足少陰厥陰少陽經其主傷寒寒熱溫瘧灑灑驚恚怒氣留熱在關節去來不定煩滿氣結心痛心脅下痞熱等證皆肝膽二經為病二經冬受寒邪則為傷寒寒熱夏傷於暑則為溫瘧灑灑邪伏不出則熱在關節去來不定二經邪郁不散則心脅下痞熱邪熱甚則驚恚怒氣煩滿氣結心痛此藥味咸氣寒入二經而除寒熱邪氣則榮衛通拘緩和而諸證無不瘳矣少陰有熱則女子為帶下赤白男子為泄精解少陰之熱而能斂澀精氣故主之也咸屬水屬陰而潤下善除一切火熱為病故又能止汗止渴及鼠瘻喉痹咳嗽也老血者宿血也咸走血而軟堅所以主之其性收斂故能澀大小腸止大小便利也腎主骨入腎益精則骨節自強邪本因虛而入肝腎足則鬼邪自去人以腎為根本根本固則年自延矣更能止心脾氣痛消疝瘕積塊癭瘤結核脅下堅滿等證皆寒能除熱咸能軟堅之功也主治參互同生地黃黃耆龍眼五味子酸棗仁麥門冬白芍藥茯神黃柏當歸治心腎盜汗同黃柏五味子地黃山茱萸枸杞子車前子沙苑蒺藜連須杜仲治夢遺泄精加牛膝則兼治赤白濁同地黃黃柏阿膠木耳炒黑香附白芍藥地榆麥門冬續斷青蒿鱉甲蒲黃止婦人崩中下血及赤白帶下仲景方同龍骨入柴胡桂枝各半湯內取其收斂浮越之陽氣固脫而鎮驚更能除胸脅中痞硬藏器方同麻黃根蛇床子為粉去陰汗本事方虛勞盜汗牡蠣粉麻黃根黃耆等分為末每服二錢水煎服仲景金匱玉函方傷寒傳成百合病如寒無寒如熱無熱欲臥不臥欲行不行欲食不食口苦小便赤色得藥則吐變成渴疾久不瘥者用牡蠣煅二兩栝樓二兩為細末每服方寸匕用米飲調下日三服古今靈驗方水病囊腫牡蠣粉二兩乾薑炮一兩研細冷水調稠掃上須臾囊熱如火干則再上小便利即愈一方用蔥汁白麵同調小兒不用幹薑經驗方男女瘰癧用牡蠣粉四兩玄參末三兩甘草一兩麵糊丸梧子大每三十丸酒下日三服服盡除根不拘已破未破皆效普濟方月水不止牡蠣煅研細米醋搜成團再煅研末以米醋調艾葉末熬膏丸梧子大每用醋湯下四五十丸簡誤凡病虛而多熱者宜用虛而有寒者忌之腎虛無火精寒自出者非宜龜甲味鹹甘平有毒主漏下赤白破癥瘕痎瘧五痔陰蝕濕痹四肢重弱小兒囟不合頭瘡難燥女子陰瘡驚恚氣心腹痛不可久立骨中寒熱傷寒勞復或肌體寒熱欲死以作湯良久服輕身不飢益氣資智亦使人能食勿令中濕中濕即有毒疏介蟲三百六十而龜為之長稟金水之氣故味鹹而甘氣平其性神靈能變化凡入藥勿令中濕中濕則遂其變化之性而成癥瘕於腹中故言有毒也氣味俱陰入足少陰經方家多入補心藥用以心藏神而龜性有神借其氣以相通且得水火既濟之義實非補心之正藥也其主骨中寒熱及傷寒勞復肌體寒熱欲死痎瘧者皆陰虛而邪熱為病經曰傷於濕者下先受之濕痹四肢重弱亦腎陰虛而邪氣易犯腎主骨腎虛則小兒囟門不合腎為五臟陰中之陰陰虛則火熱偏至而為驚恚氣心腹痛此藥補腎家之真陰則火氣自降而寒熱邪氣俱除矣益陰除熱軟堅故主漏下赤白鷖瘕五痔陰蝕陰瘡及小兒頭瘡也經曰邪熱不殺穀熱去故令人能食能食則脾胃得所養而能思思作睿故資智久服益氣輕身不飢者除熱益陰之功也主治參互丹溪方補陰丸用龜下甲酒炙熟地黃蒸曬各六兩黃柏知母各四兩為末以豬脊髓和丸梧子大每百丸空心溫酒下摘玄方治産三五日不下垂死及短小女子交骨不開者用干龜殼一個酥炙頭髮一握燒灰川芎當歸各一兩為末和勻每服七錢水煎服如人行五里許再一服生胎死胎俱下簡誤按龜鱉二甲本經所主大略相似今人有喜用鱉甲惡用龜甲者有喜用龜甲惡用鱉甲者皆一偏之見也二者咸至陰之性鱉甲走肝益腎以除熱龜甲通心入腎以滋陰第鱉甲無毒可多用龜甲非千年自死者則有毒故方書所用曰敗龜板者取其長年則得陰氣多故有益陰之功用耳若今新剖之甲斷乎有毒不宜頻使用者不可不詳辨也妊婦不宜用病人虛而無熱者不宜用凡入藥須研極細不爾留滯腸胃能變癥瘕也真珠寒無毒主手足皮膚逆臚鎮心綿裹塞耳主聾傅面令人潤澤好顏色粉點目中浮翳障膜疏珠稟太陰之精氣而結故中秋無月則蚌無胎其體光明其性堅硬大小無定要以新完未經鎖綴者為上味甘微咸氣寒無毒入手少陰足厥陰經心虛有熱則神氣浮越肝虛應熱則目生浮翳障膜除二經之熱故能鎮心去目中障翳也耳聾本屬腎虛有熱所以主之逆臚者臚脹也胸腹脹滿氣逆以及於手足皮膚皆腫也經云諸濕腫滿屬脾土又云諸腹脹大皆屬於熱此因脾虛有熱兼有積滯所致真珠味甘亦能益脾氣寒能除熱體堅能磨積消滯故主手足皮膚逆臚也古人未發斯義所以方書敘論不詳亦為闕略也珠藏於澤則川自媚況塗面寧不令人潤澤好顏色乎凡小兒驚熱風癇為必須之藥主治參互同丹砂牛黃犀角天竺黃茯神遠志鉤藤鉤琥珀金箔治小兒驚癇風熱大人失志癲狂等證同爐甘石龍腦香白硼砂空青人爪點目能去翳障同鐘乳石象牙末牛黃冰片白殭蠶紅鉛天靈蓋蛀竹屑樺皮灰沒藥明礬治廣瘡結毒及陰蝕瘡有奇效同人中白黃柏青黛硼砂和冰片少許治口疳加入雞內金膩粉治下疳格古論灰塵迷目用大珠挹之則消千金方婦人難産或胞衣不下真珠末一兩酒服立出聖惠方肝虛目暗真珠末一兩白蜜二合鯉魚膽二枚和合銅器煎至減半新綿濾過瓶盛頻點取瘥痘瘡發疔毒方見谷部豌豆下簡誤真珠體最堅硬研如飛面方堪服食不細能傷人臟腑病不由火熱者勿用玳瑁寒無毒主解嶺南百藥毒一名玳瑁疏玳瑁龜類也得水中至陰之氣故氣寒無毒而解一切熱毒其性最靈凡遇飲食有毒則必自搖動然須用生者乃靈死者則不能矣嶺南人善以諸毒藥造成蠱人中之則昏憒悶亂九竅流血則死惟用活玳瑁刺其血飲或生者磨濃汁服之可解日華子主破癥結消癰腫止驚癇陳士良主心風解煩熱行氣血利大小腸以其性稟純陰氣味至寒故治如是等病也又能解痘毒神效主治參互楊氏産乳方解一切蠱毒生玳瑁磨濃汁服一盞即消靈苑方預解痘毒遇時行痘疹服此未發內消已發稀少用生玳瑁生犀角各磨濃汁一合和勻溫服半合日三最良聞人規痘瘡論痘疹黑陷乃心熱血凝也法同上加入豬心血少許紫草汁五匙和勻溫服鴻飛集迎風目淚乃肝腎虛熱也用生玳瑁羚羊角各一兩石燕一雙為末每一錢薄荷湯下日二服簡誤痘瘡虛寒不起發者不宜服桑螵蛸味鹹甘平無毒主傷中疝瘕陰痿益精生子女子血閉腰痛通五淋利小便水道又療男子虛損五臟氣微夢寐失精遺溺久服益氣養神二月三月採蒸之當火炙不爾令人泄疏桑螵蛸桑樹上螳螂子也稟秋金之陰氣兼得桑木之津液本經味鹹氣平別録甘無毒氣薄味厚陰也入足少陰太陽經人以腎為根本男子腎經虛損則五臟氣微或陰痿夢寐失精遺溺鹹味屬水內合於腎腎得之而陰氣生長故能愈諸疾及益精生子也腎與膀胱為表裡腎得所養則膀胱自固氣化則能出故利水道通五淋也女子屬陰肝腎用事疝瘕血閉腰痛皆二經為病咸能益陰入血軟堅是以主之甘能補中故主傷中益氣腎足則水自上升克與心交故能養神也主治參互外臺祕要虛勞盜汗遺精白濁桑螵蛸炙白龍骨等分為細末每服二錢空心鹽湯下寇宗奭方桑螵蛸散治男子房勞小便日數十次如稠米泔心神恍惚瘦瘁食減其藥安神魂定心志治健忘補心氣止小便數用桑螵蛸遠志龍骨菖蒲人參茯神當歸龜甲各如法制各一兩為末臥時人參湯調下二錢千金翼婦人遺尿桑螵蛸酒炒為末白湯服二錢兼治胎前産後遺尿不禁簡誤桑螵蛸氣味雖鹹平走腎利水道然得秋時收斂之氣凡失精遺溺火氣太盛者宜少少用之石決明味鹹平無毒主目障翳痛青盲久服益精輕身凡用以麵裹煨熟磨去粗搗細如飛面方堪入藥一名千里光得龍骨療泄精畏旋覆花疏石決明得水中之陰氣以生故其味鹹氣應寒無毒乃足厥陰經藥也足厥陰開竅於目目得血而能視血虛有熱則青盲赤痛障翳生焉鹹寒入血除熱所以能主諸目疾也鹹寒又能入腎補陰故久服益精輕身也研細水飛主點外障翳主治參互得甘菊花生地黃木賊草穀精草羚羊角人爪蟬蛻空青密蒙花決明子夜明砂治青盲障翳明目集驗方羞明怕日用千里光甘菊花甘草各二錢水煎冷服鴻飛集痘後目翳用石決明火煅研穀精草各等分為細末以豬肝蘸食目疾外他用甚稀故無簡誤文蛤味鹹平無毒主惡瘡蝕五痔咳逆胸痹腰痛脅急鼠瘻大孔出血崩中漏下疏文蛤即花蛤大小背上有斑紋得陰水之氣故其味鹹氣平無毒經曰硬則氣堅咸以軟之文蛤之咸能消散上下結氣故主咳逆胸痹腰痛脅急也惡瘡蝕五痔鼠瘻大孔出血崩中漏下皆血熱為病鹹平入血除熱故主之也更能止煩渴化痰利小便主治參互仲景方傷寒在陽當以汗解反以冷水噀之或灌之其熱被劫不得去更益煩熱皮上粟起欲飲水反不渴者文蛤散主之文蛤五兩為末每服方寸匕沸湯下甚效千金翼疳蝕口鼻數日欲盡文蛤燒灰以蠟豬脂和塗之簡誤病屬邪熱痰結者宜之氣虛有寒者不得用蠡魚味甘寒無毒主濕痹面目浮腫下大水療五痔有瘡者不可食令人瘢白疏蠡魚稟北方玄水之精得中央陰土之氣故其色黑味甘氣寒無毒乃益脾除水之要藥也土虛則水泛濫土堅則水自清凡治浮腫之藥或專於利水或專於補脾其性各自為用惟蠡魚色黑象水能從其類以導橫流之勢味甘土化能補其不足以遂敦阜之性補瀉兼施故主下大水及濕痹面目浮腫有神效也五痔因濕熱所生水去則濕氣自除今世俗小兒痘後鹹食之然而早食多食能令皮膚瘢痕皆黑本草獨云有瘡者食之令人瘢白非也孟詵主下大小便壅塞氣作鱠與腳氣風氣人食良蘇頌主妊娠有水氣並取其除濕下水益脾之功也主治參互同白朮茯苓橘皮薑皮煮食下水腫大效與蒜作鱠食能去濕下水食醫心鏡治十種水氣垂死蠡魚一斤重者煮汁和冬瓜蔥白作羹食靈苑方喉痹將死者以蠡魚膽點入少許即瘥病深者水調灌之諸魚膽皆苦惟此膽甘可食為異耳簡誤蠡魚其功專於去濕下水他用無所長且多食能發痼疾不可不知也鯽魚合蓴作羹主胃弱不下食作鱠主久赤白痢燒灰塗諸瘡或取豬脂煎用又主腸癰疏鯽魚稟土氣以生故其味甘其氣溫無毒是以能入胃治胃弱不下食入大腸治赤白久痢腸癰脾胃主肌肉甘溫能益脾生肌故主諸瘡久不瘥也藏器主虛羸大明主溫中下氣孟詵云調中益五臟表其益脾和胃之功也主治參互百一選方腸風下血用活鯽魚一大尾去腸留鱗入五倍子末填滿泥固煅存性為末酒服一錢一方入白礬末二錢外以棕包更以紙裹煨存性研末每二錢米飲下經驗方膈氣吐食用大鯽魚去腸留鱗切大蒜片填滿腹紙包十重泥固曬半乾炭火煨熟單取肉用和平胃散一兩杵丸梧子大密藏每服三十丸米飲下簡誤鯽魚調胃實腸與病無礙諸魚之中惟此可常食但不宜與沙糖同食生疳蟲同芥菜食成腫疾同豬肝雞肉雉肉鹿肉食生癰疽同麥門冬食害人鱓味甘大溫無毒主補中益血療沈唇疏鱓魚得土中之陽氣以生故其味甘氣大溫甘溫俱足所以能補中益血甘溫能通經脈療風邪故又主沈唇及今人用之以治口眼喎斜也主治參互與黃耆同食能益氣力治火丹赤腫生鱓魚塗之效簡誤性熱而補凡病屬虛熱者不宜食時行病後食之多復過食動風氣兼令人霍亂鯉魚膽味苦寒無毒主目熱赤痛青盲明目久服強悍益志氣疏凡膽皆苦寒走厥陰故鯉魚膽亦主明目及目熱赤痛青盲也肝為將軍之官腎為作強之官二經有熱則虛怯志氣衰苦寒除二經之熱故久服強悍益志氣也鯉魚肉味甘主咳逆上氣黃疸止渴生者主水腫腳滿下氣疏鯉魚稟陰極之氣故其鱗三十六陰極則陽復故素問言魚熱中其氣味雖甘平然多食能令人發風熱也甘可以緩故主咳逆上氣止渴陰中有陽能從其類以導之故能利小便使黃疸水腫腳氣俱消也河間云鯉之治水因其氣以相感者是矣主治參互外臺祕要治水腫用大鯉一尾赤小豆一升水二斗煮二升余濾去滓頓服盡當小利利盡即瘥並治妊娠水腫有神效附鱗主産婦腹痛燒灰酒服亦治血氣雜諸藥用之疏魚鱗得水中之陽氣而鯉魚鱗則又稟陰極生陽之數性能入血散滯入血者陰之用也散滯者陽之用也故主婦人産後腹痛及血氣不和等證主治參互和劑局方烏金散治産後血迷血暈敗血不止淋瀝水斷臍腹疼痛及崩中下血過多不止鯉魚鱗燒血竭百草霜亂髮灰松墨煅酢淬延胡索當歸赤芍藥等分為末每二錢溫酒下外臺祕要古今録驗療魚鯁骨橫喉中六七日不出取鯉魚鱗皮燒作屑以水服之即出未出再服簡誤六陰已極陽氣初生故能發熱動風風熱病者不宜食天行病後下痢及有宿癥者俱不可食不宜合犬肉葵菜食服天門冬硃砂人不可食凡炙鯉魚不可使煙入目損目光三日內必驗也前和劑局方烏金散方內有肉桂當歸延胡索赤芍藥皆行血之藥而其所主病內開載崩中下血過多不止用之則大誤矣慎之慎之
