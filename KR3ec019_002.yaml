body:
  text: 卷二諸病應忌藥總例補氣人參黃耆二術人胞紅鉛溫補人胞紅鉛白膠鹿茸巴戟天人參黃耆二術淫羊藿肉蓯蓉補骨脂當歸狗陰莖菟絲子蛇床子大熱附子肉桂仙茅陽起石烏頭硫黃海狗腎羊肉雀肉天雄葫蘆巴破氣青皮枳實枳殼檳榔厚朴牽牛閉氣銀杏米麵食豬脂油二術黃耆降氣降真香蘇子鬱金枇杷葉橘紅沉香烏藥破血桃仁紅花蘇方木延胡索乾漆五靈脂花蕊石乳香沒藥薑黃三稜蓬荗水蛭虻蟲䗪蟲肉桂桃裊穿山甲騏鱗竭升提發散升麻柴胡川芎紫蘇麻黃乾葛羌活獨活防風白芷生薑細辛荊芥前胡藁本蔥白薄荷辛溫辛熱發散吳茱萸乾薑桂枝麻黃細辛羌活獨活防風藁本川芎白芷蔥白吐瓜蒂梔子豉皂莢藜蘆常山人參蘆蝦汁鹽湯下大黃芒硝巴豆牽牛玄明粉枳實厚朴降泄山梔知母天門冬玄參利水豬苓澤瀉木通瞿麥車前子葶藶滑石海金沙商陸茯苓萹蓄烏桕根皮琥珀芫花甘遂大戟續隨子漢防己郁李仁損津液郁李仁白礬礬紅半夏斂攝白芍藥五味子醋烏梅白梅酸棗仁固澀龍骨牡蠣粟殼訶黎勒益智子山茱萸桑螵蛸蛇床子肉果蓮鬚阿芙蓉金櫻子原蠶蛾消導山楂麥芽草果檳榔三稜蓬荗神麯枳殼枳實緑礬萊蔔子紅曲橘紅砂仁開竅龍腦香麝香蘇合香檀香安息香香燥沉香麝香龍腦香縮砂蜜豆蔻藿香香附丁香烏藥木香辛燥火酒蒜半夏南星二術辛熱乾薑吳茱萸胡椒蒜茴香生薑巴豆龍腦香濕潤地黃當歸肉蓯蓉天門冬知母豬脂油麻仁栝樓仁滯膩豬羊犬肉鵝地黃南面油膩炙煿滑利冬葵子榆皮牛乳椿根白皮柿瓜李桃梨蜜青菜蓴菜酥茄子發濕鱖魚南面苦寒傷胃山梔黃柏黃芩黃連大黃苦參玄參知母蘆薈補命門相火鹿茸巴戟天附子人胞紅鉛白膠肉桂仙茅陽起石膃肭臍淫羊藿補骨脂狗陰莖菟絲子原蠶蛾補腎水苦寒黃柏天門冬玄參知母酸寒白芍藥牛膝烏梅鹹寒童便芒硝玄參秋石生冷菱梨菜李甘甘草飴糖大棗蜜咸食鹽商陸鹼水鹿茸蛤蜊蠣黃蛭續序例下陰陽表裡虛實門陽虛即真氣虛其證惡寒或發熱自汗汗多亡陽陽虛不發熱單惡寒者居多忌破氣降泄利水苦寒又忌辛熱發散青皮枳殼厚朴牽牛檳榔以上破氣大黃石膏山梔知母天門冬生地黃栝樓以上降泄澤瀉木通瞿麥葶藶豬苓滑石以上利水海金沙商陸黃芩黃連黃柏玄參槐花以上苦寒芍藥烏梅醋以上酸斂吳茱萸麻黃羌活獨活前胡防風荊芥以上辛熱發散宜補甘溫熱人參黃耆二術炙甘草當歸白膠淫羊藿人胞紅鉛補骨脂巴戟天桂附子仙茅鹿茸大茴香陽起石羊肉雀肉陰虛即精血虛其證為咳嗽多痰吐血咯血嗽血鼻衄齒衄盜汗自汗發熱寒熱潮熱骨乏無力不眠氣息腰背痛忌補氣復忌破氣燥熱辛溫又忌大寒大苦傷胃並升提發散利水人參黃耆二術人胞以上補氣南星半夏附子官桂桂枝仙茅鹿茸乾薑硫黃陽起石海狗腎丁香胡椒烏頭火酒吳茱萸烏藥生薑以上燥熱辛溫山梔黃芩黃連大黃芒硝玄明粉以上大寒大苦傷胃麻黃升麻柴胡羌活獨活藁本川芎防風以上升提發散破氣利水藥見前宜生精補血兼清虛熱斂攝酸寒甘寒甘平鹹寒略兼苦寒地黃柏子仁人乳沙苑蒺藜枸杞子牛膝麋角膠阿膠沙參酸棗仁白芍藥五味子山茱萸石斛麥門冬薯蕷牡丹皮續斷地骨皮車前子溺白垽鱉甲黃柏知母青蒿表虛其證自汗惡風灑淅寒熱喜就溫暖脈浮無力忌破氣升發辛熱麻黃升麻防風柴胡羌活獨活前胡乾葛紫蘇薄荷白芷生薑荊芥以上升發吳茱萸桂枝表虛而中寒者不忌乾薑以上辛熱破氣藥見前宜補斂益氣實表甘酸人參黃耆白芍藥甘草桂枝有熱者勿用五味子裡虛其證洞泄或完穀不化心腹痛按之即止或腹脹或傷寒下後痞滿忌破氣下苦寒大黃芒硝巴豆玄明粉牽牛以上下黃芩黃連山梔知母黃柏天門冬茗以上苦寒破氣藥見前宜溫補甘佐以辛熱人參炙甘草術大棗糯米肉桂附子有熱者勿用乾薑陽實即表邪熱盛其證頭痛發熱遍身痛無汗忌補斂下大熱黃耆人參二術桂枝芍藥五味子米麵食豬羊犬肉醋以上補斂附子胡椒乾薑肉桂蒜吳茱萸以上大熱下藥見前宜辛寒發散天寒略加辛熱辛溫佐之石膏知母葛根麥門冬前胡柴胡黃芩紫蘇薄荷升麻防風蔥白荊芥羌活麻黃冬月可用春夏忌之陰實即裡實外感證屬邪熱內結者其證胸腹硬痛手不可近大便七八日不行或挾熱下痢忌辛溫發散補斂諸藥俱見前宜下苦寒鹹寒甘辛大黃厚朴枳實滑石山梔黃芩黃連藍茵陳芒硝桃仁陽厥即熱厥其證四肢厥逆身熱面赤唇燥大渴口乾舌苦目閉或不閉小便赤澀短少大便燥結不省人事忌升發補斂燥熱辛溫諸藥俱見前宜下清熱甘寒苦寒鹹寒大黃芒硝石膏黃芩黃連山梔知母童便如挾虛有痰者宜麥門冬竹瀝蘆根汁梨汁牛黃童便如婦人熱入血室因而厥者藥中以童便為君加赤芍藥生地黃牛膝牡丹皮桃仁甚者大便結燥加芒硝大黃下之通即止勿盡劑陰厥即寒厥其證四肢厥逆身冷面青蜷臥手指爪青黯腹痛大便溏或完穀不化小便自利不渴不省人事忌下破氣苦寒鹹寒酸寒食鹽太陰玄精石童便以上鹹寒芍藥醋以上酸寒下破氣苦寒諸藥俱見前宜補氣溫中甘溫辛熱人參乾薑附子桂吳茱萸上盛下虛屬陽盛陰虛忌升散下助陽補氣復忌破氣燥熱辛諸藥俱見陰虛條下宜降益陰甘寒酸寒佐以鹹寒苦寒蘇子枇杷葉麥門冬枸杞子生地沙參白芍藥山茱萸五味子牛膝童便玄參黃柏天門冬五臟六腑虛實門心虛八證忌升發破氣苦寒辛燥大熱諸藥俱見前宜補血甘溫酸斂佐以鹹寒鎮墜生地黃龍眼肉人參炙甘草石斛酸棗仁五味子柏子仁丹參茯神遠志鹿茸炒鹽丹砂驚邪屬心氣虛忌升破氣諸藥俱見前宜降清熱豁痰平經曰驚者平之犀角丹砂琥珀真珠龍齒金箔牛黃代赭石羚羊角麥門冬石斛桔梗膽星麝香竹瀝天竺黃遠志鬼臼癲癇屬心氣虛有熱忌補斂升諸藥俱見前宜降清熱豁痰諸藥見驚邪條加貝母丹參鉤藤鉤鬱金鉛丹神水白礬不得眠屬心血虛有熱忌升辛燥熱諸藥俱見前宜斂養陰血清熱酸棗仁五味子龍眼內丹參芍藥人參石斛竹葉生地黃茯神遠志黃連玄參麥門冬辰砂六一散竹茹木通生甘草心煩屬心家有熱忌升破氣燥熱諸藥俱見前宜清熱生津液甘寒甘平辛酸參用不得眠中諸藥竹葉麥門冬生甘草石斛丹參龍眼肉生地黃玄參沙參茯神遠志知母酸棗仁怔忡屬心血不足忌宜俱同心虛心淡淡動忌宜俱同心虛盜汗屬心血虛汗者心之液也忌破氣辛散燥熱諸藥俱見前宜補斂清虛熱甘酸甘平甘寒苦寒鹹寒生地黃當歸茯神龍眼肉黃耆五味子白芍藥酸棗仁黃芩黃柏黃連牡蠣伏梁屬心經氣血虛以致邪留下去忌破血汗下三稜蓬荗薑黃虻蟲䗪蟲紅藍花水蛭桃仁以上破血汗下諸藥俱見前宜活血涼血散熱通結辛鹹鬱金五靈脂乳香沒藥當歸延胡索赤芍藥遠志菖蒲茯神牡蠣參用東垣杖梁丸治之肝虛十證忌收斂破氣升散苦寒下諸藥俱見前宜辛散甘緩當歸陳皮生薑地黃甘菊甘草胡麻穀精草決明子刺蒺藜羊牛兔肝因鬱而虛者加細辛木香縮砂蜜沉木香川芎香附胸脅痛屬肝血虛肝氣實因而上逆忌斂補氣破血諸藥俱見前宜降氣養血和肝辛苦平緩蘇子鬱金番降香川通草當歸生地黃橘皮甘草白芍藥續斷鹿角膠轉筋屬血虛忌下復忌升燥熱閉氣苦寒破氣二術黃耆銀杏豬脂羊肉面以上閉氣余忌藥俱見前宜酸辛甘平木瓜牛膝當歸身白芍藥石斛續斷炙甘草陳皮縮砂蜜目光短屬肝血虛及腎水真陰不足忌破氣升燥熱諸藥俱見前宜補肝兼滋腎甘溫益血甘寒除熱甘枸杞生地黃甘菊花沙苑蒺藜穀精草五味子決明子天門冬麥門冬目昏屬肝血虛有熱兼腎水真陰不足忌同前目光短宜同目光短加黃柏羚羊角目翳屬肝熱兼腎水不足忌破氣升燥熱苦寒諸藥俱見前宜補肝血除熱退翳甘菊花生地黃決明子石決明沙苑蒺藜女貞實青羊膽羚羊角犀角空青黃連天龍伏翼糞木賊穀精草密蒙花人爪蟬蛻瑪瑙石蟹珊瑚真珠琥珀馬目毒公貝子亡血過多角弓反張屬肝血虛有熱忌風燥升破氣下諸藥俱見前宜補血清熱甘寒甘溫酸寒鹹寒辛潤當歸生地黃白芍藥炙甘草牛膝麥門冬牡丹皮甘菊花童便有汗加人參黃耆五味子酸棗仁少腹連陰作痛按之則止屬足厥陰經血虛忌同角弓反張宜同角弓反張加白膠偏頭痛屬血虛肝家有熱不急治久之必損目忌升燥熱苦寒諸藥俱見前宜養血清虛熱甘寒酸寒辛寒生地黃天門冬甘菊花白芍藥當歸川芎烏梅炙甘草土茯苓金銀藤黑豆有實火者可加黃芩酒炒大黃酒蒸芎藭雨前茶石膏目黑黯眩暈屬血虛兼腎水真陰不足忌破氣燥熱辛溫諸藥俱見前宜養血補肝清熱甘寒甘平酸寒苦寒生地黃枸杞子甘菊花當歸薯蕷五味子白蒺藜甘草山茱萸白芍藥天門冬黃柏肥氣屬氣血兩虛肝氣不和逆氣與瘀血相併而成忌破氣下苦寒諸藥俱見前宜和肝散結氣兼行氣血凝滯甘溫甘平川芎當歸沉香乾薑肉桂橘皮紅花鬱金延胡索香附山楂赤芍藥紅曲砂仁參用東垣肥氣丸治之腹虛十二證忌下降泄破氣苦寒諸藥俱見前宜甘溫佐以辛香酸平人參大棗黃耆薯蕷炙甘草蓮肉白茯苓白扁豆縮砂蜜橘紅白豆蔻藿香木瓜白芍藥酸棗仁飲食勞倦傷脾發熱忌破氣發散下苦寒諸藥俱見前宜補中益氣甘溫升酸人參黃耆術炙甘草大棗柴胡升麻石斛麥門冬橘紅白芍藥酸棗仁飲食不消化屬脾氣虛忌破氣消導克伐苦寒復忌燥草果枳實檳榔蓬荗三稜緑礬以上消導余忌藥見前宜益真氣香甘溫甘辛同脾虛加穀芽麥芽肉豆蔻傷食必惡食忌潤濕苦寒當歸肉蓯蓉鎖陽天門冬地黃知母玄參豬脂茄子酒糟麵食以上濕潤苦寒諸藥見前宜健脾消導甘溫辛香橘皮薯蕷蓮肉白扁豆白芍藥白茯苓草果山楂如腹痛大便不通宜下之枳實檳榔厚朴大黃元氣虛人不可下宜加參朮傷肉食輕者宜蒜山楂兼黃連重者宜礬紅棗肉為丸服二錢不可過終身忌蕎麥傷麵食宜炒萊蔔子停飲為恣飲湯水或冷茶冷酒所致忌下酸斂濕潤滯膩諸藥俱見前加栝樓根及仁桃仁郁李仁宜健脾利水淡滲兼辛散人參白朮半夏茯苓橘皮澤瀉豬苓木通桑白皮旋覆花紫蘇白豆蔻水腫屬脾氣虛忌破氣下泄濕潤咸苦寒食鹽商陸以上咸余忌藥俱見前宜補脾益氣燥濕利水辛香甘溫佐以淡滲人參二術橘皮薯蕷木瓜薏苡仁桑白皮茯苓赤小豆香薷烏蠡魚車前子豬苓澤瀉姜皮烏芋縮砂蜜通草脾虛中滿屬脾氣虛兼脾陰虛忌破氣下消導利水甘飴糖大棗蜜甘草以上甘余忌藥俱見前晝劇夜靜屬脾氣虛宜補氣健脾甘溫淡滲佐以辛香人參二術白芍藥桑白皮茯苓車前子橘紅姜皮藿香縮砂蜜無熱證者佐以桂夜劇晝靜屬脾陰虛宜補脾陰兼制肝清熱甘平酸寒淡滲酸棗仁白芍藥石斛白扁豆蓮肉橘皮山藥蘇子五味子木瓜桑白皮車前子茯苓噎膈屬氣血兩虛由於血液衰少而非痰氣逆氣致忌破氣升復忌下消導燥苦寒辛熱諸藥俱見前宜降清熱潤燥甘溫甘平以益血略佐辛香以順氣蘇子橘紅枇杷葉人參白芍藥酸棗仁龍眼肉人乳牛乳蔗漿梨汁韭汁蘆根汁薑汁白豆蔻仁脾泄屬氣虛忌破氣下消導苦寒諸藥俱見前宜溫中補氣升清甘溫甘平佐以辛香人參術炙甘草薯蕷蓮肉白扁豆茯苓車前子白芍藥升麻柴胡肉豆蔻縮砂蜜橘皮木香丁香藿香白萊蔔兼有濕及痰經年不愈糞色白