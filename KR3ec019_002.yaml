星半夏薑汁類中風口眼歪斜語言謇澀半身不遂口噤不言四肢不舉痰涎壅盛昏眊不省人事忌汗吐下大忌破氣溫熱苦寒及一切治風濕辛燥發散並開竅走真氣行血諸藥慎勿犯之犯之則輕必重重必斃麝香蘇合香檀香龍腦香安息香以上開竅走真氣余忌藥俱見前宜滋補陽虛者補氣陰虛者補血陰陽兩虛則氣血雙補兼宜清熱降氣豁痰及保脾胃天門冬脾胃薄弱者勿多用麥門冬荊瀝蘇子栝樓根貝母橘紅枇杷葉甘草竹瀝童便霞天膏梨汁黃柏次益血於前藥中加胡麻仁石斛牛膝生地黃五味子甘菊花枸杞子何首烏薯蕷菟絲子白芍藥丹參山茱萸白蒺藜酸棗仁柏子仁車前子竹葉羚羊角鱉甲木瓜青蒿遠志栝樓仁沙參巴戟天茯苓茯神如便祕加肉蓯蓉當歸倍麻仁如兼氣虛加人參黃耆有肺熱者勿入人參感冒風寒俗名傷風其證或頭疼身熱輕者則否鼻必塞兼流清涕必惡風寒或聲重或聲啞甚者痰壅氣喘咳嗽忌補氣酸斂閉氣諸藥俱見前宜發散辛甘溫芎藭細辛藁本防風甘草荊芥白芷前胡桑白皮桔梗紫蘇薄荷杏仁石膏傷風熱忌同感冒風寒宜辛寒甘寒發散石膏知母甘草竹葉麥門冬前胡桔梗薄荷葛根桑白皮久而不愈者屬虛陽虛者加人參黃耆陰虛者加五味子地黃倍門冬白芍藥寒諸病上下所出水液澄徹清冷癥瘕㿗疝堅痞腹滿急痛下利清白食已不飢吐利腥穢屈伸不便厥逆禁固皆屬於寒凡中寒必本於陽虛忌破氣苦寒下甘寒辛寒諸藥俱見前宜補氣散寒辛甘溫熱輕者解表重者溫補桂枝乾薑麻黃人參附子黃耆傷寒冬月即病宜從仲景法傷寒古今時地不同因之六經治法宜異夫傷寒者大病也時者聖人所不能違者也以關乎死生之大病而藥不從時顧不殆哉仲景醫門之聖也其立法造論後之明師如華他孫思邈輩莫不宗之漢末去古未遠風景猶厚形多壯偉氣尚敦龐其藥大都為北方感寒即病而設況南北地殊厚薄不侔故其意可師也其法不可改也循至今時千有餘年風氣澆矣人物脆矣況在荊揚交廣梁益之地與北土全別故其藥則有時而可改非違仲景也實師其意變而通之以從時也如是則法不終窮矣故作斯議條列其方稍為損益以從時地俾後之醫師知所適從庶幾患斯疾者可免於夭枉爾辨驗外感真僞法凡外感必頭疼其疼也不間晝夜探其舌本必從喉嚨內幹出於外多兼煩躁不煩躁者即輕證也不頭疼而發熱不發熱而頭疼頭雖疼而有時暫止口雖干而舌本不燥骨雖疼而頭不疼雖渴而不欲引飲至夜或偶得寐遇食不好亦不惡居處雖若尪怯而神氣安靜凡若此者皆非傷寒也三陽治法總要太陽病其證發熱惡寒惡風頭痛項強腰脊強遍身骨痛脈雖浮洪而不數多不傳經煩躁脈急者是欲傳經宜先發汗以解表邪其藥以羌活湯為主羌活三錢前胡二錢甘草八分葛根二錢生薑三片棗二枚杏仁九粒去皮尖研爛水煎服秋深冬月應用此方亦可量加紫蘇蔥白如冬月天氣嚴寒感邪即病服此方不得汗本方加麻黃一錢生薑四片共前七片得汗勿再服如病人自覺煩躁喜就清涼不喜就熱兼口渴即欲傳入陽明也若外證頭疼遍身骨疼不解或帶口渴鼻乾目疼不得臥即系太陽陽明證羌活湯中加石膏知母麥冬大劑與之得汗即解如自汗煩躁頭疼遍身骨疼不解者羌活一錢桂枝七分石膏一兩二錢麥冬六錢知母三錢竹葉一百二十片白芍藥二錢甘草八分如冬月即病太陽證惡寒畏風頭疼遍身骨疼自汗不渴宜用桂枝八分芍藥二錢甘草一錢大棗二枚生薑一片太陽病不解熱結膀胱其人如狂血自下下之愈其外證不解者不可下當先解表表證罷少腹急結者乃可下之桃仁承氣湯無蓄血證大承氣湯正陽陽明病正陽陽明者胃家實熱是也其證不大便自汗潮熱口渴咽乾鼻乾嘔或乾嘔目眴眴不得眠畏人聲畏木聲畏火不惡寒反惡熱或先惡寒不久旋發熱甚則譫語狂亂循衣摸床脈洪大而長宜急解其表用竹葉石膏湯大劑與之不嘔無汗與葛根湯亦須大劑若表證已罷脈緩小便利是病解矣若表證罷後邪結於裡大便閉小便短赤宜用調胃承氣湯或小承氣湯下之下後按其腹中不作痛而和病即已解如作痛是燥糞未盡也再用前藥下之以腹中和二便通利為度陽明病不能食若其人本虛勿輕議下陽明病頭眩咳而咽痛者用葛根甘草桔梗麥冬四味濃煎數數與之陽明病無汗小便不利心中懊憹者當發黃急用梔子麥冬淡豆豉大劑濃煎與之如已見身黃急加茵陳為君主之陽明病衄血此緣失於發汗宜用荊芥二錢葛根三錢麥門冬五錢牡丹皮一錢五分蒲黃二錢茅根二兩側柏葉二錢生地黃三錢濃煎與之兼飲童便陽明病心下硬滿者此邪未入於腹中慎勿下之用竹葉石膏湯加栝樓一個搗碎桔梗二錢黃連一錢陽明病邪結於裡汗出身重短氣腹滿而喘潮熱手足濈然汗出者此大便已硬也六七日以來宜下之用小承氣湯不行換大承氣湯勿大其劑若大便不硬者慎勿輕下陽明病發汗不解腹滿急者亟下之傷寒六七日目中不了了睛不和無表證大便難宜承氣湯下之陽明病下之早外有熱手足溫不結胸心中懊憹不能食但頭汗出梔子豉湯主之陽明病發潮熱大便溏胸滿不去者與小柴胡湯去人參加栝樓黃連陽明病自汗出或發汗後小便利津液內竭大便雖硬不可攻之須俟其自大便或用蜜導膽導法通之大下後六七日不大便煩不解腹滿痛本有宿食宜再用承氣湯下之食谷欲嘔屬陽明非少陽也胸中煩熱者竹茹湯主之竹茹三錢麥門冬五錢枇杷葉三大片蘆根三兩內無熱證者小便利口不渴此為陽明虛也吳茱萸湯主之吳茱萸二錢人參三錢生薑一錢五分大棗三枚水煎日三服凡陽明病多汗津液外出胃中燥大便必硬硬則譫語以小承氣湯下之若一服譫語止者勿再服陽明病譫語發潮熱脈滑而數者小承氣湯主之服藥後腹中轉氣者更與一服若不轉氣者勿更與之若服藥後次日不大便脈反微澀者裡虛也為難治勿復議下陽明病下血譫語者此為熱入血室汗止在頭用荊芥三錢葛根三錢黃芩一錢五分麥冬五錢牡丹皮一錢五分生蒲黃二錢濃煎以童便兌飲之陽明病脈浮緊咽燥口苦腹滿而喘發熱汗出惡熱身重若下之則胃中空虛客氣動膈心中懊憹舌上有苔者梔子豉湯主之若渴欲飲水舌燥者白虎湯加人參主之若脈浮發熱口渴小便不利者豬苓湯主之陽明病脅熱下利者宜六一散心下痞者以黃連栝樓湯調服之脈浮遲表熱裡寒下利清穀者四逆湯主之附子乾薑甘草趺陽脈浮而澀小便數大便硬其脾為約麻子仁丸主之麻仁十三兩芍藥四兩枳實四兩大黃八兩厚朴三兩杏仁六兩蜜丸如梧子大每用十丸日三服陽明實則譫語虛則鄭聲鄭聲者重語也直視譫語喘滿者死下利者亦死發汗多若重發其汗譫語脈短者死脈和者不死若下後不解不大便五六日或至十餘日日晡時發潮熱不惡寒獨語如見鬼狀若劇者發則不識人循衣妄撮惕而不安微喘直視脈弦者生澀者死澀者陽證見陰脈也微者但發熱譫語者大承氣湯下之利勿再服陽明病發狂棄衣而走登高而歌此陽明實也以承氣湯亟下之如便不結者大劑白虎湯灌之石膏四兩麥冬二兩知母一兩五錢加大青一兩甘草七錢太陽陽明病脅熱下利者宜六一散以黃連煎湯調服之太陽陽明並病六七日表證仍在其人發狂者以熱在下焦少腹當硬滿小便自利下其血乃愈當用桃仁承氣湯又二陽並病太陽證罷潮熱汗出大便難譫語者宜大承氣湯少陽病其證口苦咽乾目眩往來寒熱胸脅痛胸滿或痛耳聾脈法弦細頭痛發熱者屬少陽少陽不可發汗發汗則譫語胃和者當自愈不和者則煩而悸傷寒三日少陽脈小者欲已也凡太陽病不解傳入少陽者脅下硬滿乾嘔不能食往來寒熱未經吐下脈沉緊者與小柴胡湯柴胡二錢四分人參九分黃芩九分甘草九分半夏一錢五分生薑九分大棗二枚水煎溫服日三加減法若胸中煩而不嘔去半夏人參加栝樓實一枚若心下痞硬去大棗加牡蠣二錢半若渴者去半夏加人參栝樓根若腹中痛者去黃芩加芍藥三錢若心下悸小便不利者去黃芩加茯苓二錢若不渴外有微熱者去人參加桂二錢夏勿用溫服取微汗愈若咳者去人參大棗加五味子一錢少佐以乾薑陽明少陽並病必下利脈滑而數有宿食也當承氣湯下之若吐下發汗溫針譫語柴胡湯證罷此為壞病知犯何逆以法治之三陽合痛脈大上關上但欲睡眠目合則汗藥用百合一兩麥門冬五錢炙甘草一錢知母二錢竹葉五十片栝樓根二錢鱉甲如法三錢白芍藥二錢三陽合病腹滿身重譫語遺尿白虎湯加百合主之傷寒六七日無大熱其人煩躁者此以陽去入陰故也傷寒三日三陽為盡三陰當受邪其人反能食而不嘔此為三陰不受邪也三陰治法總要三陰病其證有二一者病發於三陽不時解表以致邪熱傳入於裡雖云陰分病屬於熱糞結宜下腹滿不可按宜下有燥糞協熱下利宜下腹痛下利宜芍藥黃芩炙甘草以和之如便膿血即加滑石黃連佐以升麻乾葛如邪雖入里糞猶未結宜清其熱渴者用白虎湯竹葉石膏湯不渴或心下痞者宜黃連黃芩芍藥枳殼麥冬栝樓輩以清之或邪未結於下焦少腹不堅痛而誤用芒硝以伐真陰洞泄不已元氣將脫宜用人參白朮炙甘草大棗乾薑芍藥大劑與之不止佐以升提升麻葛根柴胡之類若從無陽邪表證從不頭疼發熱寒邪直中陰經此必元氣素虛之人或在極北高寒之地始有是證法宜溫補以接其陽附子人參乾薑官桂大劑與之陽回寒退即以平補之劑調之勿過用附桂以防其毒三陰各經見證悉從仲景傷寒論法治之如少陰咽痛咽中生瘡聲不出用苦酒湯到咽即效故知古人立法非今人所及也春溫夏熱病大法冬傷於寒至春變為溫病大都頭疼發熱或渴或不渴三陽證俱然亦間有先微寒後即發熱者大抵發熱其常也藥用辛溫佐以辛寒以解表邪太陽宜羌活湯陽明宜白虎湯無汗不嘔者間用葛根湯少陽往來寒熱等證不可汗吐下宜和解小柴胡湯渴者去半夏加栝樓根耳聾熱盛去人參加麥冬知母栝樓根渴亦加之至夏變為熱病其表證大約與春溫同但熱比於溫則邪氣更烈耳解表用白虎湯竹葉石膏湯有太陽證則加羌活有少陽證則加柴胡黃芩如發斑白虎湯竹葉石膏湯加玄參梔子桔梗鼠黏子連翹大青小青青黛大劑與之二證若大便祕宜按之其邪已結於內便硬宜察邪結中焦小承氣湯調胃承氣湯下之邪結下焦少腹堅痛始用大承氣湯下之傷寒溫疫其不可治及難治者皆屬下元虛傷寒溫疫三陽證中往往多帶陽明者以手陽明經屬大腸與肺為表裡同開竅於鼻足陽明經屬胃與脾為表裡同開竅於口凡邪氣之入必從口鼻故兼陽明證者獨多邪在三陽法宜速逐遲則胃爛發斑或傳入於裡則屬三陰邪熱熾者令陰水枯竭於法不治矣此治之後時之過也傷寒陰陽易之為病其人身體重少氣少腹裡急或引陰中拘攣熱上衝胸頭重不欲舉眼中生花膝脛拘急者燒褌散主之取婦人中褌近陰處剪燒灰以水和服方寸匕日三小便即利陰頭微腫則愈婦人病取男子褌襠燒灰大病瘥後勞復者枳實梔子湯主之枳實三枚梔子十四枚豉一升綿裹以清漿水七升空煮取四升納枳實梔子煮取二升下豉更煮五六沸去滓溫分再服覆令微似汗若有宿食者加大黃如博棋子大五六枚傷寒瘥已後更發熱者小柴胡湯主之脈浮者以汗解之脈沉實者以下解之百合病者百脈一宗悉致其病也其證神思常默然飲食不美亦不惡如寒無寒如熱無熱口苦小便赤百合地黃湯主之汗後者百合知母湯下後者滑石代赭湯吐後者百合雞子湯近代醫師魯莽既不明傷寒治法又不識雜證類傷寒往往妄投汗下之藥以致虛人元氣變證叢生元氣本虛之人未有不因之而斃者矣戒之哉汗下之藥焉可嘗試也時氣傷寒除陰證不可服苦參一兩水酒各一碗煎八分重者水醋各半服之一汗而愈不論傷寒久近立效本草云天行尤良暑諸病喘嘔暴注下迫霍亂轉筋身熱瞀郁小便濁赤皆屬於暑忌破氣升復忌下濕潤辛溫辛燥熱發散閉氣諸藥俱見前宜清暑益氣健脾甘寒甘溫辛寒酸寒苦寒黃連香薷葛根石膏知母甘草人參黃耆白朮白扁豆神麯橘皮白茯苓木瓜麥門冬五味子白芍藥白梅烏梅大約用清暑益氣湯香薷飲生脈散凡病暑之人其氣必虛傷氣無氣以動故當補氣為本惟肺熱多火者忌人參術中暑猝昏暈急以童便灌入即省忌宜俱同暑又方用絲瓜葉一片白鹽梅肉一枚並取核中仁共研如泥新汲水調灌立瘥兼治中暑霍亂有神太陽病中暍忌同暑宜人參白虎湯有肺熱火病人不能服參者用竹葉石膏湯脾胃作瀉者水調六一散霍亂見胃虛條內忌宜俱同疰夏由於脾胃薄弱胃家有濕熱及留飲所致忌同前宜益氣健脾酸寒苦寒淡滲人參白朮半夏橘皮白茯苓白扁豆白芍藥木瓜澤瀉兼服生脈散濕諸痙強直積飲痞膈中滿霍亂吐下體重胕腫肉如泥按之不起皆屬於濕經曰地之濕氣感則害人皮肉筋脈故其病筋骨疼痛腰重痛不可轉側身重四肢不利濕在上病嘔吐頭重胸滿濕在中病腹脹中滿泄瀉濕在下病足脛跗腫腳氣臁瘡久不愈忌濕潤甘咸諸藥俱見前宜散滲泄燥辛苦木瓜薏苡仁術石斛萆薢石菖蒲茯苓佐以防風葛根寒濕加半夏五加皮風濕加獨活濕熱加黃柏車前子木通甚者加漢防己腳氣由於濕熱忌溫燥濕熱補氣復忌破氣升諸藥俱見前宜清熱除濕利小便甘平酸寒苦寒辛溫淡滲黃柏石斛麥門冬木瓜石菖蒲車前子茯苓木通澤瀉萆薢防己燥諸澀枯涸幹徑破揭皆屬於燥角弓反張筋攣急不舒舌強不能言二便閉澀口渴口乾舌苦皮膚皴揭毛髮脆折津液不生血枯胃槁以致飲食不化噎膈吐食忌升散破氣下辛燥大熱溫諸藥俱見前宜潤益血辛甘寒酸寒鹹寒有熱證者宜兼清熱麥門冬當歸地黃肉蓯蓉酥人乳牛乳蜜胡桃甘菊花麻仁胡麻柏子仁人參松實天門冬五味子酸棗仁白芍藥蔗漿蘆根汁童便梨汁韭汁佐以薑汁火諸熱瞀瘛暴瘖冒昧躁擾狂越罵詈驚駭胕腫疼酸氣逆上衝禁栗如喪神守唼嘔瘡瘍喉痹耳鳴及聾嘔湧溢食不下目昧不明暴注瞤瘈暴病暴死皆屬於火忌補斂升發閉氣辛燥溫熱諸藥俱見前宜降折下鹹寒苦寒辛寒甘寒大黃童便芒硝黃芩黃連黃柏連翹石膏山梔玄參生甘草知母天門冬麥門冬生地黃藍汁虛者宜甘寒鹹寒以滋水不宜用苦寒傷胃猝眩僕九竅流血多不治忌同火宜服童便鹽湯竹瀝藍汁梨生犀角汁猝心痛忌同火宜服山梔白芍藥延胡索生甘草鹽湯蘇子目暴赤腫痛甚見肝實條內忌宜俱同二便忽閉以利小便為先忌同火宜降潤苦寒甘寒辛寒利竅大黃蘇子生蜜麻仁桃仁石膏貝母天門冬麥門冬黃芩山梔滑石澤瀉豬苓車前子木通海金砂頭面赤腫忌同火宜清熱解毒發散苦寒辛寒甘寒鹹寒甘菊花鼠黏子連翹荊芥薄荷蟬蛻大黃玄參石膏知母竹葉生甘草童溺忽大渴思冰水忌同火宜潤生津液辛寒甘寒鹹寒石膏知母玄參麥門冬竹葉栝樓根五味子梨汁蔗漿童便涼水冰口乾舌苦忌宜俱同火暴喑忌同火宜降氣發聲音苦甘寒辛涼鹹寒蘇子枇杷葉貝母桔梗百部竹瀝梨汁天門冬麥門冬甘草薄荷玄參桑白皮童便暴注忌同火宜利水苦寒酸寒茯苓黃連黃芩白芍藥生甘草葛根滑石木通虛者加人參蓮肉白扁豆躁擾狂越罵詈驚駭忌同火宜清鎮苦寒辛寒鹹寒丹砂牛黃黃連黃芩山梔滑石知母童便大便閉者加大黃下之不行加芒硝禁栗如喪神守忌同火宜同躁擾狂越氣逆衝上忌同火宜降氣酸斂甘寒苦寒鹹寒蘇子枇杷葉橘紅五味子番降香山茱萸白芍藥麥門冬石斛黃柏牛膝桑白皮童溺瞤瘛瞀瘛忌同火宜清熱和肝酸寒苦寒辛寒甘寒白芍藥生甘草竹葉玄參黃連黃柏生地黃甘菊花麥門冬知母石膏雜證門瘧經曰夏傷於暑秋必痎瘧其證大都多熱多寒或熱多寒少或寒多熱少或單熱不寒或單寒不熱或先寒後熱或先熱後寒或有汗無汗或汗少汗多或自汗盜汗或頭疼骨痛或大渴引飲口苦舌乾或嘔吐不思食或煩躁不得眠或大便燥結或瀉利或連發或間發或三日發或發於陽或發於陰要皆中氣不足脾胃虛弱暑邪乘虛客之而作雖隨經隨證投藥解散必先清暑益氣調理脾胃為主有食者兼消導奪食有風兼散風有老痰伏飲者兼豁痰逐飲感瘴癘者兼消瘴癘汗多者固表無汗者解表泄利者升發兼利小便便燥者兼益陰潤燥病有陰陽藥分氣血證有緩急治因先後人有虛實法異攻補久而不解必屬於虛氣虛者補氣血虛者補血兩虛者氣血兼補非大補真氣大健脾胃不得瘳也忌破氣下吐諸藥俱見前瘧必由於中氣虛破氣則傷中氣邪不得解甚則中滿不思食作泄惡寒口乾惟傷食宜消不同此法誤下則邪氣陷於內變為滯下或腹滿腫脹嘔惡不思食凡屬破氣下泄藥切戒勿施宜清暑益氣健脾開胃兼消痰宜分臟腑手足六經所見證施治先清暑熱多者宜服白虎湯加減硬石膏自一兩至四兩知母自四錢至二兩四錢竹葉自一百片至四百片麥門冬自八錢至三兩二錢粳米自一小撮至二大撮病人素虛或作勞者加人參自三錢至一兩有痰加廣橘紅三錢竹瀝一杯大渴者加栝樓根三錢至六錢不渴者用清暑益氣湯兼飲食停滯者加枳實青皮草果一二劑食消即止勿多服多服則損中氣其藥俱宜黃昏煎以井水澄冷須露一宿五更進溫服蓋瘧乃暑邪為病暑得露則散也足太陽經屬膀胱其證令人腰痛頭痛頭重寒從背起先寒後熱熇熇暍暍然熱止汗出難已或遍身骨痛小便短赤羌活一錢至三四錢廣陳皮去白二錢五分黃芩二錢前胡二錢甘草炙五分豬苓一錢知母二錢五分若口渴者即兼陽明宜加石膏麥門冬倍知母渴而汗少或無汗並加葛根若涉深秋或入冬無汗宜多加姜皮因虛而無汗或汗少者加人參三五錢麥門冬四五錢佐以姜皮二三錢露一宿發日五更服因虛汗多者加黃耆三四錢桂枝七八分汗止即去桂枝不可多服若病人素有熱者勿服桂枝以芍藥五味子代之若發於陰並加當歸小便短澀或赤者與六一散二三服有濕者以豬苓茯苓代滑石下午服理脾健胃藥橘紅二錢五分白豆蔻五分白茯苓三錢山楂三錢麥芽炒三錢藿香一錢人參三錢白朮二錢白芍藥三錢白扁豆三錢有肺火者去人參白朮加麥門冬五錢石斛三錢烏梅肉一枚停食者必惡食加山楂傷肉食者加黃連紅曲傷穀食者加枳實草果各七分傷麵食者加炒萊蔔子食消即已不可多服多服則損中氣胃家素有濕痰者其證不渴寒多方可用半夏橘紅二術大劑與之嘔甚者兼用姜皮足陽明經屬胃其證發熱頭疼鼻乾渴欲引飲目眴眴不得眠甚則煩躁畏火光人聲木聲宜服大劑竹葉石膏湯無汗或汗少不嘔者可加乾葛二三錢病人虛而作勞者加人參汗多加白朮痰多加貝母橘紅得汗即解寒熱俱甚渴甚汗多寒時指爪皆紫黯者加桂枝七八分久而不解屬氣虛用人參兩許姜皮兩許煎成露一宿五更溫服下午服理脾健胃藥如前方加減亦如之足少陽經屬膽其證往來寒熱口苦耳聾胸脅痛或嘔宜服小柴胡湯渴者去半夏加石膏麥門冬肺家有熱者去人參加知母倍門冬有痰不渴者本方加貝母三錢至八錢朮茯苓各三錢姜皮一錢至三四錢病人陰虛而有熱者雖嘔吐忌用半夏生薑誤投則損人津液令人聲啞宜用竹茹橘皮麥門冬白茯苓烏梅以代之以上三陽經瘧邪客之者其證多熱多渴亦易得汗藥宜大劑急逐暑邪毋得遲留則病易愈繼以理脾開胃大補真氣蔑不瘳矣邪在三陽藥宜辛寒如石膏知母柴胡甘寒如葛根麥門冬竹葉粳米苦寒如黃芩之屬為君乃可以散暑邪除熱渴墜頭痛兼寒甚者則間用辛溫如姜皮桂枝以為嚮導以伏其邪則病易退凡寒甚者病因於虛或作勞者亦因於虛皆宜甘溫以人參黃耆術為君佐以辛甘如桂枝姜皮之屬脾胃虛弱飲食不消者則補之以參術佐以消導如白豆蔻麥芽砂仁草豆蔻枳實橘皮山楂之屬在陰分者則以當歸牛膝為君佐以薑桂如熱甚而渴者去薑桂加知母麥門冬竹葉牛膝鱉甲足厥陰經屬肝其證先寒後熱色蒼蒼然善太息甚者狀如欲死或頭疼而渴宜先服三黃石膏湯加柴胡鱉甲橘皮以祛暑邪後用當歸兩許橘皮三四錢鱉甲四五錢牛膝兩許柴胡一二錢濃煎露一宿發日五更溫服如熱甚而渴加栝樓根三四錢麥門冬四五錢竹葉一百片知母三四錢鱉甲五六錢如脾胃薄弱或溏泄去當歸加人參三五錢如有肺火不可服參者只照本方多服自愈寒多或寒甚指爪青黯者加桂枝姜皮人參足太陰經屬脾其證先寒後熱或寒多若脾瘧必寒從中起善嘔嘔已乃衰然後發熱熱過汗出乃已熱甚者或渴否則不渴喜火宜服桂枝湯建中湯病人虛者以人參姜皮各兩許濃煎露一宿五更溫服有痰者宜加朮橘皮各三四錢足少陰經屬腎其證寒熱俱甚腰痛脊強口渴寒從下起小便短赤宜先服人參白虎湯加桂枝以祛暑邪後用鱉甲四五錢牛膝兩許熱甚者加知母麥門冬各四五錢寒甚者加桂枝錢許嘔則兼加姜皮三四錢如熱甚而嘔者去桂枝姜皮加竹茹三錢人參橘皮各三四錢用牛膝桂枝者肝腎同一治故也瘧病多夾痰如痰熱須用貝母為君自三錢至八錢竹瀝竹茹栝樓根橘紅白茯苓稱是以佐之甚者可加霞天膏如寒痰發瘧寒多不渴者用半夏白朮橘皮為君多加生薑皮瘧病多夾風有風者必用何首烏為君白朮橘皮為臣葛根姜皮羌活以佐之不頭痛者除羌活暑邪盛解散不早陷入於裡則變為滯下急投黃芩黃連芍藥滑石紅曲甘草佐以葛根升麻柴胡以表裡分消之脾胃薄弱者加人參扁豆蓮肉大劑與之以愈為度滯下若愈瘧亦隨止即不止其熱必輕仍隨經隨證以治之不煩多藥而自止也又暑熱濕之邪內伏百藥不效者獨雄黃丸立愈凡勞瘧病人陰不足或作勞或房勞病發於陰或間日一發或三日一發三日一發為病深須以鱉甲牛膝何首烏為君橘皮為佐發於夜而便燥者加當歸脾胃薄弱者勿加佐以姜皮熱甚勿入大劑與之日三乃瘥附録諸瘧主治熱多宜貝母石膏麥門冬橘紅乾葛滑石竹葉牛膝知母黃芩柴胡白茯苓烏梅牡蠣何首烏鱉甲寒多宜桂枝姜皮人參二術黃耆當歸橘紅半夏草豆蔻白豆蔻炙甘草汗多宜人參白朮黃耆秋冬加桂枝無汗宜乾葛柴胡石膏羌活姜皮人參蒼朮瘧母宜鱉甲射干牡蠣三稜縮砂蜜桂橘皮青皮人參凡瘧疾多熱久不解者其人必本陰虛法當益陰除熱非鱉甲牛膝不能除也多寒而久不解者其人必本陽虛非人參白朮黃耆不能除也按瘧有山嵐瘴氣停痰留飲而發者古方類用常山砒霜等吐之今人誤執其方見瘧輒用不知二藥有大毒損人真氣犯之多致危殆慎之慎之滯下俗呼痢疾其證腹痛便膿血或赤或白或赤白相雜或下純血或下紫黑血塊或如豆汁或如魚凍或如屋漏水或下純黃積類多里急後重數登圊而不得便小便短赤不利或發熱或口渴甚則嘔惡不思食此皆暑濕之邪與飲食積滯膠固腸胃而作必先祛暑滲濕安胃為主傷氣分則調氣益氣傷血分則和血補血夾瘀血則行血藥雖因證而設要皆以補養胃氣為急故其證以噤口痢為最重胃氣一絶則不可治矣故曰安穀則昌絶谷則亡俗治多借口迎而奪之之說輕用大黃朴硝及誤用巴豆牽牛以致洞泄腸開而斃又有妄投訶子粟殼亞芙蓉肉豆蔻收澀之劑以致便閉腹脹或濕熱上攻肢節腫脹拘攣痛不可忍難以救療慎之慎之忌破氣閉氣收澀燥溫熱鹹寒滑膩諸藥俱見前宜清熱消積開胃氣升利小便黃連黃芩白芍藥紅曲山楂廣橘紅升麻葛根甘草滑石蓮肉白扁豆烏梅如胃弱加人參三四錢蓮子四十粒橘紅二錢升麻七分如腹痛以黃連四錢白芍藥三錢炙甘草一錢五分黃柏一錢升麻七分煎服如裡急同上藥加當歸二錢如後重甚加檳榔一錢五分枳殼一錢五分木香汁一字如口渴去木香倍滑石如小便赤澀短少或不利亦倍之赤多倍烏梅山楂紅曲白多加吳茱萸七分噁心欲嘔即噤口痢多用人參蓮肉扁豆白芍藥以緑色升麻七分佐之久痢不止加肉豆蔻一錢人參三錢砂仁一錢五分白茯苓二錢凡滯下非元氣壯實多啖能食之人慎勿輕用大黃巴豆牽牛等下藥復有毒痢一證或痧毒內陷下膿血各藥不效者加忍冬藤為君地榆丹砂犀角汁飲之凡産後滯下積滯雖多腹痛雖極不可用大黃等藥行之致傷胃氣遂不可救但用人參白芍當歸紅曲升麻益母草炙甘草滑石末足矣若惡露未淨兼用乳香沒藥各七分五釐炒砂仁一錢久之自愈血虛可加阿膠三錢凡胎前滯下宜用黃芩黃連白芍炙甘草橘紅赤曲枳殼蓮肉略用升麻未滿七月勿用滑石瀉利俗呼泄瀉因於濕忌濕潤破氣下苦寒滑利諸藥俱見前宜安胃補脾升利小便人參白茯苓蓮肉白扁豆白朮車前子升麻橘紅藿香木瓜乾葛炙甘草白萊蔔虛寒者加肉豆蔻補骨脂吳茱萸虛熱者去白朮加川黃連倍芍藥蓮肉暑濕為病則小水短赤或口渴倍用姜炒黃連為君佐以乾葛升麻由於感風寒者二朮吳茱萸砂仁陳皮乾薑紫蘇主之若由於飲食停滯者兼消導山楂麥芽神麯陳皮肉豆蔻五疸方書所載五疸酒食大飢後過飽女勞失治而成然其證必由濕熱傷脾及飲食停滯又有瘀血發黃一證方所不載分別一誤則藥不對證多致不救慎之慎之忌破氣閉氣下咸滑利滯膩潤燥熱有瘀血者兼忌酸寒諸藥俱見前宜清熱利水除濕養胃氣有停滯者宜消積滯有瘀血者宜行血茵陳蒿黃連苜蓿酒疸非此不愈梔子紫草栝樓根秦艽黃芩滑石車前子白鮮皮仙人對坐草白茯苓連錢草一名蟹靨草一名九里香取汁入薑汁少許飲之良虛者加人參停滯者加紅曲橘紅穀麥蘖山楂瘀血加琥珀牡丹皮紅曲紅花桃仁延胡索蒲黃五靈脂韭元氣壯實者服前藥瘀血不行可加熟大黃虛者勿用痰由於熱者忌燥溫熱補斂升諸藥俱見前宜降潤清熱苦寒辛寒佐以鹹寒蘇子橘紅天門冬枇杷葉麥門冬黃芩桑白皮薄荷百部栝樓根栝樓仁桔梗貝母蛤粉竹瀝童便膠固者加霞天膏並用貓兒刺由於風寒者忌補斂濕潤酸咸諸藥俱見前宜降氣辛散橘紅蘇子杏仁天麻前胡半夏南星葛根桑白皮薄荷白前生薑汁由於濕者忌潤咸酸滯膩發濕諸藥俱見前宜健脾燥濕辛散佐以淡滲人參二術橘紅半夏桑白皮白茯苓澤瀉飲如涎而薄者或如涎而稠者伏於胸中及脾胃間或吐酸水苦水黃水緑水或伏而不吐上支心胸胃脘作痛不可忍按之不得下或發寒熱嘔吐不能飲食忌宜俱同脾虛證內停飲條諸氣氣有餘即是火忌升閉氣酸斂滯膩諸藥俱見前虛者宜降補斂調溫酸辛甘蘇子枇杷葉橘紅麥門冬蘆根汁甘蔗番降香沉水香白豆蔻鬱金甘草童便白芍藥五味子因虛極而氣不得行者加人參實者宜破散香燥辛苦辛寒枳殼青皮檳榔厚朴木香沉香香附烏藥降香藿香縮砂蜜郁忌酸斂滯膩補氣閉氣諸藥俱見前屬情抱者宜開發志意調氣散結和中健脾遠志貝母鬱金石菖蒲香附蘇子橘紅白豆蔻木香蘇合香縮砂蜜麥門冬屬五臟者木鬱達之宜升吐升麻柴胡川芎瓜蒂人參蘆火鬱發之宜散升麻葛根柴胡防風羌活土鬱奪之宜下檳榔枳實厚朴大黃金鬱泄之宜降橘紅蘇子桑白皮豬苓澤瀉木通赤小豆車前子烏蠡魚關格不得大小便為關是熱在丹田也吐逆水漿不得下為格是寒反在胸中也是陰陽易位故上下俱病先投辛香通竅下降之藥以治其上次用下泄苦寒之藥以通二便此急證法難緩治縱有裡虛通後再補忌升補斂閉氣酸諸藥俱見前宜降下辛寒辛溫沉香白豆蔻丁香蘇子龍腦香蘇合香橘紅生薑藿香次用大黃黃柏知母滑石木通車前子牛膝噦俗呼厄逆久病沉痼而發者屬真氣虛多不治忌破氣升散諸藥俱見前宜補斂甘溫甘寒人參黃耆炙甘草麥門冬五味子益智子白芍藥石斛傷寒失下而發者忌補斂酸燥熱滯膩諸藥俱見前宜下大小承氣之類便不硬閉按之腹中和軟未經汗吐者宜辛寒解表白虎湯之類因氣逆衝上而發者忌升補諸藥俱見前宜降氣甘寒鹹寒蘇子橘紅枇杷葉竹茹蘆根汁麥門冬童便因痰水停膈而發者忌升潤苦寒甘寒酸寒諸藥俱見前宜降氣開痰辛散橘紅蘇子貝母桑白皮半夏旋覆花生薑白豆蔻吐血咯血鼻衄齒衄耳衄舌上出血忌升提發散下破血補氣閉氣破氣溫熱辛燥復忌極苦寒傷胃諸藥俱見前宜降氣清熱涼血益陰兼行血鹹寒酸寒甘寒蘇子麥門冬橘皮枇杷葉降香鬱金天門冬沙參牛膝阿膠生地黃枸杞子五味子鱉甲白芍藥犀角汁牡丹皮青蒿剪草白藥子童便側柏葉小薊茅根棕灰藕節當歸蒲黃蓄血俗名內傷或積勞或多怒或飽後行房或負重努力或登高墜下或奔逐過急皆致蓄血其證多發熱其熱類外感而不頭疼