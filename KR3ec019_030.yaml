body:
  text: 卷三十補遺玉石部黃土蚯蚓泥糞坑底泥烏爹泥煙膠石鹼銀硃爐甘石方諸水木部木芙蓉山茶花木綿子肥皂莢大風子樟腦蛀竹屑人部人氣獸部黃明膠霞天膏狗寶山獺陰莖羊脛骨蟲魚部鱖魚膽米穀部亞麻粟殼罌子粟阿芙蓉緑豆粉豌豆蠶豆豇豆刀豆子紅曲玉石部黃土味甘平無毒主泄痢冷熱赤白腹中熱毒絞結痛下血取入地乾土以水煮三五沸絞去滓暖服一二升又解諸藥毒中肉毒合口椒毒野菌毒張司空云三尺以上曰糞三尺以下曰土凡用當去上惡物勿令入客水疏土為萬物之母黃乃中央正色在人臟腑則脾胃應之故萬物非土不生人身五臟六腑非脾胃無以養是以黃土入藥治泄痢冷熱赤白脾中熱毒絞結痛者取其補助戊己之功也味甘而氣和故能安和脾胃止下血及解百毒如經所言也主治參互小兒祕訣烏沙驚風遍身都黑者急推向下將黃土一碗搗末入酢一鍾炒熱包定尉之引下至足刺破為妙氣味和平與物無忤故不著簡誤蚯蚓泥即蚯蚓屎也味甘氣寒無毒赤白久熱痢取一升炒煙盡沃汁半升濾淨飲之蓋久痢乃濕熱甚於腸胃得甘寒之氣則濕熱自除矣日華子主小兒陰囊忽虛熱腫痛以生甘草汁入輕粉末調塗之以鹽研傅瘡去熱毒及蛇犬傷蘇恭主傅狂犬傷出犬毛者神效皆取甘寒除熱解毒之力耳主治參互外臺祕要一切丹毒水和蚯蚓泥傅之丹溪方時行腮腫柏葉汁調蚯蚓泥塗之摘玄方燕窩生瘡韭地蛐蟺屎米汁水和煅過入百草霜等分研末香油調塗之又方治下部楊梅韭地上蚯蚓泥硫黃等分研勻用泥封固作團煨過取出研細生桐油調搽簡誤虛寒滑利不宜用糞坑底泥大寒無毒治發背諸惡瘡陰乾為末新水調傅其痛立止聖濟總録治疔腫糞下土蟬蛻全蠍等分搗作錢大餅香油煎滾溫服以滓傅瘡四圍疔自出也今人以熱糞盛核桃殼內覆疔腫上云疔根即爛出即此意也烏爹泥味苦澀平無毒主清上膈熱化痰生津塗金瘡一切諸瘡生肌定痛止血收濕一名孩兒茶出南番爪哇暹羅諸國今雲南老撾暮云場地方造之云是細茶末入竹筒中堅塞兩頭埋烏泥溝中日久取出搗汁熬製而成其塊小而潤澤者為上大而焦枯者次之疏烏爹泥本是茶末又得土中之陰氣其味苦澀氣應作寒性無毒其主清上膈熱化痰生津者茶之用也得地中之陰氣能涼血清熱故主金瘡止血及一切諸瘡生肌定痛也苦能燥澀能斂故又主收濕氣主治參互積德堂方牙疳口瘡孩兒茶硼砂等分為末搽之纂奇方下疳陰瘡孩兒茶一錢真珠一分片腦半分為末傅之董炳方脫肛氣熱孩兒茶二分熊膽五分片腦一分為末人乳調搽肛上熱汁自下而肛收也亦治痔瘡今人多用外治內服甚少故不著簡誤煙膠味辛苦氣微溫辛能散風苦能燥濕殺蟲故主頭瘡白禿疥瘡風癬癢流水取焇牛皮灶岸煙膏為末麻油調塗或入輕粉少許此即熏焇牛皮灶上黑土也石鹼味辛苦澀氣溫微毒性能除垢膩磨積塊過服能損人同石灰桑硇透肌肉潰癰瘰癧去瘀肉點痣靨疣贅今人用以濣衣出山東濟寧大同諸處彼入採蒿蓼之屬開窖浸水漉起曬乾燒灰以原水淋汁每百斤入粉面一二斤則凝定如石連汁貨之簡誤鹼乃軟堅消積之物食之使人泄瀉以其陰濕之性潤下軟堅透肉故於腸胃非宜作泄胃薄者忌之銀硃乃硫黃同汞升煉而成其性燥烈過服能使人齦爛筋孿其味辛氣溫有毒亦能破積滯散結療癬疥惡瘡殺蟲不宜服食今人多以黃丹礬紅雜之不堪用主治參互李樓怪症方火焰丹毒銀硃調雞子清塗之多能鄙事湯火灼傷銀硃研細菜油調傅應急良方日久頑瘡不收者銀硃一錢地龍骨即年久石灰五分松香五錢為末香油一兩化攤紙上貼之兼能治濕毒臁瘡爐甘石味甘溫無毒主止血消腫毒生肌明目去翳退赤收濕除爛同龍腦點治目中一切病疏爐甘石受金氣而結味應甘辛氣溫無毒其性帶澀經曰榮氣不從逆於肉裡乃生癰腫甘溫能通暢血脈則腫痛散血自止肌肉生也又目得血而能視風熱上壅則目為赤爛浮翳甘入脾而益血辛溫能散風熱性澀則能黏物故同除翳藥點目翳及治目中一切病也主治參互一切目疾真爐甘石半斤用黃連四兩銼碎入銀石器內水二碗煮二伏時去黃連以甘石為末入龍腦香二錢半研勻罐收每點少許頻用取效邵真人方下疳陰瘡爐甘石煅醋淬七次一兩孩兒茶三錢為末麻油調傅立效方諸水味甘寒無毒主明目定心去小兒熱煩止渴方諸大蚌也向月取之得二三合水亦如朝露又名明水得至陰之精華故能明目定心及止渴除煩熱也又為丹灶家所須木部木芙蓉稟夏末秋初之氣故其味辛辛屬金化故能清肺其氣平平即涼也故能涼血散熱解毒兼治一切癰疽腫毒惡瘡排膿止痛小兒疳積主治參互簡便方癰疽腫毒重陽前取芙蓉葉研末端午前取蒼耳燒存性研末等分蜜水調塗四周其毒自不走散名鐵井欄他用甚稀故不著簡誤山茶花得一陽之氣以生故其花開於冬末春初之時其味甘而微辛氣平而微寒色赤而入血分故主吐血衄血腸風下血併為末入童溺及酒調服木綿子得地中之陽氣復感秋金之氣以成其味辛其氣熱其性有毒入肝入腎祛風寒寒濕之藥也惟其熱故能除寒濕凡下部有風寒濕邪者宜之然而性熱有毒肝腎虛者不宜用一切陰虛火熾痿弱下體無力者咸忌之肥皂莢生於盛夏六陽之令而成於秋金之月得火金之氣故其味辛氣溫有毒凡腸胃有垢膩穢惡之氣鬱於中則外生瘰癧惡瘡腫毒泄於外則為腸風下痢膿血此藥專能蕩滌垢膩宣通穢積腸胃潔淨則諸證自除也主治參互祕方治瘰癧用肥皂去核入斑蝥在內扎緊蒸去斑蝥加入貝母天花粉玄參甘草牛蒡子連翹為丸每服一錢白湯下服後腹疼勿慮此藥力追毒之故獨核仁同豬胰子金銀花皂角刺巴蕉根雪裡紅五加皮土茯苓皂莢子白殭蠶木瓜蟬蛻白鮮皮治黴瘡久虛者加人參黃耆薏苡仁兼治結毒普濟方腸風下血獨子肥皂燒存性一片為末糊丸米飲下又方治臘梨頭瘡用獨核肥皂去核填入沙糖入巴豆二枚扎定鹽泥固煅存性再入檳榔輕粉六七分研勻香油調搽先以湯洗淨拭乾乃搽一宿見效除瘡毒外無他用故不著簡誤大風子稟火金之氣以生故其味辛苦氣熱有毒辛能散風苦能殺蟲燥濕溫熱能通行經絡世人用以治大風癘疾乃風癬疥癩諸瘡悉此意耳然性熱而燥傷血損陰不宜多服用之外治其功不可備述也樟腦得純陽之氣其味辛其氣熱初時以水煎成後得火則焰熾不息其稟龍火之性者乎氣亦香竄能通利關竅逐中惡邪氣復能去濕殺蟲凡一切疥癬風瘙濕毒瘡瘍等證皆所須用蛀竹屑年久枯竹中蠹屑也竹之餘氣尚存其氣味必甘平無毒甘能解毒平則兼散故可用為蝕膿長肉之藥也主治參互同象牙末真珠白礬等藥能消漏管方見象牙條下朱氏集驗方耳出臭膿用蛀竹屑胭脂胚子等分麝香少許為末吹之普濟方耳膿作痛因水入耳中者蛀竹屑一錢膩粉一錢麝香五分為末以綿杖絞淨送藥入耳以綿塞定有惡物放令流出甚者三度必愈又方濕毒臁瘡蛀竹屑黃柏末等分先以蔥椒茶湯洗淨搽之日一次效外臺祕要湯火灼瘡蛀竹屑末傅之愈人部人氣主下元虛冷日令童男女以時隔衣進氣臍中及兩腰腎間甚良凡人身體骨節痹痛令人更互呵尉久久經絡通透蓋氣屬陽為一身之健運即真火也天非此火不能生物人非此火不能有生故老人虛人與二七以前少陰同寢藉其熏蒸最為有益下元虛冷火氣衰也得外入之少火乃所以補其不足骨節疼痹血泣不行也血不自行隨氣而行故能便骨節通暢也近時術士令童女以氣進入鼻竅臍中精門以通三田謂之接補此亦小法不得其道者反以致疾獸部黃明膠即牛皮膠味甘平無毒主諸吐血下血血淋妊婦胎動下血風濕走注疼痛打撲傷損湯火灼瘡一切癰疽腫毒活血止痛按本經白膠一名鹿角膠煮鹿角作之阿膠一名傅致膠煮牛皮或驢皮作之其説甚明黃明膠即今水膠乃牛皮所作其色黃明非白膠也亦非阿井水所作甄權以黃明為鹿角白膠唐慎微又採黃明諸方附於白膠後並誤矣其氣味與阿膠同故其所主亦與阿膠相似以非阿井水及驢皮同造故不能疏利下行以其性味皆平補亦宜於血虛有熱者若鹿角膠則性味溫補非虛熱者所宜不可不詳辨也主治參互藺氏方跌撲損傷真牛皮膠一兩干冬瓜皮一兩銼同炒存性研末每服五錢熱酒一鐘調服仍飲酒二三盞暖臥微汗痛止本事方諸般痛腫黃明膠一兩水半升化開入黃丹一兩煮勻以鵝翎掃上瘡口如未成者塗其四圍自消阮氏經驗方背疽初起用黃明牛皮膠四兩入酒重湯頓化隨意飲盡不能飲者滾白湯飲之服此毒不內攻一方加穿山甲四片炒成末其妙無比霞天膏味甘溫無毒主中風偏廢口眼歪斜痰涎壅塞五臟六腑留痰宿飲癖塊手足皮膚中痰核其法用肥嫩雄黃牛肉三四十斤洗極淨水煮成糜濾去滓再熬成膏用疏胃屬土為水穀之海無物不受胃病則水穀不能以時運化羈留而為痰飲壅塞經絡則為積痰老痰結痰等證陰虛內熱生痰則為偏廢口眼歪斜留滯腸胃則為宿飲癖塊隨氣上湧則為喘急迷悶流注肌肉則為結核王隱居論人之諸疾悉由於痰然而痰之所生總由於脾胃虛不能運化所致惟用霞天膏以治諸痰證者蓋牛土畜也黃土色也肉者胃之味也熬而為液雖有形而無濁質也以脾胃所主之物治脾胃所生之病故能由腸胃而滲透肌膚毛竅搜剔一切留結也陰虛內熱之人往往多痰此則由於水涸火熾煎熬津液凝結為痰膠固難散者亦須以此和竹瀝貝母橘紅蘇子栝蔞根枸骨葉之類消之或以橘皮白茯苓蘇子白豆蔻仁半夏蒼朮為曲治脾胃積痰或以橘皮貝母蘇子栝樓根及仁蓬砂為曲治積熱痰結狗寶狗寶如牛之有黃也第狗性熱其寶定是苦溫之物世人用治噎證以其苦能下泄溫能通行耳又能主癰疽疔腫同蟾酥腦麝雄黃乳香沒藥等用簡誤狗寶性熱善消噎病由於痰及虛寒而得者猶可暫用取效若因血液衰少以致噎膈者法所當忌世醫不諳藥理不察病本一概妄投致病增劇戒之戒之又凡有脾胃虛弱羸瘦不振之病尤不宜用山獺陰莖味甘熱無毒主陽虛陰痿精寒此物出廣之宜州溪洞及南丹州土人號為插翅其性淫毒山中有此物凡牝獸皆避去獺無偶則抱木而枯徭女春時成群入山以採物為事獺聞婦人氣必躍來抱之刺骨而入牢不可脫因扼殺之負歸取其陰一枚值金一兩若得抱木死者尤奇貴洞獠甚珍貴之私貨出界者罪至死本地亦不常有多偽者試之之法但令婦女摩手極熱取置掌心以氣呵之惕然而動者為真羊脛骨本經無文綱目載其主虛冷勞及脾弱腎虛不能攝精白濁除濕熱健腰腳固牙齒去皯𪒟治誤吞銅鐵金銀等證按名醫別録云昔漢上張成忠女年七八歲誤吞金饋子一隻胸膈痛不可忍憂惶無措一銀匠炒末藥三錢米飲服之次早大便取下叩求其方乃羊脛灰一物蓋羊脛骨灰可以磨鏡羊頭骨灰可以消鐵故能治如是之證談野翁亦有此方乃祕妙神效之法也主治參互食鑑擦牙固齒羊脛骨灰一兩升麻一兩黃連五錢為末入青鹽和勻日用聖惠方咽喉骨鯁羊脛骨灰米飲下一錢蟲魚部鱖魚膽此魚最能發濕惟膽能治魚骨鯁及竹木刺誤吞入喉不出或吞入腹腹中作痛隱隱皆效狀如鱸魚者是米穀部亞麻即鱉蝨胡麻出兗州威勝軍今陝州亦種之其味甘氣溫無毒足厥陰經血分藥也厥陰藏血為風木之疾凡大風瘡癬總厥陰血熱所致甘溫益血而通行則血自活風自散癘疾癩瘡癬俱除矣主治參互得漆葉苦參荊芥天門冬生地黃青黛百部白花蛇何首烏半枝蓮豨蘞葉刺蒺藜甘菊花治大麻風同金銀花連翹萆薢土茯苓何首烏蒼朮木瓜薏苡仁生地黃黃柏治濕熱太甚遍身膿窠瘡粟殼味酸澀微溫無毒古方治嗽及瀉痢脫肛遺精多用之今人亦效尤輒用殊為未妥不知咳嗽惟肺虛無火或邪盡嗽不止者用此斂其虛耗之氣若肺家火熱盛與夫風寒外邪未散者誤用則咳愈增而難治瀉痢脫肛由於下久滑脫腸虛不禁遺精由於虛寒滑泄者借用酸澀收斂之氣以固虛脫如腸胃積滯尚多濕熱方熾命門火盛濕熱下流為遺精者誤用之則邪氣無從而泄或腹痛不可當或攻入手足骨節腫痛不能動或遍身發腫或嘔吐不下食或頭面俱腫或精竅閉塞水道不通變證百出而淹延不起矣可不慎哉罌子粟味甘平無毒主丹石發動不下食和竹瀝煮作粥食之極美疏罌粟其花至有千葉者紅白紫黑色有數種一罌內子凡數千萬粒細如葶藶子而色白本經味甘平無毒蘇頌性寒甘寒除熱解毒下氣和中故主丹石發動不下食及本經行風氣驅邪熱止反胃去胸中痰滯也阿芙蓉罌粟花之津液也罌粟結青苞時午後以大針刺其外面青皮勿損裡面硬皮或三五處次早津出以竹刀刮取入磁器陰乾用之其氣味與粟殼相同而此則止痢之功尤勝故小兒痘瘡行漿時泄瀉不止用五釐至一分未有不愈他藥莫逮也緑豆粉甘涼無毒主解諸熱益氣解酒食諸毒治發背癰瘡腫及湯火傷灼疏緑豆粉所稟氣味與緑豆同故能解諸熱及酒食毒湯火傷灼也發背癰疽瘡腫皆熱毒所致甘寒解陽明之熱則毒氣不至犯胃而嘔惡腸胃清涼而諸腫散矣熱傷氣除熱故能益氣也主治參互李嗣立外科精要護心散又名內托散乳香萬全散凡有疽疾一日至十三日內宜連進十餘服方免變證使毒氣出外服之稍遲毒氣內攻漸生嘔吐或鼻生瘡菌不食即危矣四五日亦宜間服之用真緑豆粉一兩乳香半兩燈心同研和勻以生甘草煎濃湯調下一錢時時呷之若毒氣衝心有嘔逆之證大宜服此蓋緑豆壓熱下氣消腫解毒乳香消諸癰毒服至一兩則香徹瘡孔中真聖藥也一方有丹砂二錢半衛生易簡解砒石毒緑豆寒水石等分以藍汁調服三五錢又方夏月痱瘡緑豆粉二兩滑石一兩和勻撲之一方加蛤粉生生編杖瘡疼痛緑豆粉炒研以雞子白和塗之妙淡寮方打撲傷損用緑豆粉炒紫色新汲水調傅以杉木皮縛定其效如神附緑豆皮能解熱毒退目翳直指方通神散治斑痘後目生翳用緑豆皮甘菊花穀精草等分為末每服一錢以乾柿餅一枚粟米泔一盞同煮乾食柿日三服淺者五七日見效遠者半月見效簡誤緑豆粉性涼脾胃虛寒易泄者勿多食豌豆即今之小豌豆也一名胡豆陳藏器云煮食治消渴孫思邈治寒熱熱中吐逆泄澼及脹滿利小便應是甘平無毒入脾胃清利除熱之物也又能治癰腫痘毒牛都御史祕傳四聖丹治小兒痘中有疔或紫黑而大或黑壞而臭或中有紫線此證十死八九惟此方點之最妙用豌豆四十九粒燒存性頭髮灰三分真珠十四粒研為末以油胭脂同杵成膏先以簪挑疔破咂去惡血以少許點之即時變紅活色千金外臺洗面澡頭方盛用畢豆麵取其白膩去皯𪒟令人光澤也蠶豆味甘微辛無毒能厚腸胃和臟腑萬表積善堂方言一女子誤吞針入腹諸醫不能治一人教令煮蠶豆同韭菜食之針自大便同出今人有誤吞金銀物者用之皆效實救急之良方也豇豆味甘咸平無毒補腎健胃與諸疾無禁可常食之昔盧廉夫教人補腎氣每日空心煮豇豆入鹽少許食之甚效刀豆子味甘微溫主溫中下氣止厄逆昔有人病後患厄逆不止聲聞鄰家或令取刀豆子燒存性為末白湯調服二錢即止此即下氣歸元之驗也紅曲味甘溫無毒主消食活血健脾燥胃治赤白痢下水穀疏紅曲以白粳米雜曲母蒸罨為之亦奇術也人之水穀入於胃受中焦濕熱熏蒸精氣變化而赤為血紅曲以白米飯受濕熱鬱蒸而變為紅皆造化自然之微妙也故紅曲治脾胃榮血之功有同氣相求之理消食健脾胃與神麯相同而活血和傷惟紅曲為能故治血痢尤為要藥主治參互得番降香通草鯪鯉甲沒藥治上部內傷胸膈作痛或怒傷吐血和童便服有神效同黃連白扁豆蓮肉黃芩白芍藥升麻乾葛烏梅甘草滑石橘紅治滯下有神同續斷番降香延胡索當歸通草紅花牛膝沒藥乳香治內傷血瘀作痛同澤蘭牛膝地黃續斷蒲黃赤芍藥治産後惡露不盡腹中痛丹溪心法濕熱泄痢青六丸用六一散加炒紅曲五錢為末蒸餅和丸梧子大每六七十丸白湯下日三服摘玄方心腹作痛赤曲香附乳香等分為末酒服簡誤性能消導無積滯者勿用又善破血無瘀血者禁使
