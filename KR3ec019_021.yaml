body:
  text: 卷二十一蟲魚部中品總五十六種今疏其要者一十七種蝟皮露蜂房鱉甲蟹蟬蛻烏賊魚骨原蠶蛾蠶沙附蠶退白殭蠶鱺鰻魚蛞蝓蝸牛併入蜚虻蟅蟲青魚膽石首魚鱸魚蝟皮味苦平無毒主五痔陰蝕下血赤白五色血汁不止陰腫痛引腰背酒煮殺之又療腹痛疝積亦燒為灰酒服之得酒良畏桔梗麥門冬疏蝟鼠類屬水其皮毛戟刺如針屬金故味苦平平即兼辛大腸屬金以類相從故能治大腸濕熱血熱為病及五痔陰蝕下血赤白五色血汁不止也陰腫痛引腰背腹痛疝積皆下焦濕熱邪氣留結所致辛以散之苦以泄之故主之也肉味甘平能開胃氣止反胃亦主痔瘻腸風主治參互同象牙末等治通腸漏見象牙條下衍義五痔下血用蝟皮穿山甲等分燒存性入肉豆蔻一半空心米飲下一錢妙楊氏家藏方腸風下血蝟皮一枚木賊草半兩炒黑為末每二錢熱酒調下簡誤凡食其肉當去骨誤食令人瘦劣諸節漸小也露蜂房味苦咸平有毒主驚癇瘛瘲寒熱邪氣癲疾鬼精盅毒腸痔火熬之良又療蜂毒毒腫疏蜂性有毒螯人則痛極以其得火氣之甚也故蜂房味苦氣平性亦有毒別録言咸當作辛鹹辛散苦泄咸可軟堅故主驚癇瘛瘲寒熱邪氣癲疾鬼精蠱毒腸痔等證也療蜂毒毒腫者取其氣類相從以毒攻毒之義也蘇恭以亂髮蛇皮三物合燒灰酒服方寸匕治惡疽附骨癰根在臟腑歷節腫出疔腫惡脈諸毒大明煎水漱齒止風蟲疼痛洗乳癰蜂疔惡瘡皆取其攻毒散邪殺蟲之功耳主治參互子母祕録臍風濕瘡久不瘥者蜂房燒末傅之效袖珍方風蟲牙痛蜂房一枚鹽實孔內燒過研末擦之鹽湯漱去一方同細辛煎水漱之又方喉痹腫痛露蜂房灰白殭蠶等分為末吹入喉內或用乳香湯服半錢濟衆方女人妒乳乳癰汁不出內結成腫名妒乳用蜂房燒灰研末每服二錢水一盞煎六分去滓溫服經驗方治漏痔蜂房燒存性研細摻之干則菜油調傅簡誤蜂房主驚癇瘛瘲及諸癰疽惡毒正取其攻散邪惡以毒攻毒之意若病屬氣血虛無外邪者與夫癰疽潰後元氣乏竭者皆不宜服鱉甲味鹹平無毒主心腹癥瘕堅積寒熱去痞疾息肉陰蝕痔核惡肉療溫瘧血瘕腰痛小兒脅下堅肉味甘主傷中益氣補不足惡礬石疏鱉甲全稟天地至陰之氣故其味鹹平無毒潤下作咸象水明矣本乎地者親下益陰何疑甲主消散者以其味兼乎平平亦辛也咸能軟堅辛能走散故本經主癥瘕堅積寒熱去痞疾息肉陰蝕痔核惡肉別録療溫瘧者以瘧必暑邪為病類多陰虛水衰之人乃為暑所深中邪入陰分故出並於陽而熱甚入並於陰而寒甚元氣虛羸則邪陷而中焦不治甚則結為瘧母甲能益陰除熱而消散故為治瘧之要藥亦是退勞熱在骨及陰虛往來寒熱之上品血瘕腰痛小兒脅下堅皆陰分血病宜其悉主之矣勞復女勞復為必須之藥勞瘦骨蒸非此不除産後陰脫資之尤急主治參互仲景鱉甲煎丸治瘧母之要藥得牛膝當歸佐以橘皮何首烏知母麥門冬治久瘧同知母石膏麥門冬貝母竹葉治溫瘧熱甚渴甚無肺熱病者加人參若瘧發熱甚渴甚又寒甚汗多發時指甲黯狀若欲死並加桂枝有神去桂枝治疸瘧良得青蒿麥門冬五味子地黃枸杞牛膝治骨蒸勞熱甚則加銀柴胡地骨皮胡黃連附肉主傷中益氣補不足腹中結熱婦人漏下陰虛羸瘦性冷補一切陰虛人宜常食之簡誤鱉甲妊娠禁用凡陰虛胃弱陰虛泄瀉産後泄瀉産後飲食不消不思食及嘔惡等證咸忌之蟹味鹹寒有毒主胸中邪氣熱結痛喎僻面腫敗漆燒之致鼠解結散血愈漆瘡養筋益氣爪主破胞墮胎疏蟹稟水氣以生故其味鹹氣寒本經雖云有毒然今人多食之卒無害其有害者大抵形質怪異如後文所載諸種始有大毒耳外骨內肉陰包陽也入足陽明足厥陰經經曰熱淫於內治以鹹寒故主胸中邪氣熱結痛也喎僻者厥陰風熱也面腫者陽明熱壅也解二經之熱則筋得養而氣自益喎僻面腫俱除矣咸走血而軟堅故能解結散血漆得蟹則化為水燒之可集鼠於庭此物性之相感相制莫能究其義也愈漆瘡者以其能解漆毒故也爪性迅利故能破胞墮胎也主治參互日華子産後肚痛血不下者以酒食之筋骨折傷者生搗炒罯之陳藏器續斷絶筋骨去殼同黃搗爛微炒納入瘡中筋即連也寇宗奭小兒解顱不合以蟹螫同白及末搗塗以合為度唐瑤經驗方骨節離脫生蟹搗爛以熱酒傾入連飲數碗其渣塗半日內骨肉谷谷有聲即好董炳驗方中鱓魚毒食蟹即解胡洽方治孕婦僵仆胎上搶心有蟹爪湯千金方神造湯治子死腹中或雙胎一死一生服之令死者出生者安神驗用蟹爪一升甘草二尺東流水一斗以葦薪煮至二升濾去滓入真阿膠三兩令煬頓服或分二服若人困不能服者灌入即活簡誤蟹性冷能散血熱為病故跌撲損傷血熱瘀滯者宜之若血因寒凝結與夫脾胃寒滑腹痛喜熱惡寒之人咸不宜食有獨螯獨目兩目相同六足四足腹下有毛腹中有骨頭背有星點足斑目赤者並有毒不可食能害人被其毒者冬瓜汁紫蘇蒜豉蘆根汁皆可解之不可與柿及荊芥食發霍亂動風木香汁可解蟬殼味鹹甘寒無毒主小兒癇女人生子不出灰服之主久痢一名枯蟬一名金牛兒凡用洗去泥並去翅足漿水煮曬乾用疏蟬稟水土之餘氣化而成形其飛鳴又得風露之清氣故能入肝祛風散熱如藥性論主小兒壯熱驚癇是矣其主婦人生子不下者取其蛻脫之義治久痢者以其有甘寒之功也其鳴清響能發音聲其性善蛻能脫翳障其體輕浮能發瘡疹其味甘寒能除風熱故陳藏器主啞病寇宗奭主目昏障翳小兒瘡疹出不快及今人治頭風眩暈皮膚風熱痘疹作癢疔腫毒瘡大人失音小兒噤風天吊驚哭夜啼等證皆以其有如上諸功能也主治參互同羚羊角密蒙花白蒺藜草決明木賊草穀精草甘菊花夜明沙生地黃黃連女貞實治目盲障翳同丹砂茯神真珠牛黃殭蠶天竺黃鉤藤鉤犀角琥珀全蠍治小兒風熱急驚癇病同犀角生地黃紫草麥門冬連翹金銀花治痘瘡血熱出不快同石膏鼠黏子赤柳木薄荷玄參甘草葛根栝樓根麥門冬治大人小兒痧疹普濟方治小兒夜啼不止狀若鬼祟以蟬蛻下半截為末每一字鉤藤湯調下或入辰砂少許亦可並治天吊驚啼全幼心鑑痘瘡作癢蟬蛻三七枚炙甘草各一錢水煎服錢氏方痘後目翳蟬蛻為末每一錢羊肝煎湯下日二服和劑局方蟬花散治肝經蘊熱風毒之氣內搏上攻眼目赤腫翳膜疼痛昏澀內外障翳咸治之用蟬蛻穀精草刺蒺藜甘菊花防風草決明密蒙花甘草羌活黃芩蔓荊子川芎木賊草荊芥等分為末每二錢茶清調食後臨臥各一服簡誤痘疹虛寒證不得服烏賊魚骨味鹹微溫無毒主女子漏下赤白經汁血閉陰蝕腫痛寒熱癥瘕無子驚氣入腹腹痛環臍陰中寒腫令人有子又止瘡多膿汁不燥一名海螵蛸一名烏鰂骨一名墨魚疏烏賊魚骨稟水中之陽氣以生故其味鹹氣溫微無毒入足厥陰少陰經厥陰為藏血之臟女人以血為主虛則漏下赤白或經汁血閉寒熱癥瘕少陰為藏精之臟主隱曲之地虛而有濕則陰蝕腫痛虛而寒客之則陰中寒腫男子腎虛則精竭無子女子肝傷則血枯無孕鹹溫入肝腎通血脈而祛寒濕則諸證除精血足令人有子也其主驚氣入腹腹痛環臍者蓋肝屬木主驚驚入膽則榮氣不和故腹痛環臍也入肝膽舒榮氣故亦主之溫能燥濕故又主瘡多膿汁也按素問云有病胸脅支滿者妨於食病至則先聞腥臊臭出清液先唾血四肢清目眩時時前後血病名血枯得之年少時有所大脫血或醉入房中氣竭肝傷故月事衰少不來治之以四烏鰂骨一藘茹為末丸以雀卵大如小豆每服五丸飲以鮑魚汁所以利腸中及傷肝也觀此則其入厥陰血分為女人崩漏下血之要藥可知矣主治參互聖惠方赤白目翳用烏鰂骨一兩去皮為末入片腦少許點之淡寮方聤耳出膿海螵蛸半錢麝香一字為末以綿杖絞淨吹入聖惠方小兒臍瘡出血及膿海螵蛸干胭脂為末油調搽之聖濟總録骨鯁在喉烏賊魚骨橘紅焙等分為末寒食麵和餳丸芡子大每一丸含化簡便單方舌腫出血不止烏賊骨蒲黃各等分炒為末塗之簡誤其氣味鹹溫血病多熱者勿用原蠶蛾雄者有小毒主益精氣強陰道交接不倦亦止精疏原蠶蛾乃是晚蠶第一番出者其子再復出者為二蠶此二蠶之種其蛾性最淫出繭便媾味鹹氣溫熱故能強陰益精令交接不倦也日華子主壯陽事止泄精尿血暖水臟蓋取其性淫助陽鹹溫入腎之功耳主治參互千金方丈夫陰痿不起未連蠶蛾二升去頭翅足炒為末蜜丸梧子大每夜服一丸可御十女以菖蒲酒止之聖濟總録玉枕生瘡生枕骨上如癰破後如箸頭用原蠶蛾炒石韋等分為末干貼瘥簡誤少年陰痿由於失志者不宜用陰虛有火者咸忌之附蠶屎即原蠶沙溫無毒主腸鳴熱中消渴風痹癮疹疏原蠶沙即晚蠶所出屎也其味辛甘氣溫無毒腸鳴者水火相觸也甘以和之消渴者中氣燥熱也辛以潤之蠶屬火其性燥燥能勝濕去風故其沙主療風濕之病如陳藏器以之炒黃袋盛浸酒去風緩諸節不隨皮膚頑痹腹內宿冷瘀血腰腳冷疼炒熱尉偏風筋骨癱緩手足不隨等證主治參互寇氏法治諸風冷用醇酒三升拌蠶沙五斗甑蒸於暖室中鋪油單上令患風冷氣痹及近感癱風人就以患處一邊臥沙上厚蓋取汗若虛人須防大熱昏悶令露頭面如未痊愈間日再作聖惠方風瘙癮疹作癢成瘡用蠶沙一升水五斗煮取二斗去滓洗浴避風儒門事親婦人血崩蠶沙為末酒服三五錢簡誤癱緩筋骨不隨由於血虛不能榮養經絡而無風濕外邪侵犯者不宜服蠶退主血風病益婦人一名馬明退近世醫家多用初出蠶子殼在紙上者東方諸醫用老蠶眠起所蛻皮功用雖相近當以蛻皮為正用之微炒疏蠶退如蟬蛻蛇蛻之類各因其本質為用蠶退得蠶氣之餘故能治血風病血熱則生風婦人以血為主故尤益婦人也近世以之療痘疹去目中翳障其義猶蟬蛻也主治參互集驗方走馬牙疳用蠶退紙灰入麝香少許貼之並治口瘡又方治纏喉風蠶蛻紙燒存性蜜丸芡實大含化咽津蠶已出蛾取退煅存性為末服之能排膿穿毒瘡口簡誤婦人血虛無風濕者不宜用白殭蠶味鹹辛平無毒主小兒驚癇夜啼去三蟲滅黑皯令人面色好男子陰瘍作瘡病女子崩中赤白産後余痛滅諸瘡瘢痕疏蠶屬陽而僵者又兼金木之化本經味鹹別録辛平無毒然詳其用應是辛勝咸劣氣微溫之藥也氣味俱薄浮而升陽也入足厥陰手太陰少陽經厥陰為風木之位主藏血小兒驚癇夜啼女子崩中赤白風熱乘肝臟也産後余痛風寒入血分也辛能祛散風寒溫能通行血脈故主如上諸證也肺主皮毛而風邪客之則面色不光潤辛溫入肺去皮膚諸風故能滅黑皯及諸瘡瘢痕令人面色好也男子陰瘍風濕浸淫也辛平能散風熱兼能燥濕是以主之三蟲亦濕熱所化故又能去三蟲也藥性論治口噤發汗日華子主中風失音一切風疰小兒客忤男子陰癢痛女子帶下蘇頌治風喉痹欲絶元素主皮膚諸風如蟲行皆取其性屬陽風熱為陽邪能入皮膚經絡發散諸邪熱氣也主治參互同丹砂牛黃膽星全蠍麝香鉤藤鉤犀角金箔天竺黃蟬蛻治小兒急驚客忤仁存方開關散治急喉風痹用白殭蠶炒白礬半生半燒等分為末每以一錢用竹瀝加薑汁調灌得吐頑痰立效小兒加薄荷一方用白梅和丸綿裹含之聖惠方小兒撮口噤風面黃赤氣喘啼聲不出由胎氣挾熱流毒心脾故令舌強唇青撮口發噤用白殭蠶二杖去嘴略炒為末蜜調傅唇中甚效普濟方治大人頭風及小兒驚風並用大蒜七個先燒紅地以蒜逐個於地上磨成膏卻以殭蠶一兩去頭足安蒜上碗覆一夜勿令泄氣只取殭蠶研末每用嗅鼻口內含水有效又方治腹內龜病詩云人間龜病不堪言肚裡生成硬似磚自死殭蠶白馬溺不過時刻軟如綿藥性論滅諸瘡瘢痕白殭蠶衣魚鷹屎白等分傅之聖惠方癮疹風瘡疼痛白殭蠶焙研酒服一錢立瘥小兒宮氣方小兒口瘡通白者白殭蠶炒為末蜜和傅之效兼治內疳蝕瘡簡誤殭蠶性辛溫辛能散其功長於祛風化痰散有餘之邪凡中風口噤小兒驚癇夜啼由於心虛神魂不寧血虛經絡徑急所致而無外邪為病者忌之女子崩中産後余痛非風寒客入者亦不宜用今世治小兒驚風不問虛實一概混施誤甚誤甚鰻鱺魚味甘有毒主五痔瘡瘻殺諸蟲疏鰻鱺魚稟土中之陰氣故其味甘其氣寒其形類蛇常與水蛇同穴故其性有小毒甘寒而善能殺蟲故骨蒸勞瘵及五痔瘡瘻人常食之有大益也燒煙闢蚊熏屋舍竹木斷蛀蟲置骨於衣箱子斷蠹其殺諸蟲之驗可證矣腹下有黑斑背上有白點者毒甚不可食重三四斤及水行昂頭者不可食妊娠食之令胎有疾脾胃薄弱易泄者勿食蛞蝓味鹹寒無毒主賊風喎僻佚筋及脫肛驚癇攣縮蝸牛味鹹寒主賊風喎僻踠跌大腸下脫肛筋急及驚癇蛞蝓蝸牛本經分二條今按其氣味相同主療無別惟形質稍異故併為一蝸牛負殼蛞蝓無殼耳疏蛞蝓蝸牛稟陰濕之氣而生故味鹹氣寒無毒經曰清靜則肉腠閉拒雖大風苛毒弗能害也如陰血虧竭陽氣躁擾則腠理不密賊風乘虛而入風主搖動中於經絡故喎僻攣縮軼筋筋急所自來矣又風為陽邪筋脈得之皆燥急鹹寒能益陰潤燥軟堅則筋脈舒緩經絡通達而諸證除矣驚癇者風熱也脫肛者大腸熱也踠跌者血脈傷必發熱也鹹寒總除諸熱所以主之蜈蚣性畏二物不敢過其所行之路觸其身即死故人取以治蜈蚣毒主治參互聖惠方治大腸因熱脫肛用蝸牛一兩燒灰豬脂和傅立縮濟生方痔瘡腫痛用蝸牛一杖入麝香少許以碗盛次日取水塗之丹溪方用蝸牛浸油塗之或燒灰傅亦可集驗方發背初起活蝸牛二百個以新汲水一盞瓶內封一宿取涎水入真蛤粉旋調掃傅瘡上日十餘度大全良方痔熱腫痛用大蛞蝓一個研泥入片腦一字燕脂坯子半錢同傅之簡誤其氣大寒非有風熱者不宜用小兒薄弱多泄者不宜用蜚虻味苦微寒有毒主逐瘀血破下血積堅痞癥瘕寒熱通利血脈及九竅女子月水不通積聚除賊血在胸腹五臟者及喉痹結塞一名虻蟲疏蜚虻其用大略與蟅蟲相似而此則苦勝苦能泄結性善齧牛馬諸畜血味應有咸咸能走血完素云虻飲血而用以治血故主積聚癥瘕一切血結為病如經所言也苦寒又能泄三焦火邪迫血上壅閉塞咽喉故主喉痹結塞也今人以其有毒多不用然仲景抵當湯丸大黃蟅蟲丸中鹹入之以其散臟腑宿血結積有神效也凡毒藥之治病如刑罰之治盜賊不如是則不足以祛邪反正書曰若藥不瞑眩厥疾不瘳正此謂也其與病相乖不宜用者詳著簡誤中主治參互入大黃蟅蟲丸治虛勞羸瘦內有乾血肌膚甲錯兩目黯黑大抵當湯治太陽病身黃脈沉結小腹硬小便自利其人如狂者備急方撲墜瘀血虻蟲二十枚牡丹皮一兩為末酒服方寸匕血化為水也簡誤傷寒發黃脈沉結少腹硬如小便不利者為無血證非蓄血也不宜用瘀血未審的者不宜用女子月水不通由於脾胃薄弱肝血枯竭而非血結閉塞者不宜用孕婦腹中有癥瘕積聚不宜用凡病氣血虛甚形質瘦損者忌之蟅蟲味鹹寒有毒主心腹寒熱洗洗血積癥瘕破堅下血閉生子大良一名地鱉疏蟅蟲生於下濕土壤之中故其味鹹氣寒得幽暗之氣故其性有小毒以刀斷之中有白汁如漿湊接即連復能行走故今人以之治跌撲損傷續筋骨有奇效乃足厥陰經藥也夫血者身中之真陰也灌溉百骸周流經絡者也血若凝滯則經絡不通陰陽之用互乖而寒熱洗洗生焉鹹寒能入血軟堅故主心腹血積癥瘕血閉諸證血和而榮衛通暢寒熱自除經脈調勻月事時至而令婦人生子也又治瘧母為必用之藥主治參互同自然銅血竭乳香沒藥五銖錢黃荊子麻皮灰狗頭骨治跌撲損傷神效仲景方大黃蟅蟲丸治産婦腹痛有乾血用蟅蟲二十枚去足桃仁二十枚大黃二兩為末煉蜜杵和分為四丸每以一丸酒一升煮取二合溫服當下血也仲景鱉甲煎丸治久瘧成癖董炳集驗方治跌撲閃挫用土鱉陰乾一個臨時旋研入乳香沒藥自然銅龍骨各等分麝香少許為末每服三分入土鱉末以酒調下須先整定骨乃服否則接挫也又可代仗簡誤無瘀血停留者不宜用青魚膽主目暗滴汁目中並塗惡瘡疏青魚膽色青象木木氣通於肝肝開竅於目故能治目暗味苦氣寒能涼血熱故又主塗惡瘡也主治參互龔氏易簡方治赤目障翳用黃連熏膏入大青魚膽汁和就再入片腦少許瓶收密封每日點之甚妙龍木論一切障翳魚膽丸用青魚膽鯉魚膽羊膽牛膽各半兩熊膽二錢龍腦香少許石決明一兩為末蜜丸梧子大每空心茶下十丸萬氏家抄乳蛾喉痹用膽礬盛青魚膽中陰乾每用少許吹喉取吐簡誤目病非風熱盛而由於血虛昏暗者不宜用服術人不可食青魚肉石首魚味甘無毒頭中有石如棋子主下石淋磨石服之亦為灰末服和蓴菜作羹開胃益氣候乾食之名為鯗炙食之主消瓜成水亦主卒腹脹食不消暴下痢疏石首魚得海中水土之氣故其味甘氣平無毒胃屬土甘為土化故能開胃胃氣開則飲食增五臟皆得所養而氣自益矣干鯗其性疏利故能入腸胃寬中消食止痢頭中石堅重下走故主下石淋也凡泄痢腹痛與夫腸胃諸疾最忌油膩魚腥惟白鯗不忌蓋鯗飲鹹水而性平不熱且無脂膩不惟少熱中之患更有消食理脾實腸胃之功也鱸魚平補五臟益筋骨和腸胃治水氣多食宜人疏鱸魚秋月方美其得水中之清氣者乎味甘淡氣平雖有小毒不至發病乃與脾胃相宜之物也腎主骨肝主筋滋味屬陰總歸於臟益二臟之陰氣故能益筋骨脾胃有病則五臟無所滋養而積漸流於虛弱脾弱則水氣泛濫益脾胃則諸證自除矣
