body:
  text: 卷二十四米穀部上品總七種今疏其要者四種胡麻麻子胡麻油飴糖胡麻味甘平無毒主傷中虛羸補五內益氣力長肌肉填髓腦堅筋骨療金瘡止痛及傷寒溫瘧大吐後虛熱羸困久服輕身不老明耳目耐飢渴延年一名巨勝疏胡麻稟天地之沖氣得稼穡之甘味故味甘氣平無毒入足太陰兼入足厥陰少陰氣味和平不寒不熱益脾胃補肝腎之佳谷也弘景雲八谷之中惟此為良仙家作飯餌之斷谷長生故主傷中虛羸補五內益氣力長肌肉堅筋骨填髓腦及傷寒溫瘧大吐後虛熱羸困久服明耳目耐飢渴輕身不老延年也金刃傷血則瘀而作痛甘平益血潤燥故療金瘡止痛也日華子主補中益氣潤養五臟補肺氣止心驚利大小腸逐風濕氣遊風頭風勞氣產後羸困李廷飛雲風病人久食則步履端正語言不謇陳士良生嚼塗小兒頭瘡煎湯浴惡瘡及婦人陰瘡皆取其甘平益血脈補虛羸入肝脾腎之功耳劉河間曰麻木谷而治風又云治風先治血血活則風去胡麻入肝益血故風藥中不可闕也主治參互得何首烏茅山蒼朮白茯苓菖蒲桑葉牛膝當歸續斷地黃桑上寄生治風濕痹同甘菊花天門冬黃柏生地黃何首烏柏子仁桑葉牛膝枸杞子麥門冬作丸治似中風口眼喎斜半身不遂久服不輟有神驗一味九蒸九曝加茅山蒼朮乳蒸曬三次作丸能健脾燥濕益氣延年抱朴子服食胡麻法和上黨胡麻三斗淘淨蒸令氣透日乾以水淘去沫再蒸如此九度去殼炒香為末白蜜或棗膏丸彈子大每溫酒化下一丸日三服忌毒魚狗肉生萊菔至百日能除一切痼疾一年病色光澤不飢二年白髮還黑三年齒落更生久服常生不老矣外臺秘要解下胎毒小兒初生嚼生脂麻綿包與兒咂之其毒自下簡便方小兒瘰癧脂麻連翹等分為末頻頻食之經驗方蜘蛛及一切蟲咬傷油麻研爛傅之三因方谷賊屍咽喉中痛癢此因誤吞谷芒戟刺癢痛也用脂麻炒研白湯調下甘平無毒補益為用仙家服食所須故不著簡誤麻子味甘平無毒主補中益氣中風汗出逐水利小便破積血復血脈乳婦產後余疾長髮可為沐藥久服肥健不老神仙疏麻子即大麻仁稟土氣以生本經味甘平無毒然其性最滑利甘能補中中得補則氣自益甘能益血血脈復則積血破乳婦產後余疾皆除矣風並於衛則衛實而榮虛榮者血也陰也經曰陰弱者汗自出麻仁益血補陰使榮衛調和風邪去而汗自止也逐水利小便者滑利下行引水氣從小便而出也好古云入手足陽明足太陰經陽明病汗多及胃熱便難三者皆燥也用之以通潤經曰脾欲緩急食甘以緩之麻仁之甘以緩脾潤燥故仲景脾約丸用之主治參互食醫心鏡麻子仁粥治風水腹大腰臍重痛不可轉動用冬麻子半升研碎水濾取汁入粳米二合煮稀粥下蔥椒鹽豉空心食仲景方麻子仁丸治脾約大便秘而小便數麻子仁二升芍藥半斤厚朴一尺大黃枳實各一斤杏仁一升熬研煉蜜丸梧子大每以漿水下十丸日三服不知再加本事方產後秘塞許學士云產後汗多則大便必秘難於用藥惟麻子粥最穩不惟產後可服凡老人諸虛風秘皆妙用大麻子仁紫蘇子各二合洗淨研細再以水研濾取汁一盞分二次煮粥啜之夏子益奇疾方截腸怪病大腸頭出寸余痛苦干則自落又出名為截腸病若腸盡則不治但初覺截時用器盛脂麻油坐浸之飲大麻子汁數升即愈也簡誤陳士良云多食損血脈滑精氣痿陽事婦人多食即髮帶疾以其滑利下行走而不守也胡麻油微寒利大腸胞衣不落生者摩瘡腫生禿髮此即烏脂麻油也功用與白麻油相同而力更勝入藥當以烏者為佳疏麻油甘寒而滑利故主胞衣不下及利大腸生者氣更寒能解毒涼血故摩瘡腫生禿髮也藏器主天行熱悶腸內熱結服一合取利為度孟詵主薙瘂殺五黃下三焦熱毒氣通大小腸治蛔心痛傅一切惡瘡疥癬殺一切蟲日華子煎膏生肌長肉止痛消癰腫補皮裂皆取其甘寒滑利除濕潤燥涼血解毒之功也主治參互入血餘一味熬膏鉛丹收好能傅一切瘡毒排膿止痛諸熬膏必用真胡麻油以其涼血解毒也惟濕氣膏不用嶺南解蠱法以清油多飲取吐效衛生易簡方解河豚毒一時倉卒無藥以清麻油多灌取吐出毒物即效亦能解砒毒胎產須知婦人難產因血枯澀者用清油半兩好蜜一兩同煎數十沸溫服胎即滑下他藥無益以此助血為效直指方癰疽發背初起即服此使毒氣不內攻以麻油一斤銀石器內煎二十餘沸和醇醋二碗分五次一日服盡百一選方腫毒初起麻油煎蔥黑色趁熱通手旋塗自消又方丹石毒發發熱者不得食熱物不得用火但著厚衣暖臥取清油一匙含咽劉禹錫傳信方蚰蜒入耳用麻油煎作餅枕臥須臾自出簡誤麻油生者過寒多食發冷疾及脾胃虛寒作瀉者不宜食熬熟治飲食甚美但須逐日熬用不可過宿若經宿則火性反復能助熱動氣也飴糖味甘微溫主補虛乏止渴去血疏飴糖用麥糵或谷糵同諸米漬熬煉而成故其味甘氣溫無毒入足太陰亦入手太陰經甘入脾而米麥皆養脾胃之物故主補虛乏仲景建中湯用之是也肺胃有火則發渴火上炎迫血妄行則吐血甘能緩火之標則火下降而渴自止血自去也思邈又謂其有消痰潤肺止嗽治咽痛吐血等功主治參互入建中湯治脾虛腹痛簡便方誤吞稻芒白餳頻食效千金方服藥過劑悶亂者飴糖食之簡誤飴糖成於濕熱少用雖能補脾潤肺然而過用之則動火生痰凡中滿吐逆酒病牙疳咸忌之腎病尤不可服
