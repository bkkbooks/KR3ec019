body:
  text: 卷二十五米穀部中品總二十三種今疏其要者十一種生大豆赤小豆酒粳米糵米小麥大麥糵附曲神麯附扁豆豉緑豆生大豆味甘平塗癰腫煮汁飲殺鬼毒止痛逐水脹除胃中熱痹傷中淋露下瘀血散五臟結積內寒殺烏頭毒久服令人身重炒為屑味甘主胃中熱去腫除痹消穀止腹脹惡五參龍膽得前胡杏仁牡蠣良疏生大豆蘇頌云有黑白二種黑者入藥白者不用其緊小者為雄入藥尤佳稟土氣以生而色黑則象水故味甘氣平無毒平即兼涼為腎家之谷也甘平能活血解毒祛風散熱故主塗癰腫止痛殺鬼毒烏頭毒除胃中熱痹傷中淋露下瘀血散五臟結積內寒消穀也色黑屬水同氣相求故能逐水腫腹脹仙方修治末服之可以辟穀度飢然初服時似乎身重一年以後便覺輕健也陳藏器炒令黑煙未斷及熱投酒中飲之治風痹癱緩口噤産後諸風及風痙陰毒腹痛食罷生吞半兩去心胸煩熱熱風孟詵主中風腳弱産後諸疾同甘草煮湯飲去一切熱毒氣及風毒腳氣同桑柴灰煮食下水鼓腹脹搗塗一切腫毒日華子主調中氣通關脈制金石藥毒解牛馬瘟病皆取其活血散風除熱解毒下氣利水之功耳主治參互同澤蘭益母草蘇木人參牛膝荊芥生地黃童便蒲黃治産後血暈悶絶同蔓荊子土茯苓金銀花甘菊花玄參川芎天麻芽茶荊芥烏梅治偏頭風痛有神古方紫湯破血去風除氣散熱産後兩日尤宜服之用黑豆五升清酒一斗將豆炒令煙絶投酒中待酒紫赤色去豆量性飲之神驗中風口噤加雞屎白二升和炒投之廣利方腳氣衝心煩悶不識人以大豆一升水三升濃煮汁服未定再服扁鵲方三豆飲子能稀痘見緑豆條內大豆殼同密蒙花穀精草黃連木賊草決明子甘菊花金銀花生地黃羚羊角羊肝治小兒痘後目翳簡誤生大豆岐伯云生溫熟寒藏器云生平炒食極熱煮食極寒觀本經及孟詵云生搗塗腫毒則生者非溫矣經又云炒為屑主胃中熱則炒者又非極熱矣應是生平炒溫煮寒無疑忌豬肉小兒以炒豆豬肉同食必壅氣致死十有八九十歲以上則無害也服萆麻子者忌炒豆犯之脹滿致死服厚朴者亦忌之能動氣故也赤小豆味甘酸平無毒主下水排癰腫膿血寒熱熱中消渴止泄利小便吐逆卒澼下脹滿疏赤小豆稟秋燥之氣以生本經味甘酸氣平無毒然詳其用味應有辛非辛平則不能排癰腫膿血及療寒熱熱中消渴也凡水腫脹滿泄瀉皆濕氣傷脾所致小豆健脾燥濕故主下水腫脹滿止泄利小便也十劑云燥可去濕赤小豆之屬是矣吐逆者氣逆上升也卒澼者大腸濕熱也甘酸斂逆氣辛平散濕熱故亦主之主治參互陳藏器本草赤小豆和桑根白皮煮食去濕氣痹腫孟詵食療和鯉魚煮食甚治腳氣金匱要略傷寒狐惑病脈數無熱微煩默默但欲臥汗出初得之三四日目赤如鳩眼七八日目四眥黃黑若能食者膿已成也赤小豆當歸散主之赤小豆三升浸令芽出當歸三兩為末漿水服方寸匕日三服甄權藥性熱毒癰腫赤小豆為末雞子白調塗蘇頌圖經治腳氣以袋盛此豆置足下朝夕輾轉踐踏之遂愈簡誤陶弘景雲小豆逐津液利小便久服令人枯燥凡水腫脹滿總屬脾虛當雜補脾胃藥中用之病已即去勿過劑也其治消渴亦借其能逐胃中熱從小便利去若用之過多則津液竭而渴愈甚不可不戒也酒味苦甘辛大熱有毒主行藥勢殺百邪惡毒氣疏酒品類極多醇醨不一惟米造者入藥用經云酒者熱谷之液其氣悍弘景雲大寒凝海惟酒不冰明其性熱獨冠群物製藥多用之以借其勢人飲多則體弊神昏是其有毒故也博物志云昔三人冒霧晨行一人飲酒一人飽食一人空服空腹者死飽食者病飲酒者健此酒勢辟邪惡毒氣之效勝於他物也藏器主通血脈厚腸胃潤皮膚消憂發怒宣言暢志無非取其橫行經絡走散皮膚開發宣通之功耳主治參互諸藥可造酒者五加皮女貞實仙靈脾薏苡仁天門冬麥門冬地黃菖蒲枸杞子人參何首烏甘菊花黃精桑椹朮蜜仙茅松節柏葉竹葉胡麻磁石蠶沙烏白蛇鹿茸羊羔膃肭臍黑豆之類各視其所生之病擇其所主之藥入曲米如常釀酒法釀成飲或袋盛入酒內浸數日飲之肘後方鬼擊諸病卒然著人如刀刺狀胸脅腹內切痛不可抑按或吐血鼻血下血以醇酒吹兩鼻內良又方馬氣入瘡或馬汗馬毛入瘡皆致腫痛煩熱入腹則殺人多飲醇酒至醉即愈千金方三十年耳聾酒三升漬牡荊子一升七日去滓任性飲之梅師方産後血悶清酒一升和生地黃汁煎服簡誤王好古曰酒能引諸經不止與附子相同味之辛者能散苦者能下甘者能居中而緩用為導引可以通行一身之表至極高之分古人惟以麥造麴釀黍已為辛熱有毒今之釀者加以烏頭巴豆桂姜之類大毒大熱之藥以增其氣味豈不傷沖和損精神涸榮衛竭天癸而夭夫人壽耶朱震亨云本草止言酒熱而有毒不言濕中發熱近於相火醉後振寒戰栗可見矣又性喜升氣必隨之痰鬱於上溺澀於下恣飲寒涼其熱內鬱於肺與大腸其始也病淺或嘔吐或瘡疥或鼻齄或泄利或心脾痛尚可散而去之其久也病深或消渴或內疽或肺癰或鼓脹或喉啞或哮喘或勞瘵或痔漏為狀不一非具眼未易處也扁鵲云過飲腐腸爛胃潰髓蒸筋生痰動火亡精耗血傷神損壽孟詵云軟筋骨動氣痢醉臥當風則成癜風醉浴冷水成癰痹陳士良云凡服丹砂鍾乳諸石藥並不可長用酒下能引石藥氣入四肢滯血化為癰疽藏器云凡飲酒忌甜物同牛肉食令人生蟲合乳飲令人氣結諸如此類不可勝載今人有喜以火逼極熱恣飲為快不知酒性既熱又以火濟火鮮有不為害者曾見一人好飲火酒不幾年患一惡證吐膿血瘀肉而斃蓋肺為火熱腐爛也酒能合歡解憂禦寒祛疾自上古至今循習為常用之物然而如上等害不可不曉惟在樽節度量寒溫適宜不至沉湎荒亂斯得酒中之趣者古人終日飲不及亂用此道耳震亨又云醇酒冷飲有三益豫謂三益未必然而傷肺生痰動火損胃之害可差免矣粳米味甘苦平無毒主益氣止煩止泄疏粳米即人所常食米感天地衝和之氣同造化生育之功為五穀之長人相賴以為命者也經曰安穀則昌絶谷則亡仲景曰人受氣於水谷以養神水穀盡而神去自上古聖人樹藝至今不可一日無此也稟土德之正其味甘而淡其性平而無毒雖專主脾胃而五臟生氣血脈精髓因之以充溢周身筋骨肌肉皮膚因之而強健本經益氣止煩止泄特其餘事耳主治參互入白虎湯治作勞人傷寒發熱虛羸少氣氣逆上衝欲吐少陰病下痢膿血或腹滿下如魚腦者桃花湯主之粳米一升赤石脂一斤一半全一半末乾薑一兩以水七升煮米令熟去滓溫服七合納赤石脂末方寸匕日三服若一服愈余勿服以上仲景法普濟方小兒初生無皮色赤但有紅筋乃受胎未足也用早白米粉撲之肌膚自生千金方嗜食生米成瘕用白米五合雞屎一升同炒焦為末水一升頓服少時吐出瘕如研米汁或白沫痰水乃愈也糵米味苦無毒主寒中下氣除熱疏糵米即稻糵也味甘氣溫無毒具生化之性故為消食健脾開胃和中之要藥脾胃和則中自溫氣自下熱自除也主治參互淡寮方啓脾進食穀神丸用谷糵四兩為末入薑汁鹽少許和作餅焙乾入炙甘草砂仁白朮麩炒各一兩為末白湯點服或丸服小麥味甘微寒無毒主除熱止燥渴咽乾利小便養肝氣止漏血唾血以作曲溫消穀止痢以作面溫不能消熱止煩疏小麥稟四時中和之氣故其味甘氣微寒無毒入手少陰經少陰有熱則燥渴咽乾解少陰之熱則燥渴咽乾自止心與小腸為表裡臟氣清腑病亦自除故利小便肝心為子母之臟子能令母實故主養肝氣甘寒走二經而能益血涼血故止漏血唾血也曲性溫所以能消穀止痢面性熱故不能消熱止煩北方霜雪多地氣厚熱性減凡入藥以北來者為勝浮麥即水淘浮起者能止自汗盜汗亦以北方者良古方有用寒食麵者寒食日以紙袋盛面懸風處數十年亦不壞取其熱性去而無毒也主治參互奉親書老人五淋身熱腹滿小麥一升通草二兩水三升煮一升飲之良生生編走氣作痛用小麥麩拌釅醋炒熱袋盛尉之面作蒸餅和藥取其易消也簡誤小麥寒氣全在皮故面去皮則熱熱則壅滯動氣發渴助濕令人體浮皆其害也凡大人脾胃有濕熱及小兒食積疳脹皆不宜服然北人以之代飯常御而不為患者此其地勢高燥無濕熱熏蒸之毒故面性亦溫平能厚腸胃強氣力補虛助五臟其功不減於稻粟耳東南卑濕春多雨水其濕熱之氣鬱於內故食之過多每能發病也夏月瘧痢人尤不宜食大麥味鹹溫微寒無毒主消渴除熱益氣調中又云令人多熱為五穀長蜜為之使疏大麥功用與小麥相似而其性更平涼滑膩故人以之佐粳米同食或歉歲全食之而益氣補中實五臟厚腸胃之功不亞於粳米矣陳士良云補虛劣壯血脈化穀食止泄瀉不動風氣久食令人肥白滑肌膚為面無燥熱勝於小麥蘇恭云平胃止渴消食療脹滿其為效可知本經云令人多熱與上文及諸說相背必是誤入也附麥糵蘇頌云化宿食破冷氣止心腹脹滿日華子溫中下氣開胃止霍亂除煩消痰破癥結疏麥糵以水漬大麥而成其味鹹氣溫無毒功用與米糵相同而此消化之力更緊咸能軟堅溫主通行其發生之氣又能助胃氣上升行陽道而主健運故主開胃補脾消化水穀及一切結積冷氣脹滿如上所言等證也好古曰麥芽神麯二藥胃氣虛人宜服之以代戊己腐熟水穀豆蔻縮砂烏梅木瓜芍藥五味子為之使主治參互麥糵同山楂紅曲橘皮草果砂仁厚朴蒼朮消食積快膈進食麥芽四兩神麯二兩白朮橘皮各一兩為末蒸餅丸梧子大每人參湯下三五十丸李絳兵部手集産後腹脹不通轉氣急坐臥不安以麥糵一合為末和酒服良久通轉神驗婦人經驗方産後青腫乃血水漬也乾漆大麥糵等分為末新瓦中鋪漆一層孽一層重重令滿鹽泥固濟煅赤研末熱酒調服二錢産後諸疾並宜丹溪方産後回乳産婦無子食乳乳不消令人發熱惡寒用大麥糵二兩炒為末每服五錢白湯下甚良簡誤麥糵能消導米麵諸果食積無積滯脾胃虛者不宜用久服消腎氣墮胎曲味甘大暖療臟腑中風氣調中下氣開胃消宿食主霍亂心膈氣痰逆除煩破癥結補虛去冷氣除腸胃中塞不下食令人有顏色六月作者良神麯使無毒能化水穀宿食癥氣健脾暖胃疏古人用曲即造酒之曲其氣味甘溫性專消導行脾胃滯氣散臟腑風冷故主療如諸家所言也神麯乃後人專造以供藥用力倍於酒麴蓋取諸神聚會之日造之又取各藥物以象六神之用故得神名陳久者良入藥炒令香用六畜食米多脹欲死者煮曲汁飲之立消造神麯法用五月五日或六月六日以白麵百斤青蒿自然汁三升赤小豆末杏仁泥各三升蒼耳自然汁野蓼自然汁各三升以配白虎青龍朱雀玄武勾陳騰蛇六神用汁和麵豆杏仁作餅麻葉或楮葉包罯如造醬黃法待生黃衣曬乾收之主治參互神麯開胃健脾消食止泄同山楂麥糵谷糵縮砂陳皮草果藿香白朮乾葛蓮肉等用效百一選方療痞滿暑泄曲術丸用神麯炒蒼朮泔制炒等分為末糊丸梧子大每米飲下五十丸和劑局方健胃思食治脾胃俱虛不能消化水穀胸膈痞悶腹脅膨脹連年纍月食減嗜臥口無味神麯六兩麥糵炒三兩乾薑炮四兩烏梅肉焙四兩為末蜜丸梧子大每米飲下五十丸日三服摘玄方食積心痛陳神麯一塊燒紅淬酒二大碗服之簡誤脾陰虛胃火盛者不宜用能落胎孕婦宜少食扁豆味甘微溫主和中下氣葉主霍亂吐下不止疏扁豆稟土中衝和之氣其味甘氣香性溫平無毒入足太陰陽明經氣分通利三焦升清降濁故專治中宮之病和中下氣消暑除濕而解毒也孟詵主霍亂吐利不止及嘔逆久食頭不白日華子云補五臟蘇頌主女子帶下解酒毒河豚魚毒寇宗奭主霍亂轉筋皆取其益脾開胃和中氣除濕熱之功耳葉氣味相同故主霍亂花有紫白二色豆有黑白二種入藥惟紫花豆白者良豆黑色及紫色者名鵲豆不入藥亦不益人主治參互白扁豆同山藥白茯苓人參蓮肉薏苡仁芡實為補脾胃之上藥中焦有濕者加白朮同黃連乾葛白芍藥升麻紅曲滑石烏梅橘紅甘草蓮肉治滯下如神同麥門冬五味子黃連乾葛能解酒毒同木瓜石斛橘皮藿香茯苓縮砂香薷治霍亂吐瀉轉筋入十味香薷飲能消暑氣健脾奇效良方血崩不止白扁豆花焙乾為末每服二錢空心炒米煮飲入鹽少許調下即效治霍亂祕法用白扁豆葉一葉同白梅一枚並仁研爛新汲水調服神效蘇恭治吐利後轉筋用白扁豆葉一把搗入醋少許絞汁服立瘥簡誤弘景雲患寒熱者不可食蓋指傷寒寒熱外邪方熾不可用此補益之物耳如脾胃虛及傷食勞倦發寒熱者不忌豉味苦寒無毒主傷寒頭痛寒熱瘴氣惡毒煩躁滿悶虛勞喘吸兩腳疼冷疏豉諸豆皆可為之惟黑豆者入藥有鹽淡二種惟江右淡者治病經云味苦寒無毒然詳其用氣應微溫蓋黑豆性本寒得蒸曬之氣必溫非苦溫則不能發汗開腠理治傷寒頭痛寒熱及瘴氣惡毒也苦以湧吐故能治煩躁滿悶以熱鬱胸中非宣劑無以除之如傷寒短氣煩躁胸中懊憹飢不能食虛煩不得眠者用梔子豉湯吐之是也又能下氣調中闢寒故主虛寒喘吸及兩腳冷疼主治參互肘後方云傷寒有數種庸人卒不能分別者今取一藥兼療之凡初覺頭痛身熱脈洪一二日以蔥豉湯治之用蔥白一虎口豉一升綿裹水三升煮一升頓服取汗仲景梔子豉湯治傷寒汗下後虛煩用梔子十四枚香豉四合綿裹以水四升先煮梔子得二升半納豉煮取一升半去滓分二服溫進一服得吐止後服又枳實梔子豉湯治大病瘥後勞復用枳實三枚梔子十四枚豉一升以清漿水七升煮取四升納枳實梔子取二升下豉更煮五六沸去滓分溫再服令微似汗傷寒之邪自外入勞復之邪自內發發汗吐下當隨宜施治也治傷寒食早成食復前湯中加大黃如博棋子大五枚梅師方闢除溫疫豉和白朮浸酒常服之甄權方傷寒暴痢腹痛者豉一升薤白一握切以水三升先煮薤納豉更煮湯色黑去豉分二服不瘥更服亦治血痢孟詵治久患盜汗以豉一升熬令香清酒三升漬滿三日取汁冷暖任服不瘥更作二劑即止簡要濟衆方傷寒後餘毒攻手足及身體虛腫用豉五合微炒以酒一升半同煮五七沸任性飲之千金方蠼螋尿瘡杵豉傅之良衛生易簡方中牛馬毒豉汁和人乳頻服之效千金方中酒成病豉蔥白各半升水二升煮一升頓服又方服藥過劑悶亂者豉汁飲之肘後方腫從腳起豉汁飲之以滓傅之弘景雲春夏之氣不和以豉蒸炒酒漬服之至佳簡誤凡傷寒傳入陰經與夫直中三陰者皆不宜用熱結胸中煩悶不安者此欲成結胸法當下不宜復用汗吐之藥並宜忌之緑豆味甘寒無毒主丹毒煩熱風疹藥石發動熱氣奔㹠生研絞汁服亦煮食消腫下氣壓熱解石用之勿去皮令人小壅疏緑豆稟土中之陰氣故其味甘氣寒無毒入足陽明經夫丹石之藥氣悍而性熱多服則火動上升為煩熱甚則口鼻出血狂悶躁擾甘寒能除熱下氣解毒故主丹石藥人毒發煩熱也陽明客熱則發出風疹以胃主肌肉熱極生風故也解陽明之熱則風疹自除脹滿者濕熱侵於脾胃也熱氣奔豚者濕熱客於腎經也除濕則腫消壓熱則氣下益脾胃而腎邪亦自平也孫思邈主寒熱熱中止泄痢卒澼利小便脹滿日華子主厚腸胃作枕明目治頭風頭痛益氣除熱毒風孟詵主去浮風益氣力治消渴和五臟安精神可常食之功效不可備述主治參互扁鵲三豆飲治天行痘瘡預服此飲疏解熱毒縱出亦少用緑豆赤小豆黑豆各一升甘草節二兩以水八升煮極熟任意吞豆飲汁七日乃止醫學正傳痘後癰毒初起以三豆膏治之神效緑豆赤小豆黑大豆等分為末醋調時時掃塗即消全幼心鑑小兒丹腫緑豆五錢大黃二錢為末用生薄荷汁入蜜調塗中砒毒者研汁飲之簡誤脾胃虛寒滑泄者忌之
