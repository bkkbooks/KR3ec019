body:
  text: 卷十三木部中品總九十二種今疏其要者二十六種桑根白皮葉耳椹灰枝黃附竹葉茹瀝附吳茱萸檳榔梔子麒麟竭龍腦香蕪荑枳殼枳實厚朴茗苦茶山茱萸紫葳胡桐淚豬苓烏藥沒藥安息香仙人杖海桐皮大腹合歡五倍子天竺黃密蒙花桑根白皮味甘寒無毒主傷中五勞六極羸瘦崩中脈絶補虛益氣去肺中水氣唾血熱渴水腫腹滿臚脹利水道去寸白可以縫金瘡出土上者殺人疏桑根白皮得土金之氣故味甘氣寒而無毒東垣海藏俱云兼辛然甘厚辛薄降多升少陽中陰也入手太陰經甘以固元氣而補不足辛以瀉肺邪之有餘故能止嗽也凡肺中有水氣及肺火有餘者宜之傷中者中氣傷也五勞者五臟勞傷也六極者六腑之中氣極也羸瘦者肌肉脫也崩者中血脫也脈絶者氣血兩虛之至故脈不來也之數者皆由陰不足則陽有餘陽有餘則火盛而內熱火與元氣不兩立火能消物造化自然也惟甘也可以補元氣惟寒也可以除內熱熱除矣元氣生矣則上來諸證自瘳故本經終之以補虛益氣焉別録去肺中水氣者即十劑中雲燥可去濕桑白皮之屬是已吐血熱渴者熱傷肺火炎迫血妄行溢出上竅而兼發熱作渴也其主水腫腹滿臚脹者即利水道除濕補虛之功也濕熱盛則寸白生消除濕熱則蟲自不能留也縫金瘡者甘寒補益宜於傷損也主治參互得天麥二冬款冬花百部薄荷甘草沙參貝母枇杷葉五味子為治嗽要藥得芍藥薏苡仁木瓜茯苓橘皮赤小豆為治水腫之神劑經驗方治咳嗽吐血甚者鮮桑根白皮一斤米泔浸三宿刮去黃皮銼細入糯米四兩焙乾為末每服一錢米飲下肘後方治消渴尿多入地三尺桑根剝取白皮炙黃黑銼以水煮濃汁隨意飲之亦可少入米勿用鹽肘後方治産後下血炙桑白皮煮水飲之經驗方治墜馬拗損桑根白皮五斤為末以水五升煎膏傅之便止以後亦無宿血終不發動子母祕録治小兒重舌桑根白皮煮汁塗乳上飲之聖惠方治小兒流涎脾熱也胸膈有痰新桑根白皮搗自然汁飲之甚效煎飲亦良聖惠方治小几天吊驚癇取家桑東行根研汁服千金方治石癰堅硬不作膿者桑白皮陰乾為末煬膠和酒調傅以軟為度蘇頌取皮中白汁主治小兒口瘡白漫拭淨塗之便愈又塗金刃所傷燥痛須臾血止仍以白皮裹之甚良時珍取汁塗蛇蜈蚣蜂蛛傷有驗取枝燒瀝治大風瘡疥生眉發子母祕録治小兒鵝口桑皮汁和胡粉塗之聖惠方治小兒唇腫桑木汁塗之即愈摘玄方治破傷中風桑瀝好酒對和溫服以醉為度醒服消風散簡誤肺虛無火因寒襲之而發咳嗽者勿服附桑葉主除寒熱出汗汁解蜈蚣毒疏葉本經無氣味詳其主治應是味甘氣寒性無毒甘所以益血寒所以涼血甘寒相合故下氣而益陰是以能主陰虛寒熱及因內熱出汗其性兼燥故又能除腳氣水腫利大小腸原稟金氣故又能除風經霜則兼得天地之清肅故又能明目而止渴發者血之餘也益血故又能長髮涼血故又止吐血合癰口罨穿掌療湯火皆清涼補血之功也主治參互四月採桑葉酒拌九蒸九曝為末胡麻或黑芝麻去殼九蒸九曝另磨如泥各等分煉蜜和為丸每五六錢空心飢時白湯下能益氣血祛風仙家餌之為引年止飢之要藥普濟方治青盲洗法昔武勝軍宋仲孚患此二十年用此法二年目明如故摘青桑葉曬乾逐月按日就地上燒存性每以一合於瓷器內煎減二分傾出澄清溫熱洗目至百度屢試有驗正月初八二月初八三月初六四月初四五月初六六月初二七月初七八月二十九九月十二十月十三十一月初二十二月三十集簡方治風眼下淚臘月不落桑葉煎湯日日溫洗或入芒硝千金方治頭髮不長用桑葉麻葉煮泔水沐之七日可長數尺聖濟總録治吐血不止晚桑葉焙乾研涼茶服三錢只一服止後用補肝肺藥直指方治癰口不斂經霜黃桑葉為末傅之通玄論治穿掌腫毒新桑葉研爛罨之即愈醫學正傳治湯火傷瘡經霜桑葉燒存性為末油和傅之三日愈附桑耳味甘有毒黑者主女子漏下赤白沃血病癥瘕積聚陰痛陰陽寒熱無子療月水不調其黃熟陳白者止久泄益氣不飢其金色者治癖飲積聚腹痛金瘡桑耳煅存性研細香附童便炒黑研細每用桑耳灰二分香附三分淡醋湯空心調服治血崩奇效過於他木耳附桑椹味甘寒無毒單食止消渴陳藏器利五臟關節通血氣久服不飢安魂鎮神令人聰明變白不老多收曝乾為末蜜丸日服時珍搗汁飲解中酒毒釀酒服利水氣消腫一名文武實疏桑椹者桑之精華所結也其味甘其氣寒其色初丹後紫味厚於氣合而論之甘寒益血而除熱其為涼血補血益陰之藥無疑矣消渴由於內熱津液不足生津故止渴五臟皆屬陰益陰故利五臟陰不足則關節之血氣不通血生津滿陰氣長盛則不飢而血氣自通矣熱退陰生則肝心無火故魂安而神自清寧神清則聰明內發陰復則變白不老甘寒除熱故解中酒毒性寒而下行利水故利水氣而消腫皆自然之道也主治參互寇宗奭曰本經言桑甚詳獨遺烏椹然桑之精英盡在於此採摘微研以布濾汁石器熬成稀膏量入多少蜜熬稠貯瓷器中每抄一二錢食後夜臥以沸湯點服治服金石藥發熱口渴生精神及小腸熱甚仙方日乾為末蜜和為丸酒服亦良四時月令云四月宜飲桑椹酒能理百種風熱其法用桑椹汁三斗重湯煮至一斗半入白蜜二合酥油一兩生薑汁一合煮令得所瓶收每服一合和酒飲之亦可以汁熬燒酒藏之經年味愈佳普濟方治水腫脹滿水不下則滿溢水下則虛竭還脹十無一活宜用桑椹酒治之桑白皮切以水二斗煮汁一斗入桑椹再煮取五升以糯米飯五升釀酒飲保命集治瘰癧結核文武膏用文武實即桑椹子二斗黑熟者以布取汁銀石器熬成膏每白湯調服一匙日三服千金方治小兒赤禿桑椹子取汁頻服聖濟録治小兒白禿黑椹入罌中曝三七日化為水洗之三七日神效集簡方治陰證腹痛桑椹絹包風乾過伏天為細末每服三錢熱酒下取汗簡誤甘寒帶滑故潤而下行脾胃虛寒作泄者勿服附桑柴灰味辛寒有小毒淋取汁與冬灰等分同滅痣疵黑子蝕惡肉煮赤小豆食大下水脹傅金瘡止血生肌桑霜即灰汁以桑皮綿紙襯淘籮底用滾水淋下瓷器盛之重湯煮乾別名木硇能鑽筋透骨為傅癰疽拔疔引諸散毒藥攻毒之要品得丹砂雄黃乳香沒藥牛黃龍腦香紅白藥子白及白蘞傅一切腫毒止痛追毒有奇效得鐵鏽蟾酥可拔疔附枝味苦平性不冷不熱主遍體風癢乾燥火氣腳氣風氣四肢拘攣上氣眼暈肺氣咳嗽消食利小便療癰疽後渴嫩條細搗一升熬香煎飲亦無禁忌久服終身不患偏風聖惠方治紫白癜風桑枝十斤益母草三斤水五斗慢煮至五升去滓再煎成膏每臥時溫酒調服半合以愈為度附桑黃氣味與白皮同其除肺熱之功殆又過之山家老桑樹多生湖桑少見同天門冬百部山梔枇杷葉治赤鼻有神竹葉味辛平大寒無毒主胸中痰熱咳逆上氣疏竹葉稟陰氣以生本經味辛平氣大寒無毒甄權言甘寒氣薄味厚陰中微陽降也入足陽明手少陰經陽明客熱則胸中生痰痰熱壅滯則咳逆上氣辛寒能解陽明之熱結則痰自消氣自下而咳逆止矣仲景治傷寒發熱大渴有竹葉石膏湯無非假其辛寒散陽明之邪熱也主治參互煎湯調酸棗仁炒熟末五錢臨臥服治心虛不得眠同麥門冬酸棗仁遠志丹參茯神丹砂犀角治心經蘊熱虛煩不眠入白虎湯治傷寒煩熱大渴引飲肘後方治時行發黃竹葉五升小麥七升石膏三兩水一斗半煮取七升細服盡劑愈附淡竹茹味甘微寒無毒主嘔啘溫氣寒熱吐血崩中疏竹茹雖與竹葉同本然竹茹得土氣多故味帶甘氣微寒無毒入足陽明經經曰諸嘔吐酸皆屬於熱陽明有熱則為嘔啘溫氣寒熱亦邪客陽明所致甘寒解陽明之熱則邪氣退而嘔啘止矣甘寒又能涼血清熱故主吐血崩中及女勞復也主治參互同木瓜橘皮麥門冬枇杷葉人參蘆根汁石斛治胃虛有熱嘔啘不止活人書治傷寒愈後交接女勞復頭痛身熱耳鳴口渴腰骨痛男子卵腫股痛竹皮一升水三升煮五沸服汁又方治婦人大病初愈有所動勞致熱氣衝胸手足搐搦拘急如中風狀淡竹青茹半斤栝蔞二兩水二升煎一升分二服簡誤胃寒嘔吐及感寒挾食作吐忌用附淡竹瀝味甘大寒無毒療暴中風痹胸中大熱止煩悶消渴勞復疏竹瀝竹之津液也經云大寒亦言其本性耳得火之後寒氣應減性滑流利走竅逐痰故為中風家要藥凡中風之證莫不由於陰虛火旺煎熬津液結而為痰壅塞氣道不得升降熱極生風以致猝然僵仆或偏痹不仁此藥能遍走經絡搜剔一切痰結兼之甘寒能益陰而除熱痰熱既祛則氣道通利經脈流轉外證自除矣其主胸中大熱止煩悶者取其甘寒清熱益陰之功耳觀古人以竹瀝治中風則知中風未有不因陰虛痰熱所致不然如果外來風邪安得復用此甘寒滑利之藥治之哉主治參互同貝母栝樓仁霞天膏白芥子蘇子橘紅鬱金童便麥門冬治似中風口眼喎斜語言謇澀或半身不遂等證千金方治中風口噤竹瀝加薑汁日日飲之梅師方治産後中風口噤身直面青手足反張以竹瀝飲一二升即蘇外臺祕要治破傷中風凡閃脫折骨諸瘡慎不可當風用扇中風則發痙口噤項急殺人亟飲竹瀝二三升忌飲食及酒千金方小兒傷寒淡竹瀝葛根汁各六合細細與服至寶方小兒狂語夜後便發竹瀝夜服二合産寶方婦人胎動妊娠因夫所動困絶以竹瀝飲一升立愈梅師方孕婦子煩茯苓二兩竹瀝一升水四升煎二升分三服千金方時氣煩躁五六日不解青竹瀝半盞煎熱數數飲之覆取微汗李絳兵部手集咳嗽肺痿大人小兒咳逆短氣胸中吸吸咳出涕唾嗽出臭膿用淡竹瀝一合服之日三五次以愈為度簡誤寒痰濕痰及飲食生痰不宜用吳茱萸味辛溫大熱有小毒主溫中下氣止痛咳逆寒熱除濕血痹逐風邪開腠理去痰冷腹內絞痛諸冷實不消中惡心腹痛逆氣利五臟疏吳茱萸稟火氣以生故其味辛氣溫有小毒甄權辛苦大熱氣味俱厚陽也入足陽明太陰兼入足少陰厥陰經凡脾胃之氣喜溫而惡寒寒則中氣不能運化或為冷實不消或為腹內絞痛或寒痰停積以致氣逆發咳五臟不利辛溫暖脾胃而散寒邪則中自溫氣自下而諸證悉除其主除濕血痹逐風邪者蓋以風寒濕之邪多從脾胃而入脾胃主肌肉為邪所侵則腠理閉密而寒熱諸痹所從來矣辛溫走散開發故能使風寒濕之邪從腠理而出中惡腹痛亦邪惡之氣干犯脾胃所致入脾散則腹痛自止矣主治參互仲景吳茱萸湯治少陰病吐利手足逆冷煩躁欲死者吳茱萸一斤人參二兩生薑六兩大棗十二枚劈四味以水七升煮二升去滓溫服七合日三服厥陰乾嘔吐涎沫頭痛者同此方又當歸四逆加吳茱萸湯治厥陰證手足厥冷脈細欲絶其人內有久寒者當歸三兩芍藥三兩炙甘草二兩通草二兩桂枝三兩細辛三兩生薑半斤吳茱萸二升大棗二十五枚以水六升清酒六升同煮取五升去滓分五服食療治冬月感寒吳茱萸五錢煎湯服之取汗聖惠方治陰毒傷寒四肢逆冷用吳茱萸一升酒拌濕絹袋二個包蒸極熱更互尉足心候氣透痛亦即止纍有效肘後方治寒疝往來吳茱萸一兩生薑半兩清酒一升煎分溫服聖惠方治食已吞酸胃虛冷者吳茱萸湯泡七次焙乾薑等分為末湯服一錢孫氏仁存方治多年脾泄老人多此謂之水土同化吳茱萸三錢泡入水煎汁入鹽少許通口服蓋茱萸能暖膀胱水道既清大腸自固他藥雖熱不能分解清濁也和劑局方戊己丸治脾胃受濕下痢赤白腹痛米穀不化吳茱萸黃連白芍藥各一兩同炒為末蒸餅丸梧子大每服二三十丸米飲下簡誤陽厥似陰手足雖逆冷而口多渴喜飲水大小便祕結小便或通亦赤澀短少此火極似水守真所謂禁栗如喪神守皆屬於火之謂耳此與桂附乾薑之類同忌嘔吐吞酸屬胃火者不宜用咳逆上氣非風寒外邪及冷痰宿水所致不宜用腹痛屬血虛有火者不宜用赤白下痢病名滯下因暑邪入於腸胃而非酒食生冷停滯積垢者不宜用小腸疝氣非驟感寒邪及初發一二次者不宜用霍亂轉筋由於脾胃虛弱冒暑所致而非寒濕生冷干犯腸胃者不宜用一切陰虛之證及五臟六腑有熱無寒之人法所咸忌檳榔味辛溫無毒主消穀逐水除痰癖殺三蟲伏尸療寸白疏檳榔得天之陽氣地之金辛故味辛氣溫無毒大明言澀元素言苦以其感盛夏火之氣耳氣薄味厚陽中微陰降也入手足陽明經夫足陽明為水穀之海手陽明為傳道之官二經相為貫輸以運化精微者也二經病則水穀不能以時消化羈留而成痰癖或濕熱停久則變生諸蟲此藥辛能散結破滯苦能下泄殺蟲故主如上諸證也甄權宣利五臟六腑壅滯破胸中氣下水腫治心痛積聚日華子下一切氣通失節利九竅健脾調中破癥結李珣主賁豚氣五膈氣風冷氣腳氣宿食不消皆取其辛溫走散破氣墜積能下腸胃有形之物耳主治參互同草果枳實橘皮治食瘧加三稜蓬荗礬紅紅曲山楂麥糵消一切堅硬肉食及諸米麵生冷食積成塊作痛同黃連扁豆蓮肉橘紅白芍藥紅曲烏梅葛根枳殼治滯下後重同雷丸使君子白蕪荑蘆薈肉豆蔻胡黃連治小兒疳蛔同楝根鶴蝨錫灰薏苡根貫衆烏梅治一切寸白蟲同蒼朮草果青皮甘草治山嵐瘴氣發瘧直指方心脾作痛雞心檳榔高良薑各一錢半陳米百粒同以水煎服之廣利方腳氣衝心悶亂不識人用白檳榔十二分為末分二服空心暖小便調下日二服十便良方蟲痔裡急檳榔為末每日空心以白湯調二錢千金方寸白蟲病檳榔二七枚為末先以水二升半煮檳榔片取一升空心調末方寸匕服之經日蟲盡出未盡再服以盡為度簡誤檳榔性能墜諸氣至於下極病屬氣虛者忌之脾胃虛雖有積滯者不宜用下利非後重者不宜用心腹痛無留結及非蟲攻咬者不宜用凡病屬陰陽兩虛中氣不足而非腸胃壅滯宿食脹滿者悉在所忌梔子味苦寒大寒無毒主五內邪氣胃中熱氣面赤酒皰皶鼻白癩赤癩瘡瘍療目熱赤痛胸心大小腸大熱心中煩悶疏梔子感天之清氣得地之苦味故其性無毒氣薄而味厚氣浮而味沉陽中陰也入手太陰手少陰足陽明經少陰為君主之官邪熱客之則五臟皆失所主清少陰之熱則五內邪氣自去胃中熱氣亦除面赤酒皰皶鼻者肺熱之候也肺主清肅酒熱客之即見是證於開竅之所延及於面也肺得苦寒之氣則酒熱自除而面鼻赤色皆退矣其主赤白癩瘡瘍者即諸痛癢瘡瘍皆屬心火之謂療目赤熱痛及胸心大小腸大熱心中煩悶者總除心肺二經之火熱也此藥味苦氣寒瀉一切有餘之火故能主如上諸證主治參互仲景治傷寒汗吐下後虛煩不得眠及心中懊憹者有梔子豉湯用梔子十四枚香豉四合水煎服入茵陳大黃湯治傷寒濕熱發黃腹脹桅子十四枚茵陳六兩大黃三兩水一斗先煮茵陳減六升納二味煮取三升分三服小便當利尿如皂角汁狀正赤一宿腹減黃從小便出也同甘草黃柏為梔子柏皮湯亦治發黃身熱同厚朴枳實為梔子厚朴湯治傷寒下後心煩腹滿臥起不安者得吐即愈同鼠矢作湯治大病後勞復小便不利者小便利即愈以上皆仲景法同連翹麥門冬竹葉燈心草生甘草黃連能瀉心經有餘之火加赤茯苓木通滑石澤瀉瀉小腸火同桑黃或桑白皮黃芩甘草桔梗五味子乾葛治酒熱傷肺發出鼻皶同茵陳蒿滑石車前子秦艽黃連車前草苜蓿治酒熱發黃梅師方治熱病後勞復及因交接後發動欲死不能語者梔子三十枚水三升煎一升服令微汗救急方治湯燙火傷梔子末和雞子清濃塗之丹溪方治胃脘火痛山梔七枚炒水一盞煎七分入生薑汁飲之立止簡誤梔子稟至苦大寒之氣苦寒損胃而傷血凡脾胃虛弱者忌之血虛發熱者忌之性能瀉有餘之火心肺無邪熱者不宜用小便不通由於膀胱虛無氣以化而非熱結小腸者不宜用瘡瘍因氣血虛不能收斂則為久冷敗瘡非溫暖補益之劑則不愈此所謂既潰之後一毫寒藥不可用是也世人又以治諸血證不知血得熱則行得寒則凝瘀血凝結於中則反致寒熱或發熱勞嗽飲食減少為難療之病凡治吐血法當以順氣為先蓋血隨氣而行氣降則火降火降則血自歸經不求其止而止矣此治療之要法不可違也麒麟竭味甘咸平有小毒主五臟邪氣帶下止痛破積血金瘡生肉舊與紫礦同條今分出疏麒麟竭稟土氣而兼水化故味甘鹹氣平無毒丹房鑑源云稟於熒惑之氣生於湯石之陰其色赤象火而味鹹則得陰氣也氣薄味厚陰也降也入足厥陰手少陰經甘主補咸主消散瘀血生新血之要藥故主破積血金瘡止痛生肉主五臟邪氣者即邪熱氣也帶下者濕熱傷血分所致也甘鹹能涼血除熱故悉主之蘇恭主心腹卒痛李珣以之治傷折打損一切疼痛血氣攪刺內傷血聚者誠為此耳此藥産外國極難得真者理傷折有奪命之功主治參互同乳香沒藥自然銅麻皮灰狗脛骨煅存性蟅蟲黃荊子骨碎補治一切打撲損傷同發灰乳香沒藥片腦輕粉象牙末紅粉霜為細末摻一切金瘡及腫毒生肌止痛廣利方金瘡出血麒麟竭末傅之立愈醫林集要産後血沖心胸喘滿命在須臾用血竭沒藥各一錢研童便和酒調服究原方收斂瘡口血竭末一字龍腦少許大棗燒灰半錢同研津調塗之摘玄方胸中血塊血竭沒藥各一兩滑石牡丹皮各一兩同煮過為末醋糊丸梧子大空心服之醫林集要嵌甲疼痛血竭末傅之簡誤凡使勿用海母血真相似只是味鹹並腥氣麒麟竭味微鹹甘似梔子氣也又云嚼之不爛如蠟者為上凡血病無瘀積者不必用日華子云此藥性急不可多使卻引膿用時勿與衆藥同研化作飛塵也龍腦香味辛甘微寒一云溫平無毒主心腹邪氣風濕積聚耳聾明目去目赤浮翳疏龍腦香稟火金之氣以生本經味辛苦氣微寒無毒其香為百藥之冠凡香氣之甚者其性必溫熱李珣言溫元素言熱是矣氣芳烈味大辛陽中之陽升也散也性善走竄開竅無往不達芳香之氣能闢一切邪惡辛熱之性能散一切風濕故主心腹邪氣及風濕積聚也耳聾者竅閉也竅開則耳自聰目赤浮翳者火熱甚也辛溫主散能引火熱之氣自外而出則目自明赤痛浮翳自去此從治之法也別録又主婦人難産者取其善走開通關竅之力耳主治參互同乳香沒藥雄黃紅藥子烏雞骨白及白蘞桑滷鹼牛黃傅一切疔腫癰疽神效聖濟總録目生浮翳龍腦為末日點三五度御藥院方頭目風熱上攻用龍腦末半兩南蓬砂末一兩頻嗅兩鼻瀕湖集簡方風熱喉痹燈心一錢黃柏五分並燒存性白礬七分煅過片腦三分為末每以一二分吹患處此陸一峰家傳絶妙方也又方鼻中鼻肉垂下者用片腦點之自入夷堅志傷寒舌出過寸者梅花片腦半分為末摻之隨手而愈又方中風牙噤無門下藥者開關散揩之五月五日午時用龍腦天南星等分為末每以一字揩齒二三十遍其口自開經驗方痘瘡狂躁心煩氣喘妄語或見鬼神瘡色赤未透者用龍腦一錢細研旋以豬心血丸芡子大每服一丸紫草湯下少時心神便定得睡發瘡總微論用獖豬第二番血清半杯紫草汁半杯和勻入龍腦一分溫服良久下瘀血一二行瘡即紅活此治痘瘡黑黶惡候醫所不治者百發百中簡誤宗奭云此物大通利關膈熱塞大人小兒風涎閉塞及暴得驚熱甚為濟用然非常服之藥震亨云龍腦屬火世知其寒而通利未達其熱而輕浮飛越喜其香而貴重動輒與麝同為桂附之助然人之陽易動陰易虧不可不思杲曰龍腦入骨風病在骨髓者宜用之為引經若風在血脈肌肉輒用腦麝反引風入骨髓如油入面莫之能出也觀三公之言則龍腦之為害可知凡中風非外來之風邪乃因氣血虛而病者忌之小兒吐瀉後成驚者為慢脾風切不可服急驚屬實熱可用慢驚屬虛寒不可用眼目昏暗屬肝腎虛者不宜入點藥誤點之必致昏暗難療蕪荑味辛平無毒主五內邪氣散皮膚骨節中淫淫溫行毒去三蟲化食逐寸白散腸中嗢嗢喘息疏蕪荑稟金氣而生於春陽之令本經味辛氣平無毒甄權加苦李珣加溫詳其功用應是苦辛溫平之藥非辛溫則不能散五臟皮膚骨節中邪毒氣非苦平則不能去三蟲化食逐寸白療腸中嗢嗢喘息然察其所主雖能除風淫邪氣之為害而其功則長於走腸胃殺諸蟲消食積也故小兒疳瀉冷痢為必資之藥主治參互同肉豆蔻胡黃連蘆薈使君子青黛五穀蟲雷丸檳榔橘皮治小兒疳熱瀉痢及腹大羸瘦面黃好吃泥土本事方制殺諸蟲生蕪荑生檳榔各四兩為末蒸餅丸如梧子每服二十丸白湯下錢氏小兒直訣疳熱有蟲瘦悴久服充飢用蕪荑一兩黃連一兩為末豬膽汁七枚和入碗內飯下蒸之一日蒸一次九蒸乃入麝香半錢湯浸蒸餅和丸緑豆大每服五七丸至二十丸米飲下危氏得效方蟲牙作痛以蕪荑仁安蛀孔中及縫中甚效入藥用大者小者即榆莢不堪入藥除疳證殺蟲外他用甚稀故不著簡誤枳殼味苦酸微寒無毒主風癢麻痹通利關節勞氣咳嗽背膊悶倦散留結胸膈痰滯逐水消脹滿大腸風安胃止風痛疏枳殼氣味所主與枳實大略相同但枳實形小其氣全其性烈故善下達如少年猛悍之將勇往直前而一無回顧者也枳殼形大其氣散其性緩故其行稍遲是以能入胸膈肺胃之分及入大腸也其主風癢麻痹通利關節止風痛者蓋肺主皮毛胃主肌肉風寒濕入於二經則皮膚瘙癢或作痛或麻木此藥有苦泄辛散之功兼能引諸風藥入於二臟故為治風所需風邪既散則關節自然通利矣其療勞氣咳嗽背膊悶倦者蓋亦指風寒鬱於上焦則肺氣滯而為悶倦咳嗽經曰肺苦氣上逆急食苦以泄之枳殼味苦能泄至高之氣故主之也又肺與大腸為表裡風邪入肺則併入大腸風熱相搏而為腸風下血苦寒下泄之氣則血熱清而風自除矣其主散留結胸膈痰滯逐水消脹滿安胃諸證悉與枳實相同第其氣稍緩耳主治參互同蘇子橘皮桔梗木香白豆蔻香附治上焦壅氣脹滿因於寒同黃連槐花乾葛防風荊芥芍藥黃芩當歸生地黃地榆側柏葉治腸風下血初起者神效同荊芥苦參防風蒼耳草敗蒲煎湯沐浴治風疹作癢同檳榔芍藥黃連升麻葛根甘草紅曲滑石治滯下里急後重得人參麥冬治氣虛大便不快同肉桂治右脅痛簡誤枳殼泄肺能損至高之氣肺氣虛弱者忌之脾胃虛中氣不運而痰壅喘急者忌之咳嗽不因於風寒入肺氣壅者服之反能作劇咳嗽陰虛火炎者服之立致危殆一概胎前産後咸不宜服今世多用以治婦人胎氣不安或至八九月為易産之劑動輒資用殊不知婦人懷孕全賴氣血以養胎氣血充足則胎自易産且娠婦至八九月精神困倦四肢軟弱飲食減少動息喘促何莫非虛弱之證而更用此耗散之藥耶正經所謂損不足而虛其虛豈不大謬哉古方有瘦胎飲者為湖陽公主而設以彼奉養太過其氣必實故用此以耗其有餘之氣則胎易産今人不知古人立方之意一概濫施誤甚誤甚枳實味苦酸寒微寒無毒主大風在皮膚中如麻豆苦癢除寒熱結止痢長肌肉利五臟益氣輕身除胸脅痰癖逐停水破結實消脹滿心下急痞痛逆氣脅風痛安胃氣止溏泄明目疏枳實感天地苦寒之氣以生故其味苦氣寒無毒別録雷公加酸甄權加辛察其功用必是苦為最而酸辛次之氣味俱厚陰也入足陽明太陰經細詳神農主治與本藥氣味大不相侔究其所因必是枳殼所主蓋二物古文原同一條後人分出時誤入耳其別録所主除胸脅痰癖逐停水破結實消脹滿心下急痞痛逆氣脅風痛安胃氣止泄瀉者是其本分內事皆足陽明太陰受病二經氣滯則不能運化精微而痰癖停水結實脹滿所自來矣胃之上口名曰賁門賁門與心相連胃氣壅則心下亦自急痞痛邪塞中焦則升降不舒而氣上逆肝木鬱於地下則不能條達而脅痛得其破散沖走之力則諸證悉除所以仲景下傷寒腹脹實結者有承氣湯胸中痞痛者有陷胸湯潔古療心下痞滿者有枳朮丸壅滯既去則胃氣自安而溏泄亦止矣末云明目者經曰目得血而能視氣旺乃能生血損氣破散之性豈能明目哉無是理也主治參互同三稜蓬荗青皮檳榔為消磨堅積之劑然須能食脾胃健者宜之同白朮橘皮厚朴甘草砂仁為枳朮丸治心下痞滿因於食入陷胸湯治傷寒寒熱結胸入大小承氣湯治傷寒熱邪入里結實脹滿痛不可當數日不更衣者簡誤此藥性專消導破氣損真觀朱震亨云瀉痰有沖牆倒壁之力其為勇悍之氣可知凡中氣虛弱勞倦傷脾以為痞滿者當用補中益氣湯補其不足則痞自除此法所當忌也脹滿非實邪結於中下焦手不可按七八日不更衣者必不可用挾熱下痢亦非燥糞留結者必不可用傷食停積多因脾胃虛不能運化所致慎勿輕餌如元氣壯實有積滯者不得已用一二劑病已即去之即潔古所制枳朮丸亦為脾胃有積滯者設積滯去則脾胃自健故謂之益脾胃之藥非消導之外復有補益之功也時醫不識病之虛實藥之補瀉往往概施損人真氣為厲不淺設誤投之雖多服參耆補劑亦難挽其克削之害也世人多踩其弊故特表以為戒厚朴味苦溫大溫無毒主中風傷寒頭痛寒熱驚悸氣血痹死肌去三蟲溫中益氣消痰下氣療霍亂及腹痛脹滿胃中冷逆胸中嘔不止泄痢淋露除驚去留熱心煩滿厚腸胃疏厚朴稟地二之氣以生兼得乎春陽之氣而成故其味苦其氣溫甄權苦辛大熱應是辛熱苦溫之藥辛熱太過則其性宜有毒以其得陽氣之正故無毒耳氣味俱厚陽中之陰降也入足太陰手足陽明經其主中風傷寒頭痛寒熱氣血痹死肌者蓋以風寒外邪傷於陽分則為寒熱頭痛風寒濕入腠理則氣血凝澀而成痹甚則肌肉不仁此藥辛能散結苦能燥濕溫熱能祛風寒故悉主之也別録又主溫中消痰下氣療霍亂及腹痛脹滿胃中冷逆胸中嘔不止泄痢心煩滿者何莫非腸胃氣逆壅滯及痰飲留結飲食生冷所致得引下泄開通溫熱暖胃暖胃則諸證不求其止而止矣至於淋露雖屬下焦為病然多因胃家濕熱下流三蟲亦腸胃濕熱所生苦能燥濕殺蟲故亦主之也本經又主驚悸及別録除驚去留熱者皆非其所宜驚悸屬心虛於脾胃絶無相干氣味大溫之藥又豈能去留熱哉至益氣厚腸胃蓋亦指邪氣去正氣自益之謂積滯消腸胃自厚之意耳非消散之外復有補益之功也用者詳之主治參互同陳皮枳殼麥糵草果山楂砂仁礬紅治傷食腹脹同橘皮黃連甘草蒼白朮葛根治濕熱作瀉同檳榔木香黃連滑石橘皮甘草白芍藥治滯下初起同白朮人參白芍藥茯苓消腹脹佐生薑橘皮藿香砂仁半夏止胃寒嘔吐同三稜蓬荗檳榔人參青皮治積年冷癖堅塊同蒼朮橘皮甘草為平胃散治胸中敦厚之氣使飲食倍增聖惠方治痰壅嘔逆心胸滿悶不下飲食用厚朴一兩薑汁炙黃為末米飲調下二錢匕張仲景金匱方治腹脹脈數厚朴三物湯用厚朴半斤枳實五枚以水一斗二升煎取五升入大黃四兩再煎取三升溫服一升轉動更服不動勿服又七物厚朴湯治腹痛脹滿用厚朴半斤甘草大黃各三兩棗十枚枳實五枚桂二兩生薑五兩以水一斗煎取四升溫服八合日三嘔者加半夏五合簡誤厚朴氣味辛溫性復大熱其功長於泄結散滿溫暖脾胃一切飲食停積氣壅暴脹與夫冷氣逆氣積年冷氣入腹腸鳴虛吼痰飲吐沫胃冷嘔逆腹痛泄瀉及脾胃壯實之人偶感風寒氣實人誤服參耆致成喘脹誠為要藥然而性專消導散而不收略無補益之功故凡嘔吐不因寒痰冷積而由於胃虛火氣炎上腹痛因於血虛脾陰不足而非停滯所致泄瀉因於火熱暴注而非積寒傷冷腹滿因於中氣不足氣不歸元而非氣實壅滯中風由於陰虛火炎猝致僵仆而非西北真中寒邪傷寒發熱頭疼而無痞塞脹滿之候小兒吐瀉乳食將成慢驚大人氣虛血稿見發膈證老人脾虛不能運化偶有停積娠婦惡阻水穀不入娠婦胎升眩暈娠婦傷食停冷娠婦腹痛瀉痢娠婦傷寒傷風産後血虛腹痛産後中滿作喘産後泄瀉反胃以上諸證法所咸忌若誤投之輕病變重重病必危世人不究其原一概濫用雖或一時未見其害而清純沖和之氣默為耗矣可不慎哉茗苦茶茗味甘微寒無毒主瘻瘡利小便去痰熱渴令人少睡苦茶主下氣消食疏茗稟土中之清氣兼得春初生髮之意本經味甘氣微寒無毒藏器言苦然亦有不苦者氣薄味厚陰中微陽降也入手太陰少陰經太陰為清肅之臟喜涼而惡熱熱則生痰而津液竭故作渴也瘻瘡者大腸積熱也小便不利者小腸熱結也甘寒入心肺而除熱則津液生痰熱解臟氣既清腑病不求其止而止矣令人少睡者蓋心藏神神昏則多睡清心經之熱則神常自惺寂故不寐也下氣消食者苦能下泄故氣下火降而兼滌除腸胃則食自消矣主治參互同黃連酸棗仁生用通草蓮實治多睡好眠同當歸川芎烏梅黑豆生地黃土茯苓甘菊花治頭痛因於血虛有火者直指方熱毒下痢蠟茶為末蜜水煎服白痢以薑汁同水煎服兩三服即愈簡誤凡茶之種類極多方宜大異要皆以味甘不澀氣芬如蘭摘於夏前者為良夫茶稟天地至清之氣生於山谷磽瘠砂土之中不受纖芥穢滓專感云露之氣以為滋培故能滌腸胃一切垢膩寧非木中清貴之品哉昔人多以其苦寒不利脾胃及多食發黃消瘦之説此皆語其粗惡苦澀品質最下者言之耳昔雅州蒙山出一種茶服四兩即為地仙豈有味甘氣芬者飲之反致疾耶但苦澀野氣葉痿莖枯非道地所産者服之不利心脾故不宜飲酒後不宜用能成飲證山茱萸味酸平微溫無毒主心下邪氣寒熱溫中逐寒濕痹去三蟲腸胃風邪寒熱疝瘕頭風風氣去來鼻塞目黃耳聾面皰溫中下氣出汗強陰益精安五臟通九竅止小便利久服輕身明目強力長年疏山茱萸感天地春生之氣兼得木之酸味神農氣平別録微溫總言其得春氣之正耳岐伯甄權加辛然嘗其味必是酸多辛少入足厥陰足少陰經陽中之陰降也其治心下邪氣寒熱腸胃風邪寒熱頭風風氣去來鼻塞面皰者皆肝腎二經所主二經虛熱故見前證肝為風木之位經曰諸風掉眩屬肝木此藥溫能通行辛能走散酸能入肝而斂虛熱風邪消散則心下腸胃寒熱自除頭目亦清利而鼻塞面皰悉愈也逐寒濕痹者經曰邪之所湊其氣必虛總借其辛溫散結行而能補也至於三蟲亦腸胃濕熱所生濕去則蟲自除能溫中則氣自下汗自出矣凡四時之令春氣暖而生秋氣涼而殺萬物之性喜溫而惡寒人身精氣亦賴陽氣溫暖而後充足況肝腎在下居至陰之位非得溫暖之氣則孤陰無以生此藥正入二經氣溫而主補味酸而主斂故精氣益而陰強也精益則五臟自安九竅自利又腎與膀胱為表裡膀胱虛寒則小便不禁耳為腎之外竅腎虛則耳聾肝開竅於目肝虛則邪熱客之而目黃二經受寒邪則為疝瘕二髒得補則諸證無不瘳矣輕身強力長年者益精安五臟之驗也主治參互同菟絲子肉蓯蓉巴戟天鹿茸牛膝白膠車前子枸杞子生地黃沙苑蒺藜麥門冬能添精固髓暖腰膝益陽道令人有子同人參五味子牡蠣益智子治老人小便淋瀝及遺尿同人乳沙苑蒺藜熟地黃人參麥門冬牛膝甘菊花治腦骨痛腦為髓之海髓足則腦痛自除同石菖蒲甘菊花地黃黃柏五味子治腎虛耳聾同杜仲牛膝地黃白膠山藥治腎虛腰痛入六味地黃丸為腎虛而有濕熱者所須簡誤命門火熾強陽不痿者忌之膀胱熱結小便不利者法當清利此藥味酸主斂不宜用陰虛血熱不宜用即用當與黃柏同加紫葳味酸微寒無毒主婦人産乳余疾崩中癥瘕血閉寒熱羸瘦養胎疏紫葳即凌霄花也稟春氣以生故其味酸氣微寒無毒花開於夏而色赤味應帶苦入肝行血之峻藥故主婦人産乳余疾及崩中癥瘕血閉寒熱羸瘦諸證至於養胎決非其性所宜用者慎之主治參互同當歸紅花川芎牛膝地黃延胡索桃仁蘇方木五靈脂治壯實婦人經閉普濟方嬰兒百日內無故口青不飲乳同凌霄花大藍葉芒硝大黃等分為末以羊髓和丸梧子大每研一丸乳送下便能吃乳熱者可服寒者忌之簡誤紫葳長於破血消瘀凡婦人血氣虛者一概勿施胎前斷不宜用胡桐淚味鹹苦大寒無毒主大毒熱心腹煩滿水和服之取吐又主牛馬急黃黑汗水研三二兩灌之立瘥疏胡桐淚稟地中至陰之氣而兼水化故味鹹苦氣大寒無毒氣味俱厚陰中之陰也入足陽明經經曰熱淫於內治以鹹寒又曰在高者因而越之苦以湧吐寒以勝熱故主大毒熱心腹煩滿取吐而效也牛馬性熱而又犯熱病所以急黃黑汗也鹹寒能除大熱故亦主之日華子以之治風蟲牙齒痛李珣謂其能治骨槽風齒𧈟元素言瘰癧非此不能除皆資其苦能殺蟲咸能入骨軟堅大寒能除極熱之用耳主治參互聖惠方牙疼出血胡桐淚半兩研入麝香少許夜夜貼之又方牙疳宣露膿血臭氣者胡桐淚一兩枸杞根一升每用五錢煎水熱漱聖濟總録牙齒蠹黑乃腎虛也胡桐淚一兩丹砂半兩麝香一分為末摻之除口齒藥外他用甚稀故不著簡誤豬苓味甘苦平無毒主痎瘧解毒蠱疰不祥利水道久服輕身耐老疏豬苓稟戊土之陽氣得風木之陰氣本經謂其味甘應兼淡苦其氣平而無毒氣味俱薄降也陽中陰也入足太陽足少陰經其主痎瘧者瘧必由暑暑必兼濕淡以利竅引暑濕之氣從小便出所以分消之也淡湧之性故利水道濕勝則身重濕去則身輕利竅之藥必能走泄精氣其曰久服耐老必無是理矣解蠱毒疰不祥義將安出亦未可盡信也主治參互入五苓散為除濕之要藥佐白芍藥白茯苓人參橘皮朮澤瀉治水腫之屬陽分者佐白芍藥生地黃桑寄生桑根白皮茯苓澤瀉琥珀石斛薏苡仁肉桂治水腫之屬陰分者均為要藥其功長於利水故善除濕簡誤寇宗奭曰豬苓利水之功多久服必損腎氣昏人目潔古曰淡滲太燥能亡津液無濕證勿服皆確論也有濕尚宜暫用久服斷乎不可烏藥味辛溫無毒主中惡心腹痛蠱毒疰忤鬼氣宿食不消天行疫瘴膀胱腎間冷氣攻衝背膂婦人血氣小兒腹中諸蟲疏烏藥稟地二之氣以生故味辛氣溫無毒然嘗其味亦帶微苦氣亦微香氣厚於味陽也入足陽明少陰經其主中惡心腹痛疰忤鬼氣天行疫瘴者皆足陽明受病陽明開竅於口鼻凡邪惡鬼忤與夫疫瘴之氣侵人悉從口鼻而入此藥辛溫暖胃辟惡散邪故能主諸證也胃暖則宿食自消辛散則蠱毒亦解又腎與膀胱為表裡虛則寒客之而冷氣攻衝背膂辛溫能散寒邪其性又善下走則冷氣攻衝自止也性溫走泄故復能散婦人血凝氣滯微苦而辛故又能療小兒腹中諸蟲也主治參互同沉香木香白豆蔻香附橘皮檳榔治婦人氣實暴氣壅脹濟生方治七情鬱結上氣喘急用四磨湯降中兼升瀉中帶補其方以人參烏藥沉香檳榔各磨濃汁七分煎細細咽之和劑局方烏沉湯治一切氣一切冷補五臟調中壯陽暖腰膝去邪氣冷風麻痹膀胱腎間冷氣攻衝背膂俯仰不利風水毒腫吐瀉轉筋癥癖刺痛中惡心腹痛鬼氣疰忤天行疫瘴婦人血氣痛用天台烏藥一百兩沉香五十兩人參三兩炙甘草四兩為末每服半錢薑鹽湯空心點服簡誤烏藥辛溫散氣病屬氣虛者忌之世人多以香附同用治女人一切氣病不知氣有虛有實有寒有熱冷氣暴氣用之固宜氣虛氣熱用之能無貽害耶以故婦人月事先期小便短赤及咳嗽內熱口渴口乾舌苦不得眠一切陰虛內熱之病皆不宜服沒藥味苦平無毒主破血止痛療金瘡杖瘡諸惡瘡痔漏卒下血目中翳暈痛膚赤疏沒藥稟金水之氣以生故味苦平無毒然平應作辛氣應微寒氣薄味厚陰也降也入足厥陰經凡惡瘡痔漏皆因血熱瘀滯而成外受金刃及杖傷作瘡亦皆血肉受病血肉傷則瘀而發熱作痛此藥苦能泄辛能散寒能除熱水屬陰血亦屬陰以類相從故能入血分散瘀血治血熱諸瘡及卒然下血證也肝開竅於目目得血而能視肝經血熱則目為赤痛浮翳散肝經之血熱則目病除矣主治參互同延胡索乳香乾膝鱉甲琥珀為末治産後血暈有神效加人參澤蘭生地益母草蘇木作湯送前藥治兒枕痛及惡露未淨腹痛寒熱等證立效同乳香白及白蘞紫花地丁半枝蓮夏枯草忍冬藤連翹甘菊貝母治一切癰疽疔腫同乳香當歸牡丹皮牛膝續斷川芎番降香穿山甲治內傷胸脅骨痛入一切膏藥能消毒止痛長肉御藥院方筋骨損傷米粉四兩炒黃入沒藥乳香末各半兩酒調成膏攤貼之奇效良方金刃所傷未透膜者乳香沒藥各一錢以童子小便半盞酒半盞溫化服之圖經本草婦人腹痛內傷㽱刺沒藥末一錢酒服便止又治婦人血暈方同婦人良方産後惡血沒藥血竭末各一錢童便溫酒各半盞煎沸服良危氏得效方女人異疾月事退出皆作禽獸之形欲來傷人先將綿塞陰戶乃頓服沒藥末一兩白湯調下即愈簡誤孕婦不宜服凡骨節痛與夫胸腹脅肋痛非瘀血停留而因於血虛者不宜用産後惡露去多腹中虛痛者不宜用癰疽已潰不宜用目赤浮翳非血熱甚者不宜用大概其功長於通滯血血滯則氣亦壅氣血壅滯則經絡滿急經絡滿急故發腫作痛打撲踠跌亦傷經絡血分血氣不行故壅滯作腫痛也沒藥善通壅滯之血血行則氣亦行氣血流通則腫痛自止矣故為諸瘡癰及金瘡杖瘡跌撲傷損腹中血結作痛之要藥而不主諸虛也安急香味辛苦平無毒主心腹惡氣鬼疰疏安息香稟火金之氣而有水故味辛苦氣平而芳香性無毒氣厚味薄陽也入手少陰經少陰主藏神神昏則邪惡鬼氣易侵芳香通神明而闢諸邪故能主鬼疰惡氣也主治參互同鬼臼犀角牛黃丹砂乳香蘇合香龍齒雄黃麝香治鬼疰尸疰殺癆蟲寐魘暴亡及大人小兒卒中邪惡氣奇效良方小兒驚邪安息香一豆許燒之自除簡誤病非關邪惡氣侵犯者不宜服仙人杖味鹹平一云冷無毒主噦氣嘔逆闢痁小兒吐乳大人吐食並水煮服小兒驚癇及夜啼安身伴睡良又主痔病燒為末服方寸匕疏仙人杖此筍之將成竹時立死者得筍之氣已過稟竹之性未全故味鹹氣平無毒其功用在竹茹竹黃之間所主噦氣嘔逆小兒吐乳闢痁大人吐食痔瘡者竹茹之用也療小兒驚癇及夜啼者竹黃之用也雖其形已痿而其性尚存故能療諸證也又祕方用此蘸麻油於空室中燃之取滴下油塗癰疽已潰之肉如神他用甚稀故無主治簡誤海桐皮味苦平無毒主霍亂中惡赤白久痢除疽𧈟疥癬牙齒蟲痛並煮服及含之水浸洗目除浮赤疏海桐皮稟木中之陰氣以生本經味苦氣平無毒然詳其用味應帶辛氣薄味厚陰中陽也入足太陰陽明經二經虛則外邪易入為霍亂中惡辛以散之濕熱內侵為疳𧈟久痢苦以泄之又脾胃主肌肉濕熱浸淫則生蟲而為疥癬苦能殺蟲平即微寒濕熱去而疥癬除矣其主漱齒洗目者亦取其苦寒殺蟲辛平散風熱之意耳李珣以之治腰腳不遂血脈頑痹腿膝疼痛之證其為辛苦之劑無疑矣主治參互續傳信方治腰膝痛不可忍用海桐皮二兩牛膝芎藭羌活地骨皮五加皮各一兩甘草半兩薏苡仁二兩生地黃十兩煎浸洗焙乾銼細以綿包裹入無灰酒二斗浸之冬二七日夏一七日空心飲一盞每日早午晚各飲一盞長令醺醺合時不得添減禁毒食此藥治因風濕濕熱流注下焦腰膝為病若因陰虛血少火熾而得者勿服同真川槿皮輕粉蛇床子山大黃為末傅癬瘡簡誤腰痛非風濕者不宜用大腹微溫無毒主冷熱氣攻心腹大腸壅毒痰膈醋心並以薑鹽同煎入疏氣藥良疏大腹皮即檳榔皮也其氣味所主與檳榔大略相同茅檳榔性烈破氣最捷腹皮性緩下氣稍遲入足陽明太陰經二經虛則寒熱不調逆氣攻走或痰滯中焦結成膈證成濕熱鬱積酸味醋心辛溫暖胃豁痰通行下氣則諸證除矣大腸壅毒以其辛散破氣而走陽明故亦主之也主治參互同白朮茯苓車前子木瓜桑白皮五加皮豬苓澤瀉薏苡仁蠡魚治水腫有效虛者加人參簡誤鴆鳥多集檳榔樹上凡用檳榔皮宜先洗去黑水復以酒洗後以大豆汁再洗過曬乾入灰火煨用性與檳榔相似病涉虛弱者概勿使用合歡味甘平無毒主安五臟利心志令人歡樂無憂久服輕身明目得所欲疏合歡稟土氣以生故味甘氣平無毒入手少陰足太陰經土為萬物之母主養五臟心為君主之官本自調和脾虛則五臟不安心氣躁急則遇事拂鬱多憂甘主益脾脾實則五臟自安甘可以緩心氣舒緩則神明自暢而歡樂無憂神明暢達則覺照圓通所欲咸遂矣嵇叔夜養生論云合歡蠲忿正此之謂歟其主輕身明目及大明主消癰疽緩筋骨者皆取其能補心脾生血脈之功耳主治參互與白蠟同入膏能長肌肉續筋骨甚捷獨行方肺癰唾濁心胸甲錯取夜合皮一掌大水三升煎取一半分二服百一選方撲損折骨夜合樹皮去粗皮炒黑色四兩芥菜子炒一兩為末每服二錢溫酒臥時服以滓外傅接骨神妙子合橘核木瓜牛膝能治疝濕熱者為黃柏寒濕者加茴香子氣味和平與病無忤故不著簡誤五倍子味苦酸平無毒療齒宣疳𧈟肺臟風毒流溢皮膚作風濕癬瘡瘙癢膿水五痔下血不止小兒面鼻疳瘡疏五倍子得木氣而兼金水之性其味苦酸澀氣平無毒氣薄味厚斂也陰也入手太陰足陽明經本經主齒宣疳𧈟風濕癬瘡及小兒面鼻疳瘡者皆從外治取其苦能殺蟲酸平能斂浮熱性燥能主風濕瘡癢膿水五痔下血者大腸積熱也大腸與肺為表裡肺得斂肅則大腸亦自清寧也藏器療腸虛泄利日華子主生津液消酒毒時珍謂其斂肺降火化痰飲止咳嗽消渴盜汗斂潰瘡金瘡收脫肛子腸墜下者悉假其入肺清金收斂固脫之功耳主治參互同地骨皮小薊皮硝甘草苦參蔥頭煎湯洗楊梅結毒集靈方自汗盜汗用五倍子研末津調填臍中縛定一夜即止化痰生津噙化丸用五倍子安大鉢頭內用煮糯米粥湯浸蓋好安靜處七日後常看待發芽黃金色又出黑毛然後將箸試之若透內無硬即收入細瓦鉢中擂如醬連鉢日中曬至上皮乾了又擂勻又曬曬至可丸方丸彈子大曬乾收用其味甘酸能化一切膠痰又方脾泄久利五倍子炒半斤除倉米炒一升丁香細辛木香各三錢川椒五錢為末每服一錢蜜湯下日二服忌生冷魚肉和劑局方玉鎖丹治腎經虛損心氣不足思慮太過真陽不固溺有餘瀝小便白濁如膏夢中頻遺盜汗虛煩食減乏力此方性溫不熱極有神效五倍子一斤白茯苓四兩龍骨二兩為末水糊丸梧子大每服七十丸食前鹽湯送下日三服百一選方臟毒下血五倍子不拘多少為末大鯽魚一枚去腸胃鱗鰓填藥令滿入瓶內煅存性為末每服一錢溫酒下直指方大腸痔疾五倍子煎湯熏洗或燒煙燻之自然收縮三因方脫肛不收用五倍子末三錢入白礬少許水一碗煎湯洗之立效婦人良方産後腸脫五倍子末摻之博濟方風毒攻眼腫癢澀痛不可忍者或上下瞼赤爛或浮翳瘀肉侵睛神效驅風散五倍子一兩蔓荊子一兩半為末每用二錢水二盞銅石器內煎汁去滓乘熱洗大能明目去澀楊子建護命方牙齦腫痛五倍子兩許瓦焙研末以半錢傅痛處片時唾去涎內服去風熱藥端效方白口惡瘡狀如木耳不拘大人小兒並用五倍子青黛等分為末以筒吹之儒門事親赴筵散治口舌生瘡五倍子密陀僧等分為末漿水漱過干貼之院方加晚蠶蛾杏林摘要魚口瘡毒初起未成膿者用五倍子炒黃研入百草霜等分以臘醋調塗患處一日一夜即消拔萃方一切金瘡五倍子降真香等分炒研末傅之皮肉自痊簡誤五倍子性燥急而專收斂咳嗽由於風寒外觸者忌之瀉痢非腸虛脫者忌之咳嗽由於肺火實者忌之若誤服之反致壅塞喘滿以其酸斂太驟火氣無從泄越故耳天竺黃味苦寒無毒主小兒驚風天吊鎮心明目去諸風熱療金瘡止血滋養五臟疏天竺黃竹之津氣結成其氣味功用與竹瀝大同小異茅竹黃氣微寒而性亦稍緩故為小兒家要藥入手少陰經小兒驚風天吊諸風熱者亦猶大人熱極生風之候也此藥能除熱養心豁痰利竅心家熱清而驚自平主君安而五臟鹹得滋養故諸證悉除也明目療金瘡者總取其甘寒涼血清熱之功耳主治參互同牛黃犀角丹砂茯神琥珀酸棗仁遠志鉤藤鉤治小兒驚癇癲疾有痰者加牛膽南星貝母竹瀝屬虛者去南星加人參錢乙方小兒驚熱天竺黃二錢雄黃牽牛末各一錢研勻麵糊丸栗米大每服三五丸薄荷湯下除小兒驚癇痰熱外無別用故不著簡誤密蒙花味苦平微寒無毒主青盲浮翳赤澀多眵淚消目中赤脈小兒麩豆及疳氣攻眼疏密蒙花稟土氣以生其蕊萌於冬而開於春故氣平微寒味甘而無毒為厥陰肝家正藥觀本經所主無非肝虛有熱所致蓋肝開竅於目目得血而能視肝血虛則為青盲浮翳肝熱甚則為赤腫眵淚赤脈及小兒豆瘡餘毒疳氣攻眼此藥甘以補血寒以除熱肝血足而諸證無不愈矣好古謂其潤肝燥守真以之治畏目羞明誠謂此也形與芫花相似但芫花狹小而密蒙花差大為異用者宜詳辨之主治參互同空青木賊生地黃蟬蛻白蒺藜穀精草決明子羚羊角治青盲翳障同甘菊花枸杞子生地黃白蒺藜穀精草治肝腎虛目不能遠視同黃連赤芍藥防風荊芥穗黃柏甘菊花甘草龍膽草治風熱濕熱眼赤痛同胡黃連白蕪荑使君子蟬蛻木賊蘆薈治小兒疳積眼目不明療眼疾外無他用故不著簡誤
