body:
  text: 卷十四木部下品總九十九種今疏其要者二十九種巴豆蜀椒皂莢子子刺附訶黎勒楝實根附椿木葉樗木附郁李仁無食子黃藥根雷丸蘇方木胡椒南燭枝葉橡實石南益智子紫荊木紫真檀烏桕木杉材接骨木樺木皮木鱉子番木鱉附鉤藤赤柳木水楊葉柞木皮棕櫚木槿巴豆味辛溫生溫熟寒有大毒主傷寒溫瘧寒熱破癥瘕結聚堅積留飲痰癖大腹水脹蕩滌五臟六腑開通閉塞利水穀道去惡肉除鬼毒蠱疰邪物殺蟲魚療女子月閉爛胎金瘡膿血不利丈夫陰殺斑蝥毒可煉餌之益血脈令人色好變化與鬼神通疏巴豆生於盛夏六陽之令而成於秋金之月故味辛氣溫得火烈剛猛之氣故其性有大毒別録言生溫熟寒恐熟亦不甚寒氣薄味厚降也陽中陰也入手足陽明經其主破癥瘕結聚堅積留飲痰癖大腹水腫鬼毒蠱疰邪物女人月閉者皆腸胃所治之位中有實邪留滯致主諸病故腸胃有病則五臟六腑閉塞不通此藥稟火性之急速兼辛溫之走散入腸胃而能蕩滌一切有形積滯之物則閉塞開水穀道利月事通而鬼毒蠱疰邪物悉為之驅逐矣溫瘧者亦暑濕之氣入於腸胃也腸胃既清則溫瘧自止火能灼物故主爛胎及去惡肉性熱有大毒則必有損於陰故不利丈夫陰本經又主傷寒寒熱及別録煉餌之法悉非所宜豈有辛熱大毒之物而能治傷寒寒熱及益血脈好顏色之理哉主治參互同白礬枯過去巴豆單用礬研細吹入喉中流出熱毒涎喉即寬治急喉痹如神一味炒煙盡存性研膏治癰疽潰後腐肉不落傅上即拔毒去瘀生新外臺祕要飛尸鬼擊中惡心痛腹脹大便不通走馬湯用巴豆二枚去皮心熬黃杏仁二枚以綿包捶碎熱湯一合捻取白汁服之當下而愈量老少用之瑣碎録天絲入咽凡露地飲食有飛絲入上食之令人咽喉生瘡急以白礬巴豆燒灰吹入即愈經驗方耳卒聾閉巴豆一粒綿裹針刺孔通氣塞之取效普濟方一切惡瘡有蟲者巴豆三十粒麻油煎黑去豆以油調硫黃輕粉末頻塗取效仲景三物白湯治傷寒懊憹滿悶身無熱者為寒結胸用桔梗三分巴豆一分去皮心熬黑貝母三分二味為末納巴豆臼中杵之以白湯和服強人半錢弱者減之病在膈上必吐在膈下必利不利進熱粥一杯利過不止進冷粥一杯簡誤元素曰巴豆乃斬關奪門之將不可輕用世以之治酒病膈氣以其辛熱能開通腸胃鬱結耳第鬱結雖開而血液隨亡真陰虧損從正曰傷寒風溫小兒痘瘡婦人産後用之下膈不死亦危奈何庸人畏大黃而不畏巴豆以其性熱而劑小耳豈知蠟匱之猶能下後使人津液枯竭胸熱口燥耗卻天真留毒不去他病轉生觀二公之言則巴豆之為害昭昭矣然而更有未盡者巴豆稟火烈之氣沾人肌肉無有不灼爛者試以少許輕擦完好之膚須臾即發出一泡況腸胃柔脆之質下咽則徐徐而走且無論下後耗損真陰而腑臟被其熏灼能免無潰爛之患耶凡一概湯散丸劑切勿輕投即不得已急證欲借其開通道路之力亦須炒熟壓令油極淨入分許即止不得多用蜀椒味辛溫大熱有毒主邪氣咳逆溫中逐骨節皮膚死肌寒濕痹痛下氣除六腑寒冷傷寒溫瘧大風汗不出心腹留飲宿食腸澼下痢泄精女子字乳余疾散風邪瘕結水腫黃疸鬼疰蠱毒殺蟲魚毒久服頭不白輕身增年開腠理通血脈堅齒髮調關節耐寒暑可作膏藥多食令人乏氣口閉者殺人疏蜀椒稟火金之氣得南方之陽受西方之陰本經味辛氣溫別録大熱有毒氣味俱厚陽也入手足太陰兼入手厥陰經其主邪氣咳逆皮膚死肌寒濕痹痛心腹留飲宿食腸澼下痢黃疸水腫者皆脾肺二經受病肺出氣主皮毛脾運化主肌肉肺虛則外邪客之為咳逆上氣脾虛則不能運化水穀為留飲宿食腸澼下痢水腫黃疸二經俱受風寒濕邪則為痛痹或成死肌或致傷寒溫瘧辛溫能發汗開腠理則外邪從皮膚而出辛溫能暖腸胃散結滯則六腑之寒冷除腸胃得溫則中焦治而留飲宿食腸澼下痢水腫黃疸諸證悉愈矣其主女子字乳余疾者亦指風寒外侵生冷內停而言泄精瘕結由下焦虛寒所致此藥能入右腎命門補相火元陽則精自固而結瘕消矣療鬼疰蠱毒殺蟲魚毒者以其得陽氣之正能破一切幽暗陰毒之物也外邪散則關節調內病除則血脈通佐補陰涼血之藥則頭不白齒髮堅耐寒暑輕身增年所自來矣主治參互同女貞子牛膝地黃何首烏旱蓮草枸杞子沒食子桑椹子黃柏人參南燭子能烏須黑髮悅色駐顏空心單服能收輕粉水銀毒椒紅丸治元臟傷憊目暗耳聾服此百日覺身輕少睡足有力是其效也服及三年心智爽悟目明倍常面色紅悅髭發光黑用蜀椒去目及閉口者炒出汗曝乾搗取紅一斤以生地黃搗自然汁入砂器中煎至一升候稀稠得所和椒末丸梧子大每空心暖酒下三十丸合藥時勿令婦人雞犬見孫真人方心腹冷痛以布裹椒安痛處用尉斗尉令椒出汗即止普濟方飧泄不化及久利小椒一兩炒蒼朮二兩土炒研末醋糊丸梧子大每五十丸米飲下經驗方囊瘡痛癢紅椒七粒蔥頭七個煎水洗之大全良方寒濕腳氣川椒二三升疏布囊盛之日以踏腳入仲景烏梅丸治蛔厥宗奭方治盜汗將椒目微炒研細用半錢以生豬上唇煎湯一合睡時調服無不效甄權方治腎虛耳中如風水鳴或如鐘磬之聲卒暴聾者用椒目巴豆菖蒲同研細以松脂黃蠟溶和為挺納耳中抽之一日一易神驗千金方水氣腫滿椒目炒搗細每酒服方寸匕簡誤椒稟純陽之氣乃除寒濕散風邪溫脾胃暖命門之聖藥然而肺胃素有火熱或咳嗽生痰或嘈雜醋心嘔吐酸水或大腸積熱下血咸不宜用凡泄瀉由於火熱暴注而非積寒虛冷者忌之陽痿腳弱由精血耗竭而非命門火衰虛寒所致者不宜入下焦藥用咳逆非風寒外邪壅塞者不宜用字乳余疾由於本氣自病者不宜用水腫黃疸因於脾虛而無風濕邪氣者不宜用一切陰虛陽盛火熱上衝頭目腫痛齒浮口瘡衄血耳聾咽痛舌赤消渴肺痿咳嗽咯血吐血等證法所咸忌皂莢味辛咸溫有小毒主風痹死肌邪氣風頭淚出利九竅殺精物療腹脹滿消穀除咳嗽囊結婦人胞不落明目益精可為沐藥疏皂莢稟木氣而兼火金之性故味辛微咸氣溫有小毒氣味俱厚浮而散陽也入足厥陰手太陰陽明經厥陰為風木之臟其主風痹死肌頭風淚出者皆厥陰風木為病得金氣之厚者能勝木稟辛散之性者能利竅木氣平關竅利則風邪散諸證除也關竅既利則神明自通精物邪氣安得不去哉又厥陰之脈循陰氣而絡於肝厥陰客寒為囊結辛溫散厥陰之寒則囊結解矣肺受風寒所迫為咳嗽入肺散邪則咳嗽止矣咸能軟堅溫主通行辛能開竅橫走故又主腹脹滿消穀及婦人胞不落也宣壅導滯之性而云益精明目無是理矣附子氣味與皂莢同炒舂去赤皮以水浸軟煮熟糖漬食之疏導五臟風熱壅滯及治大腸虛祕瘰癧惡瘡腫毒附刺功用與莢同第其鋭利能直達瘡所為癰疽妒乳疔腫未潰之神藥蘇頌以米醋熬嫩刺作煎塗癬瘡有奇效又治癘風惡瘡胎衣不下殺蟲凡癰疽已潰不宜服孕婦亦忌之主治參互同真珠象牙末牛黃冰片白殭蠶滴乳石土茯苓治蛀疳神效孫用和稀涎散治中風昏昏如醉形體不收或倒或不倒或口角流涎斯須不治便成大病此證風涎潮於上胸痹不通急宜吐之用大皂莢肥實不蛀者四挺去黑皮白礬明者一兩為末每用半錢重者三字溫水調灌不大嘔吐只是微微稀冷涎或出一升二升當待醒醒乃用藥調治不可便大吐之恐過劑傷人纍效不能盡述聖惠方胸中痰結皂莢三十挺去皮切水五升浸一夜挼取汁慢熬至可丸如梧子大每食後鹽漿水下十丸又釣痰膏用半夏醋煮過以皂角膏和勻入明礬少許以柿餅搗膏丸如彈子大噙之千金方二便關格皂角燒研粥飲下三錢立通宣明方鐵腳丸同千金方齆鼻不通皂角末吹之十全方風蟲牙痛豬牙皂角食鹽等分為末日揩之袖珍方便毒腫痛豬牙皂角七片煨黃去皮弦出火毒為末空心溫酒服五錢婦人妒乳同直指方便毒癰疽皂角一條醋熬膏傅之屢效儒門事親便癰初起皂角子七枚研末水服效阮氏經驗方年久瘰癧用不蛀皂角子一百粒米醋一升蓬砂二錢同煮乾炒令酥看癧子多少如一個服一粒十個服十粒細嚼米湯下酒浸煮服亦可一云虛人不可用蓬砂同蟬蛻白殭蠶杏仁芭蕉根白毛藤土茯苓獨核肥皂仁白鮮皮連翹薏苡仁萆薢漢防己治下疳廣瘡神效同連翹白芷甘菊紫花地丁白及金銀花甘草鼠黏子茜草地榆治下部癰疽腫毒神仙傳崔言患大風惡疾雙目昏盲眉發自落鼻梁崩倒勢不可救遇異人傳方用皂角刺三斤燒灰蒸一時久日乾為末食後濃煎大黃湯調一匕飲之一旬眉發再生肌潤目明簡誤皂莢利九竅疏導腸胃壅滯洗垢膩豁痰涎散風邪暴病氣實者用之殊效第似中風證由於陰虛火炎煎熬津液結而為痰熱極生風以致猝然僕蹶世人多以稀涎散吐之損其不足竭其津液津液愈耗則經絡無以榮養為拘攣偏廢之證矣法所最忌也孕婦忌服訶黎勒味苦溫無毒主冷氣心腹脹滿下食疏訶黎勒其味苦澀其氣溫而無毒苦所以泄澀所以收溫所以通惟斂故能主冷氣心腹脹滿惟溫故能下食甄權用以止水道蕭炳用以止腸澼久泄蘇頌用以療腸風瀉血帶下朱震亨用以實大腸無非苦澀收斂治標之功也主治參互得人參治肺虛受寒喘嗽得橘皮砂仁主冷氣入內心腹脹滿及因寒食不下得益智止氣虛小水不禁佐樗根白皮止腸澼瀉血佐白朮蓮實止久泄因於虛寒同蛇床子五味子山茱萸杜仲川斷止虛寒帶下同人參肉豆蔻則實大腸簡誤訶子性溫而味澀澀主斂不主散故咳嗽因於肺有實熱泄瀉因於濕熱所致氣喘因於火逆衝上帶下因於虛熱而不因於虛寒及腸澼初發濕熱正盛小便不禁因於腎家虛火法並忌之至於滯下必本濕熱喘嗽實由肺火用之立致殺人不可不深戒也東垣謂苦重瀉氣酸輕不能補肺故嗽藥中不用亦此意耳楝實味苦寒有小毒主溫疾傷寒大熱煩狂殺三蟲疥瘍利小便水道即金鈴子根微寒療蛔蟲利大腸疏楝實稟天之陰氣得地之苦味故其味苦氣寒極苦而寒故其性有小毒氣薄味厚陰也降也入足陽明手足太陰經經曰冬傷於寒春必病溫其主溫疾傷寒大熱煩狂者總因寒邪郁久至春變為溫病邪在陽明也苦寒能散陽明之邪熱則諸證自除膀胱為州都之官小腸為受盛之官二經熱結則小便不利此藥味苦氣寒走二經而導熱結則水道利矣濕熱鬱積則內生諸蟲濕熱浸淫則外為疥瘍得大寒極苦之物則濕熱散故能療諸蟲及疥瘍也根氣味相同故亦主殺蟲利大腸耳主治參互同牛膝木瓜橘核荔枝核杜仲巴戟天烏穠樹子茴香治腎虛疝氣淡寮方楝實丸治㿗疝腫痛或鉤腎偏墜痛不可忍用川楝子肉五兩分作五分一分用破故紙二錢炒黃一分用小茴香三錢食鹽半錢同炒一分用斑蝥七枚去頭足同炒一分用萊蔔子一錢同炒一分用牽牛子三錢同炒炒完揀去食鹽萊蔔子牽牛斑蝥只留故紙茴香同研為末以酒打麵糊丸梧子大每服五十丸空心酒下根同白蕪荑檳榔鶴蝨黃連牽牛雷丸使君子錫灰烏梅蘆薈殺腸胃一切蟲集簡方治小兒蛔蟲楝根皮同雞卵煮熟空心服之次日蟲下簡誤脾胃虛寒者不宜用椿木葉味苦有毒主洗瘡疥風疽皮主疳𧈟樗木根葉尤良雷公云凡使椿根不近西頭者為上採出拌生蔥蒸半日銼細以袋盛挂屋南陰乾用疏椿稟地中之陰氣以生本經味苦有毒甄權言微熱震亨言涼而燥然考其用必是微寒苦燥之藥入手足陽明經本經主疳𧈟及洗疥瘡風疽藏器去口鼻疳蟲疥𧈟者因腸胃有濕熱故現是證苦涼而燥所以外治皆得也藏器又主殺蛔蟲蠱毒下血及赤白久痢日華子主腸風瀉血蕭炳云得地榆主疳痢孟詵云止女子血崩及産後血不止赤帶皆取其苦能燥濕寒能除熱澀能收斂之功耳採得去粗皮蜜炙用樗功用相同主治參互存仁方下血經年樗根白皮三錢水一盞煎七分入酒半盞服外臺祕要小兒疳痢困重者用樗根白皮搗粉以水和棗作大餛飩子日曬少時又搗如此三遍以水煮熟空腹吞七枚重者不過七服愈子母祕録小兒疳疾椿根白皮日乾二兩為末以粟米淘淨研濃汁和丸梧子大十歲兒三四丸米飲下量大小加減仍以一丸納竹筒中吹入鼻內三度良經驗方下利清血腹中刺痛椿根白皮洗刮曬研醋糊丸梧子大空心米飲下三四十丸婦人良方産後腸脫不能收拾者樗根取皮焙乾一握水五升連根蔥五莖漢椒一撮同煎至三升去渣傾盆內乘熱熏洗冷則再熱一服可作五次用洗後睡少時忌鹽酢醬面發風毒物及用心勞力等事丹溪方女人白帶椿根白皮滑石等分為末粥丸梧子大空腹白湯下一百丸寇宗奭云洛陽一女子年四十六七耽飲無度多食魚蟹蓄毒在臟日夜二三十瀉大便與膿血雜下大腸連肛門痛不堪忍醫以止血痢藥不效又以腸風藥則益甚蓋腸風則有血無膿如此半年氣血漸弱食減肌瘦服熱藥則腹愈痛血愈下服冷藥則注泄食減服溫平藥則病不知如此期年垂命待盡或人教服人參散一服知二服減三服膿血皆定遂常服之而愈其方治大腸風虛飲酒過度挾熱下痢膿血痛甚多日不瘥用樗根白皮一兩人參一兩為末每服二錢空心米飲調服忌油膩濕面青菜果子甜物雞豬魚羊蒜薤等簡誤脾胃虛寒者不可用崩帶屬腎家真陰虛者亦忌之以其徒燥故也凡滯下積氣未盡者亦不宜遽用不入湯煎郁李仁味酸平無毒主大腹水腫面目四肢浮腫利小便水道疏郁李仁得木氣而兼金化本經味酸氣平無毒元素言辛苦性潤而降下陰也入足太陰手陽明太陽經其主大腹水腫面目四肢浮腫者經曰諸濕腫滿皆屬脾土又曰諸腹脹大皆屬於熱脾虛而濕熱客之則小腸不利水氣泛溢於面目四肢辛苦能潤熱結降下善導癃閉小便利則水氣悉從之而出矣甄權主腸中結氣關格不通日華子云泄五臟膀胱結痛宣腰胯冷膿消宿食下氣元素云破血潤燥李杲云專治大腸氣滯燥澀不通均得之矣主治參互同當歸地黃麻仁麥門冬桃仁生蜜肉蓯蓉治大便燥結不通甚者加大黃楊氏産乳腫滿氣急不得臥用郁李仁一大合搗和麵作餅吃入口即大便通泄氣便愈簡誤郁李仁性專降下善導大腸燥結利周身水氣然而下後多令人津液虧損燥結愈甚乃治標救急之藥津液不足者慎勿輕用無食子味苦溫無毒主赤白痢腸滑生肌肉疏無食子稟春生之氣兼得西北金水之性故味苦氣溫無毒金主斂肅大腸屬金以類相從故主赤白痢腸滑春為發生之令溫能和脾胃養腠理故主生肌肉水為潤下色黑而象腎故李珣以之益血生精和氣安神烏髭發治陰痿諸證也得溫暖之氣復兼收斂之性故為固澀精氣之要藥雷公云凡使勿犯銅鐵並被火驚者用顆小無杴米者炒用漿水於砂盆中研令盡焙乾再研如烏犀色入藥主治參互同蓮鬚女貞子枸杞子地黃南燭子何首烏黃精旱蓮草朮人參為烏鬚髮之勝藥同覆盆子牡蠣枸杞子五味子車前子地黃蓮鬚龍骨鹿茸沙苑蒺藜魚膘膠砂仁黃柏能補益精氣治一切夢遺泄精仲景方治陰汗用無食子燒灰先以湯浴了布裹灰撲之甚良宮氣方小兒久痢沒食子二個熬黃研末作餛飩食之聖濟總録牙齒疼痛綿裹無食子末一錢咬之涎出吐去聖惠方大小口瘡沒食子炮三分甘草一分研末摻之月內小兒生者少許置乳上吮之入口即啼不過三次奇效方足趾肉刺無食子三枚肥皂莢一挺燒存性為末醋和傅之立效簡誤赤白痢由於濕熱鬱於腸胃兼積滯多者不宜用黃藥根味苦平無毒主諸惡腫瘡瘻喉痹蛇犬咬毒研水服之亦含亦塗疏黃藥根得土中至陰之氣以生故其色黃味苦氣平無毒平即兼涼日華子加涼是矣氣薄味厚降多升少陰也入手少陰足厥陰經諸惡腫瘡瘻皆榮氣不從逆於肉裡所致蓋榮主血肝心又主血藏血之臟二經得苦涼之氣則血熱解榮氣和標證不求其止而止矣經曰一陰一陽結為喉痹一陰者少陰君火也一陽者少陽相火也解少陰之熱相火自不妄動而喉痹瘳矣蛇犬咬毒亦血分受熱毒所傷故也苦寒能涼血得土氣之厚者又能解百毒也日華子以之療馬病蓋馬性多熱亦取其苦寒除熱之義耳主治參互同忍冬藤夏枯草白及白蘞紫花地丁甘菊茜草連翹牛蒡子白芷貝母白藥子之屬治一切疔腫癰疽本經並載赤藥俗名紅藥子豫嘗得一方以之為君每四兩加白及白蘞各一兩乳香沒藥各五錢丹砂雄黃各三錢麝香龍腦各一錢為細末量瘡大小蜜調傅瘡周圍中留大孔以綿紙護之時時以米醋潤之其痛即減亦復易潰易收治一切發背癰疽俱神效陰毒尤要如無赤藥子以黃藥子代之孫思邈千金月令方療忽生癭疾以萬州黃藥子半斤須緊重者為上如輕虛即是他州者力慢須用加倍取無灰酒一斗投藥入中固濟瓶口以粳火燒一伏時待酒冷乃開時時飲一杯不令絶酒氣經三五日後常把鏡自照覺消即停飲不爾便令人項細也聖惠方治吐血不止黃藥子一兩水煎服簡要濟衆方治鼻衄不止黃藥子為末每服二錢煎薄膠湯下良久以新水調面一匙頭服之禹講師經驗方産後血暈惡物衝心四肢冰冷唇青腹脹昏迷紅藥子一兩頭紅花二錢水二盞婦人油叉二隻同煎一盞服大小便俱利血自下也簡誤癰疽已潰不宜服癰疽發時不焮腫不渴色淡脾胃作泄者此為陰證當以內補為急解毒次之藥子之類宜少服只可外傅雷丸味苦咸寒微寒有小毒主殺三蟲逐毒氣胃中熱利丈夫不利女子作摩膏除小兒百病逐邪氣惡風汗出除皮中熱結積蠱毒白蟲寸白自出不止久服令人陰痿疏雷丸稟竹之餘氣兼得地中陰水之氣以生本經味苦氣寒別録加咸有小毒黃帝岐伯桐君扁鵲云甘詳其所主應是苦鹹為勝氣薄味厚陰也降也入手足陽明經其主殺三蟲白蟲寸白自出者腸胃濕熱甚也逐毒氣胃中熱邪氣惡風汗出皮中熱結積者腸胃邪熱盛也苦寒能除二經濕熱邪氣則上來諸證自除作摩膏治小兒百病者以小兒好食甘肥腸胃類多濕熱蟲積苦能殺蟲除濕鹹寒能清熱消積故主之也凡蠱毒必熱必辛苦寒能除辛熱故又主解蠱毒也利丈夫不利女子者蓋以男子屬陽得陽而生故喜陰寒之味女子屬陰得陽而長故不利陰寒之物也別録又云久服令人陰痿正見其過於苦寒偏至之氣能令陽道痿也主治參互同蕪荑使君子蘆薈五穀蟲胡黃連青黛治小兒疳蛔有神同檳榔鶴蝨楝根貫衆牽牛錫灰薏苡根殺腸胃一切蟲經驗方下寸白蟲雷丸水浸去皮切焙為末五更初食炙肉少許以稀粥飲服一錢匕須上半月服蟲乃下除殺蟲外他用甚稀故不著簡誤惟赤色者能殺人用時須擇去之蘇方木味甘咸平無毒主破血産後血脹悶欲死者水煮苦酒煮五兩取濃汁服之效疏蘇方木稟水土之氣以生故其味甘鹹氣平無毒好古加辛降多於升陽中陰也入足厥陰兼入手少陰足陽明經凡積血與夫産後血脹悶欲死無非心肝二經為病此藥咸主入血辛能走散敗濁瘀積之血行則二經清寧而諸證自愈日華子主婦人血氣心腹痛月候不調及蓐勞排膿止痛消癰腫撲損瘀血女人失音血噤海藥主虛勞血癖氣壅滯産後惡露不淨心腹攪痛及經絡不通悉取其入血行血辛鹹消散亦兼有軟堅潤下之功故能祛一切凝滯留結之血婦人産後尤為所須耳主治參互同澤蘭川芎麥門冬生地黃蒲黃人參童便益母草牛膝黑豆荊芥穗治産後血暈有神同山楂延胡索牡丹皮澤蘭當歸五靈脂赤芍藥紅花治産後兒枕作痛加入乳香沒藥治産後血癖不消因寒而得者加炒黑乾薑桂各少許同延胡索牡丹皮牛膝當歸地黃芍藥續斷治婦人月候不調煎濃汁加入乳香沒藥血竭自然銅蟅蟲麻皮灰黃荊子等末量病輕重調服四五錢治跌撲損傷如神胡氏方産後氣喘面黑欲死乃血入肺也用蘇木二兩水二碗煮一碗入人參末五錢服隨時加減神效不可言名參蘇飲簡誤産後惡露已盡由血虛腹痛者不宜用胡椒味辛大溫無毒主下氣溫中去痰去臟腑中風冷疏胡椒稟天地純陽之氣以生故其味辛氣大溫性雖無毒然辛溫太甚過服未免有害氣味俱厚陽中之陽也入手足陽明經其主下氣溫中去痰除臟腑中風冷者總因腸胃為寒冷所乘以致臟腑不調痰氣逆上辛溫暖腸胃而散風冷則痰氣降臟腑和諸證悉瘳矣主治參互食療治心腹冷痛胡椒三七枚清酒吞之衛生易簡方夏月冷瀉及霍亂用胡椒碾細飯丸梧子大每米飲下四十丸簡誤胡椒辛溫大熱純陽之藥也凡胃冷嘔逆宿食不消或霍亂氣逆心腹冷痛或大腸虛寒完穀不化或寒痰冷積四體如冰兼殺一切魚肉鱉菌等毒誠為要品然而血分有熱與夫陰虛發熱咳嗽吐血咽乾口渴熱氣暴沖目昏口臭齒浮鼻衄腸風臟毒痔漏泄澼等證切勿輕餌誤服之能令諸病即時作劇慎之慎之南燭枝葉味苦平無毒止泄除睡強筋益氣久服輕身長年令人不飢變白去老取莖葉搗碎漬汁浸粳米九浸九蒸九曝米粒緊小正黑如翳珠袋盛之可適遠方日進一合不飢益顏色堅筋骨能行取汁炊飯名烏飯亦名烏草亦名牛筋言食之健如牛筋也疏南燭稟春生之氣以生本經言其味苦氣平性無毒然嘗其味亦多帶微澀其氣平者平即涼也入心脾腎三經之藥十劑云澀可去脫非其味帶澀則不能止泄非其氣本涼則不能變白發者血之餘也顏色者血之華也血熱則鬢髮早白而顏枯稿脾弱則困倦嗜臥而氣力不長腎虛則筋骨軟弱而行步不前入心涼血入脾益氣入腎添精其云輕身長年令人不飢者非虛語矣凡變白之藥多是氣味苦寒有妨脾胃惟南燭氣味和平兼能益脾為修真家所須子味甘酸其功效尤勝枝葉真變白駐顏輕身卻老之良藥也牧童食之輒止飢渴亦一驗矣主治參互孫思邈千金月令方南燭煎益髭發及容顏兼補暖三月三日採葉並蕊子入大淨瓶中以童子小便浸滿瓶固濟其口置間處經一周年取開每用一匙溫酒調服極有效驗同旱蓮草沒食子地黃桑椹枸杞山茱萸何首烏白蒺藜為烏鬚髮之聖藥氣味和平性復無毒除變白外無他用故不著簡誤橡實味苦微溫無毒主下痢厚腸胃肥健人其殼為散及煮汁服亦主痢並堪染用疏橡實感天地微陽之氣兼得秋時收斂之性故其味苦氣微溫性無毒氣薄味厚陽中陰也入手足陽明足太陰少陰經夫脾胃為五臟根本一身之最要喜溫暖而惡寒濕寒濕則違其性故宜急食苦以燥之此藥味苦能除其所惡氣溫能遂其所喜故主厚腸胃肥健人也得收斂之性故又主下痢及日華子澀腸止瀉諸治兼能澀精煮食復能止飢御歉歲殼氣味與實相同而澀則過於實故亦主下痢並堪染皂也主治參互聖惠方水穀下痢日夜百餘行者橡實二兩楮葉炙一兩為末每服一錢食前烏梅湯調下直指方下痢脫肛橡斗子燒存性研末豬脂和傅簡誤濕熱作痢者不宜用石南味辛苦平有毒主養腎氣內傷陰衰利筋骨皮毛療腳弱五臟邪氣除熱女子不可久服令思男疏石南得火金之氣故其味辛苦氣平有毒然觀其用當是金勝火微其性應云有小毒可升可降陰中陽也入足厥陰足少陰經少陰屬水得金氣之厚者能生水故主養腎氣又腎為陰中之陰肝為陰中之陽二經俱在下而主筋骨二經得所養則內傷陰衰自起筋骨皮毛自利而腳弱自健也濕熱之邪留滯五臟則筋骨皮毛氣血皆為之病矣邪熱散則諸病自瘳女子久服思男者以其補腎氣助陽火耳主治參互同巴戟天肉蓯蓉鎖陽鹿茸枸杞子山茱萸治腎經虛寒精滑精冷同白蒺藜桑葉何首烏淫羊藿巴戟天五加皮菟絲子威靈仙虎骨治肝腎為風寒濕所乘以致痹弱不能行動簡誤腎虛而陽道數舉者不宜用腳弱由於肝腎虛而不由於風寒濕客下部者不宜用益智子味辛溫無毒主遺精虛漏小便餘瀝益氣安神補不足安三焦調諸氣夜多小便者取二十四枚碎入鹽同煎服有奇驗疏益智子仁得火土金之氣故其味辛其氣溫其性無毒入足太陰足少陰經惟辛故所以散結惟溫故所以通行其氣芳香故主入脾其稟火土與金故燥而收斂以其斂攝故治遺精虛漏及小便餘瀝此皆腎氣不固之證也腎主納氣虛則不能納矣又主五液涎乃脾之所統脾腎氣虛二臟失職是腎不能納脾不能攝故主氣逆上浮涎穢泛濫而上溢也斂攝脾腎之氣則逆氣歸元涎穢下行宜東垣用以治客寒犯胃和中益氣及人多唾王好古謂益智本脾家藥主君相二火故用以益脾胃理元氣補腎虛滑瀝劉河間又謂益智辛熱能開發鬱結使氣宣通皆以其香可入脾開鬱辛能散結復能潤下於開通結滯之中復有收斂之義故也主治參互益智在集香丸則入肺在四君子湯則入脾在大風髓丹則入腎當於補藥中兼用不宜多服佐人參茯苓半夏橘皮車前子則攝涎穢立效同藿香蘇子橘皮枇杷葉木瓜止逆氣上壅同五味子山茱萸炒鹽人參治小便頻數淋瀝同人參乾薑橘皮藿香治因寒犯胃作嘔吐簡誤益智乃脾腎二經之藥其用專在脾所以亦能入腎者辛以潤之之故也然其氣芳香性本溫熱證屬燥熱病人有火者皆當忌之故凡嘔吐由於熱而不因於寒氣逆由於怒而不由於虛小便餘瀝由於水涸精虧內熱而不由於腎氣虛寒泄瀉由於濕火暴注而不由於氣虛腸滑法並忌之紫荊木味苦平無毒主破宿血下五淋濃煮服之疏紫荊木皮內稟天地清寒之性外感南方初陽之氣故其味苦氣平花木色皆紫藏器言寒無毒入足厥陰經血分寒勝熱苦泄結紫入榮故能活血破血消腫毒下五淋也花梗氣味功用並同主治參互仙傳外科發背初生一切癰疽皆治單用紫荊皮為末酒調箍住自然撮小不開內服柞木飲子乃救貧良劑也並可內服楊清叟仙傳方沖和膏治一切癰疽發背流注諸腫毒用紫荊皮三兩炒獨活炒三兩赤芍藥炒二兩生白朮一兩木蠟炒一兩為末用蔥湯調熱傅血得熱則行蔥能散氣也瘡不甚熱者酒調之痛甚者加乳香除癰毒外他用甚稀故無簡誤紫真檀味鹹微寒主惡毒風毒疏紫真檀稟水氣以生故其味鹹氣微寒性應無毒氣味俱厚陽中陰也入足厥陰經其主惡毒風毒者凡毒必因熱而發熱甚則生風而榮血受傷毒乃生焉此藥咸能入血寒能除熱則毒自消矣弘景以之傅金瘡止血止痛者亦取此意耳宜與番降真香同為極細末傅金瘡良烏桕木根皮味苦微溫有毒主暴水癥結積聚疏烏桕木根皮稟火金之氣以生本經味苦氣微溫日華子言涼然詳其用應是辛苦溫之藥而其性則有毒也與巴豆牽牛大略相似性沉而降陽中陰也入手足陽明經其主暴水癥結積聚者皆二經為病苦能泄辛能散溫能通行腸胃則諸證無不除矣主治參互肘後方二便關格二三日則殺人烏桕東南根白皮干為末熱水服二錢簡誤水腫多屬脾虛不能制水以致水氣泛濫法當補脾實土為急此藥必不可輕用如果元氣壯實者亦須暫施一二劑病已即去之杉材微溫無毒主療漆瘡疏杉極得陽氣而兼金化本經氣微溫無毒日華子加辛氣味芬芳可升可降陽也入足陽明經本經主療漆瘡及蘇恭療腳氣腫滿者皆從外治取其芬芳能解漆氣之穢惡辛溫能散濕毒之沖逆也蘇恭又云服之治心腹脹痛去惡氣日華子云治霍亂上氣無非假其下氣散邪辛溫開發之功耳木皮主金瘡血出及湯火傷灼取老樹皮燒存性研傅之或入雞子清調傅一二日愈香油亦可主治參互同橘皮木瓜香薷砂仁白扁豆石斛治暑月霍亂轉筋柳柳州纂救死三方云元和十年二月得腳氣夜半痞絶脅有塊大如石且死困不知人三日家人號哭榮陽陳洵美傳杉木湯服半食頃大下三行氣通塊散方用杉木節一大升橘葉切一大升無葉則以皮代之檳榔七枚童子小便三大升共煮一大升半分為兩服若一服得快即停後服此乃死病會有教者乃得不死恐人不幸病此故傳之危氏得效方小兒陰腫赤痛日夜啼叫數日退皮愈而復作用老杉木燒灰入膩粉清油調傅效救急方臁瘡黑爛多年老杉木節燒灰麻油調隔箬葉攤貼系定數易即愈除轉筋腳氣外他用甚稀故不著簡誤接骨木味甘苦平無毒主折傷續筋骨除風癢齲齒可作浴湯疏接骨木稟土氣以生故其味甘苦氣平無毒甘能入脾養血故主折傷續筋骨苦涼能除風濕浮熱故主風癢齲齒也千金方打傷瘀血及産婦惡血一切血不行或行不止並煮汁服主治參互易簡方治折傷筋骨接骨木半兩乳香半錢芍藥當歸川芎自然銅各一兩為末化黃蠟四兩投藥攪勻衆手丸如芡實大若止損傷酒化一丸若碎折筋骨先用此傅貼乃服無別用故不著簡誤樺木皮味苦平無毒主諸黃疸濃煮汁飲之良疏樺木皮生於西北陰寒之地故其味苦氣平無毒氣味俱薄降多升少陰也入足陽明經五疸皆濕熱鬱於陽明所致苦平能除濕熱故主諸疸也藏器以之治傷寒時行熱毒瘡宗奭以之治肺風毒皆取其苦涼能散風邪熱毒之義耳主治參互靈苑方乳癰初發腫痛結硬欲破一服即瘥以北來真樺皮燒存性研無灰酒服方寸匕即臥覺即瘥也唐瑤經驗方乳癰腐爛靴內年久樺皮燒灰酒服一錢日一服和劑局方肺風毒瘡遍身瘡疥如癘及癮疹瘙癢面上風刺婦人粉刺並用樺皮散主之樺皮燒灰四兩枳殼去穰燒四兩荊芥穗二兩炙甘草一兩各為末杏仁水煮過去皮尖二兩研如泥研勻每服二錢食後溫酒調下瘡疥甚者日三服簡誤脾胃弱易於作泄者忌之木鱉子味甘溫無毒主折傷消結腫惡瘡生肌止腰痛除粉刺皯𪒟婦人乳癰肛門腫痛疏木鱉子稟火土之氣感長夏暑熱之令以生故其味甘氣溫無毒味厚於氣可升可降陽也為散血熱除癰毒之要藥夫結腫惡瘡粉刺皯𪒟肛門腫痛婦人乳癰等證皆血熱所致折傷則血亦瘀而發熱甘溫能通行經絡則血熱散血熱散則諸證無不瘳矣其止腰痛者蓋指濕熱客於下部所致而非腎虛為病之比也用者詳之主治參互孫用和祕寶方肛門痔痛用木鱉仁三枚砂盆擂如泥入百沸湯一碗乘溫先熏後洗日用三次仍塗少許聖惠方耳卒熱腫木鱉子仁一兩赤小豆大黃各半兩為末每以少許生油調塗之簡誤木鱉子味雖甘而氣則大溫本經雖云無毒然亦未免有毒但宜外用勿輕內服劉績霏雪録云木鱉子有毒不可食昔薊門有人生二子恣食成痞其父得一方以木鱉子煮豬肉食之其幼子當夜死長子明日死其為毒雖未如此之厲然亦必非純粹之物也附番木鱉形小於木鱉而色白味苦氣寒性無毒主傷寒熱病咽喉痹痛消痞塊並含之咽汁醫方摘要治喉痹作痛用番木鱉青木香山豆根等分為末吹之簡誤番木鱉性大寒味至苦凡病人氣血虛弱脾胃不實者慎勿用之鉤藤微寒無毒主小兒寒熱十二驚癇疏鉤藤稟春氣以生本經氣微寒無毒保升言苦甄權言甘平應是甘苦俱不甚氣味悉和平者也為手少陰足厥陰經要藥少陰主火厥陰主風風火相搏則為寒熱驚癇此藥氣味甘寒直走二經則風靜火息而肝心寧寒熱驚癇自除矣甄權主小兒驚啼瘛瘲熱壅客忤胎風者亦此意耳主治參互得遠志茯神琥珀棗仁丹砂牛黃天竺黃犀角屑生地黃龍齒麥門冬金箔治小兒驚癇瘛瘲有痰加竹瀝南星橘紅聖濟録小兒驚熱鉤藤一兩消石半兩炙甘草二錢五分為散每服半錢溫水服日三服聖惠方卒得癇疾鉤藤炙甘草各二錢水五合煎二合每服棗許日五夜三除小兒驚癇外無他用故不著簡誤赤柳木無毒主剝驢馬血入肉毒取以火炙尉之亦可煮汁浸之疏赤柳木稟春陽之氣以生故其色青而葉稍帶微赤凌冬不調其藥味甘鹹其氣溫而無毒浮而升陽也入足陽明手太陰少陰經觀本經載其能解驢馬血入肉發毒者蓋以驢馬性熱故多毒生時汗氣沾人即能為病所以剝時熱血入肉亦能致毒此藥味甘鹹甘得土氣鹹得水氣故能入血解血分之毒也近世又以治痧疹熱毒不能出用為發散之神藥經曰少陰所至為瘍疹正劉守真所謂諸痛癢瘡瘍皆屬心火之旨也蓋熱毒熾於肺胃則發斑疹於肌肉間以肺主皮毛胃主肌肉也此藥正入肺胃心三經三經毒解則邪透肌膚而內熱自消此皆開發升散甘鹹微溫之功用也主治參互同石膏知母薄荷荊芥玄參牛蒡子麥門冬竹葉連翹黃芩甘草之屬治癍疹發不出或雖發不透如熱甚毒熾舌生芒刺大渴譫語癍色紫黑者加入三黃石膏湯內大效單用及兼各藥並主痧疹首尾諸證治一切風不問遠近用赤柳木葉半斤切荊芥半斤水五升煮二升澄清入白蜜五合竹瀝五合新瓶盛之油紙封入重湯煮一伏時每服一小盞日三服酒多致病長壽仙人柳曬乾為末每服一錢溫酒下氣味甘溫性復無毒除痧疹外他用甚稀故不著簡誤水楊葉嫩枝味苦平無毒主久痢赤白搗和水絞取汁服一升日二大效疏水楊葉嫩枝生於涯涘之旁得水土之陰氣偏多故味苦氣平無毒久痢赤白腸胃濕熱也得苦涼之氣則濕熱散痢自止今人又用以治癰腫痘瘡多效魏直博愛心鑑云痘瘡數日陷頂漿滯不行或風寒所阻者宜用水楊枝葉無葉用枝五斤流水一大釜煎湯溫浴之如冷添湯良久照見纍起有暈絲者漿行也如不滿再浴之力弱者只洗頭面手足如屢浴不起者氣血敗矣不可再浴始出及癢塌者皆不可浴痘不行漿乃氣滯血澀腠理閉密或風寒外阻而然浴令暖氣透達和暢鬱蒸氣血通徹每隨暖氣而發行漿貫滿功非淺也若內服助氣血藥藉此升之其效更速直見一嫗在村中用此有驗叩得其方行之百發百中慎勿易之誠有燮理之妙也柞木皮味苦平無毒治黃疸病皮燒末服方寸匕疏柞木即鑿子木處處山中有之葉小而有細齒光滑而韌其木及葉丫皆有針刺經冬不凋五月開碎白花不結子木心裡皆白色本經味苦氣平無毒然其性又善下達主黃疸病者蓋黃疸因濕熱鬱於腸胃而發此藥苦能燥濕微寒能除熱兼得下走利竅之性則濕熱皆從小便出而黃自退矣今世又以為治難産催生之要藥亦取其下達利竅之性耳同魚膘人參千里馬百草霜牛膝白芷當歸益母草為催生聖藥無別用故不著參互及簡誤棕櫚皮平無毒止鼻衄吐血破癥治崩中帶下腸風赤白痢入藥燒灰用不可絶過疏棕櫚皮稟微陽之氣以生故其味苦澀氣平無毒本經主諸病皆燒灰用者凡血得熱則行得黑灰則止故主鼻衄吐血苦能瀉熱澀可去脫故主崩中帶下及腸風赤白痢也止血固脫之性而能消瘀血故能破癥也凡失血過多內無瘀滯者用之切當與亂髮灰同入更良如暴得吐血瘀滯方動暴得崩中惡露未竭濕熱下痢初發腸風帶下方熾悉不宜遽用即用亦無效入藥須年久敗者良木槿平無毒止腸風瀉血又止痢後熱渴作飲服之令人得睡入藥妙用疏木槿本經氣平無毒詳其主治應是味苦氣寒清熱滑利之藥腸風瀉血濕熱留中也痢後作渴餘熱在經津液不足也夜臥少睡心經蘊熱虛煩不寧也苦寒能除諸熱滑利能導積滯故主如上等證今人用治癬瘡多取川中所産肉厚而色紅者彌良花功用相同作湯代茶兼能治風主治參互扶壽方牛皮癬川槿皮一兩大風子肉十五個半夏五錢銼河水井水各一碗浸六七宿入輕粉一錢禿筆掃塗覆以青衣數日有臭涎出妙忌澡浴簡便方癬瘡有蟲川槿皮煎入肥皂浸水頻頻擦之或以槿皮浸汁磨雄黃尤妙
