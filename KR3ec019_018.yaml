body:
  text: 卷十八獸部下品總二十一種今疏其要者四種豬懸蹄足腎膽膚肚肪膏胰附麋角茸附獺肝膃肭臍豬懸蹄主五痔伏熱在腸腸癰內蝕疏豬水畜也在辰屬亥在卦屬坎其肉氣味雖寒然而多食令人暴肥性能作濕生痰易惹風熱殊無利益耳其懸蹄乃蹄甲之懸起不著地者本經無氣味然為鹹寒無毒之物入手足陽明經藥也濕熱下注則為五痔內蝕熱壅血滯則為腸癰鹹寒能除腸胃之熱故主之也主治參互得牛角䚡槐角子蝟皮象牙末金頭蜈蚣蛀竹梢明礬地榆青黛白蠟治通腸漏令漏管自出錢氏小兒方痘後目翳半年已上者一月取效用豬懸蹄三兩瓦瓶固濟煅蟬蛻一兩羚羊角三錢為末每歲一字三歲已上三錢溫水服日三附豬四足小寒主傷撻諸敗瘡下乳汁疏乳屬陽明陽明脈弱則乳汁不通能益陽明經氣血故能下乳傷撻敗瘡必血熱作痛氣寒而味甘鹹故涼血止痛也又煮湯為洗潰瘍之要藥主治參互廣濟方婦人乳無汁者以豬蹄四枚水二斗煮一斗去蹄入土瓜根通草漏蘆各三兩再煮六升去滓納蔥白豉作粥或羹食之身體微熱有少汗出佳未通再作梅師方癰疽發背乳發初起母豬蹄一隻通草六分綿裹煮羹食之外科精要洗癰疽有豬蹄湯附腎冷和理腎氣通利膀胱疏豬腎味鹹氣冷能瀉腎氣腎虛寒者不宜食本經主理腎氣乃借其同氣以引導之耳不言補而言理其意有在矣腎與膀胱為表裡故復能利膀胱也今人誤認以為補腎恣意食之大為差謬不睹日華子云久食令人無子孟詵云久食令人傷腎其非補腎之物明矣附膽主傷寒熱渴疏膽味苦氣寒經曰熱淫於內寒以勝之苦以泄之故主傷寒熱渴也主治參互仲景膽導法以豬膽汁和醋少許灌穀道中通大便神效入豬牙皂角細末二分攪勻更速蓋酸苦益陰潤燥而瀉便也又治少陰下利不止厥逆無脈乾嘔煩者以白通湯加豬膽汁主之使其氣相從無拒格之患此寒因熱用熱因寒用之義也蔥白四莖乾薑一兩生附子一枚水三升煮一升入人尿五合豬膽汁一合分服入雄黃末三四分蜈蚣末二發套指縛緊治天蛇毒有效梅師方熱病𧈟蝕上下用豬膽汁一枚醋一合煎沸服蟲立死外臺祕要湯火傷瘡豬膽調黃柏末塗之附膚仲景治足少陰下利咽痛胸滿心煩者有豬膚湯用豬膚一斤水一斗煮五升取汁入白蜜一升白粉五合熬香分服成無己注云豬水畜也其氣先入腎解少陰客熱加白蜜以潤燥除煩白粉以益氣斷利也附肚豬肚屬土故其味必甘氣微溫無毒乃豬一身無害之物為補脾胃之要品脾胃得補則中氣益利自止矣日華子主補虛損蘇頌主骨蒸勞熱血脈不行皆取其補益脾胃則精血自生虛勞自愈根本固而五臟皆安也主治參互普濟方水瀉不止用豬肚一枚煮爛入平胃散搗丸服效仲景方豬肚黃連丸治消渴用雄豬肚一枚入黃連末五兩栝樓根白粱米各四兩知母三兩麥門冬二兩縫定蒸熟搗丸梧子大每服三十丸米飲下千金方溫養胎氣胎至九月消息用豬肚一枚如常著五味煮食至盡又豬肚丸黃連一味為細末量肚大小實之煮令極爛搗勻為丸梧子大治臟毒下血又方治腹脹大用烏芋去皮入雄肚線縫砂器煮糜食之勿入鹽附肪膏主煎諸膏藥解斑蝥芫菁毒疏肪膏即脂油也味甘寒性滑澤能涼血解毒潤燥故主煎諸膏藥及解斑蝥芫菁毒也又能利腸胃通大小便能散風熱療惡瘡主治參互肘後方膏發煎治女勞黃疸見發皮條兼能治五疸萬氏方肺熱暴瘖豬脂油一斤煉過入白蜜一斤再煉少頃濾淨冷定不時挑服一匙即愈附胰一名腎脂生兩腎中間似脂非脂似肉非肉乃人物之命門三焦發原處也陳藏器主肺痿咳嗽和棗肉浸酒服亦能主痃癖羸瘦蘇頌主肺氣干脹喘急潤五臟去皴皰皯𪒟等證蓋是甘寒滑澤之物甘寒則津液生浸澤則垢膩去故主如上諸證也男子多食損陽薄大腸其能專在去垢膩可用以浣垢衣俗名豬胰子按豬為食味中常用之物臟腑腸胃咸無棄焉然其一身除肚膏外余皆有毒發病人習之而不察也壯實者或暫食無害有疾者不可不知其忌故列其害於後肉多食令人虛肥生痰熱熱病後食之復發不宜與薑同食食則發大風病頭肉有病者食之生風發疾腦食之損男子陽道臨房不能行事酒後尤不可食血能敗血損陽服地黃何首烏諸補藥者尤忌之多食耗心氣不可合吳茱萸食肝餌藥人不可食合魚鱠食生癰疽合鯉魚腸子食傷人神延壽書云豬臨宰驚氣入心絶氣歸肝俱不可多食必傷人脾孫思邈云凡六畜脾人一生莫食之肺不可與白花菜合食令人氣滯發霍亂八月和飴食至冬發疽腎久食令人傷腎少子冬月不可食損人真氣兼發虛壅胰男子多食損陽腸多食動冷氣鼻唇多食動風舌多食損心麋角甘無毒主痹止血益氣力疏麋屬陰好遊澤畔其角冬至解者陽長則陰消之義也為補左腎真陰不足虛損勞乏筋骨腰膝痠痛一切血液衰少為病故主止血益氣力及除痹也痹雖風寒濕合而成疾然外邪易入者由氣血先虛經絡因之壅滯血脈不通故也麋角入血益陰榮養經絡故主之也茸功用相同而補陰之力更勝主治參互千金方麋角丸補心神安五臟填骨髓理腰腳能久立聰明耳目發白更黑返老還少麋角取當年新角連腦頂者不論具數去尖一大寸截斷於淨盆中水浸每夜換易軟即將出削去皺皮以鎊鎊取白處至心即止以精米泔浸兩宿取出曝乾以無灰酒於大瓷器中浸兩宿其藥及酒俱入淨釜中初用武火煎一食頃後以文火微煎如蟹眼柳木不住手攪時時添酒以成膏為度煎時皆須平旦下手不得經宿仍看屑如稀膠即以牛乳五升酥一升以次漸下後項藥另以麋角炙令黃為末檳榔通草秦艽肉蓯蓉人參菟絲子甘草各一兩為末將膠再煎一食頃似稀粥即止火投諸藥末和勻約稠黏堪作丸傾出衆手一時丸梧子大空腹酒下三十丸日加一丸至五十丸為度日二服至一百日忌房事經一月腹內諸疾自相驅逐有微利勿怪服至二百日面皺光澤一年齒落更生強記身輕二年令人肥飽少食不老神仙合時須在淨室勿令陰人雞犬教子等見楊氏家藏方二至丸補虛損生精血去風濕壯筋骨用鹿角鎊細以真酥一兩無灰酒一升慢火炒乾取四兩麋角鎊細以真酥二兩米醋一升慢火炒乾取四兩蒼耳子酒浸一宿焙半斤山藥白茯苓黃耆蜜炙各四兩當歸五兩肉蓯蓉酒浸焙遠志人參沉香各二兩五味子一兩通為末酒煮糯米糊丸梧子大每服五十丸溫酒鹽湯任下日二服簡誤陽氣衰少虛羸畏寒者勿用肉多食令人弱房獺肝味甘有毒主鬼疰蠱毒卻魚鯁止久嗽燒服之疏獺水中之獸也本經味甘有毒藥性論咸微熱無毒詳其功用應是咸勝甘劣微溫小毒之物入肝入腎之藥也經曰邪之所湊其氣必虛虛損勞極則五臟之神俱不安鬼邪相挾而為病久嗽者亦勞極所致水不勝火火氣上炎肺為賊邪所幹也鹹味潤下俾火氣下降則肺自清總之此藥能益陰氣補虛損保勞極故主如上諸證也甘鹹善於解毒故又主蠱毒獺性嗜魚故能卻魚鯁也大抵其功長於治傳尸勞及鬼疰邪惡有效故張仲景治冷勞有獺肝散崔氏治九十種蠱疰傳尸骨蒸伏連殗殜諸鬼毒癘疾有獺肝丸皆妙主治參互同蘆薈牛漆象膽青黛胡黃連啄木鳥頭狐脾虎胃丹砂天靈蓋治傳尸勞能殺勞蟲孟詵尸疰一門悉患者獺肝一具燒水服方寸匕日再葛洪尸疰鬼疰乃是五尸之一又挾諸鬼邪為害其病變動乃有三十六種至九十種大略使人寒熱沉沉默默不知病之所苦而無處不惡積月纍年淹滯至死死後傳人乃至滅門覺有此候惟以獺肝散服之有效法如上除傳尸勞證外無他用故不著簡誤膃肭臍味鹹無毒主鬼氣尸疰夢與鬼交鬼魅狐魅心腹痛中惡邪氣宿血結塊痃癖羸瘦一名海狗腎雷雲此物多偽者真者有一對則兩重薄皮裹丸核其皮上有肉黃毛三莖共一穴濕潤常如新或置睡犬旁其犬忽驚跳若狂者真也與水烏龍似以此別之凡用酒浸一宿紙裹炙香銼或酒煎熟合藥疏膃肭海獸也得水中之陽氣故其味鹹無毒藥性論大熱李珣甘香美大溫其味與獺肝相似第其氣倍熱耳所主鬼氣尸疰夢與鬼交鬼魅狐魅心腹痛中惡邪氣者蓋因真陽虛則神明不振幽暗易侵故諸邪惡纏疰為病此藥專補陽氣則陰邪自闢所以能療如上等證也咸能入血軟堅溫熱能通行消散故又主宿血結塊及痃癖羸瘦也近世房術中多用之以其鹹溫入腎補虛暖腰膝固精氣壯陽道也主治參互同陽起石肉蓯蓉巴戟天菟絲子山茱萸鹿茸能壯陽道益精和劑局方有膃肭臍丸治諸虛勞損鬼疰邪惡夢與鬼交精氣乏絶等證簡誤膃肭臍性熱助陽為腎氣衰竭精寒痿弱之要藥然而陰虛火熾強陽不倒或陽事易舉及骨蒸勞嗽等候咸在所忌
