body:
  text: 卷六草部上品之上總八十七種今疏其要者三十二種黃精菖蒲甘菊花人參天門冬甘草乾地黃術菟絲子牛膝茺蔚子萎蕤茈柴字胡麥門冬獨活羌活附升麻車前子木香薯蕷今呼山藥薏苡仁澤瀉遠志草龍膽細辛石斛巴戟天菴䕡子卷柏闢虺雷藥王草犀根百草花黃精味甘平無毒主補中益氣除風濕安五臟久服輕身延年不飢黃帝曰太陽之草名曰黃精餌之可以長生疏黃精君純得土之沖氣而稟乎季春之令故味甘氣和性無毒其色正黃味厚氣薄土位乎中脾治中焦故補中脾土為後天生氣之源故益氣中氣強脾胃實則風濕之邪不能幹故除風濕五臟之氣皆稟胃氣以生胃氣者即後天之氣也斯氣盛則五臟皆實實則安故安五臟臟安則氣血精三者益盛氣滿則不飢久服輕身延年著其為效之極功也雖非治療之所急而為養性之上藥故仙經纍贊其能服餌駐顏久而彌勝矣主治參互黃精同漆葉桑椹何首烏茅山術作丸餌可以變白久之殺三蟲能使足溫而不寒同術久服可輕身涉險不飢同地黃天門冬釀酒可去風益血氣簡誤雪公云凡使勿用鉤吻真似黃精只是葉有毛鉤子二個是別認處若誤服害人黃精葉似竹葉以溪水洗淨後蒸從巳至子竹刀薄切爆乾用菖蒲味辛溫無毒主風寒濕痹咳逆上氣開心孔補五臟通九竅明耳目出音聲主耳聾癰瘡溫腸胃止小便利四肢濕痹不得屈伸小兒溫瘧身積熱不解可作浴湯久服輕身聰明耳目不忘不迷惑延年益心智高志不老一寸九節者良露根者不可用忌飴糖羊肉不可犯鐵令人吐逆疏菖蒲君正稟孟夏六陽之氣而合金之辛味以生者也其味苦辛其氣大溫陽精芳草故無毒陽氣開發外充百骸辛能四達以散邪結此通利心脾二經之要藥也蓋苦可燥濕溫能闢寒辛可散結風寒濕三者合而成痹去此三邪痹自愈矣陽氣開發芬芳輕楊氣重於味辛兼橫走故能下氣開心咳逆者氣逆之候也下氣則咳逆上氣可去五臟之壅遏既徹則九竅應之而通故聰明耳目出音聲主耳聾辛以散之故治癰瘡氣味辛溫氣厚發熱故溫腸胃膀胱虛寒則小便不禁腸胃既溫則膀胱興焉故止小便脾主四肢脾濕既祛則四肢濕痹不得屈伸自利山嵐瘴氣最能使小兒發瘧寒濕之甚莫過山嵐既散其邪則病本已拔瘧焉得而不已焉作浴湯及久服輕身者除濕之驗也不迷惑益心智高志者心竅開利也其曰補五臟延年者單指岩棲修煉之士辟穀服餌之用以其助發陽氣闢除陰嵐兼可參合養性諸藥如黃精青黏地黃天門冬之屬資其宣導臻乎太和故亦為仙經要藥至於世俗之人五欲熾然六淫迭至詎可窮年卒歲久餌偏燥之物乎主治參互菖蒲同熟地黃黃柏作丸治腎虛耳聾若中年預服可使老而聽聰同二朮木瓜薏仁石斛萆薢黃柏為除濕強步之要藥兼治下部膿窠濕瘡如神佐人參麥門冬酸棗仁茯神遠志生熟地黃為補心之劑如心氣鬱結者加沉香能益火以開心兼闢蚤蝨簡誤雪公云凡使勿用泥菖夏菖其二件相似如竹根硬形黑氣穢味腥不堪用凡使採石上生者根條嫩黃緊硬節一寸有九節者是真也採得後用銅刀刮去黃黑皮硬節一重了用嫩桑條相拌蒸出爆干去桑條銼用菊花味苦甘平無毒主風頭眩腫痛目欲脫淚出皮膚死肌惡風濕痹療腰痛去來陶陶除胸中煩熱安腸胃利五脈調四肢久服利血氣輕身耐老延年疏菊花生髮於春長養於夏秀英於秋而資味乎土歷三時之氣得天地之精獨稟金精專制風木故為去風之要藥苦可泄熱甘能益血甘可解毒平則兼辛故亦散結苦入心小腸甘入脾胃平辛走肝膽兼入肺與大腸其主風頭眩腫痛目欲脫淚出皮膚死肌惡風濕痹者諸風掉眩皆屬肝木風藥先入肝肝開竅於目風為陽邪勢必走上血虛則熱熱則生風風火相搏故也腰痛去來陶陶者乃血虛氣滯之候苦以泄滯結甘以益血脈辛平以散虛熱也其除胸中煩熱者心主血虛則病煩陰虛則熱收於內故熱在胸中血益則陰生陰生則煩止苦辛能泄熱故煩熱並解安腸胃利五脈調四肢利血氣者即除熱祛風益血入心入脾入肝之驗也久服輕身耐老延年者物久則力專力專則氣化化則變常其釀酒延齡和藥變白皆服餌專氣之功故亦為仙經所録矣生搗最治疔瘡血線疔猶為要藥疔者風火之毒也三六九十二月採葉莖花根四物並陰乾百日等分搗末酒調下錢許又可蜜丸如桐子大每七丸日三服皆酒吞一年變白二年齒生三年返老仙人王子喬方也主治參互甘菊花祛風要藥風本通肝肝開竅於目故為明目之主同地黃黃柏枸杞子白蒺藜五味子山茱萸當歸羚羊角羊肝治肝腎俱虛目痛加決明子木賊草穀精草柴胡可以去外翳同黃連玄參甘草生地黃荊芥穗決明子連翹桔梗柴胡川芎羌活童便可治風熱目痛君川芎細辛藁本當歸生熟地黃天麥門冬白芍藥甘草童便治血虛頭痛亦主頭眩暈因痰結而作者無痰藥不效與枸杞子相對蜜丸久服則終身無目疾兼不中風及生疔疽連根生用為君加紫花地丁益母草金銀花半枝蓮貝母連翹生地黃栝樓根白芷白及蒼耳子夏枯草可治疔瘡甚者以蟾酥丸發汗大便閉者汗後以玉樞丹下之如無玉樞丹以大戟加蚤休棗肉丸服三錢必下矣忌甘草犯之則死為大戟也人參味甘微寒微溫無毒主補五臟安精神定魂魄止驚悸除邪氣明目開心益智療腸胃中冷心腹鼓痛胸脅逆滿霍亂吐逆調中止消渴通血脈破堅積令人不忘久服輕身延年茯苓為之使疏人參得土中清陽之氣稟春升少陽之令而生故味甘微寒而無毒氣味均齊不厚不薄升多於降潔古謂其氣味俱薄浮而升陽中之陽也又曰陽中微陰蓋亦指其生長真元之氣而言歟神農微寒別録微溫二義相蒙世鮮解者蓋微寒者春之寒也微溫者亦春之溫也神農直指所稟故曰微寒別録兼言功用故又曰微溫既云微矣寒不甚寒則近於溫溫不甚溫則近於寒故知寒溫雖別言微則一也以言乎天則得其生生升發之氣以言乎地則得其清陽至和之精狀類人形上應瑤光故能回陽氣於垂絶卻虛邪於俄頃功魁群草力等丸丹矣其主治也則補五臟蓋臟雖有五以言乎生氣之流通則一也益真氣則五臟皆補矣其曰安精神定魂魄止驚悸開心益智者以心藏神肝藏魂肺藏魄腎藏精與志脾藏意與智故也心腎虛則精神不安矣肝肺虛則魂魄不定矣驚悸者心脾二經之病也心脾虛則驚悸心脾之氣強則心竅通利能思而智益深矣邪氣之所以久留而不去者無他真氣虛則不能敵故留連而不解也茲得補而真元充實則邪自不能容譬諸君子當陽則小人自退清陽之氣下陷則耳目不聰明兼之目得血能視陽生則陰長故明目真氣內虛故腸胃中冷氣旺陽回則不冷矣心腹鼓痛者心脾虛故也二髒得補其痛自止所謂按之快然者是也故經曰可按者虛也不可按者實也不可按者勿用胸脅逆滿者氣不歸元也得補則氣實而歸元也脾胃俱虛則物停滯而邪客之故霍亂吐逆也補助脾胃之元氣則二證自除調中者脾治中焦脾得補則中自調矣消渴者津液不足之候也氣回則津液生津液生則渴自止矣通血脈者血不自行氣壯則行故通血脈破堅積者真氣不足則不能健行而磨物日積月纍遂成堅積譬夫磨管納物無力則不轉不轉則停積矣脾主消化真陽之氣回則脾強而能消何堅積之不磨哉令人不忘者心主記脾主思心脾二臟之精氣滿則能慮而不忘矣久服輕身延年者純陽則充舉氣積則身輕五臟皆實延年可知矣斯皆敦本之論也主治參互人參補五臟陽氣之君藥開胃氣之神品同大棗白芍藥龍眼肉甘草酸棗仁補脾陰腎氣衰陽痿以之為君加鹿茸肉蓯蓉巴戟天五味子麥門冬菟絲子山茱萸地黃枸杞杜仲柏子仁乃扶衰之要劑兼令人有子君藿香木瓜橘紅治胃虛弱嘔吐反胃如妊娠嘔吐加竹茹枇杷葉同白朮吳茱萸治脾泄久不止君五味子吳茱萸補骨脂肉豆蔻治腎泄同白芍藥炙甘草治血虛腹痛鼓痛同乾薑白朮炙甘草治中寒泄瀉下利清穀甚則加肉桂附子同附子乾薑肉桂治寒厥指爪青黯便清蜷臥同附子五味子治陽氣脫溫腸胃中冷君五味子麥門冬治肺虛氣喘夏月服之益氣除熱止消渴名生脈散加白朮又治中暑傷氣倦怠同沉水香白芍藥治真氣虛氣不歸元因而胸脅逆滿同茯苓遠志益智棗仁麥門冬治精神恍惚魂魄不定驚悸同沉水香茯神治心虛邪客之作痛同鹿角膠杜仲續斷當歸地黃蘇木治負重努力內傷失血去蘇木加生地黃治胎漏不安同黃耆白芍藥五味子治汗多亡陽同蘇木麥門冬治産後氣喘在白虎湯治勞傷元氣人患熱病渴甚並頭疼在敗毒散治氣虛人患四時不正傷寒在參蘇飲治肺虛人傷風同鱉甲青皮乾漆䗪蟲肉桂牡蠣射干消瘧母同甘菊花當歸地黃枸杞子蒺藜甘草柴胡則明目同黃連紅曲白芍藥滑石末升麻治帶下腹痛赤色同黃連烏梅蓮肉升麻滑石末肉豆蔻治滯下久不止同白朮木瓜茯苓藿香炙甘草止虛煩躁同牛黃犀角天竺黃鉤藤鉤丹砂雄黃真珠茯神遠志治驚癇同地黃阿膠麥門冬山茱萸五味子續斷杜仲治血崩加牛膝大薊鹿角膠治血淋同橘皮紫蘇木瓜白朮竹茹治惡阻安胎熱多者去朮紫蘇加麥門冬同五加皮白鮮皮石南葉石斛秦艽木瓜薏苡仁萆薢牛膝沉香菖蒲二術治痹同黃柏黃耆白朮五味子麥門冬木瓜白芍藥薏苡仁白茯苓治痿同附子白朮芍藥甘草茯苓治慢驚慢脾風同白朮黃耆芍藥治自汗同生姜皮各兩許水煎露一宿五更溫服治氣虛久瘧不止同蘇木當歸童便治産後血暈同石菖蒲蓮肉等分水煎治産後不語同乳香丹砂雞子白薑汁三匙調勻別用當歸兩許煎濃同吞治橫生倒養難産神效同附子肉桂麥門冬五味子治房勞過度脫陽欲絶下部虛冷同黃耆天門冬五味子牛膝枸杞子菖蒲治中風不語簡誤人參論其功能之廣俱如本經所說信非虛語第其性亦有所不宜世之録其長者或遺其短摘其瑕者並棄其瑜是以或當用而後時或非宜而妄設不蒙其利徒見其害二者之誤其失則一遂使良藥不見信於世粗工互勝其口說惜哉豈知人參本補五臟真陽之氣者也若夫虛羸尪怯勞役飢飽所傷努力失血以致陽氣短乏陷入陰分發熱倦怠四肢無力或中熱傷暑暑傷氣無氣以動或嘔吐泄瀉霍亂轉筋胃弱不能食脾虛不磨食或真陽衰少腎氣乏絶陽道不舉完穀不化下利清水中風失音産後氣喘小兒慢驚吐瀉不止痘後氣虛潰瘍長肉等證投之靡不立效惟不利於肺家有熱咳嗽吐痰吐血衄血齒衄內熱骨蒸勞瘵陰虛火動之候蓋肺者華蓋之臟也位乎上象天屬金喜清肅而惡煩熱真氣無虧則寧謐清淨以受生氣之熏蒸而朝百脈苟縱恣情欲虧損真陰火空則發熱起於下炎爍乎上則肺先受之火乃肺之賊邪邪氣勝則實實則肺熱鬱結為痰喉癢而發嗽血熱妄行溢出上竅王好古所謂肺熱還傷肺是已又有痧疹初發身雖熱而斑點未形傷寒始作形證未定而邪熱方熾若誤投之鮮克免者斯皆實實之害非藥可解經曰實實虛虛損不足而益有餘如是者醫殺之耳可不戒哉可不慎哉天門冬味苦甘平大寒無毒主諸暴風濕偏痹強骨髓殺三蟲去伏尸保定肺氣去寒熱養肌膚益氣力利小便冷而能補久服輕身益氣延年不飢忌鯉魚疏天門冬正稟大寒初之氣以生得地之陰精獨厚味雖微苦甘而帶辛其氣大寒其性無毒要以甘多者為勝味厚於氣陰也降也除肺腎虛熱之要藥也其主諸暴風濕偏痹殺三蟲去伏尸保定肺氣去寒熱者蓋以熱則生風暴則屬火其言濕者乃濕熱之謂苦以泄濕寒以除熱熱去則風止濕泄則痹瘳偏痹者濕熱所致也強骨髓者腎為作強之官而主骨濕熱不去下流客腎能使人骨痿腎欲堅急食苦以堅之天門冬黃柏之屬是已且腎者水臟也平則溫而堅虛則熱而軟味苦氣寒正入腎而除熱堅軟故強骨也三蟲伏尸必生於脾腎俱虛內熱氣弱之人若能殺蟲辛能散結故殺三蟲而除伏尸也肺為華蓋之臟喜清肅而惡煩熱亦畏濕熱平則安和發聲清亮一受火熱則為賊邪所幹而痰壅咳逆氣喘吐血寒熱聲啞之證出焉熱泄則痰散而肝清肺清則津液流通氣得下降而諸證自止矣養肌膚益氣力利小便者肺主皮毛脾氣散精上歸於肺通調水道下輸膀胱又肺為水之上源朝百脈而主氣熱邪退則肺得所養故能養肌膚益氣力利小便也冷而能補者熱盛則肺腎俱虛除虛熱即補肺腎也久服輕身益氣延年不飢者熱退則水足水足則精固精固則腎氣益實腎為先天真氣之源腎實骨強延齡可知已要之道書所録皆指遺世獨立辟穀服餌之流者設非謂恆人亦可望此也主治參互痰之標在脾胃與肺其本在腎若非腎家有火炎上薄肺煎熬津液而成黏膩則痰何自而生耶天門冬味苦氣大寒能清熱保肺下通於腎故同麥門冬百部桑白皮枇杷葉玄參貝母童便竹瀝為清肺消痰止嗽必用之藥同地黃麥門冬五味子黃柏車前子枸杞牛膝為丸補陰除熱滋腎家燥脾胃弱者加山藥白茯苓砂仁以佐之同麥門冬五味子熬膏入煉蜜益肺甚妙亦治消渴同甘菊花釀酒除一切風能愈大風病水煮則除風熱兼除煩悶同生地黃麥門冬白芍藥鱉甲牛膝杜仲續斷童便治吐血同乾膝百部鱉甲青黛獺肝象膽殺三蟲而除勞瘵同薏苡仁桑黃白及紫菀百部百合能治肺痿吐膿血同青蒿鱉甲麥門冬銀柴胡牛膝白芍藥地骨皮五味子能治婦人骨蒸同麻子仁麥門冬生地黃童便能除大腸熱燥胃強者略加桃仁同熟地黃胡麻仁和蜜久服駐顏不飢簡誤天門冬味苦平辛其氣大寒若因陰虛水涸火起下焦上炎於肺發為痰喘者誠哉要藥也然大寒而苦不利脾胃陰虛之人脾胃多弱又以苦寒損其胃氣以致泄瀉惡食則危殆矣何者後天元氣生於胃氣五臟之氣皆因之以為盛衰者也強則喜食而甘味弱則惡食而不甘味陰虛精絶之病正賴脾胃之氣強能納能消以滋精氣若脾胃先困則是後天生氣之源絶矣丸餌雖佳總統於食湯液雖妙終屬於飲若非胃氣無損焉能納而消之以各歸其根奏平定之功哉必不得已當以薏苡仁白茯苓山藥甘草白芍藥同用或用麥門冬以代之可也誤用之必泄甘草味甘平無毒主五臟六腑寒熱邪氣堅筋骨長肌肉倍力金瘡腫解毒溫中下氣煩滿短氣傷臟咳嗽止渴通經脈利氣血解百藥毒為九土之精安和七十二種石一千二百種草久服輕身延年二月八月除日採根暴乾十日成朮苦參為使反大戟芫花甘遂海藻惡遠志忌豬肉令人陰痿疏甘草味甘氣平無毒正稟土中衝和之陽氣以生故別録稱之為九土之精可升可降陰中陽也主五臟六腑寒熱邪氣堅筋骨者以其得土中衝陽之氣味甘平性和緩故能解一切毒氣安臟腑除邪熱也五臟之寒熱邪氣既解則臟氣和而真氣生氣日以盛故筋骨堅長肌肉倍力者甘能益脾脾主肌肉兼主四肢脾強則四肢生力故長肌肉倍力也主金瘡腫者甘入血分而能緩中且傷則熱熱而後腫甘溫益血而除熱煩熱解故腫散也溫中下氣者甘味屬土土位乎中故溫中甘能緩中散結故下氣煩滿短氣者是勞傷內乏陽氣不足故虛而煩滿短氣甘溫能益血除大熱助氣故煩滿短氣併除也甘平且和和能理傷故治傷臟肺苦氣上逆嗽乃肺病甘以緩之故治咳嗽血不足則內熱內熱則津液衰少而作渴甘能入脾益血故止渴血虛則經脈不通能益血則經脈自通矣甘能益血而溫氣分故利血氣其解一切金石草木蟲魚禽獸之毒者凡毒遇土則化甘草為九土之精故能解諸毒也久服輕身延年者為其益血安和五臟也主治參互諸毒遇土則化甘草為土精故能化毒解一切邪氣佐黃耆防風能運毒走表為痘疹氣血兩虛者首尾必資之劑得白芍藥則補脾甲己化土故也同人參黃耆白朮大棗當歸身麥門冬加升麻柴胡為補中益氣藥專理飢飽勞役內傷陽氣下陷發熱同人參乾薑肉桂則溫中同麥門冬蘇子枇杷葉則下氣同黃連芍藥升麻滑石解熱毒滯下同桔梗玄參鼠黏子栝樓根清利咽喉虛熱同人參菖蒲益智龍眼肉遠志治健忘同麥門冬石膏竹葉知母除煩悶躁渴頭痛解飢同紫花地丁金銀花甘菊夏枯草貝母白及白芷消一切疔腫同川黃連止小兒胎毒驚癇同黃連木通赤芍藥生地黃瀉心經有餘之火同預知子貫衆解一切蠱毒單用水炙百遍煎熬斤許治懸癰如神炙則補傷寒病瘥後血虛簡誤甘能緩中故中滿者忌之嘔家忌甘酒家亦忌甘諸濕腫滿及脹滿病咸不宜服乾地黃味甘苦寒無毒主折跌絶筋傷中逐血痹填骨髓長肌肉作湯除寒熱積聚除痹主男子五勞七傷女子傷中胞漏下血破惡血溺血利大小腸去胃中宿食飽力斷絶補五臟內傷不足通血脈益氣力利耳目生者尤良生地黃大寒主婦人崩中血不止及産後血上薄心悶絶傷身胎動下血胎不落墮墜踠折瘀血吐血鼻衄吐血皆搗飲之久服輕身不老採得即用者為生曬乾收者為干以法制過者為熟疏乾地黃稟仲冬之氣以生黃者土之正色兼稟地之和氣故味甘氣寒而無毒別録又云苦者以其兼入心脾也此乃補腎家之要藥益陰血之上品本經主折跌絶筋傷中逐血痹者肝藏血而主筋補肝則榮血調榮血調則傷中自去痹者血分之病因虛而風寒濕邪客之故筋拘攣而痛養血和肝痹必廖矣作湯除寒熱積聚除痹者血和則結散故諸證自除也其曰填骨髓長肌肉主男子五勞七傷者地黃為至陰之藥正補腎水真陰而益血血王則髓滿陰足則肌肉自長五勞七傷皆陰虛內熱真陰不足之候甘寒能除內熱而益精髓故勞傷自除也女子傷中胞漏下血者陰虛則火熾而血熱火能銷物造化自然之道也涼血益血則胞漏自止矣下血者血熱也涼血則下血自愈榮血滯則為惡血生地黃能行血故破惡血溺血者腎與小腸熱也益陰涼血則溺血自止二便自利矣胃為足陽明胃家濕熱盛則食不消生地黃能瀉脾胃中濕熱濕熱去而脾胃安則宿食自去飽而努力則腸胃筋脈有絶傷之患形屬血故行血益血則諸傷自理矣五臟咸屬陰陰即精血補精血則五臟內傷不足自愈矣通血脈益氣力利耳目者皆臟安之驗也又主婦人崩中血不止及産後血上薄心悶絶傷身胎動下血胎不落墮墜踠折瘀血留血衄血吐血生者搗汁飲之皆涼血行血之功也久服輕身不老則益陰填髓補五臟之能事畢矣又按日華子云助心膽氣強筋骨長志安魂定魄除驚悸者膽為五臟六腑之首行春升之氣故十一臟皆取決於膽為中正之官地黃入手足少陰亦入足厥陰心與肝為子母之臟膽為肝之腑肝主筋腎主骨腎藏精與志肝藏魂肺藏魄心膽二經虛則病驚悸生地黃為手少陰之要藥能涼心助膽補肝心涼則熱不薄肺肝肺清寧則魂魄自定膽氣壯則驚自除肝腎足則筋骨自強心腎交濟則志自長矣主治參互生地黃同大小薊各半俱搗取自然汁和童便飲治一切血熱妄行吐血齒鼻衄神效取汁和麵作䬪飥冷淘治蟲心痛同苧麻根搗汁碗許加炒砂仁末三錢治胎動下血同麥門冬治産後煩悶同當歸赤芍藥乳香沒藥肉桂炒黃荊子末治一切跌打折傷瘀血作痛同金銀花甘草荊芥穗玄參連翹黃柏地榆白芷木通治血分濕熱生膿瘡痛甚者濃煎恣飲立差入瓊玉膏為陰陽兩補之要劑乾地黃同沙苑蒺藜肉蓯蓉鹿茸山茱萸五味子能益男子精同人參枸杞五味子麥門冬鹿茸車前子覆盆子菟絲子多服令人有子得青蒿子鱉甲銀柴胡沙參天麥二冬黃柏甘草地骨皮牡丹皮白芍藥牛膝能治骨蒸勞熱同人參遠志麥門冬酸棗仁柏子仁茯神甘草治心虛驚悸怔忡健忘同黃耆黃連黃柏酸棗仁五味子白芍藥麥門冬龍眼肉牡蠣粉治盜汗久不止得麥門冬五味子牛膝枸杞子車前子阿膠天門冬治溺血同人參麥門冬五味子牛膝漬酒能益氣力逐及奔馬同當歸白芍藥川芎阿膠鹿角膠能益母安胎同砂仁治胎動下血腰痛同青蒿地骨皮麥門冬白芍藥山茱萸枇杷葉治婦人月事先期同生姜治産後中風同當歸川芎蒲黃黑豆炒炮薑澤蘭益母牛膝續斷杜仲鹿角膠治一切産後血虛發熱得肉桂及乳香沒藥五靈脂治兒枕痛夏月去桂同芍藥當歸川芎阿膠蘄艾香附治經事不調同甘菊花女貞實枸杞子白蒺藜能明目益精同黃連連翹薄荷甘草甘菊花木通治目暴赤痛同鹿茸五味子人參人乳粉白茯苓能生齒同何首烏桑椹甘菊鱧腸蜀椒能烏鬚髮簡誤生地黃性大寒凡産後惡食作瀉雖見發熱惡露作痛不可用誤用則泄不止胃氣者後天元氣之本也胃困則飲食不運精血不生虛熱何自而退故並當歸忌之凡見此證宜多加炮薑桂心人參必自愈凡陰虛咳嗽內熱骨蒸或吐血等候一見脾胃薄弱大便不實或天明腎泄産後泄瀉産後不食俱禁用生地黃當歸誤則同於前轍慎之凡胸膈多痰氣道不利升降窒塞藥宜通而不宜滯湯液中禁入地黃術味苦甘溫無毒主風寒濕痹死肌痙疸止汗除熱消食主大風在身面風眩頭痛目淚出消痰水逐皮間風水結腫除心下急滿及霍亂吐下不止利腰臍間血益津液暖胃消穀嗜食作煎餌久服輕身延年不飢茅山者為勝忌蛤雀桃李菘菜青魚疏術稟初夏之氣以生其味苦其氣溫從火化也正得土之沖氣故別録益之以甘表土德也故無毒其氣芳烈其味甘濃其性純陽為除風痹之上藥安脾胃之神品本經主風寒濕痹死肌痙疸者正以風寒濕三者合而成痹痹者拘攣而痛者是也經曰地之濕氣感則害人皮肉筋骨死肌者濕毒侵肌肉也痙者風寒秉虛客於肝脾腎所致也疸者脾胃虛而濕熱瘀滯也如上諸病莫不由風寒濕而成術有除此三邪之功故能祛其所致之疾也止汗除熱消食者濕熱盛則自汗濕邪客則發熱濕去而脾胃燥燥則食自消汗自止熱自除也又主大風在身面者術氣芳烈而悍純陽之物也風為陽邪發於陽部故主之也風眩頭痛目淚出者陽虛則風客之而眩痰厥則頭痛風熱壅則目淚出也消痰水逐皮間風水結腫除心下急痛及霍亂吐下不止者濕客於胃則滯而生痰客於脾則生水脾虛濕勝則為水腫濕客中焦則心下急滿脾胃俱虛則中焦不治而濕邪客之則為霍亂吐下不止也利腰臍間血者血屬陰濕為陰邪下流客之使腰臍血滯而不得通利濕去則諸證無不愈矣益津液暖胃消穀嗜食者濕去則胃強而津液自生寒濕散則胃自暖邪去而脾胃健則消穀而嗜食矣煎餌久服輕身延年不飢者術為陽藥故善除陰濕濕去則脾胃之氣旺陽主氣氣盛則身輕脾主四肢濕去則脾健健則四肢利故能涉險負重也仙經云氣滿不思食是以延年而不飢也主治參互術為陽草氣勝黃精除濕祛寒疏風辟惡其功能也單餌則延年輕身不飢兼濟則觀所從何道故同人參茯苓白芍藥甘草橘皮蓮肉縮砂則健脾開胃消飲食為壯脾胃之要劑調中之正法同藿香橘皮茯苓人參木瓜豬苓澤瀉縮砂則治霍亂吐瀉轉筋同乾葛防風茯苓炙甘草車前子豬苓澤瀉則治濕勝作泄若雷奔同秦艽萆薢木瓜薏苡仁桑寄生石斛黃耆地黃石菖蒲桂枝甘草晚蠶砂則治一切痛痹及關節不利熱者去桂枝加黃柏得黃柏牛膝木瓜石斛能健步潛行得苦參牡蠣治小兒胃家濕熱飲食不生肌肉君人參芍藥木瓜薏苡茯苓桑白皮赤小豆車前橘皮佐以豬苓澤瀉能治一切水腫日重倍人參夜重則加地黃芍藥俱與術倍君枳實橘皮砂仁半夏人參則除心腹脹痛消宿食開胃去痰涎除傷食發寒熱及泄瀉同人參橘紅白茯苓木瓜藿香治反胃吐逆因於寒則加生薑因於熱則加竹茹枇杷葉逆水蘆根君黃耆生地黃佐以黃柏治一切臁瘡濕毒攻注足脛成瘡久不愈作丸餌良倍茯苓修事如經驗方能烏須駐顏同麥門冬石斛黃柏白芍藥木瓜薏苡仁五味子為治痿要藥同生薑藿香檳榔能治山嵐瘴氣同四物湯麥門冬荊芥防風地榆能治腸風下血同雄羊肝治雀盲同補骨脂川椒茴香青鹽川楝子黃柏治疝同熟地桑椹修事採日精月華干則蜜丸日三服可變白為末和芝麻研爛入水攪勻絞汁濾淨曝乾每三錢空心酒服能滋脾腎簡誤術本經無分別陶弘景有赤白二種近世乃有蒼白之分其用較殊要之俱為陽草故祛邪之功勝而益陰之效虧藥性偏長物無兼力此天地生物自然之道也凡病屬陰虛血少精不足內熱骨蒸口乾唇燥咳嗽吐痰吐血鼻衄齒衄咽塞便祕滯下者法咸忌之術燥腎而閉氣肝腎有動氣者勿服劉涓子癰疽論云潰瘍忌白朮以其燥腎而閉氣故反生膿作痛也凡臟皆屬陰世人但知術能健脾此蓋指脾為正邪所幹術能燥濕濕去則脾健故曰補也寧知脾虛而無濕邪者用之反致燥竭脾家津液是損脾陰也何補之足云此最易誤故特表而出之菟絲子味辛甘平無毒主續絶傷補不足益氣力肥健汁去面䵟養肌強陰堅筋骨主莖中寒精自出溺有餘瀝口苦燥渴寒血為積久服明目輕身延年得酒良宜丸不宜煮疏菟絲子君稟春末夏初之氣以生凝乎地之沖氣以成感秋之氣而實故本經言其味辛平別録益之以甘者正雷公所謂稟中和凝正陽之氣而結者也其為無毒明矣五味之中惟辛通四氣復兼四味經曰腎苦燥急食辛以潤之菟絲子之屬是也與辛香燥熱之辛迥乎不同矣學者不以辭害義可也為補脾腎肝三經要藥主續絶傷補不足益氣力肥健者三經而俱實則絶傷續而不足補矣脾統血合肌肉而主四肢足陽明太陰之氣盛則力長而肌健補脾故養肌益肝腎故強陰堅筋骨暖而能補腎中陽氣故主莖中寒精自出溺有餘瀝口苦燥渴者脾腎虛而生內熱津液因之不足也二髒得補則二病自愈寒血為積者勞傷則血瘀陽氣乏絶則內寒血隨氣行氣弱不能統血以行久而為積矣凡勞傷皆脾腎肝三臟主之肝脾氣王則瘀血自行也久服明目輕身延年者目得血而能視肝開竅於目瞳子神光屬腎肝腎實則目自明臟實精滿則身自輕延年可必矣主治參互君蓮實山藥人參能實脾止泄嗜食加五味子肉豆蔻砂仁能治腎泄同五味子沙苑蒺藜覆盆子蓮鬚山茱萸巴戟天車前子沒食子枸杞子能益脾腎固精種子同甘菊花沙苑蒺藜甘枸杞子熟地黃羚羊角穀精草決明子能明目君朮人參牛膝胡麻仁治丈夫腰膝積冷痛或頑麻無力單服偏補人衛氣能助人筋脈王好古云能補肝臟虛故去風專主腰膝腰膝者肝腎之所治也苗生研塗面斑神效簡誤腎家多火強陽不痿者忌之大便燥結者亦忌之牛膝君味苦酸平無毒主寒濕痿痹四肢拘攣膝痛不可屈伸逐血氣傷熱火爛墮胎療傷中少氣男子陰消老人失溺補中續絶填骨髓除腦中痛及腰脊痛婦人月水不通血結益精利陰氣止發白久服輕身耐老忌牛肉牛乳疏牛膝君稟地中陽氣以生氣則兼乎木火之化也故其味苦酸平無毒味厚氣薄走而能補性善下行故入肝腎主寒濕痿痹四肢拘攣膝痛不可屈伸者肝脾腎虛則寒濕之邪客之而成痹及病四肢拘攣膝痛不可屈伸此藥既稟地中陽氣所生又兼木火之化其性走而下行其能逐寒濕而除痹也必矣益補肝則筋舒下行則理膝行血則痛止逐血氣猶云能通氣滯血凝也詳藥性氣當作痹傷熱火爛血焦枯之病也血行而活痛自止矣入肝行血故墮胎傷中少氣男子陰消老人失溺者皆腎不足之候也腦為髓之海腦不滿則空而痛腰乃腎之腑脊通髓於腦腎虛髓少則腰脊痛血虛而熱則發白虛羸勞頓則傷絶肝藏血腎藏精峻補肝腎則血足而精滿諸證自瘳矣血行則月水自通血結自散久服輕身耐老悉如上說不復具疏主治參互君朮仙茅木瓜石斛茯苓石南葉五加皮萆薢生地黃黃耆芍藥虎骨沉香桂治諸痹同甘菊花石斛木瓜何首烏生地黃虎骨沉水香人參朮黃耆天門冬麥門冬杜仲續斷芍藥橘皮黃柏桑寄生白鮮皮治一切痿痹四肢拘攣筋骨疼痛君當歸地黃能下死胎加朴硝立下胞衣君木瓜石斛萆薢生地黃黃柏五加皮骨碎補續斷金銀花白及芍藥甘草甘菊根紫花地丁茜草連翹治鶴膝風根苗同用二三兩濃煎調鱉甲末三錢空心服治瘧在陰分久不瘥者三劑必已胃虛者加人參兩許橘皮去白五錢君青蒿生地黃麥門冬甘枸杞子熬膏治婦人血虛發熱內熱口乾舌苦治小便不利莖中痛欲死兼治婦人血結腹堅痛鮮牛膝三四兩白酒煎濃服之立愈金瘡作痛生搗傅之立瘥簡誤誤用傷胎經閉未久疑似有娠者勿用上焦藥中勿入血崩不止者忌之茺蔚子味辛甘微溫微寒無毒主明目益精除水氣療血逆大熱頭痛心煩久服輕身莖主癮疹癢可作浴湯一名益母草忌鐵疏茺蔚子稟地中之陽氣以生兼感乎上天春夏之氣而成亦陽草也味辛甘微溫微寒無毒入手足厥陰經為婦人胎産調經之要藥此藥補而能行辛散而兼潤者也目者肝之竅也益肝行血故明目益精其氣純陽辛走而不守故除水氣肝臟有火則血逆肝涼則降而順矣大熱頭痛心煩皆血虛而熱之候也清肝散熱和血則頭疼心煩俱解微溫微寒說見人參條內主治參互午月五日採紫花益母草搗汁分貯瓷器內各少許曬乾剔取和蜂蜜封固加人參琥珀乳香沒藥血竭沉香丹砂五靈脂催生及胞衣不下神效兼産後血暈瘀血薄心惡露不行腹痛少腹兒枕痛調經治血閉經阻經行作痛單用和童便服能下死胎及治熱入血室發熱煩躁類傷寒君四物湯杜仲阿膠真川續斷為丸安胎止痛得生地黃白芍藥麥門冬枇杷葉青蒿子五味子阿膠治血熱經行先期及胎漏下血同生甘菊蒼耳草金銀花紫花地丁各一握貝母鼠黏子白芷殭蠶白及白蘞生甘草連翹生地黃各三錢熬夏枯草汁和藥同煎濃頓飲之消一切疔腫發背及無名腫毒簡誤益母草辛甘為陽故性善行走能行血通經血崩禁用瞳子散大禁用惟熱血欲貫瞳人者與涼血藥同用則不忌萎蕤味甘平無毒主中風暴熱不能動搖跌筋結肉諸不足心腹結氣虛熱濕毒腰痛莖中寒及目痛眥爛淚出久服去面黑䵟好顏色潤澤輕身不老疏萎蕤稟天地清和之氣而得稼穡之甘故本經味甘平無毒主諸不足久服好顏色潤澤輕身不老別録又主心腹結氣虛熱腰痛莖中寒目痛眥爛淚出甄權主內補不足去虛勞客熱頭痛不安加而用之良日華子謂其除煩悶止渴潤心肺補五勞七傷虛損腰腳疼痛詳味諸家所主則知其性本醇良氣味和緩譬諸盛德之人無往不利終始一節故可長資其利用而不窮正如斯藥之能補益五臟滋養氣血根本既治余疾自除夫血為陰而主駐顏氣為陽而主輕身陰精不足則發虛熱腎氣不固則見骨痿及腰腳痛虛而火炎則頭痛不安目痛眥爛淚出虛而熱壅則煩悶消渴上盛下虛則莖中寒甚則五勞七傷精髓日枯而成虛損之證矣以一藥而所主多途為效良多非由滋益陰精增長陽氣其能若是乎跡其所長殆亦黃精之類歟其主中風暴熱不能動搖跌筋結肉濕毒等證皆是女萎之用以本經二物混同一條故耳或謂即青黏理或有之純而不駁和而不偏有益無損故無簡誤昔彭城樊阿少師事華他他授以漆葉青黏散服之利五臟去蟲輕身益氣年至五百餘歲青黏生豐沛彭城及朝歌一名地節一名黃芝主理五臟益精氣本出於迷人入山見仙人服之以告他他以為佳語阿阿祕之人見阿之壽而氣力強盛問之因醉誤說人服多驗後無復有人識青黏者或云即黃精之正葉者又云即萎蕤同黃精桑椹何首烏能駐顏茈胡君味苦平微寒無毒主心腹去腸胃中結氣飲食積聚寒熱邪氣推陳致新除傷寒心下煩熱諸痰熱結實胸中邪逆五臟間遊氣大腸停積水脹及濕痹拘攣亦可作浴湯久服輕身明目益精半夏為之使疏柴胡稟仲春之氣以生兼得地之辛味春氣生而升故味苦平微寒而無毒為少陽經表藥主心腹腸胃中結氣飲食積聚寒熱邪氣推陳致新除傷寒心下煩熱者足少陽膽也膽為清淨之府無出無入不可汗不可吐不可下其經在半表半裡故法從和解小柴胡湯之屬是也其性升而散屬陽故能達表散邪也邪結則心下煩熱邪散則煩熱自解陽氣下陷則為飲食積聚陽升則清氣上行脾胃之氣行陽道則飲食積聚自消散矣諸痰熱結實胸中邪逆五臟間遊氣者少陽實熱之邪所生病也柴胡苦平而微寒能除熱散結而解表故能愈以上諸病大腸停積水脹及濕痹拘攣者柴胡為風藥風能勝濕故也主治參互仲景小柴胡湯中同人參半夏黃芩治傷寒往來寒熱口苦耳聾胸脅痛無汗又治少陽經瘧往來寒熱亦治似瘧非瘧大便不實邪不在陽明者在大柴胡湯治傷寒表裡俱急傷寒百合證有柴胡百合湯東垣治元氣勞傷精神倦怠用參耆白朮炙甘草當歸佐以柴胡升麻此引脾胃之氣行陽道名補中益氣湯本方去當歸加茯苓豬苓澤瀉乾葛神麯名清暑益氣湯同四物湯去當歸加澤蘭益母草青蒿能治熱入血室同升麻乾葛等能升陽散火同生地黃黃柏黃連甘草甘菊玄參連翹羌活荊芥穗治暴赤眼簡誤柴胡性升而發散病人虛而氣升者忌之嘔吐及陰虛火熾炎上者法所同忌瘧非少陽經者勿入治瘧必用柴胡其說誤甚不可久服亦無益精明目之理盡信書則不如無書此之謂也按今柴胡俗用有二種色白黃而大者為銀柴胡用以治勞熱骨蒸色微黑而細者用以解表發散本經並無二種之說功用亦無分別但云銀州者為最則知其優於升散而非除虛熱之藥明矣衍義所載甚詳故並録之附衍義曰柴胡本經並無一字治勞今人方中鮮有不用者嗚呼凡此誤世甚多嘗原病勞有一種真臟虛損復受邪熱邪因虛而致勞故曰勞者牢也當須斟酌用之如經驗方中治勞熱青蒿煎之用柴胡正合宜耳服之無不效熱去即須急已若或無表熱得此愈甚雖至死人亦不悟目擊甚多可不戒哉可不慎哉日華子又謂補五勞七傷藥性論亦謂治勞乏羸瘦若此等症苟無實熱醫者執而用之不死何待注釋本草一字亦不可忽萬世之後所誤無窮耳麥門冬君味甘平微寒無毒主心腹結氣傷中傷飽胃絡脈絶羸瘦短氣身重目黃心下支滿虛勞客熱口乾燥渴止嘔吐愈痿蹶強陰益精消穀調中保神定肺氣安五臟令人肥健美顏色有子久服輕身不老不飢疏麥門冬在天則稟春陽生生之氣在地則正感清和稼穡之甘本經甘平平者沖和而淡也別録微寒著春德矣入足陽明兼入手少陰太陰實陽明之正藥主心腹結氣者邪熱之氣結於心腹間也以其清和微寒而平緩故能散熱結而下逆氣也傷中傷飽以致胃絡脈絶者脾主肌肉五臟之氣皆稟於胃胃病則脾無所稟故羸瘦而短氣也身重目黃者脾胃濕熱也心下支滿者脾虛而濕滯中焦也虛勞客熱口乾燥渴者因虛勞而熱客中焦故口乾而燥渴陽明之熱上衝則兼嘔吐也痿蹶者陽明濕熱病也陽明濕熱盛則上熏蒸於肺而為痿蹶治痿獨取陽明治本之道也陰精生於五味五味先入脾胃脾胃得所養則能散精幹各臟而陰精充滿故能強陰益精也中焦者脾胃之所治也脾胃安則中焦治故能消穀而調中也保神定肺氣則兼潤乎心肺矣胃氣盛則五臟之氣皆有所稟而安脾胃俱實則能食而肥健脾統血心主血五臟之英華皆見於面血充臟安則華彩外發而顏色美矣脾胃強則後天之元氣日盛下氣則陽交於陰交則虛勞愈而內熱不生內熱去則陰精日盛故有子斷谷固著於仙經卻乃已疾之良藥故久服延年輕身而不老不飢也主治參互同人參五味子為生脈散能復脈通心夏月暑傷氣服之良酒後飲之解酒毒肺熱者去人參加甘枸杞子作飲治一切虛勞客熱同五味子枸杞地黃牛膝鱉甲酸棗仁天冬治五勞七傷胃強者可加當歸火盛者可入黃柏砂仁甘草三物俱遞減治陽明瘧大渴引飲煩躁或嘔吐麥門冬石膏知母竹葉各數兩病人虛者加人參兩許痰多者加貝母橘紅各兩許藥性論云麥門冬止煩渴主大水面目肢節浮腫下水治肺痿吐膿宜同天門冬薏苡仁黃柏芍藥茯苓石斛桑根白皮五味子牛膝煮飲彌佳止泄精宜兼覆盆蒺藜黃柏五味子同茯苓車前黃連石斛豬苓澤瀉療心腹結氣身重目黃日華子治五勞七傷安魂定魄止渴肥人時疾熱狂頭痛止嗽故同石膏知母竹葉粳米專療時氣頭痛大渴煩躁及發狂甚者須各數兩濃煎頓飲乃佳虛羸人因作勞內傷而發者可量加人參名人參白虎湯有肺熱者勿入人參崔元亮海上方同黃連治消渴衍義治心肺虛熱虛勞客熱入沙參五味子同青蒿鱉甲牛膝地黃芍藥天門冬枸杞子五味子胡黃連山藥茯苓山茱萸蜜丸治骨蒸勞熱簡誤麥門冬性寒雖主脾胃而虛寒泄瀉及痘瘡虛寒作泄産後虛寒泄瀉者咸忌之獨活味苦甘平微溫無毒主風寒所擊金瘡止痛賁豚癇痓痓作痙女子疝瘕療諸賊風百節痛風無久新者久服輕身耐老一名羌活疏獨活稟天地正陽之氣以生故味苦甘平甄權潔古益之以辛微溫無毒氣味俱薄浮而升陽也足少陰引經氣分之藥羌活性溫辛苦氣厚於味浮而升陽也手足太陽行經風藥併入足厥陰少陰經氣分羌活氣雄獨活氣細故雄者治足太陽風濕相搏頭痛肢節痛一身盡痛者非此不能除乃卻亂反正之主君藥也細者治足少陰傷風頭痛兩足濕痹不能行動非此不能除而不治太陽之證名列君部之中非比柔懦之主小無不入大無不通故能散肌表八風之邪利周身百節之痛其主風寒所擊金瘡止痛者金瘡為風寒之所襲擊則血氣壅而不行故其痛愈甚獨活之苦甘辛溫能闢風寒邪散則肌表安和氣血流通故其痛自止也賁豚者腎之積腎經為風寒秉虛客之則成賁豚此藥本入足少陰故治賁豚癇與痓皆風邪之所成也風去則癇痓自愈矣女子疝瘕者寒濕乘虛中腎家所致也苦能燥濕溫能闢寒辛能發散寒濕去而腎臟安故主女子疝瘕及療諸賊風百節痛風無久新也輕身耐老定非攻邪發散之藥所能烏可久服哉本經載之誤矣二藥本一種第質有虛實老嫩氣有厚薄之不同耳主治參互君麻黃甘草主冬月即病傷寒太陽經頭疼發汗解表君麥門冬前胡黃芩佐以甘草治春時瘟疫邪在太陽頭痛入葛根湯治太陽陽明頭痛兼遍身骨痛口渴煩熱不得眠若渴甚煩熱甚頭痛甚則加石膏知母竹葉各兩許瘧發太陽經頭痛者於治瘧藥中加之痛止則去之同白朮蒼朮秦艽生地黃薏苡仁木瓜石斛黃柏治下部一切風濕濕熱同生地黃赤芍藥生甘草牡丹皮石膏等水煎治風熱上攻牙腫痛同萊蔔子炒香只取羌活為末每服二錢溫酒調下一日一服二日二服三日三服治妊娠浮腫由於風濕出許學士本事方人睛忽垂至鼻如黑角塞痛不可忍或時時大便血出痛名曰肝脹羌活一味煎汁服數盞自愈出夏子益奪疾方簡誤獨活羌活陽草中之風藥也本為祛風散寒除濕之要品風能勝濕以其性燥故也本經別録並載主中風及諸風不知真中風惟西北邊塞高寒之地風氣剛猛虛人當之往往猝中或口眼歪斜或口噤不語或手足癱瘓左右不仁或剛痙柔痙即角弓反張此藥與諸風藥並用可也若夫江南吳楚越閩百粵鬼方梁州之域從無剛徑之風多有濕熱之患質脆氣虛多熱多痰其患中風如前等病外證雖一一相似而其中實非何者此皆劉河間所謂將息失宜水不制火丹溪所謂中濕中痰中氣是也此則病系氣血兩虛虛則內熱煎熬津液結而為痰熱則生風故致猝倒亦如真中風狀而求其治療之方迥若天淵外邪之氣勝則實實則瀉之祛風是已內而真氣不足則虛虛則補之調氣補血生津清熱是已倘誤用風藥反致燥竭其津液血愈不足而病愈沉困命曰虛虛攻補既謬死生遂殊粗工懵昧執迷不悟茲特表而明之又有血虛頭痛及遍身疼痛骨痛因而帶寒熱者此屬內證誤用反致作劇升麻味甘苦平微寒無毒主解百毒殺百精老物殃鬼闢瘟疫瘴氣邪氣蠱毒入口皆吐出中惡腹痛時氣毒癘頭痛寒熱風腫諸毒喉痛口瘡久服不夭輕身長年疏升麻稟天地清陽之氣以生陽草也故味甘苦平微寒無毒潔古又云性溫味辛微苦氣味俱薄浮而升陽也為足陽明太陰引經的藥得蔥白白芷緩帶脈之縱急亦入手陽明大腸升陽氣於至陰之下春氣生生而上升升麻正得之故主解百毒感清陽之氣者必能破幽暗故殺百精老物殃鬼闢瘟疫瘴氣邪氣蠱毒入口皆吐出凡云甘者其氣必和升則必散和而散故主中惡腹痛時氣毒癘頭痛寒熱風腫諸毒喉痛口瘡者手少陽足陽明太陰熱極故也散三經之義則二證愈矣末載久服不夭輕身長年此豈發散之藥所能哉無是理也主治參互升麻葛根湯散足陽明之熱邪發手太陰陽明之斑疹及天行豌豆瘡水煎綿沾拭之引蔥白散手陽明風邪引石膏止陽明經齒痛或加生地黃麥門冬知母牡丹皮黃柏連翹玄參彌良醋炒緑色升麻君蓮肉人參治噤口痢有神同石膏知母麥門冬竹葉治陽明熱極發斑頭疼口渴佐參耆引清陽之氣上升行陽道故補脾胃藥中不可缺入升陽散火湯治陽氣鬱遏及元氣不足陽氣下陷同荊芥防風黃芩甘草白芷能去皮膚風邪同葛根荊芥菊花甘草解肌肉間風熱兼發浮汗同葛根連翹玄參甘草生地黃麥門冬治牙根浮爛惡臭為小兒斑疹及天行瘡子家聖藥天行瘡子即痘也未見點時可用見標之後不可用同鬱金服治蠱毒不吐則下同射干水煎服治射工溪毒並以滓塗之同生地黃麥門冬牛膝蒲黃水煎治小兒尿血佐黃連紅曲滑石白芍藥蓮肉甘草為治一切滯下要藥簡誤升麻屬陽而性升其功用俱如經說凡吐血鼻衄咳嗽多痰陰虛火動腎經不足及氣逆嘔吐驚悸怔忡癲狂等病法咸忌之誤用多致危殆車前子味甘咸寒無毒主氣癃止痛利水道小便除濕痹男子傷中女子淋瀝不欲食養肺強陰益精令人有子明目療赤痛久服輕身耐老葉及根味甘寒主金瘡止血衄鼻瘀血血瘕下血小便赤止煩下氣除小蟲疏車前子稟土之沖氣兼天之冬氣以生故味甘寒而無毒別録兼咸故走水道其主氣癃止痛通腎氣也小便利則濕去濕去則痹除傷中者必內起煩熱甘寒而潤下則煩熱解故主傷中女子淋瀝不欲食是脾腎交病也濕去則脾健而思食氣通則淋瀝自止水利則無胃家濕熱之氣上熏而肺得所養矣男女陰中俱有二竅一竅通精一竅通水命門真陽之火即系先天之元氣通家謂之君火後天之精氣亦與之合而系焉膀胱者濕熱濁陰之水滲出下竅為小便道家謂之民火是也二竅不並開故水竅常開則小便利而濕熱外泄不致鼓動真陽之火則精竅常閉而無漏泄久久則真火寧謐而精用益固精固則陰強精盛則生子腎氣固即是水臟足故明目及療赤痛輕身耐老即強陰益精之驗肝腎膀胱三經之要藥也附葉及根味甘寒金瘡必發熱熱則痛極甘寒能涼血除熱故主金瘡血熱則妄行溢出上竅故主吐衄及尿血便赤止煩下氣明醫雜録云根葉治鼻衄尿血熱痢搗汁飲之子主氣癃利水道療肝中有風熱沖目若人服固精藥久服此一泄即有子主治參互同木通沉香橘皮升麻治氣癃同二朮宣木瓜石斛川萆薢茯苓五加皮治濕痹獨用為末米飲下二錢匕治暴瀉神效君白芍藥白扁豆炙甘草治水泄同生地黃牛膝天門冬麥門冬黃柏五味子甘枸杞子人參白膠治尿血及婦人血淋入十子衍宗丸為生精種子要藥入金匱腎氣丸則固精益陰獨用炒為末專治濕勝水瀉同五味子覆盆子蓮子蓮鬚山茱萸肉沒食子沙苑蒺藜人參麥門冬牛膝白膠魚膠能強陰固精種子同生地黃甘菊花決明子玄參密蒙花連翹黃連柴胡生甘草治暴赤目痛簡誤車前子性走下竅雖有強陰益精之功若遇內傷勞倦陽氣下陷之病皆不當用腎氣虛脫者忌與淡滲藥同用木香味辛溫無毒主邪氣闢毒疫溫鬼強志主淋露療氣劣肌中偏寒主氣不足消毒殺鬼精物溫瘧蠱毒行藥之精久服不夢寤魘寐輕身致神仙疏青木香味辛溫無毒是稟夏秋之陽氣以生兼得土之陽精故無毒性屬純陽故主邪氣闢毒疫溫鬼陽主清明開發故強志及不夢寤魘寐行藥之精皆陽盛氣烈之功也主治參互同延胡索治一切女人血氣刺心痛不可忍同牽牛雷丸檳榔殺一切蟲佐黃連芍藥治一切滯下惟身熱作嘔逆口渴者勿用同橘皮砂仁白豆蔻紫蘇葉調一切氣不通順及冷氣攻痛作泄大怒後氣逆胸膈脹滿兩脅作痛簡誤詳其治療與今白木香當是兩種按圖經謂生永昌又云今惟廣州舶上有來者一云出大秦國一云産崑崙則所出地土各異是名同而實異可知已藥性論云當以崑崙來者為勝此絶不可得又云西胡來者劣今市肆所有正白木香也其味辛其氣溫專主諸氣不順求其能闢毒疫溫鬼殺鬼精物恐或未然也肺虛有熱者慎毋犯之元氣虛脫及陰虛內熱諸病有熱心痛屬火者禁用傷寒類要所載治天行熱病若發赤豆斑用青木香水煮服者蓋指崑崙來者一種定非坊間所市廣州舶上世所常用之白木香也薯蕷味甘溫平無毒主傷中補虛羸除寒熱邪氣補中益氣力長肌肉主頭面遊風頭風眼眩下氣止腰痛補虛勞羸瘦充五臟除煩熱強陰久服耳目聰明輕身不飢延年疏薯蕷得土之沖氣兼稟春之和氣以生故味甘溫平無毒觀其生搗傅癰瘡能消熱腫是微寒之驗也甘能補脾脾統血而主肌肉甘溫能益血脾治中焦故主傷中補虛羸補中益氣力長肌肉充五臟除煩熱強陰也其主寒熱邪氣及頭面遊風頭風眼眩下氣止腰痛者正以其甘能除大熱甘能益陰氣甘能緩中甘溫平能補肝腎藥性論云薯蕷臣能補五勞七傷去冷是也蓋寒熱邪氣者陰不足則內熱內虛則外邪客之熱則生風緩則下氣下氣則陽交於陰五勞既去五臟既充則久服耳目聰明輕身延年之效自著矣主治參互同地黃枸杞牛膝甘菊花白蒺藜五味子則補肝腎益陰氣治一切虛羸強陰長肌增力明目同蓮肉白扁豆人參白芍藥茯苓炙甘草橘皮則補脾健胃止泄瀉加木瓜藿香安吐逆同羊肉肉蓯蓉作羹可扶衰補虛羸簡誤薯藇薯蕷確係兩種譬諸米穀其種有禾糯秈黍稷之不同是也入藥必以冀州所産者為勝總之南方不逮北地圖經並載入四明則誤矣不宜與面同食薏苡仁味甘微寒無毒主筋急拘攣不可屈伸風濕痹下氣除筋骨邪氣不仁利腸胃消水腫令人能食久服輕身益氣疏薏苡仁正得地之燥氣兼稟乎天之秋氣以生故味甘淡微寒無毒陽中陰降也經曰地之濕氣感則害人皮肉筋脈又曰風寒濕三者合而成痹此藥性燥能除濕味甘能入脾朴脾兼淡能滲泄故主筋急拘攣不可屈伸及風濕痹除筋骨邪氣不仁利腸胃消水腫令人能食久服輕身總之濕邪去則脾胃安脾胃安則中焦治中焦治則能榮養乎四肢而通利乎血脈也甘以益脾燥以除濕脾實則腫消脾強則能食濕去則身輕如是則以上諸疾不求其愈而自愈矣主治參互同木瓜石斛萆薢黃柏生地黃麥門冬治痿厥同五加皮牛膝石斛生地黃甘草主筋拘急加二朮菖蒲甘菊花可治痹佐以附子能治胸痹偏緩獨用數兩淘淨煮濃湯頓飲可治肺經因濕火所傷吐膿血一切肺痿肺疽咳嗽涕唾上氣經曰治痿獨取陽明陽明者胃與大腸也二經濕熱盛則成痿熏蒸於肺則發肺癰及吐血咳嗽涕唾穢濁蓋肺與大腸為表裡腑熱必傳於臟大腸與胃家之濕熱散則痿自愈吐膿血咳嗽亦並止矣簡誤薏苡乃除濕燥脾胃之藥凡病人大便燥小水短少因寒轉筋脾虛無濕者忌之妊娠禁用澤瀉味甘咸寒無毒主風寒濕痹乳難消水養五臟益氣力肥健補虛損五勞除五臟痞滿起陰氣止泄精消渴淋瀝逐膀胱三焦停水久服耳目聰明不飢延年輕身面生光能行水上扁鵲云多服病人眼疏澤瀉稟地之燥氣天之冬氣以生故味甘寒別録益之以咸腎與膀胱為表裡咸能入腎甘能入脾寒能去熱蓋淡滲利竅之藥也其曰主風寒濕痹乳難消水養五臟皆以利水燥濕則脾得所養脾得所養則五臟皆得所養益氣力肥健者皆水利則濕去濕去則脾強之功效也又云主腹痞滿淋瀝逐膀胱三焦停水其能利水祛濕益無疑矣泄精者濕熱下流客腎與膀胱是民火扇君火也故精搖而泄病在脾胃濕熱盡則泄精自止矣止消渴者單指濕熱侵脾脾為邪所幹則不能致津液也總之其性利水除濕則因濕熱所生之病靡不除矣主治參互水腫晝劇夜平者陽水也澤瀉同豬苓白茯苓人參白朮白芍藥赤小豆桑白皮橘皮治之多服必愈夜劇晝平者陰水也同車前子赤茯苓生地黃白芍藥赤小豆桑根白皮木瓜石斛薏苡仁治之多服必愈入五苓散四苓散治一切濕熱入六味地黃丸除陰虛病有濕熱者同人參白朮半夏茯苓橘皮紫蘇豬苓為治飲之要藥一切停飲停水無不效仲景治心下支飲澤瀉五兩術二兩水二升煎取半升分溫再服素問身熱懈墮汗出如浴惡風少氣名曰酒風服之以澤瀉術各十分麋銜五分合以二指撮食後服之飲證病甚欲眩者用澤瀉五兩炒術二兩水三升煮濃服必效仲景治水搐渴煩小便不利或吐或瀉五苓散主之簡誤澤瀉本經及藥性論日華子皆曰補虛損五勞久服耳目聰明不飢延年及仙經斷谷腎虛精自出補女人血海令人有子等條則悖謬之談文不屬理非神農氏之言明矣扁鵲云多服病人眼乃為確論也澤瀉善逐水病人無濕無飲而陰虛及腎氣乏絶陽衰精自流出腎氣不固精滑目痛虛寒作泄等候法咸禁用誤犯令人虛極遠志君味苦溫無毒主咳逆傷中補不足除邪氣利九竅益智慧耳目聰明不忘強志倍力利丈夫定心氣止驚悸益精去心下膈氣皮膚中熱面目黃久服輕身不老好顏色延年莖名小草主益精補陰氣止虛損夢泄疏遠志感天之陽氣得地之芳烈而生故無毒亦陽草也其菖蒲之流乎其味苦溫兼微辛為手少陰經君藥兼入足太陰經苦能泄熱溫能壯氣辛能散郁故主咳逆傷中補不足養性全神明故除邪氣陽主發散故利九竅心氣開通則智慧自益經曰心為君主之官神明出焉天君既定五官自明故耳目聰明不忘強志陽氣盛則力增長男子屬陽故利丈夫定心氣止驚悸者心臟得補而實故心氣定而驚悸止也心火不妄動則陽不妄舉精不搖矣故益精心下膈氣是心氣鬱而不舒也皮膚中熱面目黃者濕熱在上部也苦以泄之溫以暢之辛以散之則二證自去矣久服輕身不老好顏色延年者心主血心氣足則血色華於面君主強明則十一官皆得職故延年不老陽氣日積故身輕也人之心腎晝夜必交心家氣血旺盛則腎亦因之而實腎藏精與志腎實故志強也莖名小草性味略同功用相近故亦主益精補陰氣止虛損夢泄主治參互同茯神人參地黃酸棗仁丹砂為鎮心定驚要藥同人參白芍藥酸棗仁茯神炙甘草天竺黃鉤藤鉤治兒心虛易驚加白檀香治一切驚及慢驚同茯神天竺黃鉤藤鉤丹砂金箔真珠琥珀膽星犀角治小兒急驚同人參柏子仁酸棗仁麥門冬五味子當歸身茯神茯苓益智仁生地黃甘草沉香治心氣弱心血少餒怯易驚夢寐多魘神不守舍怔忡健忘失志陽痿同茯神人參白朮龍眼酸棗仁木香炙甘草能歸脾益智入當歸六黃湯能止陰虛盜汗加甘草治婦人口噤失音小兒客忤古今録驗及範汪方治胸痹心痛逆氣膈中飲不下小草丸小草桂心蜀椒去目乾薑細辛各三兩附子二分炮去皮臍共為末蜜丸如梧子大先食米汁下三丸日三不知稍增以知為度禁豬肉冷水生蔥菜遠志一味煎酒治一切癰疽發背病從七情憂鬱惱怒而得者服之皆愈陳言三因方用遠志酒治一切癰疽發痛惡候浸大有死血陰毒在中則不痛傅之即痛有憂怒等氣積怒攻則痛不可忍傅之即不痛或蘊熱在內熱逼人手不可近傅之即清涼或氣虛冷潰而不斂傅之即斂此本韓大夫宅用以救人方極驗若七情內郁不問虛實寒熱治之皆愈用遠志不拘多寡米泔浸洗捶去心為末每服三錢溫酒一盞調澄少頃飲其清以滓傅患處簡誤心經有實火為心家實熱應用黃連生地黃者禁與參術等補陽氣藥同用龍膽味苦澀大寒無毒主骨間寒熱驚癇邪氣續絶傷定五臟殺蠱毒除胃中伏熱時氣溫熱熱泄下痢去腸中小蟲益肝膽氣止驚惕久服益智不忘輕身耐老疏草龍膽稟天地純陰之氣以生故其味大苦澀其性大寒而無毒足厥陰足少陰足陽明三經藥入足少陰除本經之熱腎主骨故主骨間寒熱熱極生風則發驚搐重則變為癇病濕熱邪氣之在中下二焦者非此不去熱去則諸證自解五臟有熱則不安熱除則五臟自定苦澀而寒故殺蠱毒大苦大寒故能滌除胃中所伏實熱及時氣溫熱熱泄下痢去腸中小蟲熱清則肝膽之氣亦清故益肝膽氣而止驚惕也久服益智不忘輕身耐老則非其任矣主治參互草龍膽同白芍藥甘草茯神麥門冬木通主小兒驚癇入心壯熱骨熱時疾熱黃口瘡同苦參牛膽治谷疸同苦參蛆蟲灰青黛治小兒一切疳熱狂語及瘡疥治蛔蟲攻心如刺吐清水龍膽二兩去頭銼水二盞煎取一盞去滓隔宿勿進食平旦時頓服之即瘥同生地黃等分治濕熱傷血分浸大腸以致卒下血多服必效簡誤草龍膽味既大苦性復大寒純陰之藥也雖能除實熱胃虛血少之人不可輕試凡病脾胃兩虛因而作泄者忌之凡病虛而有熱者勿用亦勿空腹服餌之令人溺不禁以其太苦則下泄太甚故也炮炙論以銅刀切去須上頭銼碎甘草汁中浸一宿漉出曝乾用細辛味辛溫無毒主咳逆頭痛腦動百節拘攣風濕痹痛死肌溫中下氣破痰利水道開胸中除喉痹齆鼻風癇疾下乳結汗不出血不行安五臟益肝膽通精氣久服明目利九竅輕身長年疏細辛稟天地陽升之氣以生故其味辛溫而無毒入手少陰太陽經風藥也風性升升則上行辛則橫走溫則發散故主咳逆頭痛腦動百節拘攣風濕痹痛死肌蓋痹及死肌皆是感地之濕氣或兼風寒所成風能除濕溫能散寒辛能開竅故療如上諸風寒濕疾也別録又謂溫中下氣破痰開胸中除喉痹齆鼻下乳結汗不出血不行益肝膽通精氣皆升發辛散開通諸竅之功也其曰久服明目利九竅輕身長年者必無是理蓋辛散升發之藥其可久服哉主治參互同石膏能治陽明火熱上攻以致齒痛得當歸芍藥芎藭牡丹藁本甘草白薇通治婦人子宮冷不受孕得鯉魚膽青羊肝甘菊花決明子療目痛得甘草療傷寒少陰咽痛得藁本芎藭白芷荊芥防風治風頭痛得紫蘇防風甘草桔梗杏仁薄荷桑白皮能解利傷風寒鼻塞簡誤細辛風藥也其性升燥發散故凡病內熱及火升炎上上盛下虛氣虛有汗血虛頭痛陰虛咳嗽法皆禁用即入風藥亦不可過五分以其氣味俱厚而性過烈耳石斛味甘平無毒主傷中除痹下氣補五臟虛勞羸瘦強陰益精補內絶不足平胃氣長肌肉逐皮膚邪熱痱氣腳膝疼冷痹弱久服厚腸胃輕身延年定志除驚疏石斛稟土中衝陽之氣兼感春之和氣以生故其味甘平而無毒氣薄味厚陽中陰也入足陽明足少陰亦入手少陰甘能除熱甘能助脾甘能益血平能下氣味厚則能益陰氣故主傷中下氣補五臟虛勞羸瘦強陰益精補內絶不足平胃氣長肌肉久服厚腸胃輕身延年定志除驚者以其入胃入腎入心脾補益四經則四經所生病皆得治療蓋皆益脾益胃益腎益心之功力也又主除痹逐肌膚邪熱痱氣腳膝疼冷痹弱者兼能除脾胃二經之濕故也主治參互同麥門冬白茯苓橘皮甘草則益胃強四肢同麥門冬五味子人參炙甘草白芍藥枸杞牛膝杜仲則理傷中補五臟虛勞羸瘦強陰益精同枇杷葉麥門冬橘皮則下氣得木瓜牛膝桑白皮石南葉白鮮皮黃柏茯苓菖蒲則主諸痹及逐皮膚邪熱痱氣冷痹弱夏月一味酒蒸泡湯代茶頓健足力簡誤宜入湯酒不宜入丸其味不苦而帶甘其形長而細中堅實者良酒洗蒸曬乾用慎毋誤用木斛味太苦餌之損人亦不入上焦藥巴戟天味辛甘微溫無毒主大風邪氣陰痿不起強筋骨安五臟補中增志益氣療頭面遊鳳少腹及陰中相引痛下氣補五勞益精利男子疏巴戟天稟土德真陽之精氣兼得天之陽和陽主發散散則橫行是當木之令而兼金之用也故其味辛別録益之以甘而本經又曰微溫無毒宜其然也其主大風邪氣及頭面遊風者風為陽邪勢多走上經曰邪之所湊其氣必虛巴戟天性能補助元陽而兼散邪況真元得補邪安所留此所以愈大風邪氣也主陰痿不起強筋骨安五臟補中增志益氣者是脾腎二經得所養而諸虛自愈矣其能療少腹及陰中引痛下氣並補五勞益精利男子者五臟之勞腎為之主下氣則火降火降則水升陰陽互宅精神內守故主腎氣滋長元陽益盛諸虛為病者不求其退而退矣主治參互得黃柏橘核荔枝核牛膝川萆薢木瓜金鈴子懷生地黃治疝氣因於腎虛得五味子肉蓯蓉鹿茸山茱萸柏子仁補骨脂枸杞子治陰痿去鹿茸肉蓯蓉加黃柏牛膝麥門冬生地黃車前子治陰虛白濁久不愈得鹿角柏子仁天門冬遠志蓮鬚覆盆黃柏治夜夢鬼交泄精同甘菊花石菖蒲何首烏刺蒺藜黑豆山茱萸天門冬治頭面上風得熟大黃治飲酒人腳弱簡誤巴戟天性溫屬陽故凡病相火熾盛思欲不得便赤口苦目昏目痛煩躁口渴大便燥閉法咸忌之菴䕡子味苦微寒微溫無毒主五臟瘀血腹中水氣臚脹留熱風寒濕痹身體諸痛療心下堅膈中寒熱周痹婦人月水不通消食明目久服輕身延年不老疏菴䕡子得土之烈氣而微感天之陰氣味厚氣薄故味苦微寒微溫無毒察其功用必應兼辛藥性論加辛是也何者苦以泄下溫以開通使非兼辛胡能主五臟瘀血及腹中水氣臚脹留熱風寒濕痹身體諸痛療心下堅膈中寒熱周痹婦人月水不通消食明目耶正以其散中有補補而能行故列上經也主治參互同牛膝茜草白及消腹癰去留血又主瘀血腹脹俗呼為單腹脹四肢不腫者是其候也善闢蛇蛇著之即爛簡誤此行血散結之藥婦人月事不以時至審察未定者不可輕用瘀血病見之不審者勿試卷柏味辛甘溫平微寒無毒主五臟邪氣女子陰中寒熱痛癥瘕血閉絶子止咳逆治脫肛散淋結頭中風眩痿蹶強陰益精久服輕身和顏色令人好容顏疏卷柏稟石之氣兼感天之陽氣以生故味辛溫別録益之以甘平微寒無毒入足厥陰少陰血分藥也故主五臟邪氣女子陰中寒熱痛癥瘕血閉絶子又主痿蹶強陰益精久服輕身和顏色當是理榮血之要藥行而能補者也別録又謂止咳逆治脫肛散淋結頭中風眩其亦辛能散結辛能潤燥甘能緩中甘能益血之謂歟簡誤孕婦禁用闢虺雷味苦大寒無毒主解百毒消痰祛大熱療頭痛闢瘟疫其狀如粗塊蒼朮節中有眼疏闢虺雷感天地陰寒之精其味苦氣大寒無毒故主解百毒消痰祛大熱療頭痛闢瘟疫豫章人專以此和諸草搗汁治疔瘡有神藥王味甘平無毒解一切毒止鼻衄吐血祛煩躁苗莖青色花黃色葉摘之有汁搗汁飲驗疏藥王稟天地清和生髮之氣以生故其味甘平無毒甘能解毒故主解一切毒平能涼血清熱故止鼻衄吐血祛煩躁也草犀根味辛平無毒主解諸藥毒嶺南及睦婺間如中毒草此藥及千金藤並解之亦主蠱毒溪毒惡刺虎狼蟲虺等毒天行瘧瘴寒熱咳嗽痰壅飛尸喉閉瘡腫小兒寒熱丹毒中惡疰忤痢血等並煮汁服之其功用如犀故名草犀解毒為最疏草犀根得地之辛味感天之寒氣以生本草只言辛平詳治療功能專主解藥毒亦主蠱毒溪毒惡刺虎狼蟲虺等天行瘧瘴寒熱咳嗽痰壅飛尸喉閉瘡腫小兒寒熱丹毒中惡疰忤痢血並煮汁服之其功用如犀故名草犀解毒為最生衢婺江饒間苗高二三尺獨莖根如細辛研服更良生水中者名水犀也百草花主百病長生神仙亦煮花汁釀酒服之異類云鳳剛者漁陽人也常採百花水漬封泥埋之百日煎為丸卒死者納口中即活剛服藥百餘歲入地肺山列仙傳云堯時赤松子服之得仙疏百草花當取群草中之芳烈者大都百花必在春時春者天地發生萬物之氣也花者華也因得天地發生之和氣抽其精英而為花故主百病長生神仙亦煮花汁釀酒服昔有采百花水漬泥封埋之百日煎為丸卒死者納口中即活其功固可驗矣以上三種一種唐本餘二種陳藏器余以下卻有旱藕石蕊仙人草會州白藥龍珠捶胡根甜藤孟娘菜吉祥草郎耶菜𧀎菜蓼蕎等功效雖多所産土地不一罕識難致坊間無有故皆存而不論以俟後之博物君子
